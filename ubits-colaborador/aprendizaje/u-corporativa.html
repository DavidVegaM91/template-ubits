<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">

    <!-- Estilos locales -->
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/avatar.css">
    <link rel="stylesheet" href="../../components/card-content.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/toolbar-panel.css">
    <link rel="stylesheet" href="../../components/dropdown-menu.css">
    <link rel="stylesheet" href="../../components/input.css">
    <link rel="stylesheet" href="../../components/chip.css">
    <link rel="stylesheet" href="../../components/modal.css">
    <link rel="stylesheet" href="../../components/paginator.css">

</head>
<body data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <div id="top-nav-container"></div>
            <!-- Content Area -->
            <div class="content-area">
                <!-- Content wrapper con secciones de widgets -->
                <div class="content-sections">
                    <!-- Sección encabezado universidad corporativa -->
                    <div class="section-single">
                        <div class="widget-encabezado-universidad">
                            <div class="encabezado-banner">
                                <img src="../../images/banner-u-corporativa.jpg" alt="Universidad Corporativa">
                            </div>
                            <div class="encabezado-content">
                                <h1 class="encabezado-title">Contenidos de mi empresa</h1>
                                <p class="encabezado-description">Encuentra los contenidos formativos creados por la empresa, pensados para todos nuestros colaboradores.</p>
                                <div class="encabezado-button-wrapper">
                                    <button type="button" class="ubits-button ubits-button--secondary ubits-button--md" onclick="window.location.href='../lms-creator/contenidos.html'">
                                        <i class="far fa-bolt"></i>
                                        <span>Acceder a LMS Creator</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- U. corporativa = vista colaborador del catálogo publicado (BDS contents); filtros = mismo modal que lms-creator/contenidos.html -->
                    <div class="section-single">
                        <div class="widget-buscador-filtros">
                            <div class="ubits-toolbar-panel" id="ucorporativa-toolbar-panel">
                                <div class="ubits-toolbar-panel__bar">
                                    <div class="ubits-toolbar-panel__title-block">
                                        <span class="ubits-toolbar-panel__title ubits-body-md-bold">Lista de contenidos</span>
                                        <span class="ubits-toolbar-panel__meta">
                                            <span class="ubits-body-sm-regular" id="buscador-results-count" aria-live="polite">0</span>
                                            <span class="ubits-body-sm-regular">resultados</span>
                                        </span>
                                    </div>
                                    <div class="ubits-toolbar-panel__actions">
                                        <div class="ubits-toolbar-panel__search-group" id="ucorporativa-search-group">
                                            <button type="button" id="buscador-toggle-btn" class="ubits-button ubits-button--secondary ubits-button--md ubits-button--icon-only ubits-toolbar-panel__search-toggle" data-tooltip="Buscar" data-tooltip-delay="1000" aria-label="Buscar">
                                                <i class="far fa-magnifying-glass"></i>
                                            </button>
                                            <div id="buscador-input-container" class="ubits-toolbar-panel__search-inline" style="display: none;" aria-hidden="true"></div>
                                            <button type="button" id="ucorporativa-btn-filtro" class="ubits-button ubits-button--secondary ubits-button--md ubits-button--icon-only ubits-toolbar-panel__filter-btn" data-tooltip="Filtrar" data-tooltip-delay="1000" aria-label="Filtrar">
                                                <i class="far fa-filter"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="widget-filtros-aplicados ucorp-filtros-aplicados" id="ucorp-filtros-aplicados" style="display: none;" aria-live="polite">
                                    <span class="ubits-body-sm-regular">Filtros aplicados:</span>
                                    <div class="filtros-chips-container" id="ucorp-filtros-chips-container"></div>
                                    <button type="button" class="ubits-button ubits-button--tertiary ubits-button--xs" id="ucorp-clear-all-filters-btn" aria-label="Limpiar todos los filtros">
                                        <i class="far fa-filter-slash"></i>
                                        <span>Limpiar filtros</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sección grid cards cursos propios (empty state entre grid y paginador = mismo bloque que el listado) -->
                    <div class="section-single">
                        <div class="widget-grid-cursos-propios">
                            <div class="grid-cards-container" id="cursos-corporativos-container"></div>
                            <div id="empty-state-no-results" style="display: none;"></div>
                            <div class="paginador-container" id="paginador-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Tab Bar Container -->
    <div id="tab-bar-container"></div>

    <!-- Floating Menu Container -->
    <div id="floating-menu-container"></div>
    
    <!-- Profile Menu Container -->
    <div id="profile-menu-container"></div>

        <script src="../../components/tooltip.js"></script>
<script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/avatar.js"></script>
    <script src="../../components/card-content.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/paginator.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../script.js"></script>
    <script src="../../bd-master/bd-master-niveles-contenido.js"></script>
    <script src="../../bd-master/bd-master-aliados.js"></script>
    <script src="../../bd-master/bd-master-categorias-fiqsha.js"></script>
    <script src="../../bd-master/bd-master-tipos-contenido.js"></script>
    <script src="../../bd-master/bd-contenidos-fiqsha.js"></script>
    <script>
        // Cargar componentes dinámicamente
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('sidebar-container', 'aprendizaje');
            loadSubNav('top-nav-container', 'aprendizaje');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');
            
            setTimeout(() => {
                document.querySelectorAll('.nav-tab, .hamburger-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                const corporateTab = document.querySelector('.nav-tab[data-tab="corporate"]');
                if (corporateTab) {
                    corporateTab.classList.add('active');
                }
                
                const corporateHamburger = document.querySelector('.hamburger-item[data-tab="corporate"]');
                if (corporateHamburger) {
                    corporateHamburger.classList.add('active');
                }
                
                const aprendizajeButton = document.querySelector('.nav-button[data-section="aprendizaje"]');
                if (aprendizajeButton) {
                    document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
                    aprendizajeButton.classList.add('active');
                }
                
                const modulosTabBarItem = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTabBarItem) {
                    document.querySelectorAll('.tab-bar-item').forEach(item => item.classList.remove('active'));
                    modulosTabBarItem.classList.add('active');
                }
                
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('corporativa');
                }
            }, 200);

            if (typeof initTooltip === 'function') {
                initTooltip('#ucorporativa-toolbar-panel [data-tooltip]');
            }

            // Contenidos desde bd-master/bd-contenidos-fiqsha.js (BDS_CONTENIDOS_FIQSHA)
            var COMPETENCIA_POR_CATEGORIA_FIQSHA = {
                'cfq-001': 'Liderazgo',
                'cfq-002': 'Comunicación',
                'cfq-003': 'Trabajo en equipo',
                'cfq-004': 'Gestión de proyectos',
                'cfq-005': 'Innovación',
                'cfq-006': 'Marketing digital',
                'cfq-007': 'Experiencia del cliente',
                'cfq-008': 'Gestión financiera',
                'cfq-009': 'People management',
                'cfq-010': 'Inteligencia emocional',
                'cfq-011': 'Resolución de problemas',
                'cfq-012': 'Productividad',
                'cfq-013': 'Negociación',
                'cfq-014': 'Ventas',
                'cfq-015': 'Marketing',
                'cfq-016': 'Gestión del cambio',
                'cfq-017': 'Desarrollo de software',
                'cfq-018': 'Data skills',
                'cfq-019': 'Wellness'
            };

            function buildCursosCorporativosFromBd() {
                var bd = typeof window !== 'undefined' && window.BDS_CONTENIDOS_FIQSHA;
                if (!bd || !bd.contents || !bd.contents.length) {
                    return [];
                }
                var nivelesArr = window.BD_MASTER_NIVELES_CONTENIDO && window.BD_MASTER_NIVELES_CONTENIDO.niveles;
                var aliadosArr = window.BD_MASTER_ALIADOS && window.BD_MASTER_ALIADOS.aliados;

                function nivelNombrePorId(nivelId) {
                    if (!nivelesArr || !nivelId) return 'Intermedio';
                    for (var j = 0; j < nivelesArr.length; j++) {
                        if (nivelesArr[j].id === nivelId) {
                            return nivelesArr[j].nombre || 'Intermedio';
                        }
                    }
                    return 'Intermedio';
                }

                function aliadoPorId(proveedorAliadoId) {
                    if (!aliadosArr || !proveedorAliadoId) return null;
                    for (var k = 0; k < aliadosArr.length; k++) {
                        if (aliadosArr[k].id === proveedorAliadoId) {
                            return aliadosArr[k];
                        }
                    }
                    return null;
                }

                var out = [];
                for (var i = 0; i < bd.contents.length; i++) {
                    var c = bd.contents[i];
                    var nivelNombre = nivelNombrePorId(c.nivelId);
                    var a = aliadoPorId(c.proveedorAliadoId);
                    var providerName = a && a.nombre ? a.nombre : 'UBITS';
                    var providerLogo = '../../images/Favicons/UBITS.jpg';
                    if (a && a.logo) {
                        providerLogo = '../../' + String(a.logo).replace(/^\.\//, '');
                    }
                    var durMin = c.tiempoValor != null ? String(c.tiempoValor) : '60';
                    var duration = durMin + ' min';
                    var competency = COMPETENCIA_POR_CATEGORIA_FIQSHA[c.categoriaFiqshaId] || 'Liderazgo';
                    var imgPath = c.imagen
                        ? ('../../' + String(c.imagen).replace(/^\.\//, ''))
                        : '../../images/Profile-image.jpg';
                    var tipo = c.tipoContenido || 'Curso';
                    out.push({
                        type: tipo,
                        title: c.titulo || '',
                        provider: providerName,
                        providerLogo: providerLogo,
                        duration: duration,
                        level: nivelNombre,
                        progress: 0,
                        status: 'default',
                        image: imgPath,
                        competency: competency,
                        language: (c.idioma || 'Español').trim(),
                        categoriaFiqshaId: c.categoriaFiqshaId || '',
                        nivelId: c.nivelId || ''
                    });
                }
                return out;
            }

            const cursosCorporativos = buildCursosCorporativosFromBd();

            /** Mismos criterios que `lms-creator/contenidos.html` (modal Filtros: tipo, categoría Fiqsha, nivel, idioma). */
            var ucorpFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
            var ucorpFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };

            let currentPage = 1;
            let itemsPerPageValue = 16;
            let paginatorInstance = null;
            let cursosFiltrados = [];
            let currentSearchValue = '';

            function hasActiveUcorpFiltros() {
                var f = ucorpFiltrosActive;
                return !!(f.tipo || f.categoriaId || f.nivelId || f.idioma);
            }

            function cursoPassesModalFilters(curso) {
                var f = ucorpFiltrosActive;
                if (f.tipo && (curso.type || '') !== f.tipo) return false;
                if (f.categoriaId && (curso.categoriaFiqshaId || '') !== f.categoriaId) return false;
                if (f.nivelId && (curso.nivelId || '') !== f.nivelId) return false;
                if (f.idioma && String(curso.language || '').trim() !== f.idioma) return false;
                return true;
            }

            function escapeHtmlUcorpChip(str) {
                if (str == null) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function resolveUcorpCategoriaNombre(id) {
                var catRoot = window.BD_MASTER_CATEGORIAS_FIQSHA;
                if (!catRoot || !Array.isArray(catRoot.categorias) || !id) return id || '';
                for (var i = 0; i < catRoot.categorias.length; i++) {
                    var c = catRoot.categorias[i];
                    if (c && c.id === id) return c.nombre || id;
                }
                return id;
            }

            function resolveUcorpNivelNombre(id) {
                var nivRoot = window.BD_MASTER_NIVELES_CONTENIDO;
                if (!nivRoot || !Array.isArray(nivRoot.niveles) || !id) return id || '';
                for (var j = 0; j < nivRoot.niveles.length; j++) {
                    var n = nivRoot.niveles[j];
                    if (n && n.id === id) return n.nombre || id;
                }
                return id;
            }

            function getUcorpFiltrosAplicadosCount() {
                var f = ucorpFiltrosActive;
                var n = 0;
                if (f.tipo) n++;
                if (f.categoriaId) n++;
                if (f.nivelId) n++;
                if (f.idioma) n++;
                return n;
            }

            function updateUcorpFiltrosButtonBadge() {
                var btn = document.getElementById('ucorporativa-btn-filtro');
                if (!btn) return;
                var c = getUcorpFiltrosAplicadosCount();
                var badge = document.getElementById('ucorp-btn-filtro-badge');
                if (c <= 0) {
                    if (badge && badge.parentNode) badge.parentNode.removeChild(badge);
                    btn.setAttribute('aria-label', 'Filtrar');
                    return;
                }
                if (!badge) {
                    badge = document.createElement('span');
                    badge.id = 'ucorp-btn-filtro-badge';
                    badge.className = 'ubits-attention-badge ubits-attention-badge--sm ubits-attention-badge--error';
                    btn.appendChild(badge);
                }
                badge.textContent = String(c);
                badge.classList.toggle('ubits-attention-badge--circle', c >= 1 && c <= 9);
                btn.setAttribute(
                    'aria-label',
                    'Filtrar (' + c + ' ' + (c === 1 ? 'filtro aplicado' : 'filtros aplicados') + ')'
                );
            }

            function syncUcorpFilterButtonState() {
                var fb = document.getElementById('ucorporativa-btn-filtro');
                if (fb) fb.classList.toggle('ubits-button--active', hasActiveUcorpFiltros());
            }

            function renderUcorpFiltrosAplicados() {
                var wrap = document.getElementById('ucorp-filtros-aplicados');
                var chipsCont = document.getElementById('ucorp-filtros-chips-container');
                if (!wrap || !chipsCont) return;
                var f = ucorpFiltrosActive;
                var chips = [];
                if (f.tipo) {
                    chips.push({
                        label: 'Tipo',
                        value: f.tipo,
                        remove: function () {
                            ucorpFiltrosActive.tipo = '';
                            ucorpFiltrosPending.tipo = '';
                            applyFiltersAndRender();
                        }
                    });
                }
                if (f.categoriaId) {
                    chips.push({
                        label: 'Categoría',
                        value: resolveUcorpCategoriaNombre(f.categoriaId),
                        remove: function () {
                            ucorpFiltrosActive.categoriaId = '';
                            ucorpFiltrosPending.categoriaId = '';
                            applyFiltersAndRender();
                        }
                    });
                }
                if (f.nivelId) {
                    chips.push({
                        label: 'Nivel',
                        value: resolveUcorpNivelNombre(f.nivelId),
                        remove: function () {
                            ucorpFiltrosActive.nivelId = '';
                            ucorpFiltrosPending.nivelId = '';
                            applyFiltersAndRender();
                        }
                    });
                }
                if (f.idioma) {
                    chips.push({
                        label: 'Idioma',
                        value: f.idioma,
                        remove: function () {
                            ucorpFiltrosActive.idioma = '';
                            ucorpFiltrosPending.idioma = '';
                            applyFiltersAndRender();
                        }
                    });
                }
                if (chips.length === 0) {
                    wrap.style.display = 'none';
                    chipsCont.innerHTML = '';
                    return;
                }
                wrap.style.display = 'flex';
                chipsCont.innerHTML = chips
                    .map(function (chip, index) {
                        var full = chip.label + ': ' + chip.value;
                        var labelVal = full.replace(/"/g, '&quot;');
                        return (
                            '<span class="ubits-chip ubits-chip--xs ubits-chip--close ucorp-filtro-chip" data-chip-index="' +
                            index +
                            '" data-tooltip="' +
                            labelVal +
                            '">' +
                            '<span class="ubits-chip__text">' +
                            escapeHtmlUcorpChip(full) +
                            '</span>' +
                            '<button type="button" class="ubits-chip__close" data-chip-index="' +
                            index +
                            '" aria-label="Quitar filtro"><i class="far fa-times"></i></button></span>'
                        );
                    })
                    .join('');
                chipsCont.querySelectorAll('.ubits-chip__close').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var idx = parseInt(btn.getAttribute('data-chip-index'), 10);
                        if (!isNaN(idx) && chips[idx] && typeof chips[idx].remove === 'function') {
                            chips[idx].remove();
                        }
                    });
                });
                if (typeof initTooltip === 'function') {
                    initTooltip('#ucorp-filtros-chips-container .ubits-chip[data-tooltip]');
                }
            }

            function clearUcorpFiltros() {
                ucorpFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                ucorpFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                applyFiltersAndRender();
            }

            function openUcorpFiltrosModal() {
                if (typeof openModal !== 'function' || typeof createInput !== 'function') {
                    if (typeof showToast === 'function') {
                        showToast('error', 'Carga modal.js e input.js para usar filtros.');
                    }
                    return;
                }
                ucorpFiltrosPending = {
                    tipo: ucorpFiltrosActive.tipo,
                    categoriaId: ucorpFiltrosActive.categoriaId,
                    nivelId: ucorpFiltrosActive.nivelId,
                    idioma: ucorpFiltrosActive.idioma
                };
                var overlayId = 'ucorp-filtros-modal';
                var tiposRoot = window.BD_MASTER_TIPOS_CONTENIDO;
                var catRoot = window.BD_MASTER_CATEGORIAS_FIQSHA;
                var nivRoot = window.BD_MASTER_NIVELES_CONTENIDO;
                var selectTipos = [{ value: '', text: 'Todos los tipos' }];
                if (tiposRoot && Array.isArray(tiposRoot.tipos)) {
                    tiposRoot.tipos.forEach(function (t) {
                        if (t && t.nombre) selectTipos.push({ value: t.nombre, text: t.nombre });
                    });
                }
                var selectCat = [{ value: '', text: 'Todas las categorías' }];
                if (catRoot && Array.isArray(catRoot.categorias)) {
                    catRoot.categorias.forEach(function (c) {
                        if (c && c.id) selectCat.push({ value: c.id, text: c.nombre || c.id });
                    });
                }
                var selectNiv = [{ value: '', text: 'Todos los niveles' }];
                if (nivRoot && Array.isArray(nivRoot.niveles)) {
                    nivRoot.niveles.forEach(function (n) {
                        if (n && n.id) selectNiv.push({ value: n.id, text: n.nombre || n.id });
                    });
                }
                var selectIdioma = [
                    { value: '', text: 'Todos los idiomas' },
                    { value: 'Español', text: 'Español' },
                    { value: 'Inglés', text: 'Inglés' },
                    { value: 'Portugués', text: 'Portugués' }
                ];
                var bodyHtml =
                    '<div class="ucorp-filtros-modal-fields">' +
                    '<div id="ucorp-filtro-tipo" class="ucorp-filtros-modal-field"></div>' +
                    '<div id="ucorp-filtro-categoria" class="ucorp-filtros-modal-field"></div>' +
                    '<div id="ucorp-filtro-nivel" class="ucorp-filtros-modal-field"></div>' +
                    '<div id="ucorp-filtro-idioma" class="ucorp-filtros-modal-field"></div>' +
                    '</div>';
                var overlay = openModal({
                    overlayId: overlayId,
                    title: 'Filtros',
                    bodyHtml: bodyHtml,
                    size: 'sm',
                    closeOnOverlayClick: true,
                    footerTertiary: {
                        text: 'Borrar filtros',
                        onClick: function () {
                            ucorpFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                            ucorpFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                            if (typeof closeModal === 'function') closeModal(overlayId);
                            applyFiltersAndRender();
                        }
                    },
                    footerHtml: '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="ucorp-filtros-modal-aplicar"><span>Aplicar</span></button>'
                });
                var tertiaryBtn = overlay.querySelector('#' + overlayId + '-footer-tertiary');
                if (tertiaryBtn) {
                    tertiaryBtn.classList.remove('ubits-button--tertiary');
                    tertiaryBtn.classList.add('ubits-button--secondary');
                }
                function bindPending(key, val) {
                    ucorpFiltrosPending[key] = val != null ? String(val) : '';
                }
                createInput({
                    containerId: 'ucorp-filtro-tipo',
                    type: 'select',
                    label: '',
                    placeholder: 'Tipo de contenido',
                    size: 'md',
                    selectOptions: selectTipos,
                    value: ucorpFiltrosPending.tipo,
                    onChange: function (v) { bindPending('tipo', v); }
                });
                createInput({
                    containerId: 'ucorp-filtro-categoria',
                    type: 'select',
                    label: '',
                    placeholder: 'Categoría',
                    size: 'md',
                    selectOptions: selectCat,
                    value: ucorpFiltrosPending.categoriaId,
                    onChange: function (v) { bindPending('categoriaId', v); }
                });
                createInput({
                    containerId: 'ucorp-filtro-nivel',
                    type: 'select',
                    label: '',
                    placeholder: 'Nivel',
                    size: 'md',
                    selectOptions: selectNiv,
                    value: ucorpFiltrosPending.nivelId,
                    onChange: function (v) { bindPending('nivelId', v); }
                });
                createInput({
                    containerId: 'ucorp-filtro-idioma',
                    type: 'select',
                    label: '',
                    placeholder: 'Idioma',
                    size: 'md',
                    selectOptions: selectIdioma,
                    value: ucorpFiltrosPending.idioma,
                    onChange: function (v) { bindPending('idioma', v); }
                });
                var aplicarBtn = document.getElementById('ucorp-filtros-modal-aplicar');
                if (aplicarBtn) {
                    aplicarBtn.addEventListener('click', function () {
                        ucorpFiltrosActive = {
                            tipo: ucorpFiltrosPending.tipo,
                            categoriaId: ucorpFiltrosPending.categoriaId,
                            nivelId: ucorpFiltrosPending.nivelId,
                            idioma: ucorpFiltrosPending.idioma
                        };
                        if (typeof closeModal === 'function') closeModal(overlayId);
                        applyFiltersAndRender();
                    });
                }
            }

            function applyFiltersAndRender() {
                var list = cursosCorporativos.filter(function (curso) {
                    return cursoPassesModalFilters(curso);
                });
                var sq = (currentSearchValue || '').toLowerCase().trim();
                if (sq) {
                    list = list.filter(function (curso) {
                        return (
                            curso.title.toLowerCase().includes(sq) ||
                            curso.competency.toLowerCase().includes(sq) ||
                            curso.type.toLowerCase().includes(sq) ||
                            curso.level.toLowerCase().includes(sq)
                        );
                    });
                }
                cursosFiltrados = list;
                currentPage = 1;
                renderCards();
                updatePaginator();
                syncUcorpFilterButtonState();
                renderUcorpFiltrosAplicados();
                updateUcorpFiltrosButtonBadge();
                if (typeof initTooltip === 'function') {
                    initTooltip('#ucorporativa-toolbar-panel [data-tooltip]');
                }
            }

            function updateResultsCount() {
                var el = document.getElementById('buscador-results-count');
                if (!el) return;
                var total = cursosCorporativos.length;
                var matchCount = cursosFiltrados.length;
                el.textContent = matchCount + '/' + total;
            }

            // Función para renderizar cards de la página actual
            function renderCards() {
                const container = document.getElementById('cursos-corporativos-container');
                const emptyStateContainer = document.getElementById('empty-state-no-results');
                if (!container) return;

                // Si no hay resultados, mostrar empty state
                if (cursosFiltrados.length === 0) {
                    // Ocultar el grid de cards
                    container.style.display = 'none';
                    
                    // Mostrar y cargar empty state component
                    if (emptyStateContainer) {
                        emptyStateContainer.style.display = 'flex'; // Usar flex para que gap funcione
                        
                        if (typeof loadEmptyState === 'function') {
                            loadEmptyState('empty-state-no-results', {
                                icon: 'fa-search',
                                iconSize: 'lg',
                                title: 'No se encontraron resultados',
                                description: 'Intenta ajustar tu búsqueda o filtros para encontrar lo que buscas.',
                                buttons: {
                                    secondary: {
                                        text: 'Limpiar búsqueda',
                                        icon: 'fa-times',
                                        onClick: function() {
                                            // Placeholder, manejaremos el click directamente
                                        }
                                    }
                                }
                            });
                            
                            // Agregar event listener directo al botón (KISS approach)
                            setTimeout(() => {
                                const clearBtn = emptyStateContainer.querySelector('.ubits-button--secondary');
                                if (clearBtn) {
                                    clearBtn.onclick = function(e) {
                                        e.preventDefault();
                                        e.stopPropagation();
                                        if (typeof window.clearSearchUCorporativa === 'function') {
                                            window.clearSearchUCorporativa();
                                        }
                                    };
                                }
                            }, 50);
                        }
                    }
                    
                    // Ocultar paginador cuando no hay resultados
                    const paginatorContainer = document.getElementById('paginador-container');
                    if (paginatorContainer) {
                        paginatorContainer.style.display = 'none';
                    }
                    
                    // Actualizar contador de resultados
                    updateResultsCount();
                    return;
                }

                // Si hay resultados, ocultar empty state y mostrar las cards
                if (emptyStateContainer) {
                    emptyStateContainer.style.display = 'none';
                    emptyStateContainer.innerHTML = ''; // Limpiar contenido del empty state
                    emptyStateContainer.className = ''; // Limpiar clases también
                }
                
                container.style.display = 'grid';
                
                if (typeof loadCardContent === 'function') {
                    const startIndex = (currentPage - 1) * itemsPerPageValue;
                    const endIndex = startIndex + itemsPerPageValue;
                    const pageCards = cursosFiltrados.slice(startIndex, endIndex);

                    loadCardContent('cursos-corporativos-container', pageCards);
                }
                
                // Mostrar paginador cuando hay resultados
                const paginatorContainer = document.getElementById('paginador-container');
                if (paginatorContainer) {
                    paginatorContainer.style.display = 'flex'; // Usar flex para centrar
                }
                
                // Actualizar contador de resultados
                updateResultsCount();
            }

            // Función para actualizar el paginador con el nuevo total de items
            function updatePaginator() {
                if (paginatorInstance) {
                    paginatorInstance.updateTotalItems(cursosFiltrados.length);
                } else {
                    // Si el paginador aún no existe, inicializarlo
                    initializePaginator();
                }
            }

            // Inicializar paginador usando componente oficial UBITS
            function initializePaginator() {
                const container = document.getElementById('paginador-container');
                if (!container || typeof loadPaginator !== 'function') return;

                paginatorInstance = loadPaginator('paginador-container', {
                    totalItems: cursosFiltrados.length,
                    itemsPerPage: itemsPerPageValue,
                    currentPage: currentPage,
                    itemsPerPageOptions: [16, 32, 48, 64, 80],
                    onPageChange: function(page) {
                        currentPage = page;
                        renderCards();
                        
                        // Scroll suave hacia arriba
                        window.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    },
                    onItemsPerPageChange: function(newItemsPerPage) {
                        itemsPerPageValue = newItemsPerPage;
                        currentPage = 1; // Resetear a la primera página
                        renderCards();
                        
                        // Actualizar el paginador con el nuevo total de páginas
                        if (paginatorInstance) {
                            paginatorInstance.updateTotalItems(cursosFiltrados.length);
                        }
                    }
                });
            }

            // Funcionalidad del botón de búsqueda
            const buscadorToggleBtn = document.getElementById('buscador-toggle-btn');
            const buscadorInputContainer = document.getElementById('buscador-input-container');
            const buscadorSearchGroup = document.getElementById('ucorporativa-search-group');
            let searchInputInstance = null;
            let isSearchMode = false;

            window.clearSearchUCorporativa = function() {
                ucorpFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                ucorpFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                currentSearchValue = '';

                const emptyStateContainer = document.getElementById('empty-state-no-results');
                if (emptyStateContainer) {
                    emptyStateContainer.style.display = 'none';
                    emptyStateContainer.innerHTML = '';
                    emptyStateContainer.className = '';
                }

                applyFiltersAndRender();
                
                // Si el input está abierto, cerrarlo también
                if (isSearchMode) {
                    buscadorInputContainer.innerHTML = '';
                    buscadorInputContainer.style.display = 'none';
                    buscadorInputContainer.setAttribute('aria-hidden', 'true');
                    buscadorToggleBtn.style.display = 'flex';
                    isSearchMode = false;
                    searchInputInstance = null;
                    if (buscadorSearchGroup) {
                        buscadorSearchGroup.classList.remove('ucorporativa-search-mode-active');
                    }
                }
            };

            // Función para cerrar el input de búsqueda
            function closeSearchInput(clearSearchParam = true) {
                if (isSearchMode) {
                    buscadorInputContainer.innerHTML = '';
                    buscadorInputContainer.style.display = 'none';
                    buscadorInputContainer.setAttribute('aria-hidden', 'true');
                    buscadorToggleBtn.style.display = 'flex';
                    if (buscadorSearchGroup) {
                        buscadorSearchGroup.classList.remove('ucorporativa-search-mode-active');
                    }
                    isSearchMode = false;
                    searchInputInstance = null;
                    
                    // Limpiar búsqueda y restaurar todos los cursos solo si se solicita
                    if (clearSearchParam) {
                        currentSearchValue = '';
                        applyFiltersAndRender();
                    }
                }
            }
            
            // Función para verificar si hay texto en el input de búsqueda
            function hasSearchText() {
                // Usar la variable almacenada en lugar de leer del DOM
                return currentSearchValue.trim() !== '';
            }
            
            if (buscadorToggleBtn && buscadorInputContainer) {
                buscadorToggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation(); // Prevenir que el clic se propague
                    if (!isSearchMode) {
                        // Convertir botón en input de búsqueda
                        buscadorToggleBtn.style.display = 'none';
                        buscadorInputContainer.style.display = 'flex';
                        buscadorInputContainer.removeAttribute('aria-hidden');
                        if (buscadorSearchGroup) {
                            buscadorSearchGroup.classList.add('ucorporativa-search-mode-active');
                        }
                        
                        // Crear input de búsqueda UBITS
                        if (typeof createInput === 'function') {
                            searchInputInstance = createInput({
                                containerId: 'buscador-input-container',
                                type: 'search',
                                placeholder: 'Buscar contenidos...',
                                size: 'md',
                                onChange: function(value) {
                                    currentSearchValue = value || '';
                                    applyFiltersAndRender();
                                }
                            });
                            
                            setTimeout(function () {
                                var inputWrapper = buscadorInputContainer.querySelector('.ubits-input-wrapper');
                                if (inputWrapper) {
                                    var inputElement = inputWrapper.querySelector('input');
                                    if (inputElement) {
                                        inputElement.focus();
                                    }
                                }
                            }, 100);
                            
                            isSearchMode = true;
                            if (typeof initTooltip === 'function') {
                                initTooltip('#ucorporativa-toolbar-panel [data-tooltip]');
                            }
                        }
                    }
                });
                
                document.addEventListener('click', function(e) {
                    if (isSearchMode) {
                        var filtroBtnUc = document.getElementById('ucorporativa-btn-filtro');
                        var filtrosWrap = document.getElementById('ucorp-filtros-aplicados');
                        if (filtroBtnUc && filtroBtnUc.contains(e.target)) return;
                        if (filtrosWrap && filtrosWrap.contains(e.target)) return;
                        if (e.target.closest && e.target.closest('.ubits-modal-overlay')) return;
                        var isClickInside = buscadorInputContainer.contains(e.target) ||
                            buscadorToggleBtn.contains(e.target);
                        if (!isClickInside) {
                            if (!hasSearchText()) {
                                closeSearchInput(true);
                            }
                        }
                    }
                });
            }

            var ucorpBtnFiltro = document.getElementById('ucorporativa-btn-filtro');
            if (ucorpBtnFiltro) {
                ucorpBtnFiltro.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    openUcorpFiltrosModal();
                });
            }
            var ucorpClearAllFiltros = document.getElementById('ucorp-clear-all-filters-btn');
            if (ucorpClearAllFiltros) {
                ucorpClearAllFiltros.addEventListener('click', function () {
                    clearUcorpFiltros();
                });
            }

            applyFiltersAndRender();
        });
    </script>
</body>
</html>
