    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initMiEquipoLayout === 'function') initMiEquipoLayout();

            var asignacionesData = [];
            var pendingCursosRow = null;
            var catalogoCursos = (window.CATALOGO_CURSOS_DRAWER || []).slice();
            if (typeof refreshCatalogoContenidosDrawer === 'function') {
                catalogoCursos = refreshCatalogoContenidosDrawer().slice();
            }

            function yyyyMmDdToDdMmYyyy(val) {
                if (!val || typeof val !== 'string') return '';
                var parts = val.trim().split('-');
                if (parts.length !== 3) return val;
                return parts[2] + '/' + parts[1] + '/' + parts[0];
            }

            function parseDateInput(val) {
                if (!val) return null;
                var parts = String(val).trim().split('-');
                if (parts.length !== 3) return null;
                var y = parseInt(parts[0], 10);
                var m = parseInt(parts[1], 10) - 1;
                var d = parseInt(parts[2], 10);
                if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
                var dt = new Date(y, m, d);
                return isNaN(dt.getTime()) ? null : dt;
            }

            function computeEstadoNuevoPlan(fechaInicioStr) {
                var today = new Date();
                today.setHours(0, 0, 0, 0);
                var inicio = parseDateInput(fechaInicioStr);
                if (!inicio) return 'Planeado';
                inicio.setHours(0, 0, 0, 0);
                if (inicio.getTime() > today.getTime()) return 'Planeado';
                return 'Procesando 0%';
            }

            function canCrearPlan() {
                var nombreEl = document.getElementById('asignacion-nombre');
                var nombre = nombreEl && nombreEl.value ? String(nombreEl.value).trim() : '';
                var inicioInput = document.querySelector('#fecha-inicio-container input');
                var finInput = document.querySelector('#fecha-fin-container input');
                var hasInicio = inicioInput && inicioInput.value && String(inicioInput.value).trim() !== '';
                var hasFin = finInput && finInput.value && String(finInput.value).trim() !== '';
                var hasAsignacion = asignacionesData.length > 0;
                var todasConContenido = asignacionesData.every(function (a) {
                    return a.contenidos && a.contenidos.length > 0;
                });
                return nombre.length > 0 && hasInicio && hasFin && hasAsignacion && todasConContenido;
            }

            function updateCrearPlanButtonState() {
                var btn = document.getElementById('btn-crear-plan-mi-equipo');
                if (btn) btn.disabled = !canCrearPlan();
            }
            window.updateCrearPlanButtonState = updateCrearPlanButtonState;

            function guardarNuevoPlan() {
                if (!canCrearPlan()) {
                    if (typeof showToast === 'function') {
                        var sinContenidos = asignacionesData.filter(function (a) {
                            return !a.contenidos || a.contenidos.length === 0;
                        });
                        if (sinContenidos.length > 0) {
                            showToast('error', 'Todas las asignaciones deben tener al menos un contenido. Agrega contenidos a las que faltan antes de guardar.');
                        } else {
                            showToast('error', 'Completa el nombre, las fechas y al menos una asignación con contenidos.');
                        }
                    }
                    return;
                }
                var nombreEl = document.getElementById('asignacion-nombre');
                var inicioInput = document.querySelector('#fecha-inicio-container input');
                var finInput = document.querySelector('#fecha-fin-container input');
                var fechaInicio = yyyyMmDdToDdMmYyyy(inicioInput ? inicioInput.value : '');
                var fechaFin = yyyyMmDdToDdMmYyyy(finInput ? finInput.value : '');
                var estado = computeEstadoNuevoPlan(inicioInput ? inicioInput.value : '');
                var contenidoPorUsuario = {};
                asignacionesData.forEach(function (a) {
                    if (a.colaboradorId) contenidoPorUsuario[String(a.colaboradorId)] = (a.contenidos || []).slice();
                });
                var nuevo = typeof addMiEquipoPlan === 'function' ? addMiEquipoPlan({
                    nombre: nombreEl.value.trim(),
                    fechaInicio: fechaInicio,
                    fechaFin: fechaFin,
                    estado: estado,
                    progreso: 0,
                    tipo: 'contenidos',
                    asignaciones: asignacionesData.slice(),
                    contenidoPorUsuario: contenidoPorUsuario
                }) : null;
                if (!nuevo) return;
                try {
                    sessionStorage.setItem('ubits-toast-pending', JSON.stringify({
                        type: 'success',
                        message: 'Plan creado correctamente.'
                    }));
                } catch (e) {}
                if (String(estado).indexOf('Procesando') === 0) {
                    window.location.href = 'editar-plan-contenidos.html?id=' + encodeURIComponent(nuevo.id);
                } else {
                    window.location.href = 'planes.html';
                }
            }

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Crear plan de contenidos',
                    backButton: {
                        onClick: function () { window.location.href = 'planes.html'; }
                    },
                    primaryButton: {
                        text: 'Crear plan',
                        icon: 'fa-plus',
                        onClick: guardarNuevoPlan
                    }
                });
                setTimeout(function () {
                    var actions = document.querySelector('#header-product-container .ubits-header-product__actions');
                    if (actions) {
                        var primaryBtn = actions.querySelector('.ubits-button--primary');
                        if (primaryBtn && !primaryBtn.id) {
                            primaryBtn.id = 'btn-crear-plan-mi-equipo';
                            primaryBtn.disabled = true;
                        }
                    }
                    updateCrearPlanButtonState();
                }, 0);
            }

            setTimeout(function () {
                var nombreTa = document.getElementById('asignacion-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function () {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                        updateCrearPlanButtonState();
                    });
                }
            }, 0);

            if (typeof createInput === 'function') {
                createInput({
                    containerId: 'fecha-inicio-container',
                    type: 'calendar',
                    label: 'Fecha de inicio',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Igual o mayor a hoy',
                    showHelper: true,
                    size: 'sm',
                    onChange: updateCrearPlanButtonState
                });
                createInput({
                    containerId: 'fecha-fin-container',
                    type: 'calendar',
                    label: 'Fecha de finalización',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Mayor o igual a la fecha de inicio',
                    showHelper: true,
                    size: 'sm',
                    onChange: updateCrearPlanButtonState
                });
            }

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) seleccionada(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            function escapeHtmlAttr(t) {
                if (t == null) return '';
                return String(t).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function buildAsignacionRowHtml(row) {
                var cursosCell = row.contenidosCount === 0
                    ? '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-asignacion-agregar-contenidos" data-asignacion-id="' + escapeHtmlAttr(row.id) + '"><i class="far fa-plus"></i><span>Agregar contenidos</span></button>'
                    : '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-asignacion-agregar-contenidos" data-asignacion-id="' + escapeHtmlAttr(row.id) + '"><i class="far fa-plus"></i><span>' + escapeHtmlAttr(String(row.contenidosCount)) + ' contenidos</span></button>';
                var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                    (avatarUrl
                        ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeHtmlAttr(row.nombreUsuario) + '" class="ubits-avatar__img"></span>'
                        : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                    '<span class="ubits-body-sm-regular">' + escapeHtmlAttr(row.nombreUsuario) + '</span></div>';
                return '<td data-col="usuario">' + usuarioCell + '</td><td data-col="contenidos">' + cursosCell + '</td>';
            }

            var asignacionesTablaRef = null;
            var pendingAsignacionesDeleteIds = [];

            if (typeof createUbitsDataTable === 'function') {
                asignacionesTablaRef = createUbitsDataTable({
                    containerId: 'asignaciones-data-table-container',
                    tableId: 'asignaciones-table',
                    title: 'Asignaciones',
                    columns: [
                        { id: 'usuario', label: 'Nombre de usuario' },
                        { id: 'contenidos', label: 'Contenidos asignados' }
                    ],
                    getData: function () { return asignacionesData; },
                    rowIdField: 'id',
                    buildRowHtml: buildAsignacionRowHtml,
                    features: { checkboxes: true, search: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    primaryButton: {
                        text: 'Agregar asignación',
                        icon: 'fa-plus',
                        onClick: function () { if (typeof abrirDrawerAgregarUsuarios === 'function') abrirDrawerAgregarUsuarios(); }
                    },
                    actionBarButtons: [{
                        id: 'eliminar',
                        label: 'Eliminar',
                        icon: 'fa-trash',
                        variant: 'error-secondary',
                        onClick: function (selectedIds) {
                            if (!selectedIds || selectedIds.length === 0) return;
                            pendingAsignacionesDeleteIds = selectedIds.slice();
                            var countEl = document.getElementById('asignaciones-delete-count');
                            var inputEl = document.getElementById('asignaciones-delete-type-input');
                            var confirmEl = document.getElementById('asignaciones-delete-confirm');
                            if (countEl) countEl.textContent = pendingAsignacionesDeleteIds.length;
                            if (inputEl) { inputEl.value = ''; inputEl.focus(); }
                            if (confirmEl) confirmEl.disabled = true;
                            var overlay = document.getElementById('asignaciones-delete-overlay');
                            if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
                        }
                    }],
                    emptyState: {
                        message: 'Aún no hay asignaciones',
                        icon: 'far fa-user-check',
                        description: 'Agrega colaboradores de tu equipo para asignarles contenidos en este plan.'
                    },
                    i18n: {
                        selectAll: 'Seleccionar todo',
                        deselectAll: 'Deseleccionar todo',
                        verSeleccionados: 'Ver seleccionados',
                        buscar: 'Buscar usuarios',
                        buscarPlaceholder: 'Buscar por nombre de usuario...'
                    }
                });
            }

            /** Drawer wizard: Participantes → Contenidos (mismo patrón que editar-plan-contenidos y LMS Creator). */
            function getDrawerAgregarAsignacionEditarPlanHtml() {
                var stepperEditHtml = '<nav id="drawer-wiz-stepper-nav-edit" class="drawer-wizard-stepper-nav" aria-label="Pasos de asignación">' +
                    '<ol id="drawer-wiz-stepper-ol-edit" class="ubits-stepper ubits-stepper--horizontal ubits-stepper--horizontal-compact">' +
                    '<li class="ubits-stepper__step ubits-stepper__step--active" data-step-label="Participantes">' +
                    '<span class="ubits-stepper__mark" aria-hidden="true"><span class="ubits-stepper__mark-num">1</span><i class="far fa-check" aria-hidden="true"></i></span>' +
                    '<span class="ubits-stepper__label">Participantes</span></li>' +
                    '<li class="ubits-stepper__rail" aria-hidden="true"></li>' +
                    '<li class="ubits-stepper__step ubits-stepper__step--pending" data-step-label="Contenidos">' +
                    '<span class="ubits-stepper__mark" aria-hidden="true"><span class="ubits-stepper__mark-num">2</span><i class="far fa-check" aria-hidden="true"></i></span>' +
                    '<span class="ubits-stepper__label">Contenidos</span></li>' +
                    '</ol></nav>';
                var stepParticipantesHtml = '<div id="drawer-wizard-step2" class="drawer-wizard-step drawer-wizard-step--participantes">' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--colaborador" id="drawer-usuarios-colaborador-panel" style="display:flex">' +
                    '  <div id="drawer-colab-data-table-container" class="drawer-colab-dt-wrapper"></div>' +
                    '</div></div>';
                var step3ContenidosHtml = '<div id="drawer-wizard-step3" class="drawer-wizard-step" style="display:none">' +
                    '<div class="drawer-agregar-cursos drawer-agregar-cursos--single-col">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Buscar y agregar contenidos</span>' +
                    '  <div class="drawer-cursos-search-row">' +
                    '    <div class="drawer-wiz-cursos-action-bar" id="drawer-wiz-cursos-action-bar">' +
                    '      <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-wiz-cursos-ver-seleccionados">' +
                    '        <i class="far fa-eye"></i><span>Ver seleccionados</span></button>' +
                    '    </div>' +
                    '    <div id="drawer-wiz-cursos-search-container" class="drawer-cursos-search-input-wrap"></div>' +
                    '    <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="drawer-wiz-cursos-filter-btn" aria-label="Filtrar por origen"><i class="far fa-filter"></i></button>' +
                    '  </div>' +
                    '  <div class="drawer-cursos-resultados-bg drawer-cursos-resultados-bg--paso2-full">' +
                    '    <div id="drawer-wiz-contenidos-empty-search" class="drawer-contenidos-empty-search-wrap" style="display:none;"></div>' +
                    '    <div class="drawer-cursos-cards-grid" id="drawer-wiz-cursos-cards-container"></div>' +
                    '  </div>' +
                    '</div></div>';
                return '<div class="drawer-asignacion-wizard-root">' + stepperEditHtml + stepParticipantesHtml + step3ContenidosHtml + '</div>';
            }

            function attachWizardContenidosPaso2(overlay, onSync, opts) {
                opts = opts || {};
                var idPrefix = opts.idPrefix || 'drawer-wiz';
                function I(suffix) { return idPrefix + '-' + suffix; }
                if (!overlay._wizCursosSeleccionados) overlay._wizCursosSeleccionados = [];
                var idSearch = I('cursos-search-container');
                var searchWrap = overlay.querySelector('#' + idSearch);
                if (searchWrap) searchWrap.innerHTML = '';
                if (typeof createInput === 'function') {
                    createInput({
                        containerId: idSearch,
                        type: 'search',
                        placeholder: 'Buscar contenidos...',
                        size: 'sm',
                        showLabel: false
                    });
                }
                var searchContainer = overlay.querySelector('#' + idSearch);
                var searchInput = searchContainer ? searchContainer.querySelector('input') : null;
                var cardsContainer = overlay.querySelector('#' + I('cursos-cards-container'));
                var emptySearchContainer = overlay.querySelector('#' + I('contenidos-empty-search'));
                var DRAWER_CURSOS_PAGE_SIZE = 12;
                var drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                var drawerCursosFilter = 'all';
                overlay._wizViewOnlySeleccionados = false;

                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    var bySource = catalogoCursos;
                    if (drawerCursosFilter === 'ubits') bySource = catalogoCursos.filter(function (c) { return c.courseSource === 'ubits'; });
                    else if (drawerCursosFilter === 'empresa') bySource = catalogoCursos.filter(function (c) { return c.courseSource === 'empresa'; });
                    return bySource.filter(function (c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q)) || (c.categoria && String(c.categoria).toLowerCase().includes(q));
                    });
                }

                function getFiltradosParaGrid() {
                    var filtrados = getFiltradosDrawerCursos();
                    var sel = overlay._wizCursosSeleccionados || [];
                    if (!overlay._wizViewOnlySeleccionados || !sel.length) return filtrados;
                    var idSet = {};
                    sel.forEach(function (c) { if (c && c.id != null) idSet[String(c.id)] = true; });
                    return filtrados.filter(function (c) { return idSet[String(c.id)]; });
                }

                function updateVerSeleccionadosBar() {
                    var bar = overlay.querySelector('#' + I('cursos-action-bar'));
                    var btn = overlay.querySelector('#' + I('cursos-ver-seleccionados'));
                    if (!bar || !btn) return;
                    var n = (overlay._wizCursosSeleccionados || []).length;
                    var icon = btn.querySelector('i');
                    var span = btn.querySelector('span');
                    if (n === 0) {
                        overlay._wizViewOnlySeleccionados = false;
                        bar.classList.remove('is-visible');
                        if (icon) icon.className = 'far fa-eye';
                        if (span) span.textContent = 'Ver seleccionados';
                        btn.classList.remove('active');
                        return;
                    }
                    bar.classList.add('is-visible');
                    if (overlay._wizViewOnlySeleccionados) {
                        if (icon) icon.className = 'far fa-eye-slash';
                        if (span) span.textContent = 'Dejar de ver seleccionados (' + n + ')';

            function initDrawerAgregarUsuarios() {
                var overlay = document.getElementById('drawer-agregar-usuarios');
                if (!overlay) return;

                overlay._wizContenidosAttached = false;
                overlay._wizardStep = 1;
                overlay._wizCursosSeleccionados = [];

                var stepContenidos = overlay.querySelector('#drawer-wizard-step3');

                var btnCancel = overlay.querySelector('#drawer-wiz-btn-cancel');

                    return empleadosDrawer;
                }

                    if (!btnPrimary) return;
                    var sp = btnPrimary.querySelector('span');
                    if (sp) sp.textContent = text;
                    else btnPrimary.textContent = text;
                }
                function setSecondaryLabel(text) {
                    if (!btnCancel) return;
                    var sp = btnCancel.querySelector('span');
                    if (sp) sp.textContent = text;
                    else btnCancel.textContent = text;
                }

                function syncWizardPrimary() {
                    if (!btnPrimary) return;
                    var ws = overlay._wizardStep || 1;
                    if (ws === 1) {
                        setPrimaryLabel('Siguiente');
                        var ref = overlay._drawerColabTablaRef;
                        var dis = !ref || typeof ref.getSelectedIds !== 'function' || ref.getSelectedIds().length === 0;
                        btnPrimary.disabled = dis;
                        setSecondaryLabel('Cancelar');
                    } else {
                        setPrimaryLabel('Agregar');
                        btnPrimary.disabled = (overlay._wizCursosSeleccionados || []).length === 0;
                        setSecondaryLabel('Anterior');
                    }
                }

                function showWizardStep(num) {
                    overlay._wizardStep = num;
                    if (stepParticipantes) stepParticipantes.style.display = num === 1 ? 'flex' : 'none';
                    if (stepContenidos) stepContenidos.style.display = num === 2 ? '' : 'none';
                    if (stepperOlEdit && typeof setStepperStepStates === 'function') {
                        setStepperStepStates(stepperOlEdit, num === 1 ? 0 : 1);

                    if (num === 2 && !overlay._wizContenidosAttached) {
                        attachWizardContenidosPaso2(overlay, syncWizardPrimary);
                    }
                    syncWizardPrimary();

                function escapeDrawerHtml(t) {

                    d.textContent = t;
                    return d.innerHTML;
                }
                function buildDrawerColabRowHtml(row) {
                    var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                    var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                        (avatarUrl

                        '<span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.nombre) + '</span></div>';
                    return '<td data-col="username"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.username) + '</span></td>' +
                        '<td data-col="nombre">' + usuarioCell + '</td>' +
                        '<td data-col="correo"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.correo) + '</span></td>' +
                        '<td data-col="area"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.area) + '</span></td>' +
                        '<td data-col="lider"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.lider) + '</span></td>';
                }

                var drawerColabContainer = overlay.querySelector('#drawer-colab-data-table-container');

                        getData: function () { return getEmpleadosDrawerLista(); },

                        emptyState: {

                            icon: 'far fa-user',
                            description: 'No se encontraron reportes directos para asignar en este plan.'

                            buscarPlaceholder: 'Buscar colaborador...'

                    });
                }
                overlay._drawerColabTablaRef = drawerColabTablaRef;
                overlay._empleadosDrawer = empleadosDrawer;

                if (stepParticipantes) stepParticipantes.style.flexDirection = 'column';

                showWizardStep(1);

                if (btnPrimary) {
                    btnPrimary.onclick = function () {
                        var ws = overlay._wizardStep || 1;
                        if (ws === 1) {
                            overlay._wizCursosSeleccionados = [];
                            overlay._wizContenidosAttached = false;
                            showWizardStep(2);
                            return;
                        }
                        var ref = overlay._drawerColabTablaRef;
                        var ids = (ref && typeof ref.getSelectedIds === 'function') ? ref.getSelectedIds() : [];
                        var cursosSel = (overlay._wizCursosSeleccionados || []).map(function (c) {
                            var full = catalogoCursos.find(function (x) { return String(x.id) === String(c.id); });
                            return full || c;
                        });
                        var afectados = 0;
                        ids.forEach(function (cid) {
                            var row = empleadosDrawer.find(function (e) { return String(e.id) === String(cid); });
                            if (!row) return;
                            var existing = asignacionesData.find(function (a) { return String(a.colaboradorId) === String(cid); });
                            if (existing) {
                                if (typeof mergeContenidosEnAsignacion === 'function') {
                                    mergeContenidosEnAsignacion(existing, cursosSel);
                                } else {
                                    existing.contenidos = cursosSel.slice();
                                    existing.contenidosCount = cursosSel.length;
                                }
                                afectados++;
                                return;
                            }
                            afectados++;
                            asignacionesData.push({
                                id: 'fila-usuario-' + String(cid),
                                colaboradorId: String(cid),
                                nombreUsuario: row.nombre || row.username || '',
                                avatar: row.avatar || null,
                                contenidos: cursosSel.slice(),
                                contenidosCount: cursosSel.length
                            });
                        });
                        if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                        if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                        updateCrearPlanButtonState();
                        if (typeof showToast === 'function' && afectados > 0) {
                            showToast('success', 'Contenidos asignados correctamente');
                        }
                    };
                }
                if (btnCancel) {
                    btnCancel.onclick = function () {
                        var ws = overlay._wizardStep || 1;
                        if (ws === 2) {
                            showWizardStep(1);
                            return;
                        }
                        if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                    };
                }
            }

            var deleteClose = document.getElementById('asignaciones-delete-close');
            var deleteCancel = document.getElementById('asignaciones-delete-cancel');
            var deleteConfirm = document.getElementById('asignaciones-delete-confirm');
            var deleteTypeInput = document.getElementById('asignaciones-delete-type-input');

            function closeAsignacionesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function () {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function (e) { if (e.target === deleteOverlay) closeAsignacionesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function () {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsignacionesDeleteModal();
                    pendingAsignacionesDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function (id) { idSet[String(id)] = true; });
                    asignacionesData = asignacionesData.filter(function (a) { return !idSet[String(a.id)]; });
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    updateCrearPlanButtonState();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' asignación(es) eliminada(s) correctamente');
                });
            }
        });
    </script>
</body>
</html>
