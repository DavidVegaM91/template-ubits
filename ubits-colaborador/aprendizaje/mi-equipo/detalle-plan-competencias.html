    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initMiEquipoLayout === 'function') initMiEquipoLayout();
            if (typeof hydrateMiEquipoPlanesCatalogData === 'function') hydrateMiEquipoPlanesCatalogData();
            var Shared = window.MiEquipoPlanCompetenciasShared;
            var params = new URLSearchParams(window.location.search);
            var planId = params.get('id') || '';
            var planRawBd = typeof loadPlanFormacionFromBd === 'function'
                ? loadPlanFormacionFromBd(planId, 'competencias')
                : null;
            if (!planRawBd || planRawBd.tipo !== 'competencias') {
                window.location.href = 'planes.html?tab=competencias';
                return;
            }
            var plan = typeof planFormacionToDetalleHeader === 'function'
                ? planFormacionToDetalleHeader(planRawBd)
                : { nombre: planRawBd.nombre, progreso: 0, fechaInicio: planRawBd.fechaInicio, fechaFin: planRawBd.fechaFin, estado: planRawBd.estado, horasEstudioPorCompetencia: 2 };

            var competenciaPorUsuario = planRawBd.competenciaPorUsuario || {};
            var asignacionesDetalleData = Shared.buildDetalleRowsFromPlan(planRawBd);
            var asignacionesDetalleTablaRef = null;
            var pendingAsignacionesDeleteIds = [];

            function isDetallePlanVistaProgreso() {
                return plan.estado === 'Vigente' || plan.estado === 'No vigente';
            }

            function planSinProgreso() {
                return plan.estado === 'Planeado' || String(plan.estado).indexOf('Procesando') === 0;
            }

            function progresoEstudiante(rowId) {
                var list = competenciaPorUsuario[rowId] || [];
                if (!list.length) return 0;
                var sum = list.reduce(function (acc, c) { return acc + (c.progress != null ? c.progress : 0); }, 0);
                return Math.round(sum / list.length);
            }

            function progresoTotalPlan() {
                if (typeof BD_PLANES_FORMACION !== 'undefined' && typeof BD_PLANES_FORMACION.getProgresoAgregadoPlan === 'function') {
                    return BD_PLANES_FORMACION.getProgresoAgregadoPlan(planRawBd);
                }
                if (!asignacionesDetalleData.length) return 0;
                var completos = asignacionesDetalleData.filter(function (r) {
                    return progresoEstudiante(r.id) >= 100;
                }).length;
                return Math.round((completos / asignacionesDetalleData.length) * 100);
            }

            function initDetallePlanProgressBarMount(value) {
                var wrap = document.getElementById('plan-progress-bar-wrap');
                if (!wrap || wrap.querySelector('.ubits-progress-bar')) return;
                if (typeof progressBarHtml === 'function') {
                    wrap.innerHTML = progressBarHtml({ value: value, size: 'lg', rounded: true, track: 'subtle', id: 'plan-progress-bar', ariaLabel: 'Progreso del plan' });
                }
            }

            function setDetallePlanProgressBar(value) {
                var pct = Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
                var root = document.getElementById('plan-progress-bar');
                if (root && typeof setProgressBarValue === 'function') setProgressBarValue(root, pct);
                var valueEl = document.getElementById('plan-progress-value');
                if (valueEl) valueEl.textContent = pct + '%';
            }

            function detallePlanTableProgressCell(value) {
                var html = typeof tableProgressCellHtml === 'function' ? tableProgressCellHtml(value) : '<div class="ubits-table__cell-progress"><span class="ubits-body-sm-regular">' + value + '%</span></div>';
                return '<td data-col="progreso">' + html + '</td>';
            }

            function getEstadoTagClass(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }

            function renderEstadoTag() {
                var estadoEl = document.getElementById('plan-estado-container');
                if (!estadoEl || !plan.estado) return;
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + getEstadoTagClass(plan.estado) + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + plan.estado + '</span></span>';
                estadoEl.innerHTML = tagHtml;
            }

            function getPlanActionOptionsByStatus(estado) {
                if (estado === 'Vigente') {
                    return [
                        { text: 'Editar plan', value: 'editar', leftIcon: 'pen' },
                        { text: 'Enviar recordatorio', value: 'send-reminders', leftIcon: 'bell' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                    ];
                }
                if (estado === 'No vigente') {
                    return [
                        { text: 'Descargar certificados', value: 'download-certificates', leftIcon: 'download' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                    ];
                }
                return [{ text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }];
            }

            function openDeletePlanModal() {
                var body = '<p class="ubits-body-md-regular">Si eliminas este plan, se perderá toda la data asociada (asignaciones, avances e historial).</p>';
                var typeBlock = '<div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="plan-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="plan-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var footer = plan.estado === 'Planeado'
                    ? '<button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm"><span>Eliminar plan</span></button>'
                    : '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="plan-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm" disabled><span>Eliminar plan</span></button>';
                document.getElementById('asignaciones-modals-container').innerHTML += getModalHtml({
                    overlayId: 'plan-delete-overlay',
                    title: plan.estado === 'Planeado' ? 'Eliminar plan planeado' : 'Confirmar eliminación',
                    bodyHtml: body + (plan.estado === 'Planeado' ? '' : '<p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p>' + typeBlock),
                    footerHtml: footer, size: 'sm', closeButtonId: 'plan-delete-close'
                });
                var overlay = document.getElementById('plan-delete-overlay');
                var confirmBtn = document.getElementById('plan-delete-confirm');
                var typeInput = document.getElementById('plan-delete-type-input');
                function closeDel() { if (overlay) { overlay.style.display = 'none'; overlay.remove(); } }
                document.getElementById('plan-delete-close').addEventListener('click', closeDel);
                var cancelBtn = document.getElementById('plan-delete-cancel');
                if (cancelBtn) cancelBtn.addEventListener('click', closeDel);
                if (typeInput && confirmBtn && plan.estado !== 'Planeado') {
                    typeInput.addEventListener('input', function () { confirmBtn.disabled = typeInput.value.trim().toLowerCase() !== 'eliminar'; });
                }
                confirmBtn.addEventListener('click', function () {
                    if (typeof deleteMiEquipoPlans === 'function') deleteMiEquipoPlans([planId]);
                    try { sessionStorage.setItem('ubits-toast-pending', JSON.stringify({ type: 'success', message: 'Plan eliminado correctamente.' })); } catch (e) {}
                    window.location.href = 'planes.html?tab=competencias';
                });
                if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
            }

            function openRemindersConfirmModal() {
                document.getElementById('asignaciones-modals-container').innerHTML += getModalHtml({
                    overlayId: 'plan-reminders-overlay',
                    title: 'Enviar recordatorio',
                    bodyHtml: '<p class="ubits-body-md-regular">Se enviará un recordatorio por correo a todos los estudiantes que no hayan completado su plan de formación, informándoles su avance hasta el momento y la fecha de vencimiento del plan.</p>',
                    footerHtml: '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="plan-reminders-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="plan-reminders-confirm"><span>Confirmar</span></button>',
                    size: 'sm', closeButtonId: 'plan-reminders-close'
                });
                var overlay = document.getElementById('plan-reminders-overlay');
                function closeR() { if (overlay) { overlay.style.display = 'none'; overlay.remove(); } }
                document.getElementById('plan-reminders-close').addEventListener('click', closeR);
                document.getElementById('plan-reminders-cancel').addEventListener('click', closeR);
                document.getElementById('plan-reminders-confirm').addEventListener('click', function () {
                    closeR();
                    if (typeof showToast === 'function') showToast('success', 'Recordatorio enviado');
                });
                if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
            }

            function initPlanActions() {
                var actionsBtn = document.getElementById('plan-actions-btn');
                if (!actionsBtn || typeof getDropdownMenuHtml !== 'function') return;
                actionsBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var overlayId = 'detalle-plan-comp-actions-overlay';
                    var existing = document.getElementById(overlayId);
                    if (existing) existing.remove();
                    document.body.insertAdjacentHTML('beforeend', getDropdownMenuHtml({ overlayId: overlayId, options: getPlanActionOptionsByStatus(plan.estado) }));
                    var overlay = document.getElementById(overlayId);
                    overlay.style.zIndex = '10100';
                    overlay.querySelectorAll('.ubits-dropdown-menu__option').forEach(function (opt) {
                        opt.addEventListener('click', function () {
                            var value = this.getAttribute('data-value');
                            closeDropdownMenu(overlayId);
                            if (overlay.parentNode) overlay.remove();
                            if (value === 'editar') window.location.href = 'editar-plan-competencias.html?id=' + encodeURIComponent(planId);
                            if (value === 'send-reminders') openRemindersConfirmModal();
                            if (value === 'download-certificates' && typeof showToast === 'function') showToast('success', 'Se descargaron los certificados de los estudiantes que finalizaron el plan.');
                            if (value === 'delete-plan') openDeletePlanModal();
                        });
                    });
                    openDropdownMenu(overlayId, actionsBtn, { alignRight: true });
                });
                if (typeof initTooltip === 'function') setTimeout(function () { initTooltip('#plan-actions-btn'); }, 50);
            }

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Detalle del plan de competencias',
                    backButton: { onClick: function () { window.location.href = 'planes.html?tab=competencias'; } }
                });
            }

            document.getElementById('plan-nombre').textContent = plan.nombre || '';
            document.getElementById('plan-fecha-inicio').textContent = typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaInicio) : plan.fechaInicio;
            document.getElementById('plan-fecha-fin').textContent = typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaFin) : plan.fechaFin;
            document.getElementById('plan-horas-estudio-static').textContent = String(plan.horasEstudioPorCompetencia != null ? plan.horasEstudioPorCompetencia : 4);
            renderEstadoTag();
            initPlanActions();

            var totalPlan = planSinProgreso() ? 0 : (plan.progreso != null ? plan.progreso : progresoTotalPlan());
            initDetallePlanProgressBarMount(totalPlan);
            setDetallePlanProgressBar(totalPlan);

            asignacionesDetalleData.forEach(function (r) { r.progreso = planSinProgreso() ? 0 : progresoEstudiante(r.id); });

            function escapeDetalleHtml(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }

            function buildDetalleAsignacionRowHtml(row) {
                var count = (competenciaPorUsuario[row.id] || []).length;
                var competenciasLabel = count === 0
                    ? (isDetallePlanVistaProgreso() ? '0 competencias' : 'Agregar competencias')
                    : (count + ' competencias');
                var competenciasBtn = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-detalle-plan-competencias-btn" data-row-id="' + escapeDetalleHtml(row.id) + '"><span>' + competenciasLabel + '</span></button>';
                var progresoMostrar = planSinProgreso() ? 0 : (row.progreso || 0);
                var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                    (avatarUrl
                        ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeDetalleHtml(row.usuario) + '" class="ubits-avatar__img"></span>'
                        : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                    '<span class="ubits-body-sm-regular">' + escapeDetalleHtml(row.usuario) + '</span></div>';
                return '<td data-col="usuario">' + usuarioCell + '</td>' +
                    '<td data-col="ultimo-acceso"><span class="ubits-body-sm-regular">' + escapeDetalleHtml(row.ultimoAcceso) + '</span></td>' +
                    '<td data-col="ultima-fecha-progreso"><span class="ubits-body-sm-regular">' + escapeDetalleHtml(typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.ultimaFechaProgreso) : row.ultimaFechaProgreso) + '</span></td>' +
                    '<td data-col="competencias">' + competenciasBtn + '</td>' +
                    detallePlanTableProgressCell(progresoMostrar);
            }

            var actionBarButtons = [
                {
                    id: 'recordatorio', label: 'Enviar recordatorio', icon: 'fa-bell', variant: 'secondary',
                    onClick: function (selectedIds) {
                        if (!selectedIds || !selectedIds.length) return;
                        if (typeof showToast === 'function') showToast('success', 'Recordatorio enviado a ' + selectedIds.length + ' usuario(s) (demo)');
                    }
                }
            ];
            if (!isDetallePlanVistaProgreso()) {
                actionBarButtons.push({
                    id: 'eliminar', label: 'Eliminar del plan', icon: 'fa-trash', variant: 'error-secondary',
                    onClick: function (selectedIds) {
                        if (!selectedIds || !selectedIds.length) return;
                        pendingAsignacionesDeleteIds = selectedIds.slice();
                        document.getElementById('asignaciones-delete-count').textContent = pendingAsignacionesDeleteIds.length;
                        document.getElementById('asignaciones-delete-type-input').value = '';
                        document.getElementById('asignaciones-delete-confirm').disabled = true;
                        var ov = document.getElementById('asignaciones-delete-overlay');
                        if (ov) { ov.style.display = 'flex'; ov.setAttribute('aria-hidden', 'false'); }
                    }
                });
            }

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) del plan?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled><span>Eliminar</span></button>', size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            if (typeof createUbitsDataTable === 'function') {
                asignacionesDetalleTablaRef = createUbitsDataTable({
                    containerId: 'asignaciones-detalle-data-table-container',
                    tableId: 'asignaciones-detalle-table',
                    title: 'Lista de asignaciones',
                    columns: [
                        { id: 'usuario', label: 'Nombre de usuario', sortable: true },
                        { id: 'ultimo-acceso', label: 'Último acceso' },
                        { id: 'ultima-fecha-progreso', label: 'Última fecha de progreso', sortable: true },
                        { id: 'competencias', label: 'Competencias' },
                        { id: 'progreso', label: 'Progreso', sortable: true, sortType: 'number' }
                    ],
                    getData: function () { return asignacionesDetalleData; },
                    rowIdField: 'id',
                    buildRowHtml: buildDetalleAsignacionRowHtml,
                    features: { checkboxes: true, search: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    actionBarButtons: actionBarButtons,
                    emptyState: { message: 'No hay asignaciones', icon: 'far fa-user-group', description: 'Aún no hay colaboradores asignados a este plan.' },
                    i18n: { selectAll: 'Seleccionar todo', deselectAll: 'Deseleccionar todo', verSeleccionados: 'Ver seleccionados', buscar: 'Buscar usuarios', buscarPlaceholder: 'Buscar por nombre de usuario...' }
                });
            }

            function abrirDrawerCompetenciasEstudiante(rowId) {
                var rowData = asignacionesDetalleData.find(function (r) { return String(r.id) === String(rowId); });
                var userName = rowData ? rowData.usuario : '';
                if (isDetallePlanVistaProgreso()) {
                    Shared.openPanelCompetenciasReadOnly({
                        userName: userName,
                        competencias: competenciaPorUsuario[rowId] || [],
                        plan: planRawBd,
                        colaboradorId: rowId,
                        sinProgreso: planSinProgreso(),
                        onClose: function () {
                            if (asignacionesDetalleTablaRef) asignacionesDetalleTablaRef.refresh();
                        }
                    });
                } else {
                    window.location.href = 'editar-plan-competencias.html?id=' + encodeURIComponent(planId);
                }
            }

            document.getElementById('asignaciones-detalle-data-table-container').addEventListener('click', function (e) {
                if (e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                var row = e.target.closest('tbody tr[data-id]');
                if (!row) return;
                var rowId = row.getAttribute('data-id');
                var btn = e.target.closest('.js-detalle-plan-competencias-btn');
                if (btn) rowId = btn.getAttribute('data-row-id') || rowId;
                e.preventDefault();
                e.stopPropagation();
                abrirDrawerCompetenciasEstudiante(rowId);
            });

            var deleteOverlay = document.getElementById('asignaciones-delete-overlay');
            if (deleteOverlay) {
                function closeAsigDel() {
                    deleteOverlay.style.display = 'none';
                    deleteOverlay.setAttribute('aria-hidden', 'true');
                    document.getElementById('asignaciones-delete-type-input').value = '';
                    document.getElementById('asignaciones-delete-confirm').disabled = true;
                }
                document.getElementById('asignaciones-delete-type-input').addEventListener('input', function () {
                    document.getElementById('asignaciones-delete-confirm').disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
                document.getElementById('asignaciones-delete-close').addEventListener('click', closeAsigDel);
                document.getElementById('asignaciones-delete-cancel').addEventListener('click', closeAsigDel);
                deleteOverlay.addEventListener('click', function (e) { if (e.target === deleteOverlay) closeAsigDel(); });
                document.getElementById('asignaciones-delete-confirm').addEventListener('click', function () {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsigDel();
                    ids.forEach(function (id) { delete competenciaPorUsuario[id]; });
                    asignacionesDetalleData = asignacionesDetalleData.filter(function (r) { return ids.indexOf(r.id) === -1; });
                    if (asignacionesDetalleTablaRef) asignacionesDetalleTablaRef.refresh();
                    setDetallePlanProgressBar(progresoTotalPlan());
                    if (typeof showToast === 'function') showToast('success', ids.length + ' asignación(es) eliminada(s) del plan');
                });
            }

            try {
                var pending = sessionStorage.getItem('ubits-toast-pending');
                if (pending && typeof showToast === 'function') {
                    var t = JSON.parse(pending);
                    showToast(t.type || 'success', t.message || '');
                    sessionStorage.removeItem('ubits-toast-pending');
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
