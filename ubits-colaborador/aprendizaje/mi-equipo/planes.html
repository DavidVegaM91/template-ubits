    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initMiEquipoLayout === 'function') initMiEquipoLayout();

            var planesTablaRef = null;
            var pendingDeleteIds = [];
            var activeListTab = 'contenidos';

            try {
                var tabParam = (new URLSearchParams(window.location.search).get('tab') || '').toLowerCase();
                if (tabParam === 'competencias') activeListTab = 'competencias';
                else {
                    var stored = sessionStorage.getItem('ubits-mi-equipo-list-tab');
                    if (stored === 'competencias' || stored === 'contenidos') activeListTab = stored;
                }
            } catch (e) {}

            var planesFormacionData = typeof getMiEquipoPlanesListData === 'function'
                ? getMiEquipoPlanesListData()
                : (window.MI_EQUIPO_PLANES_DB && window.MI_EQUIPO_PLANES_DB.planes) || [];

            function refreshPlanesListData() {
                planesFormacionData = typeof getMiEquipoPlanesListData === 'function'
                    ? getMiEquipoPlanesListData()
                    : (window.MI_EQUIPO_PLANES_DB && window.MI_EQUIPO_PLANES_DB.planes) || [];
            }

            function persistListTab(tabId) {
                activeListTab = tabId === 'competencias' ? 'competencias' : 'contenidos';
                try { sessionStorage.setItem('ubits-mi-equipo-list-tab', activeListTab); } catch (e) {}
            }

            /** Tab activo según el header (fuente de verdad visual al crear plan). */
            function getActiveMiEquipoListTab() {
                var container = document.getElementById('header-product-container');
                if (container) {
                    var activeBtn = container.querySelector('.ubits-header-product__tabs .ubits-tab--active[data-tab-id]');
                    if (activeBtn) {
                        var tid = activeBtn.getAttribute('data-tab-id');
                        if (tid === 'competencias' || tid === 'contenidos') {
                            if (tid !== activeListTab) persistListTab(tid);
                            return tid;
                        }
                    }
                }
                return activeListTab === 'competencias' ? 'competencias' : 'contenidos';
            }

            function irCrearPlanMiEquipo() {
                var tab = getActiveMiEquipoListTab();
                var url = typeof getMiEquipoCrearPlanUrl === 'function'
                    ? getMiEquipoCrearPlanUrl(tab)
                    : (tab === 'competencias' ? 'crear-plan-competencias.html' : 'crear-plan-contenidos.html');
                window.location.href = url;
            }

            var planesAsignadoFilter = null;
            var PLANES_ASIGNADO_FILTER_MAX = 5;
            var planesAsignadoFilterOverlayId = 'planes-asignado-filter-overlay';

            function normalizePlanesFilterText(t) {
                if (!t) return '';
                return String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            }

            function getSubordinadosParaFiltroAsignados() {
                if (typeof getMiEquipoSubordinadosDirectos === 'function') {
                    return getMiEquipoSubordinadosDirectos().map(function (c) {
                        return {
                            colaboradorId: String(c.id || c.idColaborador || ''),
                            nombre: (c.nombre || '').trim(),
                            avatar: c.avatar || null
                        };
                    }).filter(function (p) { return p.nombre; });
                }
                return [];
            }

            function planIncluyeColaborador(planRow, colaboradorId) {
                if (!colaboradorId) return false;
                return (planRow.asignados || []).some(function (a) {
                    return String(a.colaboradorId) === String(colaboradorId);
                });
            }

            function getProgresoFilaLista(planRow) {
                if (planesAsignadoFilter && planesAsignadoFilter.colaboradorId) {
                    if (typeof getMiEquipoProgresoColaboradorEnPlan === 'function') {
                        return getMiEquipoProgresoColaboradorEnPlan(planRow.id, planesAsignadoFilter.colaboradorId);
                    }
                }
                if (typeof getMiEquipoProgresoAgregadoPlan === 'function') {
                    return getMiEquipoProgresoAgregadoPlan(planRow.id);
                }
                return planRow.progreso != null ? planRow.progreso : 0;
            }

            function getPlanesTableRowsForDisplay() {
                var rows = getFilteredPlanesData();
                if (planesAsignadoFilter && planesAsignadoFilter.colaboradorId) {
                    rows = rows.filter(function (p) {
                        return planIncluyeColaborador(p, planesAsignadoFilter.colaboradorId);
                    });
                }
                return rows.map(function (p) {
                    return {
                        id: p.id,
                        nombre: p.nombre,
                        fechaInicio: p.fechaInicio,
                        fechaFin: p.fechaFin,
                        estado: p.estado,
                        progreso: getProgresoFilaLista(p),
                        tipo: p.tipo,
                        asignados: p.asignados || []
                    };
                });
            }

            function clearPlanesAsignadoFilter(refreshTable) {
                planesAsignadoFilter = null;
                if (refreshTable !== false && planesTablaRef && typeof planesTablaRef.refresh === 'function') {
                    planesTablaRef.refresh();
                }
            }

            function updatePlanesAsignadoFilterChip() {
                var container = document.getElementById('planes-data-table-container');
                if (!container) return;
                var wrap = container.querySelector('.ubits-dt-filtros-aplicados');
                var chipsCont = container.querySelector('.filtros-chips-container');
                if (!wrap || !chipsCont) return;
                chipsCont.querySelectorAll('.js-planes-asignado-filter-chip').forEach(function (el) { el.remove(); });
                if (!planesAsignadoFilter || !planesAsignadoFilter.nombre) {
                    return;
                }
                wrap.style.display = 'flex';
                var labelVal = ('Asignados: ' + planesAsignadoFilter.nombre).replace(/"/g, '&quot;');
                var chipHtml = '<span class="ubits-chip ubits-chip--xs ubits-chip--close ubits-dt-chip js-planes-asignado-filter-chip" data-tooltip="' + labelVal + '">' +
                    '<span class="ubits-chip__text">Asignados: ' + escapeHtml(planesAsignadoFilter.nombre) + '</span>' +
                    '<button type="button" class="ubits-chip__close js-planes-asignado-filter-clear" aria-label="Quitar filtro de asignado"><i class="far fa-times"></i></button></span>';
                chipsCont.insertAdjacentHTML('afterbegin', chipHtml);
                var clearBtn = chipsCont.querySelector('.js-planes-asignado-filter-clear');
                if (clearBtn) {
                    clearBtn.addEventListener('click', function () {
                        clearPlanesAsignadoFilter(true);
                        setTimeout(function () { initPlanesTableTooltips(); }, 50);
                    });
                }
                if (typeof initTooltip === 'function') {
                    initTooltip('#planes-data-table-container .js-planes-asignado-filter-chip[data-tooltip]');
                }
            }

            function syncPlanesAsignadosFilterButton() {
                var btn = document.querySelector('#planes-data-table-container .js-planes-asignados-filter-btn');
                if (!btn) return;
                btn.classList.toggle('ubits-dt-filter-btn--active', !!(planesAsignadoFilter && planesAsignadoFilter.colaboradorId));
            }

            function initPlanesAsignadosColumnFilter() {
                var th = document.querySelector('#planes-data-table-container th[data-col="asignados"]');
                if (!th) return;
                th.classList.add('ubits-dt-th-filterable');
                var btn = th.querySelector('.js-planes-asignados-filter-btn');
                if (!btn) {
                    th.insertAdjacentHTML('beforeend',
                        ' <button type="button" class="ubits-button ubits-button--tertiary ubits-button--xs ubits-button--icon-only ubits-dt-filter-btn js-planes-asignados-filter-btn" aria-label="Filtrar por asignado" data-tooltip="Filtrar por asignado" data-tooltip-delay="1000"><i class="far fa-filter"></i></button>');
                    btn = th.querySelector('.js-planes-asignados-filter-btn');
                }
                syncPlanesAsignadosFilterButton();
                if (btn && !btn._planesFilterBound) {
                    btn._planesFilterBound = true;
                    btn.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        openPlanesAsignadoFilterMenu(btn);
                    });
                }
            }

            function openPlanesAsignadoFilterMenu(anchorBtn) {
                if (typeof window.getDropdownMenuHtml !== 'function' || typeof window.openDropdownMenu !== 'function') return;
                var personas = getSubordinadosParaFiltroAsignados();
                var overlayId = planesAsignadoFilterOverlayId;
                var existing = document.getElementById(overlayId);
                if (existing) existing.remove();
                var options = personas.map(function (p) {
                    var selected = planesAsignadoFilter && String(planesAsignadoFilter.colaboradorId) === String(p.colaboradorId);
                    return {
                        text: p.nombre,
                        value: p.colaboradorId,
                        avatar: p.avatar || null,
                        selected: !!selected
                    };
                });
                var autocompleteContainerId = overlayId + '-autocomplete';
                document.body.insertAdjacentHTML('beforeend', window.getDropdownMenuHtml({
                    overlayId: overlayId,
                    hasAutocomplete: true,
                    autocompletePlaceholder: 'Filtrar por asignado...',
                    autocompleteContainerId: autocompleteContainerId,
                    options: options,
                    footerSecondaryLabel: 'Cancelar',
                    footerPrimaryLabel: 'Aplicar',
                    footerSecondaryId: overlayId + '-cancel',
                    footerPrimaryId: overlayId + '-apply'
                }));
                var overlayEl = document.getElementById(overlayId);
                if (!overlayEl) return;
                var optionsContainer = overlayEl.querySelector('.ubits-dropdown-menu__options');
                var optionButtons = optionsContainer ? optionsContainer.querySelectorAll('.ubits-dropdown-menu__option') : [];

                function filterVisibleOptions(searchVal) {
                    var q = normalizePlanesFilterText(searchVal || '');
                    var shown = 0;
                    optionButtons.forEach(function (opt) {
                        var textEl = opt.querySelector('.ubits-dropdown-menu__option-text');
                        var text = textEl ? textEl.textContent : '';
                        var match = !q || normalizePlanesFilterText(text).indexOf(q) >= 0;
                        if (match && shown < PLANES_ASIGNADO_FILTER_MAX) {
                            opt.style.display = '';
                            shown++;
                        } else {
                            opt.style.display = 'none';
                        }
                    });
                }

                optionButtons.forEach(function (opt) {
                    opt.addEventListener('click', function () {
                        optionButtons.forEach(function (other) {
                            other.classList.remove('ubits-dropdown-menu__option--selected');
                        });
                        this.classList.add('ubits-dropdown-menu__option--selected');
                    });
                });

                var inputEl = document.getElementById(overlayId + '-autocomplete-input');
                var clearIcon = document.getElementById(overlayId + '-autocomplete-clear');
                if (inputEl) {
                    inputEl.placeholder = 'Filtrar por asignado...';
                    inputEl.value = '';
                    inputEl.setAttribute('aria-label', 'Filtrar por asignado');
                    inputEl.addEventListener('input', function () {
                        if (clearIcon) clearIcon.style.display = this.value.length > 0 ? 'block' : 'none';
                        filterVisibleOptions(this.value);
                    });
                }
                if (clearIcon && inputEl) {
                    clearIcon.style.display = 'none';
                    clearIcon.addEventListener('click', function (ev) {
                        ev.preventDefault();
                        ev.stopPropagation();
                        inputEl.value = '';
                        clearIcon.style.display = 'none';
                        filterVisibleOptions('');
                        inputEl.focus();
                    });
                }
                filterVisibleOptions('');

                var applyBtn = document.getElementById(overlayId + '-apply');
                if (applyBtn) {
                    applyBtn.addEventListener('click', function () {
                        var selectedOpt = overlayEl.querySelector('.ubits-dropdown-menu__option--selected');
                        if (selectedOpt) {
                            var cid = selectedOpt.getAttribute('data-value');
                            var persona = personas.find(function (p) { return String(p.colaboradorId) === String(cid); });
                            var labelFallback = selectedOpt.querySelector('.ubits-dropdown-menu__option-text');
                            planesAsignadoFilter = {
                                colaboradorId: cid,
                                nombre: persona ? persona.nombre : (labelFallback ? labelFallback.textContent.trim() : ''),
                                avatar: persona ? persona.avatar : null
                            };
                        } else {
                            planesAsignadoFilter = null;
                        }
                        if (typeof window.closeDropdownMenu === 'function') window.closeDropdownMenu(overlayId);
                        if (overlayEl.parentNode) overlayEl.remove();
                        if (planesTablaRef && typeof planesTablaRef.refresh === 'function') planesTablaRef.refresh();
                        setTimeout(function () { initPlanesTableTooltips(); }, 50);
                    });
                }
                var cancelBtn = document.getElementById(overlayId + '-cancel');
                if (cancelBtn) {
                    cancelBtn.addEventListener('click', function () {
                        if (typeof window.closeDropdownMenu === 'function') window.closeDropdownMenu(overlayId);
                        if (overlayEl.parentNode) overlayEl.remove();
                    });
                }
                overlayEl.addEventListener('click', function (ev) {
                    if (ev.target === overlayEl) {
                        if (typeof window.closeDropdownMenu === 'function') window.closeDropdownMenu(overlayId);
                        if (overlayEl.parentNode) overlayEl.remove();
                    }
                });
                window.openDropdownMenu(overlayId, anchorBtn);
            }

            function refreshPlanesTableUi() {
                if (planesTablaRef && typeof planesTablaRef.refresh === 'function') {
                    planesTablaRef.refresh();
                } else {
                    initPlanesAsignadosColumnFilter();
                    updatePlanesAsignadoFilterChip();
                    syncPlanesAsignadosFilterButton();
                    setTimeout(function () { initPlanesTableTooltips(); }, 50);
                }
            }

            function getFilteredPlanesData() {
                if (typeof getMiEquipoPlanesListData === 'function') {
                    return getMiEquipoPlanesListData().filter(function (p) { return p.tipo === activeListTab; });
                }
                return planesFormacionData.filter(function (p) { return p.tipo === activeListTab; });
            }

            function initPlanesTableTooltips() {
                if (typeof initTooltip === 'function') {
                    initTooltip('#planes-data-table-container [data-tooltip]');
                }
            }

            function buildAsignadosCellHtml(row) {
                var html = '';
                if (planesAsignadoFilter && planesAsignadoFilter.colaboradorId) {
                    var persona = (row.asignados || []).find(function (a) {
                        return String(a.colaboradorId) === String(planesAsignadoFilter.colaboradorId);
                    });
                    if (!persona) {
                        persona = {
                            nombre: planesAsignadoFilter.nombre,
                            avatar: planesAsignadoFilter.avatar
                        };
                    }
                    if (typeof renderAvatar === 'function') {
                        var nombre = (persona.nombre || persona.name || planesAsignadoFilter.nombre || '').trim();
                        var tooltip = nombre.replace(/"/g, '&quot;');
                        html = '<span class="js-planes-asignado-filter-avatar"' +
                            (tooltip ? ' data-tooltip="' + tooltip + '" data-tooltip-delay="500"' : '') + '>' +
                            renderAvatar({ nombre: nombre, avatar: persona.avatar || null }, { size: 'sm' }) +
                            '</span>';
                    }
                } else {
                    var asignados = row.asignados || [];
                    if (asignados.length > 0 && typeof renderProfileList === 'function') {
                        html = renderProfileList(asignados, { size: 'sm', maxVisible: 3, showTooltip: true, tooltipDelay: 500 });
                    }
                }
                return '<td data-col="asignados"><div class="ubits-table__cell-assignee">' + html + '</div></td>';
            }

            function closePlanesAsignadosPopover() {
                var overlay = document.getElementById('planes-asignados-popover-overlay');
                var popover = document.getElementById('planes-asignados-popover');
                if (overlay) { overlay.style.display = 'none'; overlay.setAttribute('aria-hidden', 'true'); }
                if (popover) popover.style.display = 'none';
            }

            function openPlanesAsignadosPopover(chip) {
                var tr = chip.closest('tr');
                if (!tr) return;
                var rowId = tr.getAttribute('data-id');
                var row = getPlanesTableRowsForDisplay().find(function (r) { return String(r.id) === String(rowId); });
                if (!row || !row.asignados || row.asignados.length <= 3) return;
                var remaining = row.asignados.slice(3);
                var listEl = document.getElementById('planes-asignados-popover-list');
                var popover = document.getElementById('planes-asignados-popover');
                var overlay = document.getElementById('planes-asignados-popover-overlay');
                if (!listEl || !popover || !overlay) return;
                listEl.innerHTML = '';
                remaining.forEach(function (p) {
                    var nombre = (p && (p.nombre || p.name)) || 'Sin asignar';
                    var div = document.createElement('div');
                    div.className = 'asignados-popover-item';
                    if (typeof renderAvatar === 'function') {
                        div.innerHTML = renderAvatar(p, { size: 'sm' });
                    }
                    var span = document.createElement('span');
                    span.className = 'ubits-body-sm-regular';
                    span.textContent = nombre;
                    div.appendChild(span);
                    listEl.appendChild(div);
                });
                overlay.style.display = 'block';
                overlay.setAttribute('aria-hidden', 'false');
                popover.style.display = 'block';
                var rect = chip.getBoundingClientRect();
                var popoverH = popover.offsetHeight;
                var gap = 4;
                var margin = 8;
                var spaceBelow = window.innerHeight - rect.bottom - margin;
                var spaceAbove = rect.top - margin;
                if (spaceBelow >= popoverH + gap) {
                    popover.style.top = (rect.bottom + gap) + 'px';
                } else if (spaceAbove >= popoverH + gap) {
                    popover.style.top = (rect.top - popoverH - gap) + 'px';
                } else {
                    popover.style.top = spaceBelow >= spaceAbove ? (rect.bottom + gap) + 'px' : (rect.top - popoverH - gap) + 'px';
                }
                var left = rect.left;
                var maxLeft = window.innerWidth - popover.offsetWidth - margin;
                if (left > maxLeft) left = maxLeft;
                if (left < margin) left = margin;
                popover.style.left = left + 'px';
            }

            function getEmptyStateConfig() {
                if (activeListTab === 'competencias') {
                    return {
                        message: 'Aún no tienes planes de competencias',
                        icon: 'far fa-bullseye',
                        description: 'Crea planes por competencias para que tu equipo desarrolle habilidades en un periodo definido.',
                        buttons: {
                            secondary: { text: 'Crear plan', icon: 'fa-plus', onClick: irCrearPlanMiEquipo }
                        }
                    };
                }
                return {
                    message: 'Aún no tienes planes de contenidos',
                    icon: 'far fa-layer-group',
                    description: 'Asigna cursos concretos a las personas de tu equipo en un periodo de tiempo.',
                    buttons: {
                        secondary: { text: 'Crear plan', icon: 'fa-plus', onClick: irCrearPlanMiEquipo }
                    }
                };
            }

            function updateEmptyStateConfig() {
                var cfg = getEmptyStateConfig();
                emptyStateConfig.message = cfg.message;
                emptyStateConfig.icon = cfg.icon;
                emptyStateConfig.description = cfg.description;
                emptyStateConfig.buttons = cfg.buttons;
            }

            var emptyStateConfig = getEmptyStateConfig();

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="planes-delete-count">0</strong> plan(es) seleccionado(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="planes-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="planes-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="planes-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="planes-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('planes-modals-container').innerHTML = getModalHtml({ overlayId: 'planes-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'planes-delete-close' });
            }

            function openPlanesDeleteModal(ids) {
                if (!ids || ids.length === 0) return;
                pendingDeleteIds = ids.slice();
                var countEl = document.getElementById('planes-delete-count');
                var inputEl = document.getElementById('planes-delete-type-input');
                var confirmEl = document.getElementById('planes-delete-confirm');
                if (countEl) countEl.textContent = pendingDeleteIds.length;
                if (inputEl) { inputEl.value = ''; inputEl.focus(); }
                if (confirmEl) confirmEl.disabled = true;
                var overlay = document.getElementById('planes-delete-overlay');
                if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
            }

            function escapeHtml(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }

            function getEstadoTagClass(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }

            function getEstadoTooltip(estado) {
                if (estado === 'Planeado') return 'Plan creado para una fecha futura; aún no ha iniciado. Solo lo ve el administrador, no los estudiantes.';
                if (estado === 'Vigente') return 'En curso: la fecha actual está entre inicio y fin.';
                if (estado === 'No vigente') return 'Ya pasó la fecha de cierre. El progreso quedó congelado; lo que estudien después no suma al plan.';
                return '';
            }

            function buildPlanesRowHtml(row) {
                var estadoClass = getEstadoTagClass(row.estado);
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + estadoClass + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + escapeHtml(row.estado) + '</span></span>';
                var tooltipText = getEstadoTooltip(row.estado);
                var estadoHtml = tooltipText
                    ? '<span data-tooltip="' + escapeHtml(tooltipText) + '">' + tagHtml + '</span>'
                    : tagHtml;
                var pct = Math.min(100, Math.max(0, parseInt(row.progreso, 10) || 0));
                var fechaInicioDisplay = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.fechaInicio) : row.fechaInicio);
                var fechaFinDisplay = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.fechaFin) : row.fechaFin);
                var accionesBtn = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only js-planes-row-acciones-btn" data-plan-id="' + escapeHtml(String(row.id)) + '" data-plan-tipo="' + escapeHtml(row.tipo) + '" aria-label="Acciones del plan" data-tooltip="Acciones" data-tooltip-delay="500"><i class="far fa-ellipsis-vertical"></i></button>';
                return '<td data-col="nombre"><span class="ubits-body-sm-regular">' + escapeHtml(row.nombre) + '</span></td>' +
                    buildAsignadosCellHtml(row) +
                    '<td data-col="fecha-inicio" data-date="' + escapeHtml(row.fechaInicio) + '"><span class="ubits-body-sm-regular">' + escapeHtml(fechaInicioDisplay) + '</span></td>' +
                    '<td data-col="fecha-fin" data-date="' + escapeHtml(row.fechaFin) + '"><span class="ubits-body-sm-regular">' + escapeHtml(fechaFinDisplay) + '</span></td>' +
                    '<td data-col="estado">' + estadoHtml + '</td>' +
                    '<td data-col="progreso">' + (typeof tableProgressCellHtml === 'function' ? tableProgressCellHtml(pct) : '<div class="ubits-table__cell-progress"><span class="ubits-body-sm-regular">' + pct + '%</span></div>') + '</td>' +
                    '<td data-col="acciones" class="planes-formacion-tabla__td-acciones">' + accionesBtn + '</td>';
            }

            function syncHeaderProductTabs() {
                var container = document.getElementById('header-product-container');
                if (!container) return;
                container.querySelectorAll('.ubits-header-product__tabs .ubits-tab[data-tab]').forEach(function (btn) {
                    var tid = btn.getAttribute('data-tab');
                    var isActive = tid === activeListTab;
                    btn.classList.toggle('ubits-tab--active', isActive);
                    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
                });
            }

            function switchMiEquipoListTab(tabId) {
                persistListTab(tabId);
                clearPlanesAsignadoFilter(false);
                updateEmptyStateConfig();
                syncHeaderProductTabs();
                refreshPlanesTableUi();
            }

            if (typeof createUbitsDataTable === 'function') {
                planesTablaRef = createUbitsDataTable({
                    containerId: 'planes-data-table-container',
                    tableId: 'planes-table',
                    title: 'Lista de planes',
                    columns: [
                        { id: 'nombre', label: 'Nombre del plan', sortable: true },
                        { id: 'asignados', label: 'Asignados' },
                        { id: 'fecha-inicio', label: 'Fecha inicio', sortable: true, sortType: 'date' },
                        { id: 'fecha-fin', label: 'Fecha fin', sortable: true, sortType: 'date' },
                        { id: 'estado', label: 'Estado', filterable: true, filterOptions: ['Vigente', 'No vigente', 'Planeado'], filterHasAutocomplete: false },
                        { id: 'progreso', label: 'Progreso', sortable: true, sortType: 'number' },
                        { id: 'acciones', label: 'Acciones' }
                    ],
                    initialSort: { column: 'fecha-inicio', direction: 'desc' },
                    getData: function () { return getPlanesTableRowsForDisplay(); },
                    rowIdField: 'id',
                    buildRowHtml: buildPlanesRowHtml,
                    features: { checkboxes: true, search: true, filters: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    actionBarButtons: [
                        { id: 'eliminar', label: 'Eliminar', icon: 'fa-trash', variant: 'error-secondary', onClick: function (selectedIds) {
                            openPlanesDeleteModal(selectedIds);
                        } }
                    ],
                    emptyState: emptyStateConfig,
                    i18n: { selectAll: 'Seleccionar todo', deselectAll: 'Deseleccionar todo', verSeleccionados: 'Ver seleccionados', clearFilters: 'Limpiar filtros', filtrosAplicados: 'Filtros aplicados', buscar: 'Buscar' },
                    onAfterRefresh: function () {
                        initPlanesAsignadosColumnFilter();
                        updatePlanesAsignadoFilterChip();
                        syncPlanesAsignadosFilterButton();
                        setTimeout(function () { initPlanesTableTooltips(); }, 50);
                    }
                });
                refreshPlanesTableUi();

                var clearFiltersBtn = document.querySelector('#planes-data-table-container .ubits-dt-clear-filters');
                if (clearFiltersBtn && !clearFiltersBtn._planesAsignadoClearBound) {
                    clearFiltersBtn._planesAsignadoClearBound = true;
                    clearFiltersBtn.addEventListener('click', function () {
                        planesAsignadoFilter = null;
                    }, true);
                }
            }

            var planesAsignadosOverlay = document.getElementById('planes-asignados-popover-overlay');
            if (planesAsignadosOverlay) planesAsignadosOverlay.addEventListener('click', closePlanesAsignadosPopover);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closePlanesAsignadosPopover();
            });

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    variant: 'tabs-with-actions',
                    tabs: [
                        { id: 'contenidos', label: 'Planes de contenidos' },
                        { id: 'competencias', label: 'Planes de competencias' }
                    ],
                    activeTabId: activeListTab,
                    onTabChange: function (tabId) { switchMiEquipoListTab(tabId); },
                    primaryButton: {
                        text: 'Crear plan',
                        icon: 'fa-plus',
                        onClick: irCrearPlanMiEquipo
                    }
                });
                syncHeaderProductTabs();
            }

            persistListTab(activeListTab);

            var deleteOverlay = document.getElementById('planes-delete-overlay');
            var deleteClose = document.getElementById('planes-delete-close');
            var deleteCancel = document.getElementById('planes-delete-cancel');
            var deleteConfirm = document.getElementById('planes-delete-confirm');
            var deleteTypeInput = document.getElementById('planes-delete-type-input');

            function closePlanesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function () {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closePlanesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closePlanesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function (e) { if (e.target === deleteOverlay) closePlanesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function () {
                    var ids = pendingDeleteIds.slice();
                    closePlanesDeleteModal();
                    pendingDeleteIds = [];
                    if (typeof deleteMiEquipoPlans === 'function') {
                        deleteMiEquipoPlans(ids);
                        refreshPlanesListData();
                    } else {
                        var idSet = {};
                        ids.forEach(function (id) { idSet[String(id)] = true; });
                        for (var i = planesFormacionData.length - 1; i >= 0; i--) {
                            if (idSet[String(planesFormacionData[i].id)]) planesFormacionData.splice(i, 1);
                        }
                    }
                    if (planesTablaRef && typeof planesTablaRef.refresh === 'function') refreshPlanesTableUi();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' plan(es) eliminado(s) correctamente');
                });
            }

            var planesContainer = document.getElementById('planes-data-table-container');
            if (planesContainer) {
                planesContainer.addEventListener('click', function (e) {
                    var countChip = e.target.closest('.ubits-profile-list__count');
                    if (countChip) {
                        e.preventDefault();
                        e.stopPropagation();
                        openPlanesAsignadosPopover(countChip);
                        return;
                    }
                    /* Menú ⋮ — mismo patrón que planes-contenidos.html */
                    if (e.target.closest('.js-planes-row-acciones-btn')) {
                        e.preventDefault();
                        e.stopPropagation();
                        var accBtn = e.target.closest('.js-planes-row-acciones-btn');
                        if (!accBtn || typeof window.getDropdownMenuHtml !== 'function' || typeof window.openDropdownMenu !== 'function' || typeof window.closeDropdownMenu !== 'function') return;
                        var planIdAcc = accBtn.getAttribute('data-plan-id');
                        refreshPlanesListData();
                        var planRowAcc = planIdAcc ? planesFormacionData.find(function (p) { return String(p.id) === String(planIdAcc); }) : null;
                        var estAcc = planRowAcc && planRowAcc.estado != null ? String(planRowAcc.estado) : '';
                        var planTipoAcc = (planRowAcc && planRowAcc.tipo) || accBtn.getAttribute('data-plan-tipo') || activeListTab;
                        var mostrarVerProgreso = estAcc === 'Vigente' || estAcc === 'No vigente';
                        var mostrarEditar = estAcc === 'Planeado' || estAcc === 'Vigente' || String(estAcc).indexOf('Procesando') === 0;
                        var overlayId = 'planes-formacion-row-options-overlay';
                        var prev = document.getElementById(overlayId);
                        if (prev) prev.remove();
                        var options = [];
                        if (mostrarVerProgreso) options.push({ text: 'Ver progreso', value: 'ver-progreso', leftIcon: 'chart-line' });
                        if (mostrarEditar) options.push({ text: 'Editar', value: 'editar', leftIcon: 'pen' });
                        options.push({ text: 'Eliminar', value: 'eliminar', leftIcon: 'trash' });
                        document.body.insertAdjacentHTML('beforeend', window.getDropdownMenuHtml({ overlayId: overlayId, options: options }));
                        var overlayEl = document.getElementById(overlayId);
                        if (!overlayEl) return;
                        overlayEl.style.zIndex = '10100';
                        overlayEl.querySelectorAll('.ubits-dropdown-menu__option').forEach(function (opt) {
                            opt.addEventListener('click', function () {
                                var val = this.getAttribute('data-value');
                                window.closeDropdownMenu(overlayId);
                                if (overlayEl.parentNode) overlayEl.remove();
                                if (val === 'ver-progreso') {
                                    var pid = accBtn.getAttribute('data-plan-id');
                                    var tipoV = planTipoAcc;
                                    window.location.href = (tipoV === 'competencias' ? 'detalle-plan-competencias.html' : 'detalle-plan.html') + '?id=' + encodeURIComponent(pid);
                                    return;
                                }
                                if (val === 'editar') {
                                    var pidEd = accBtn.getAttribute('data-plan-id');
                                    var tipoE = planTipoAcc;
                                    window.location.href = (tipoE === 'competencias' ? 'editar-plan-competencias.html' : 'editar-plan-contenidos.html') + '?id=' + encodeURIComponent(pidEd);
                                    return;
                                }
                                if (val === 'eliminar') {
                                    var pidDel = accBtn.getAttribute('data-plan-id');
                                    if (pidDel) openPlanesDeleteModal([pidDel]);
                                }
                            });
                        });
                        overlayEl.addEventListener('click', function (ev) {
                            if (ev.target === overlayEl) {
                                window.closeDropdownMenu(overlayId);
                                if (overlayEl.parentNode) overlayEl.remove();
                            }
                        });
                        window.openDropdownMenu(overlayId, accBtn, { alignRight: true });
                        return;
                    }
                    var row = e.target.closest('tbody tr[data-id]');
                    if (!row || e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                    var planId = row.getAttribute('data-id');
                    if (!planId) return;
                    refreshPlanesListData();
                    var planRow = planesFormacionData.find(function (p) { return String(p.id) === String(planId); });
                    var esProcesando = planRow && String(planRow.estado).indexOf('Procesando') === 0;
                    var esPlaneadoCont = planRow && planRow.estado === 'Planeado';
                    var tipoNav = (planRow && planRow.tipo) || activeListTab;
                    window.location.href = (esProcesando || esPlaneadoCont)
                        ? (tipoNav === 'competencias' ? 'editar-plan-competencias.html' : 'editar-plan-contenidos.html') + '?id=' + encodeURIComponent(planId)
                        : (tipoNav === 'competencias' ? 'detalle-plan-competencias.html' : 'detalle-plan.html') + '?id=' + encodeURIComponent(planId);
                });
            }

            try {
                var pendingToast = sessionStorage.getItem('ubits-toast-pending');
                if (pendingToast) {
                    sessionStorage.removeItem('ubits-toast-pending');
                    var pt = JSON.parse(pendingToast);
                    if (typeof showToast === 'function' && pt && pt.message) showToast(pt.type || 'success', pt.message);
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
