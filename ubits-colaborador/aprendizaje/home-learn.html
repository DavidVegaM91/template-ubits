<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - Dashboard</title>

    <!-- Estilos base UBITS -->
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/progress-bar.css">
    <link rel="stylesheet" href="../../components/carousel-contents.css">
    <link rel="stylesheet" href="../../components/carousel-indicators.css">
    <link rel="stylesheet" href="../../components/avatar.css">
    <link rel="stylesheet" href="../../components/card-content.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../components/input.css">
    <link rel="stylesheet" href="../../components/dropdown-menu.css">
    <link rel="stylesheet" href="../../components/badge-tag.css">
    <link rel="stylesheet" href="../../components/empty-state.css">
    <link rel="stylesheet" href="../../components/skeleton.css">
    <link rel="stylesheet" href="../../components/hero-search.css">
    <link rel="stylesheet" href="./catalogo.css">
    <link rel="stylesheet" href="./resultados-busqueda.css">
    <link rel="stylesheet" href="./home-learn.css">
</head>
<body data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>

        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">

                    <!-- Hero buscador — componente ubits-hero-search -->
                    <div class="section-single">
                        <div class="widget-home-learn-hero">
                            <div id="home-learn-hero-mount"></div>
                        </div>
                    </div>

                    <!-- Lo más buscado (debajo del hero, modo exploración) -->
                    <div class="section-single home-learn-trending-section" id="home-learn-trending-panel" hidden>
                        <div class="widget-home-learn-trending">
                            <h2 class="ubits-heading-h2 home-learn-trending__title">Lo más buscado</h2>
                            <div class="home-learn-trending__chips" id="catalog-chips" role="list"></div>
                        </div>
                    </div>

                    <!-- Exploración catálogo (visible al enfocar buscador) -->
                    <div class="section-single home-learn-browse-section" id="home-learn-browse-panel" hidden>
                        <div class="widget-home-learn-browse">
                            <div class="academias-section-wrapper">
                                <h2 class="ubits-heading-h2 academias-section-title">Explora por academias</h2>
                                <div id="catalog-results"></div>
                            </div>
                            <div id="aliados-container"></div>
                            <div class="tipos-contenido-section-wrapper">
                                <div class="tipos-contenido-section-header">
                                    <h2 class="ubits-heading-h2 tipos-contenido-section-title">Explora por tipo de contenido</h2>
                                    <div class="tipos-contenido-controls">
                                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="tipos-contenido-nuevo-prev" aria-label="Anterior">
                                            <i class="far fa-chevron-left"></i>
                                        </button>
                                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="tipos-contenido-nuevo-next" aria-label="Siguiente">
                                            <i class="far fa-chevron-right"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="tipos-contenido-carousel-nuevo" id="tipos-contenido-carousel-nuevo"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Resultados de búsqueda en grid -->
                    <div class="section-single home-learn-results-section" id="home-learn-results-panel" hidden>
                        <div class="widget-home-learn-resultados">
                            <div class="widget-buscador-filtros">
                                <div class="buscador-header">
                                    <div class="buscador-title-container">
                                        <h2 class="ubits-heading-h2 buscador-title">Resultados de búsqueda</h2>
                                        <div class="buscador-results">
                                            <span class="buscador-results-count" id="home-learn-results-count">0</span>
                                            <span class="buscador-results-text">resultados</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="widget-grid-resultados">
                                <div class="resultados-grid-container" id="home-learn-results-grid"></div>
                            </div>
                            <div id="home-learn-empty-state" style="display: none;"></div>
                        </div>
                    </div>

                    <!-- Zona de estudio — planes de formación activos -->
                    <div class="section-single home-learn-home-section">
                        <div class="widget-zona-estudio">
                            <div id="home-learn-zona-estudio-mount"></div>
                        </div>
                    </div>

                    <!-- Continúa aprendiendo -->
                    <div class="section-single home-learn-home-section">
                        <div class="widget-continua-viendo">
                            <div id="continua-viendo-container"></div>
                        </div>
                    </div>

                    <!-- Universidad corporativa (contenidos Fiqsha) -->
                    <div class="section-single home-learn-home-section">
                        <div class="widget-outstanding">
                            <div id="ucorporativa-home-container"></div>
                        </div>
                    </div>

                    <!-- Aliados destacados (al final) -->
                    <div class="section-single home-learn-home-section">
                        <div class="widget-aliados">
                            <div id="allies-container"></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/progress-bar.js"></script>
    <script src="../../components/carousel-indicators.js"></script>
    <script src="../../components/carousel-contents.js"></script>
    <script src="../../components/card-content.js"></script>
    <script src="../../script.js"></script>
    <!-- BD Universidad corporativa -->
    <script src="../../bd-master/bd-master-niveles-contenido.js"></script>
    <script src="../../bd-master/bd-master-aliados.js"></script>
    <script src="../../bd-master/bd-contenidos-fiqsha.js"></script>
    <script src="../../bd-master/bd-contenidos-ubits.js"></script>
    <script src="../../bd-master/bd-master-competencias.js"></script>
    <script src="../../bd-master/bd-master-habilidades.js"></script>
    <script src="../../bd-master/bd-master-categorias-fiqsha.js"></script>
    <script src="../lms-creator/planes-formacion/catalogo-contenidos-drawer.js"></script>
    <script src="../../components/hero-search.js"></script>
    <script src="./catalogo-browse.js"></script>
    <script src="./home-learn.js"></script>
    <script src="./home-learn-search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadSidebar('sidebar-container', 'aprendizaje');
            loadSubNav('top-nav-container', 'aprendizaje');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            setTimeout(function () {
                var homeTab = document.querySelector('.nav-tab[data-tab="home"]');
                if (homeTab) {
                    document.querySelectorAll('.nav-tab').forEach(function (tab) {
                        tab.classList.remove('active');
                    });
                    homeTab.classList.add('active');
                }

                var aprendizajeButton = document.querySelector('.nav-button[data-section="aprendizaje"]');
                if (aprendizajeButton) {
                    document.querySelectorAll('.nav-button').forEach(function (btn) {
                        btn.classList.remove('active');
                    });
                    aprendizajeButton.classList.add('active');
                }

                var modulosTabBarItem = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTabBarItem) {
                    document.querySelectorAll('.tab-bar-item').forEach(function (item) {
                        item.classList.remove('active');
                    });
                    modulosTabBarItem.classList.add('active');
                }

                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('inicio');
                }
            }, 200);
        });
    </script>
</body>
</html>
