<body data-theme="light" class="page-zona-estudio page-progreso">
    <div id="ubits-toast-container"></div>
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-contenido-tabs">
<div id="zona-estudio-panel-progreso" class="zona-estudio-progreso-page">
                                <div class="zona-estudio-tab-panel__inner zona-estudio-progreso">
                                    <!-- Nivel 1: hero unificado (cambia con la persona seleccionada) -->
                                    <section class="widget-zona-estudio-plan zona-estudio-progreso-hero" aria-labelledby="zona-estudio-progreso-hero-name">
                                        <div class="zona-estudio-progreso-hero__top">
                                            <div class="zona-estudio-progreso-hero__identity">
                                                <div id="zona-estudio-progreso-hero-avatar" class="zona-estudio-progreso-hero__avatar" aria-hidden="true"></div>
                                                <div class="zona-estudio-progreso-hero__text">
                                                    <h2 class="ubits-heading-h2 zona-estudio-progreso-hero__name" id="zona-estudio-progreso-hero-name"></h2>
                                                    <p class="ubits-body-sm-regular zona-estudio-progreso-hero__cargo" id="zona-estudio-progreso-hero-cargo"></p>
                                                    <p class="ubits-body-sm-regular zona-estudio-progreso-hero__mail" id="zona-estudio-progreso-hero-mail"></p>
                                                </div>
                                            </div>
                                            <div id="zona-estudio-progreso-profile" class="zona-estudio-progreso-profile" aria-label="Seleccionar persona"></div>
                                        </div>

                                        <div id="zona-estudio-progreso-hero-metrics" class="zona-estudio-progreso-hero__metrics">
                                            <div class="zona-estudio-plan__progress zona-estudio-progreso-hero__progress">
                                                <div class="zona-estudio-plan__progress-meta">
                                                    <span class="ubits-body-sm-regular" id="zona-estudio-progreso-general-label"></span>
                                                    <span class="ubits-body-sm-bold zona-estudio-plan__progress-pct" id="zona-estudio-progreso-general-pct"></span>
                                                </div>
                                                <div id="zona-estudio-progreso-general-bar"></div>
                                            </div>

                                            <div id="zona-estudio-progreso-kpis" class="zona-estudio-progreso-kpis" aria-label="Indicadores del colaborador"></div>

                                            <div id="zona-estudio-progreso-planes-carousel" class="zona-estudio-progreso-carousel-mount"></div>
                                        </div>

                                        <div id="zona-estudio-progreso-empty-planes" class="zona-estudio-progreso-empty-planes" style="display: none;"></div>
                                    </section>

                                    <section class="widget-zona-estudio-plan zona-estudio-progreso-recordatorio-widget" aria-labelledby="zona-estudio-progreso-recordatorio-title">
                                        <div id="zona-estudio-progreso-recordatorio"></div>
                                    </section>

                                    <div class="zona-estudio-progreso-rankings">
                                        <article class="widget-zona-estudio-plan zona-estudio-progreso-ranking-card">
                                            <div class="zona-estudio-progreso-ranking-card__head">
                                                <h3 class="ubits-body-md-bold zona-estudio-progreso-ranking-card__title">Ranking de estudio del mes</h3>
                                                <div class="ubits-button-group" role="group" aria-label="Alcance del ranking" data-variant="selectable" data-value="equipo" id="zona-estudio-progreso-equipo-scope-group">
                                                    <button type="button" class="ubits-button ubits-button--secondary ubits-button--xs" data-value="equipo" aria-pressed="true"><span>Equipo</span></button>
                                                    <button type="button" class="ubits-button ubits-button--secondary ubits-button--xs" data-value="empresa" aria-pressed="false"><span>Empresa</span></button>
                                                </div>
                                            </div>
                                            <p class="ubits-body-sm-regular zona-estudio-progreso-ranking-card__desc" id="zona-estudio-progreso-equipo-desc">De mayor a menor tiempo de estudio.</p>
                                            <div class="zona-estudio-progreso-ranking-stack">
                                                <div id="zona-estudio-progreso-ranking-equipo-podium" class="zona-estudio-progreso-ranking-list zona-estudio-progreso-ranking-list--podium"></div>
                                                <div id="zona-estudio-progreso-ranking-equipo" class="zona-estudio-progreso-ranking-list zona-estudio-progreso-ranking-list--scroll"></div>
                                            </div>
                                        </article>
                                        <article class="widget-zona-estudio-plan zona-estudio-progreso-ranking-card">
                                            <h3 class="ubits-body-md-bold zona-estudio-progreso-ranking-card__title">Ranking entre áreas este mes</h3>
                                            <p class="ubits-body-sm-regular zona-estudio-progreso-ranking-card__desc">Tiempo de estudio acumulado por área</p>
                                            <div class="zona-estudio-progreso-ranking-stack">
                                                <div id="zona-estudio-progreso-ranking-areas-podium" class="zona-estudio-progreso-ranking-list zona-estudio-progreso-ranking-list--podium"></div>
                                                <div id="zona-estudio-progreso-ranking-areas" class="zona-estudio-progreso-ranking-list zona-estudio-progreso-ranking-list--scroll"></div>
                                            </div>
                                        </article>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../script.js"></script>
    <script src="../../general-utils/humanizador-fechas.js"></script>
    <script src="./zona-estudio-progreso.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadSidebar('sidebar-container', 'aprendizaje');
            loadSubNav('top-nav-container', 'aprendizaje');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            window.zonaEstudioNavigateToPlan = function (planId, tipo) {
                var tabId = tipo === 'competencias' ? 'competencias' : 'contenidos';
                var q = planId ? ('?planId=' + encodeURIComponent(planId)) : '';
                window.location.href = 'zona-estudio.html' + q + '#' + tabId;
            };

            setTimeout(function () {
                document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function (item) {
                    item.classList.remove('active');
                });
                var progresoTab = document.querySelector('.nav-tab[data-tab="progreso"]');
                if (progresoTab) progresoTab.classList.add('active');
                var progresoHamburger = document.querySelector('.hamburger-item[data-tab="progreso"]');
                if (progresoHamburger) progresoHamburger.classList.add('active');
                var aprendizajeButton = document.querySelector('.nav-button[data-section="aprendizaje"]');
                if (aprendizajeButton) {
                    document.querySelectorAll('.nav-button').forEach(function (btn) { btn.classList.remove('active'); });
                    aprendizajeButton.classList.add('active');
                }
                var modulosTabBarItem = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTabBarItem) {
                    document.querySelectorAll('.tab-bar-item').forEach(function (item) { item.classList.remove('active'); });
                    modulosTabBarItem.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('progreso');
                }
            }, 200);

            if (typeof renderZonaEstudioProgresoTab === 'function') {
                renderZonaEstudioProgresoTab();
            }
        });
    </script>
</body>
