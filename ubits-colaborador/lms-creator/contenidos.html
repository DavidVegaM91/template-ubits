    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var _hCrearLegacy = location.hash || '';
            if (
                _hCrearLegacy === '#crear-contenido' ||
                _hCrearLegacy === '#crear-contenido-recursos' ||
                _hCrearLegacy === '#crear-contenido-step-recursos'
            ) {
                location.replace(
                    'crear-contenido.html' + (_hCrearLegacy === '#crear-contenido' ? '#portada' : '#recursos')
                );
                return;
            }
            if (typeof initTooltip === 'function') {
                initTooltip('.widget-contenidos-creator [data-tooltip]');
            }
            if (typeof initCardContentLmsRowActions === 'function') {
                initCardContentLmsRowActions();
            }

            function escapeHtmlAttrContenidos(s) {
                if (s == null) return '';
                return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            }

            /** Prefijo del id del overlay; el sufijo es el id del contenido (sanitizado). */
            var CONTENIDO_BORRADOR_DRAWER_ID_PREFIX = 'contenido-borrador-drawer-overlay--';
            var CONTENIDO_ANTIGUO_LMS_DRAWER_ID_PREFIX = 'contenido-antiguo-lms-drawer-overlay--';

            function contenidoIdToDrawerOverlayId(contentId) {
                var raw = String(contentId != null && contentId !== '' ? contentId : 'sin-id');
                var safe = raw.replace(/[^a-zA-Z0-9_-]/g, '-');
                if (!safe) safe = 'sin-id';
                return CONTENIDO_BORRADOR_DRAWER_ID_PREFIX + safe;
            }

            /** Id único del rail del sidebar por contenido (evita duplicados si varios drawers siguen en el DOM ocultos). */
            function contenidoIdToSidebarHostId(contentId) {
                var raw = String(contentId != null && contentId !== '' ? contentId : 'sin-id');
                var safe = raw.replace(/[^a-zA-Z0-9_-]/g, '-');
                if (!safe) safe = 'sin-id';
                return 'contenido-editor-sidebar-host--' + safe;
            }

            function contenidoIdToAntiguoDrawerOverlayId(contentId) {
                var raw = String(contentId != null && contentId !== '' ? contentId : 'sin-id');
                var safe = raw.replace(/[^a-zA-Z0-9_-]/g, '-');
                if (!safe) safe = 'sin-id';
                return CONTENIDO_ANTIGUO_LMS_DRAWER_ID_PREFIX + safe;
            }

            /** Host del sidebar en el drawer Antiguo LMS (distinto del borrador por si coexisten overlays ocultos). */
            function contenidoIdToAntiguoSidebarHostId(contentId) {
                var raw = String(contentId != null && contentId !== '' ? contentId : 'sin-id');
                var safe = raw.replace(/[^a-zA-Z0-9_-]/g, '-');
                if (!safe) safe = 'sin-id';
                return 'contenido-antiguo-lms-sidebar-host--' + safe;
            }

            /**
             * Hash del editor borrador = id numérico del curso en BD (p. ej. #24001).
             * Compatibilidad: #editar-contenido=demo-2 (enlaces antiguos).
             * Antiguo LMS: #antiguo-lms=<id> (contenidos con badge Antiguo LMS; no colisiona con #id borrador).
             */
            var CONTENIDO_BORRADOR_HASH_LEGACY_PREFIX = '#editar-contenido=';
            var contenidoBorradorOpenedWithHistoryPush = false;
            var contenidoBorradorUrlActiveId = '';

            function buildBorradorUrlHash(contentId) {
                return '#' + encodeURIComponent(String(contentId != null && contentId !== '' ? contentId : 'sin-id'));
            }

            function getContentIdFromBorradorUrlHash() {
                var h = location.hash || '';
                if (h === '#crear-contenido' || h === '#crear-contenido-recursos' || h === '#crear-contenido-step-recursos') return '';
                if (h.indexOf(CONTENIDO_BORRADOR_HASH_LEGACY_PREFIX) === 0) {
                    try {
                        return normalizeLegacyBorradorUrlContentId(
                            decodeURIComponent(h.slice(CONTENIDO_BORRADOR_HASH_LEGACY_PREFIX.length))
                        );
                    } catch (e) {
                        return '';
                    }
                }
                if (!h || h.charAt(0) !== '#' || h.length < 2) return '';
                if (h.indexOf('=') >= 0) return '';
                try {
                    return normalizeLegacyBorradorUrlContentId(decodeURIComponent(h.slice(1)));
                } catch (e2) {
                    return '';
                }
            }

            /** Ids demo-* en URLs o enlaces viejos → ids numéricos en `contentsCreatorOnly`. */
            function normalizeLegacyBorradorUrlContentId(cid) {
                var map = { 'demo-1': '24000', 'demo-2': '24001', 'demo-3': '24002', 'demo-4': '24003' };
                return map[cid] != null ? map[cid] : cid;
            }

            function syncUrlAfterBorradorDrawerOpen(contentId) {
                contenidoBorradorUrlActiveId = String(contentId != null && contentId !== '' ? contentId : '');
                var targetHash = buildBorradorUrlHash(contentId);
                if (location.hash !== targetHash) {
                    history.pushState(
                        { ubitsLmsCreatorBorrador: true, contentId: contenidoBorradorUrlActiveId },
                        '',
                        location.pathname + location.search + targetHash
                    );
                    contenidoBorradorOpenedWithHistoryPush = true;
                } else {
                    contenidoBorradorOpenedWithHistoryPush = false;
                }
            }

            function syncUrlAfterBorradorDrawerClose() {
                if (contenidoBorradorOpenedWithHistoryPush) {
                    contenidoBorradorOpenedWithHistoryPush = false;
                    contenidoBorradorUrlActiveId = '';
                    history.back();
                    return;
                }
                var ah = contenidoBorradorUrlActiveId;
                contenidoBorradorUrlActiveId = '';
                if (!ah) return;
                var shortHash = buildBorradorUrlHash(ah);
                var legacyHash = CONTENIDO_BORRADOR_HASH_LEGACY_PREFIX + encodeURIComponent(ah);
                if (location.hash === shortHash || location.hash === legacyHash) {
                    history.replaceState(null, '', location.pathname + location.search);
                }
            }

            /** Hash del drawer Antiguo LMS: #antiguo-lms=<id> (no colisiona con borrador #id ni #crear-contenido). */
            var CONTENIDO_ANTIGUO_LMS_HASH_PREFIX = '#antiguo-lms=';
            var contenidoAntiguoLmsOpenedWithHistoryPush = false;
            var contenidoAntiguoLmsUrlActiveId = '';

            function buildAntiguoLmsUrlHash(contentId) {
                return (
                    CONTENIDO_ANTIGUO_LMS_HASH_PREFIX +
                    encodeURIComponent(String(contentId != null && contentId !== '' ? contentId : 'sin-id'))
                );
            }

            function getContentIdFromAntiguoLmsUrlHash() {
                var h = location.hash || '';
                if (h.indexOf(CONTENIDO_ANTIGUO_LMS_HASH_PREFIX) !== 0) return '';
                try {
                    return normalizeLegacyBorradorUrlContentId(
                        decodeURIComponent(h.slice(CONTENIDO_ANTIGUO_LMS_HASH_PREFIX.length))
                    );
                } catch (e) {
                    return '';
                }
            }

            function syncUrlAfterAntiguoLmsDrawerOpen(contentId) {
                contenidoAntiguoLmsUrlActiveId = String(contentId != null && contentId !== '' ? contentId : '');
                var targetHash = buildAntiguoLmsUrlHash(contentId);
                if (location.hash !== targetHash) {
                    history.pushState(
                        { ubitsLmsCreatorAntiguoLms: true, contentId: contenidoAntiguoLmsUrlActiveId },
                        '',
                        location.pathname + location.search + targetHash
                    );
                    contenidoAntiguoLmsOpenedWithHistoryPush = true;
                } else {
                    contenidoAntiguoLmsOpenedWithHistoryPush = false;
                }
            }

            function syncUrlAfterAntiguoLmsDrawerClose() {
                if (contenidoAntiguoLmsOpenedWithHistoryPush) {
                    contenidoAntiguoLmsOpenedWithHistoryPush = false;
                    contenidoAntiguoLmsUrlActiveId = '';
                    history.back();
                    return;
                }
                var ah = contenidoAntiguoLmsUrlActiveId;
                contenidoAntiguoLmsUrlActiveId = '';
                if (!ah) return;
                var antHash = buildAntiguoLmsUrlHash(ah);
                if (location.hash === antHash) {
                    history.replaceState(null, '', location.pathname + location.search);
                }
            }

            window.addEventListener('popstate', function () {
                var overlayAntiguo = document.querySelector('.ubits-drawer-overlay.contenido-antiguo-lms-drawer-overlay');
                if (overlayAntiguo && overlayAntiguo.getAttribute('aria-hidden') !== 'true') {
                    if (!getContentIdFromAntiguoLmsUrlHash()) {
                        overlayAntiguo.style.display = 'none';
                        overlayAntiguo.setAttribute('aria-hidden', 'true');
                        document.body.classList.remove('contenido-borrador-drawer-abierto');
                        contenidoAntiguoLmsOpenedWithHistoryPush = false;
                        contenidoAntiguoLmsUrlActiveId = '';
                    }
                }
                var overlay = document.querySelector('.ubits-drawer-overlay.contenido-borrador-drawer-overlay');
                if (!overlay || overlay.getAttribute('aria-hidden') === 'true') return;
                if (!getContentIdFromBorradorUrlHash()) {
                    overlay.style.display = 'none';
                    overlay.setAttribute('aria-hidden', 'true');
                    document.body.classList.remove('contenido-borrador-drawer-abierto');
                    contenidoBorradorOpenedWithHistoryPush = false;
                    contenidoBorradorUrlActiveId = '';
                }
            });

            window.addEventListener('hashchange', function () {
                tryOpenContenidoAntiguoLmsFromUrlHash();
                tryOpenContenidoBorradorFromUrlHash();
            });

            /** Video demo público (CC0); sustituir por URL del recurso real cuando exista backend. */
            var CONTENIDO_EDITOR_VIDEO_DEMO_URL =
                'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4';

            function getContenidoBorradorEditorBodyHtml(contentId) {
                var videoSrc = escapeHtmlAttrContenidos(CONTENIDO_EDITOR_VIDEO_DEMO_URL);
                var sidebarHostId = escapeHtmlAttrContenidos(contenidoIdToSidebarHostId(contentId));
                return (
                    '<div id="contenido-borrador-editor-workspace" class="contenido-borrador-editor-workspace">' +
                    '  <div id="' + sidebarHostId + '" class="contenido-borrador-editor__rail" aria-label="Pasos del contenido"></div>' +
                    '  <div id="contenido-borrador-editor-index" class="contenido-borrador-editor__index">' +
                    '    <div id="contenido-borrador-seccion-1" class="contenido-borrador-editor__seccion contenido-borrador-editor__seccion--activa">' +
                    '      <div class="contenido-borrador-editor__seccion-head">' +
                    '        <span class="contenido-borrador-editor__seccion-title ubits-body-md-bold">Sección 1: Bases para comunicarte con el cliente</span>' +
                    '        <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de sección"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '      </div>' +
                    '      <div class="contenido-borrador-editor__paginas">' +
                    '        <div class="contenido-borrador-editor__pagina contenido-borrador-editor__pagina--activa">' +
                    '          <span class="contenido-borrador-editor__pagina-bar" aria-hidden="true"></span>' +
                    '          <i class="far fa-video contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +
                    '          <span class="contenido-borrador-editor__pagina-text ubits-body-sm-bold">Introducción: qué es comunicación efectiva con el cliente</span>' +
                    '          <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de página"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '        </div>' +
                    '        <div class="contenido-borrador-editor__pagina">' +
                    '          <i class="far fa-file-lines contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +
                    '          <span class="contenido-borrador-editor__pagina-text ubits-body-sm-semibold">Escucha activa y mensajes claros</span>' +
                    '          <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de página"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '        </div>' +
                    '        <div class="contenido-borrador-editor__pagina">' +
                    '          <i class="far fa-file-pdf contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +
                    '          <span class="contenido-borrador-editor__pagina-text ubits-body-sm-semibold">Guía: tono y canal según el contexto</span>' +
                    '          <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de página"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '        </div>' +
                    '        <div class="contenido-borrador-editor__pagina">' +
                    '          <i class="far fa-video contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +
                    '          <span class="contenido-borrador-editor__pagina-text ubits-body-sm-semibold">Empatía y manejo de la primera reacción del cliente</span>' +
                    '          <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de página"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '        </div>' +
                    '      </div>' +
                    '    </div>' +
                    '    <div id="contenido-borrador-seccion-2" class="contenido-borrador-editor__seccion">' +
                    '      <div class="contenido-borrador-editor__seccion-head">' +
                    '        <span class="contenido-borrador-editor__seccion-title ubits-body-md-bold">Sección 2: Práctica y seguimiento con el cliente</span>' +
                    '      </div>' +
                    '      <div class="contenido-borrador-editor__paginas">' +
                    '        <div class="contenido-borrador-editor__pagina">' +
                    '          <i class="far fa-window-maximize contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +
                    '          <span class="contenido-borrador-editor__pagina-text ubits-body-sm-semibold">Simulador: cliente insatisfecho o en desacuerdo</span>' +
                    '          <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" aria-label="Opciones de página"><i class="far fa-ellipsis-vertical"></i></button>' +
                    '        </div>' +
                    '        <div class="contenido-borrador-editor__pagina">' +
                    '          <i class="far fa-file-zipper contenido-borrador-editor__pagina-icon" aria-hidden="true"></i>' +

            function cardDataFromFiqshaContent(c) {
                var nivelesArr = window.BD_MASTER_NIVELES_CONTENIDO && window.BD_MASTER_NIVELES_CONTENIDO.niveles;
                var nivelNombre = 'Básico';
                if (nivelesArr && c.nivelId) {
                    for (var j = 0; j < nivelesArr.length; j++) {
                        if (nivelesArr[j].id === c.nivelId) {
                            nivelNombre = nivelesArr[j].nombre || 'Básico';
                            break;
                        }
                    }
                }
                var a = null;
                var aliadosArr = window.BD_MASTER_ALIADOS && window.BD_MASTER_ALIADOS.aliados;
                if (aliadosArr && c.proveedorAliadoId) {
                    for (var k = 0; k < aliadosArr.length; k++) {
                        if (aliadosArr[k].id === c.proveedorAliadoId) {
                            a = aliadosArr[k];
                            break;
                        }
                    }
                }
                var providerName = a && a.nombre ? a.nombre : 'UBITS';
                var providerLogo = '../../images/Favicons/UBITS.jpg';
                if (a && a.logo) {
                    providerLogo = '../../' + String(a.logo).replace(/^\.\//, '');
                }
                var competency = COMPETENCIA_POR_CATEGORIA_FIQSHA[c.categoriaFiqshaId] || 'Liderazgo';
                var imgPath = c.imagen
                    ? ('../../' + String(c.imagen).replace(/^\.\//, ''))
                    : '../../images/Profile-image.jpg';
                return {
                    type: c.tipoContenido || 'Curso',
                    title: c.titulo || '',
                    provider: providerName,
                    providerLogo: providerLogo,
                    duration: (c.tiempoValor != null ? String(c.tiempoValor) : '60') + ' min',
                    level: nivelNombre,
                    progress: 0,
                    status: 'default',
                    image: imgPath,
                    competency: competency,
                    language: c.idioma || 'Español',
                    legacyLms: c.legacyLms === true
                };
            }

            /* Cards en cuadrícula: loadCardContent + lmsTag (Publicado / Borrador / …) vía card-content.js; requiere status-tag.css */
            function buildContenidosCardsPayload() {
                var cards = [];
                var bd = window.BDS_CONTENIDOS_FIQSHA;
                if (bd && Array.isArray(bd.contentsCreatorOnly)) {
                    bd.contentsCreatorOnly.forEach(function (c) {
                        if (!c || !c.titulo) return;
                        var row = cardDataFromFiqshaContent(c);
                        row.lmsTag = c.visibilidadLms || 'Privado';
                        row.lmsCardId = c.id != null ? String(c.id) : '';
                        row.legacyLms = c.legacyLms === true;
                        cards.push(row);
                    });
                }
                if (bd && bd.contents) {
                    bd.contents.forEach(function (c) {
                        if (!c || !c.titulo) return;
                        var row = cardDataFromFiqshaContent(c);
                        row.lmsTag = 'Publicado';
                        row.lmsCardId = c.id != null ? String(c.id) : '';
                        cards.push(row);
                    });
                }
                return { cards: cards };
            }

            (function renderContenidosFiqshaTableRows() {
                var bd = window.BDS_CONTENIDOS_FIQSHA;
                var nivelesRoot = window.BD_MASTER_NIVELES_CONTENIDO;
                var tbody = document.getElementById('creator-contenidos-tbody');
                if (!bd || !tbody) return;
                var mapNivel = {};
                if (nivelesRoot && Array.isArray(nivelesRoot.niveles)) {
                    nivelesRoot.niveles.forEach(function (n) {
                        if (n && n.id) mapNivel[n.id] = n.nombre || 'Básico';
                    });
                }
                function visibilidadLmsToTagModifier(vis) {
                    var v = String(vis || '');
                    if (v === 'Privado') return 'warning';
                    if (v === 'Borrador') return 'info';
                    if (v === 'Oculto') return 'neutral';
                    if (v === 'Archivado') return 'error';
                    return 'neutral';
                }
                function appendFiqshaRow(tr, c, opts) {
                    opts = opts || {};
                    var nivelNombre = mapNivel[c.nivelId] || 'Básico';
                    var tipoTxt = c.tipoContenido || 'Curso';
                    function appendTextCell(col, text) {
                        var td = document.createElement('td');
                        td.setAttribute('data-col', col);
                        var span = document.createElement('span');
                        span.className = 'ubits-body-sm-regular';
                        span.textContent = text;
                        td.appendChild(span);
                        tr.appendChild(td);
                    }
                    appendTextCell('nombre', c.titulo);
                    appendTextCell('tipo', tipoTxt);
                    appendTextCell('creacion', '20 feb 2026');
                    appendTextCell('nivel', nivelNombre);
                    var tdVis = document.createElement('td');
                    tdVis.setAttribute('data-col', 'visibilidad');
                    var wrap = document.createElement('span');
                    wrap.className = 'creator-contenidos-table__tag-wrap';
                    var tag = document.createElement('span');
                    var tagMod = opts.tagModifier || 'success';
                    var labelText = opts.visibilidadLabel || 'Publicado';
                    tag.className = 'ubits-status-tag ubits-status-tag--sm ubits-status-tag--' + tagMod;
                    var tagInner = document.createElement('span');
                    tagInner.className = 'ubits-status-tag__text';
                    tagInner.textContent = labelText;
                    tag.appendChild(tagInner);
                    wrap.appendChild(tag);
                    tdVis.appendChild(wrap);
                    tr.appendChild(tdVis);
                    var tdAcc = document.createElement('td');
                    tdAcc.setAttribute('data-col', 'acciones');
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'ubits-button ubits-button--secondary ubits-button--sm js-contenidos-lms-actions-btn';
                    btn.setAttribute('data-lms-row-key', c.id != null ? String(c.id) : '');
                    if (c.legacyLms === true) btn.setAttribute('data-legacy-lms', 'true');
                    btn.setAttribute('aria-haspopup', 'true');
                    btn.setAttribute('aria-expanded', 'false');
                    btn.setAttribute('aria-label', 'Acciones');
                    var spanBtn = document.createElement('span');
                    spanBtn.textContent = 'Acciones';
                    btn.appendChild(spanBtn);
                    var ic = document.createElement('i');
                    ic.className = 'far fa-chevron-down';
                    btn.appendChild(ic);
                    tdAcc.appendChild(btn);
                    tr.appendChild(tdAcc);
                }
                var fragCreator = document.createDocumentFragment();
                if (Array.isArray(bd.contentsCreatorOnly)) {
                    bd.contentsCreatorOnly.forEach(function (c) {
                        if (!c || !c.titulo) return;
                        var tr = document.createElement('tr');
                        tr.setAttribute('data-contenidos-lms-only', 'true');
                        tr.setAttribute('data-fiqsha-id', c.id || '');
                        tr.setAttribute('data-legacy-lms', c.legacyLms === true ? 'true' : 'false');
                        tr.setAttribute('data-tipo', c.tipoContenido || 'Curso');
                        tr.setAttribute('data-categoria-fiqsha-id', c.categoriaFiqshaId || '');
                        tr.setAttribute('data-nivel-id', c.nivelId || '');
                        tr.setAttribute('data-idioma', c.idioma || 'Español');
                        var vis = c.visibilidadLms || 'Privado';
                        appendFiqshaRow(tr, c, {
                            tagModifier: visibilidadLmsToTagModifier(vis),
                            visibilidadLabel: vis
                        });
                        fragCreator.appendChild(tr);
                    });
                }

            var _tbodyContenidos = document.getElementById('creator-contenidos-tbody');
            var _contenidosTotalFilas = _tbodyContenidos ? _tbodyContenidos.querySelectorAll('tr').length : 24;

            (function initContenidosTableSearch() {
                var SEARCH_COLS = ['nombre', 'tipo', 'creacion', 'nivel', 'visibilidad'];
                var searchQuery = '';
                var isSearchMode = false;
                var contenidosPaginatorInst = null;
                /** 'lms-creator' = todos los contenidos; 'antiguo-lms' = solo filas con data-legacy-lms="true". */
                var contenidosCatalogMode = 'lms-creator';
                /** Filtros aplicados (valores de los select del modal). Vacío = sin filtrar ese criterio. */
                var contenidosFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                var contenidosFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };

                function hasActiveContenidosFiltros() {
                    var f = contenidosFiltrosActive;
                    return !!(f.tipo || f.categoriaId || f.nivelId || f.idioma);
                }

                function rowPassesContenidosFilters(tr) {
                    var f = contenidosFiltrosActive;
                    if (f.tipo) {
                        var t = (tr.getAttribute('data-tipo') || '').trim();
                        if (t !== f.tipo) return false;
                    }
                    if (f.categoriaId) {
                        var cat = tr.getAttribute('data-categoria-fiqsha-id') || '';
                        if (cat !== f.categoriaId) return false;
                    }
                    if (f.nivelId) {
                        var nv = tr.getAttribute('data-nivel-id') || '';
                        if (nv !== f.nivelId) return false;
                    }
                    if (f.idioma) {
                        var idm = (tr.getAttribute('data-idioma') || '').trim();
                        if (idm !== f.idioma) return false;
                    }
                    return true;
                }

                function getFilterFilteredRows(rows) {
                    if (!hasActiveContenidosFiltros()) return rows;
                    return rows.filter(rowPassesContenidosFilters);
                }

                function syncContenidosFilterButtonState() {
                    var fb = document.getElementById('contenidos-btn-filtro');
                    if (fb) fb.classList.toggle('ubits-button--active', hasActiveContenidosFiltros());
                }

                /** Número de criterios de filtro activos (para badge en el botón Filtrar; mismo criterio que chips). */
                function getContenidosFiltrosAplicadosCount() {
                    var f = contenidosFiltrosActive;
                    var n = 0;
                    if (f.tipo) n++;
                    if (f.categoriaId) n++;
                    if (f.nivelId) n++;
                    if (f.idioma) n++;
                    return n;
                }

                /**
                 * Attention badge sm (error) en el botón Filtrar cuando hay filtros aplicados.
                 * Sin nodo en el DOM si el conteo es 0 (como tareas.html / tareas.js).
                 */
                function updateContenidosFiltrosButtonBadge() {
                    var btn = document.getElementById('contenidos-btn-filtro');
                    if (!btn) return;
                    var c = getContenidosFiltrosAplicadosCount();
                    var badge = document.getElementById('contenidos-btn-filtro-badge');
                    if (c <= 0) {
                        if (badge && badge.parentNode) badge.parentNode.removeChild(badge);
                        btn.setAttribute('aria-label', 'Filtrar');
                        return;
                    }
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.id = 'contenidos-btn-filtro-badge';
                        badge.className = 'ubits-attention-badge ubits-attention-badge--sm ubits-attention-badge--error';
                        btn.appendChild(badge);
                    }
                    badge.textContent = String(c);
                    badge.classList.toggle('ubits-attention-badge--circle', c >= 1 && c <= 9);
                    btn.setAttribute(
                        'aria-label',
                        'Filtrar (' + c + ' ' + (c === 1 ? 'filtro aplicado' : 'filtros aplicados') + ')'
                    );
                }

                function escapeHtmlContenidosChip(str) {
                    if (str == null) return '';
                    return String(str)
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;');
                }

                function resolveContenidosCategoriaNombre(id) {
                    var catRoot = window.BD_MASTER_CATEGORIAS_FIQSHA;
                    if (!catRoot || !Array.isArray(catRoot.categorias) || !id) return id || '';
                    for (var i = 0; i < catRoot.categorias.length; i++) {
                        var c = catRoot.categorias[i];
                        if (c && c.id === id) return c.nombre || id;
                    }
                    return id;
                }

                function resolveContenidosNivelNombre(id) {
                    var nivRoot = window.BD_MASTER_NIVELES_CONTENIDO;
                    if (!nivRoot || !Array.isArray(nivRoot.niveles) || !id) return id || '';
                    for (var j = 0; j < nivRoot.niveles.length; j++) {
                        var n = nivRoot.niveles[j];
                        if (n && n.id === id) return n.nombre || id;
                    }
                    return id;
                }

                function renderContenidosFiltrosAplicados() {
                    var wrap = document.getElementById('contenidos-filtros-aplicados');
                    var chipsCont = document.getElementById('contenidos-filtros-chips-container');
                    if (!wrap || !chipsCont) return;
                    var f = contenidosFiltrosActive;
                    var chips = [];
                    if (f.tipo) {
                        chips.push({
                            label: 'Tipo',
                            value: f.tipo,
                            remove: function () {
                                contenidosFiltrosActive.tipo = '';
                                contenidosFiltrosPending.tipo = '';
                                if (contenidosPaginatorInst) {
                                    contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                    contenidosPaginatorInst.goToPage(1);
                                }
                                syncListaContenidos();
                            }
                        });
                    }
                    if (f.categoriaId) {
                        chips.push({
                            label: 'Categoría',
                            value: resolveContenidosCategoriaNombre(f.categoriaId),
                            remove: function () {
                                contenidosFiltrosActive.categoriaId = '';
                                contenidosFiltrosPending.categoriaId = '';
                                if (contenidosPaginatorInst) {
                                    contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                    contenidosPaginatorInst.goToPage(1);
                                }
                                syncListaContenidos();
                            }
                        });
                    }
                    if (f.nivelId) {
                        chips.push({
                            label: 'Nivel',
                            value: resolveContenidosNivelNombre(f.nivelId),
                            remove: function () {
                                contenidosFiltrosActive.nivelId = '';
                                contenidosFiltrosPending.nivelId = '';
                                if (contenidosPaginatorInst) {
                                    contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                    contenidosPaginatorInst.goToPage(1);
                                }
                                syncListaContenidos();
                            }
                        });
                    }
                    if (f.idioma) {
                        chips.push({
                            label: 'Idioma',
                            value: f.idioma,
                            remove: function () {
                                contenidosFiltrosActive.idioma = '';
                                contenidosFiltrosPending.idioma = '';
                                if (contenidosPaginatorInst) {
                                    contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                    contenidosPaginatorInst.goToPage(1);
                                }
                                syncListaContenidos();
                            }
                        });
                    }
                    if (chips.length === 0) {
                        wrap.style.display = 'none';
                        chipsCont.innerHTML = '';
                        return;
                    }
                    wrap.style.display = 'flex';
                    chipsCont.innerHTML = chips
                        .map(function (chip, index) {
                            var full = chip.label + ': ' + chip.value;
                            var labelVal = full.replace(/"/g, '&quot;');
                            return (
                                '<span class="ubits-chip ubits-chip--xs ubits-chip--close contenidos-filtro-chip" data-chip-index="' +
                                index +
                                '" data-tooltip="' +
                                labelVal +
                                '">' +
                                '<span class="ubits-chip__text">' +
                                escapeHtmlContenidosChip(full) +
                                '</span>' +
                                '<button type="button" class="ubits-chip__close" data-chip-index="' +
                                index +
                                '" aria-label="Quitar filtro"><i class="far fa-times"></i></button></span>'
                            );
                        })
                        .join('');
                    chipsCont.querySelectorAll('.ubits-chip__close').forEach(function (btn) {
                        btn.addEventListener('click', function () {
                            var idx = parseInt(btn.getAttribute('data-chip-index'), 10);
                            if (!isNaN(idx) && chips[idx] && typeof chips[idx].remove === 'function') {
                                chips[idx].remove();

                    if (typeof initTooltip === 'function') {

                function clearContenidosFiltros() {
                    contenidosFiltrosActive = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                    contenidosFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };
                    if (contenidosPaginatorInst) {
                        contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                        contenidosPaginatorInst.goToPage(1);
                    }
                    syncListaContenidos();
                }

                function normalizeText(t) {
                    if (t == null) return '';
                    return String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                }

                function getRowCellText(tr, colId) {
                    var td = tr.querySelector('td[data-col="' + colId + '"]');
                    if (!td) return '';
                    var parts = [];
                    td.querySelectorAll('.ubits-body-sm-regular, .ubits-body-md-regular').forEach(function (el) {
                        if (el.closest('.ubits-avatar')) return;
                        var tx = el.textContent.trim();
                        if (tx) parts.push(tx);
                    });
                    td.querySelectorAll('.ubits-status-tag__text').forEach(function (el) {
                        var tx = el.textContent.trim();
                        if (tx) parts.push(tx);
                    });
                    if (parts.length > 0) return parts.join(' ');
                    return td.textContent.trim();
                }

                function getTableRows() {
                    var tbody = document.querySelector('#creator-contenidos-table tbody');
                    return tbody ? Array.from(tbody.querySelectorAll('tr')) : [];
                }

                function getCatalogFilteredRows() {
                    var rows = getTableRows();
                    if (contenidosCatalogMode !== 'antiguo-lms') return rows;
                    return rows.filter(function (tr) {
                        return tr.getAttribute('data-legacy-lms') === 'true';
                    });
                }

                /** Filas que cumplen catálogo, filtros del modal y búsqueda */
                function getSearchMatches() {
                    var rows = getCatalogFilteredRows();
                    rows = getFilterFilteredRows(rows);
                    if (searchQuery.trim()) {
                        var q = normalizeText(searchQuery);
                        rows = rows.filter(function (r) {
                            return SEARCH_COLS.some(function (colId) {
                                return normalizeText(getRowCellText(r, colId)).indexOf(q) >= 0;
                            });
                        });
                    }
                    return rows;
                }

                function applyPaginationToRows() {
                    var all = getTableRows();
                    var matches = getSearchMatches();
                    var ipp = contenidosPaginatorInst ? contenidosPaginatorInst.getItemsPerPage() : 16;
                    var page = contenidosPaginatorInst ? contenidosPaginatorInst.getCurrentPage() : 1;
                    var totalMatch = matches.length;
                    var totalPages = Math.max(1, Math.ceil(totalMatch / ipp));
                    if (page > totalPages) page = totalPages;
                    if (page < 1) page = 1;
                    var start = (page - 1) * ipp;
                    var pageSlice = matches.slice(start, start + ipp);
                    var matchSet = new Set(matches);
                    var sliceSet = new Set(pageSlice);
                    all.forEach(function (r) {
                        if (!matchSet.has(r)) {
                            r.style.display = 'none';
                            return;
                        }
                        r.style.display = sliceSet.has(r) ? '' : 'none';
                    });
                }

                function syncContenidosCardsVisibility() {
                    if (contenidosViewMode !== 'grid') return;
                    var grid = document.getElementById('contenidos-cards-grid');
                    if (!grid) return;
                    var rows = getTableRows();
                    rows.forEach(function (tr, i) {
                        var item = grid.querySelector('.contenidos-card-item[data-row-index="' + i + '"]');
                        if (item) item.style.display = tr.style.display;
                    });
                }

                function syncListaContenidos() {
                    applyPaginationToRows();
                    updateResultsCount();
                    updateEmptyState();
                    syncContenidosCardsVisibility();
                    syncContenidosFilterButtonState();
                    renderContenidosFiltrosAplicados();
                    updateContenidosFiltrosButtonBadge();
                    var pagEl = document.getElementById('contenidos-paginador');
                    var m = getSearchMatches();
                    if (pagEl) {
                        pagEl.style.display = m.length === 0 ? 'none' : '';
                    }
                }

                function updateResultsCount() {
                    var el = document.getElementById('contenidos-results-count');
                    if (!el) return;
                    var total = getCatalogFilteredRows().length;
                    var matchCount = getSearchMatches().length;
                    el.textContent = matchCount + '/' + total;
                }

                function clearContenidosSearch() {
                    searchQuery = '';
                    isSearchMode = false;
                    var searchCont = document.getElementById('contenidos-search-inline');
                    var toggle = document.getElementById('contenidos-btn-buscar');
                    if (searchCont) {
                        searchCont.innerHTML = '';
                        searchCont.style.display = 'none';
                        searchCont.setAttribute('aria-hidden', 'true');
                    }
                    if (toggle) toggle.style.display = '';
                    refreshContenidosSearch();
                }

                function updateEmptyState() {
                    var tableWrap = document.querySelector('.contenidos-table-panel .contenidos-table-wrap');
                    var cardsPanel = document.getElementById('contenidos-cards-panel');
                    var emptyEl = document.getElementById('contenidosTableEmpty');
                    if (!emptyEl) return;
                    var visible = getSearchMatches();
                    var totalAll = getTableRows().length;
                    var totalInCatalog = getCatalogFilteredRows().length;
                    var hasSearch = searchQuery.trim().length > 0;
                    var catalogAntiguoVacio = contenidosCatalogMode === 'antiguo-lms' && totalInCatalog === 0 && totalAll > 0;
                    if (catalogAntiguoVacio) {
                        if (contenidosViewMode === 'grid') {
                            if (cardsPanel) cardsPanel.style.display = 'none';
                        } else if (tableWrap) {
                            tableWrap.style.display = 'none';
                        }
                        emptyEl.style.display = 'flex';
                        emptyEl.innerHTML = '';
                        if (typeof loadEmptyState === 'function') {
                            loadEmptyState('contenidosTableEmpty', {
                                icon: 'fa-folder-open',
                                iconSize: 'lg',
                                title: 'No hay contenidos en Antiguo LMS',
                                description: 'Cambia el catálogo a LMS Creator para ver todos los contenidos.'
                            });
                        }
                        return;
                    }
                    var hasFilters = hasActiveContenidosFiltros();
                    if (totalInCatalog > 0 && visible.length === 0 && hasFilters && !hasSearch) {
                        if (contenidosViewMode === 'grid') {
                            if (cardsPanel) cardsPanel.style.display = 'none';
                        } else if (tableWrap) {
                            tableWrap.style.display = 'none';
                        }
                        emptyEl.style.display = 'flex';
                        emptyEl.innerHTML = '';
                        if (typeof loadEmptyState === 'function') {
                            loadEmptyState('contenidosTableEmpty', {
                                icon: 'fa-search',
                                iconSize: 'lg',
                                title: 'No se encontraron resultados',
                                description: 'Intenta ajustar tu búsqueda o filtros para encontrar lo que buscas.',
                                buttons: {
                                    secondary: {
                                        text: 'Limpiar búsqueda',
                                        icon: 'fa-times',
                                        onClick: function () {
                                            clearContenidosSearch();
                                            clearContenidosFiltros();
                                        }
                                    }
                                }
                            });
                        }
                        return;
                    }
                    if (totalAll > 0 && visible.length === 0 && hasSearch) {
                        if (contenidosViewMode === 'grid') {
                            if (cardsPanel) cardsPanel.style.display = 'none';
                        } else if (tableWrap) {
                            tableWrap.style.display = 'none';
                        }
                        emptyEl.style.display = 'flex';
                        if (typeof loadEmptyState === 'function' && !emptyEl.querySelector('.ubits-empty-state__title')) {
                            loadEmptyState('contenidosTableEmpty', {
                                icon: 'fa-search',
                                iconSize: 'lg',
                                title: 'No se encontraron resultados',
                                description: 'Intenta ajustar tu búsqueda o filtros para encontrar lo que buscas.',
                                buttons: {
                                    secondary: {
                                        text: 'Limpiar búsqueda',
                                        icon: 'fa-times',
                                        onClick: function () {
                                            clearContenidosSearch();
                                        }
                                    }
                                }
                            });
                        }
                    } else {
                        if (contenidosViewMode === 'grid') {
                            if (cardsPanel) cardsPanel.style.display = '';
                        } else if (tableWrap) {
                            tableWrap.style.display = '';
                        }
                        emptyEl.style.display = 'none';
                        emptyEl.innerHTML = '';
                    }
                }

                function refreshContenidosSearch() {
                    var m = getSearchMatches();
                    var pagEl = document.getElementById('contenidos-paginador');
                    if (searchQuery.trim() && m.length === 0) {
                        if (pagEl) pagEl.style.display = 'none';
                        syncListaContenidos();
                        return;
                    }
                    if (pagEl) pagEl.style.display = '';
                    if (contenidosPaginatorInst) {
                        contenidosPaginatorInst.updateTotalItems(m.length);
                        contenidosPaginatorInst.goToPage(1);
                    } else {
                        syncListaContenidos();
                    }
                }

                getTableRows().forEach(function (tr, i) {
                    tr.setAttribute('data-row-index', String(i));
                });

                if (typeof loadPaginator === 'function') {
                    contenidosPaginatorInst = loadPaginator('contenidos-paginador', {
                        totalItems: _contenidosTotalFilas,
                        itemsPerPage: 16,
                        currentPage: 1,
                        itemsPerPageOptions: [16, 32, 48, 64, 80],
                        onPageChange: function () {
                            syncListaContenidos();
                        },
                        onItemsPerPageChange: function () {
                            syncListaContenidos();
                        }
                    });
                }

                function openContenidosFiltrosModal() {
                    if (typeof openModal !== 'function' || typeof createInput !== 'function') {

                    contenidosFiltrosPending = {
                        tipo: contenidosFiltrosActive.tipo,

                    };

                    ];
                    var bodyHtml =
                        '<div class="contenidos-filtros-modal-fields">' +
                        '<div id="contenidos-filtro-tipo" class="contenidos-filtros-modal-field"></div>' +
                        '<div id="contenidos-filtro-categoria" class="contenidos-filtros-modal-field"></div>' +
                        '<div id="contenidos-filtro-nivel" class="contenidos-filtros-modal-field"></div>' +
                        '<div id="contenidos-filtro-idioma" class="contenidos-filtros-modal-field"></div>' +
                        '</div>';
                    var overlay = openModal({
                        overlayId: overlayId,
                        title: 'Filtros',
                        bodyHtml: bodyHtml,
                        size: 'sm',
                        closeOnOverlayClick: true,
                        footerTertiary: {
                            text: 'Borrar filtros',
                            onClick: function () {
                                contenidosFiltrosPending = { tipo: '', categoriaId: '', nivelId: '', idioma: '' };

                                if (typeof closeModal === 'function') closeModal(overlayId);
                                if (contenidosPaginatorInst) {
                                    contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);

                    var tertiaryBtn = overlay.querySelector('#' + overlayId + '-footer-tertiary');

                                tipo: contenidosFiltrosPending.tipo,

                                nivelId: contenidosFiltrosPending.nivelId,
                                idioma: contenidosFiltrosPending.idioma
                            };
                            if (typeof closeModal === 'function') closeModal(overlayId);
                            if (contenidosPaginatorInst) {
                                contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                contenidosPaginatorInst.goToPage(1);
                            }
                            syncListaContenidos();
                        });
                    }
                }

                var toggle = document.getElementById('contenidos-btn-buscar');
                var searchCont = document.getElementById('contenidos-search-inline');
                var filtroBtn = document.getElementById('contenidos-btn-filtro');
                if (toggle && searchCont) {
                    toggle.addEventListener('click', function (e) {
                        e.stopPropagation();
                        if (!isSearchMode && (searchCont.style.display === 'none' || searchCont.style.display === '' || !searchCont.innerHTML.trim())) {
                            toggle.style.display = 'none';
                            searchCont.style.display = 'flex';
                            searchCont.setAttribute('aria-hidden', 'false');
                            if (typeof createInput === 'function') {
                                createInput({
                                    containerId: 'contenidos-search-inline',
                                    type: 'search',
                                    size: 'md',
                                    placeholder: 'Buscar...',
                                    showLabel: false,
                                    onChange: function (value) {
                                        searchQuery = value || '';
                                        refreshContenidosSearch();
                                    }
                                });
                                setTimeout(function () {
                                    var input = searchCont.querySelector('input');
                                    if (input) input.focus();
                                }, 100);
                            }
                            isSearchMode = true;
                        }
                    });

                    document.addEventListener('click', function (e) {
                        if (!isSearchMode) return;
                        if (searchCont.contains(e.target) || toggle.contains(e.target)) return;
                        if (filtroBtn && filtroBtn.contains(e.target)) return;
                        if (!searchQuery || !String(searchQuery).trim()) {
                            clearContenidosSearch();
                        }
                    });
                }

                if (filtroBtn) {
                    filtroBtn.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        openContenidosFiltrosModal();
                    });
                }

                var clearAllFiltrosBtn = document.getElementById('contenidos-clear-all-filters-btn');
                if (clearAllFiltrosBtn) {
                    clearAllFiltrosBtn.addEventListener('click', function () {
                        clearContenidosFiltros();
                    });
                }

                var btnGrid = document.getElementById('contenidos-view-cuadricula');
                var btnTable = document.getElementById('contenidos-view-tabla');
                var tablePanel = document.querySelector('.contenidos-table-panel');
                var cardsPanel = document.getElementById('contenidos-cards-panel');

                function setViewToggle(activeEl) {
                    if (!btnGrid || !btnTable) return;
                    var isGrid = activeEl === btnGrid;
                    btnGrid.classList.toggle('ubits-button--active', isGrid);
                    btnTable.classList.toggle('ubits-button--active', !isGrid);
                    btnGrid.setAttribute('aria-pressed', isGrid ? 'true' : 'false');
                    btnTable.setAttribute('aria-pressed', isGrid ? 'false' : 'true');
                }

                if (contenidosViewMode === 'grid') {
                    setViewToggle(btnGrid);
                    renderContenidosCardsGrid();
                    if (tablePanel) tablePanel.style.display = 'none';
                    if (cardsPanel) {
                        cardsPanel.style.display = '';
                        cardsPanel.setAttribute('aria-hidden', 'false');
                    }
                }

                syncListaContenidos();

                if (btnGrid) {
                    btnGrid.addEventListener('click', function () {
                        setViewToggle(btnGrid);
                        contenidosViewMode = 'grid';
                        if (!contenidosCardsBuilt) {
                            renderContenidosCardsGrid();
                        } else {
                            setTimeout(function () {
                                tryOpenContenidoAntiguoLmsFromUrlHash();
                                tryOpenContenidoBorradorFromUrlHash();
                            }, 0);
                        }
                        if (tablePanel) tablePanel.style.display = 'none';
                        if (cardsPanel) {
                            cardsPanel.style.display = '';
                            cardsPanel.setAttribute('aria-hidden', 'false');
                        }
                        syncListaContenidos();
                    });
                }
                if (btnTable) {
                    btnTable.addEventListener('click', function () {
                        setViewToggle(btnTable);
                        contenidosViewMode = 'table';
                        if (tablePanel) tablePanel.style.display = '';
                        if (cardsPanel) {
                            cardsPanel.style.display = 'none';
                            cardsPanel.setAttribute('aria-hidden', 'true');
                        }
                        syncListaContenidos();
                    });
                }

                function initContenidosHeaderCatalogSelect() {
                    var actions = document.querySelector('#header-product-container .ubits-header-product__actions');
                    if (!actions || typeof createInput !== 'function') return;
                    if (actions.querySelector('.contenidos-header-catalog')) return;
                    var wrap = document.createElement('div');
                    wrap.className = 'contenidos-header-catalog';
                    wrap.innerHTML = '<span class="ubits-body-sm-regular contenidos-header-catalog__label">Catálogo:</span><div id="contenidos-header-catalog-select" class="contenidos-header-catalog__field"></div>';
                    actions.insertBefore(wrap, actions.firstChild);
                    createInput({
                        containerId: 'contenidos-header-catalog-select',
                        type: 'select',
                        label: '',
                        placeholder: 'Catálogo…',
                        size: 'sm',
                        selectOptions: [
                            { value: 'lms-creator', text: 'LMS Creator' },
                            { value: 'antiguo-lms', text: 'Antiguo LMS' }
                        ],
                        value: contenidosCatalogMode === 'antiguo-lms' ? 'antiguo-lms' : 'lms-creator',
                        onChange: function (val) {
                            contenidosCatalogMode = val === 'antiguo-lms' ? 'antiguo-lms' : 'lms-creator';
                            if (contenidosPaginatorInst) {
                                contenidosPaginatorInst.updateTotalItems(getSearchMatches().length);
                                contenidosPaginatorInst.goToPage(1);
                            }
                            syncListaContenidos();
                        }
                    });
                }
                initContenidosHeaderCatalogSelect();
            })();

            setTimeout(function() {
                var tab = document.querySelector('.nav-tab[data-tab="contenidos"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) {
                        item.classList.remove('active');
                    });
                    tab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="lms-creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) {
                        btn.classList.remove('active');
                    });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) {
                        item.classList.remove('active');
                    });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('contenidos');
                }
            }, 200);
        });
    </script>
</body>
</html>
