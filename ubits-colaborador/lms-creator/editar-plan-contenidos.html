    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var planTipo = params.get('tipo') || 'contenidos';
            var planId = params.get('id') || '';
            var planTipoInput = document.getElementById('plan-tipo');
            if (planTipoInput) planTipoInput.value = planTipo;

            var empleados = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
            /** Ítems { id, title, duration } alineados con CATALOGO_CURSOS_DRAWER (bd-master). */
            function contenidosEjemploDesdeCatalogo(start, len) {
                var cat = window.CATALOGO_CURSOS_DRAWER || [];
                var out = [];
                for (var i = 0; i < len; i++) {
                    var c = cat[start + i];
                    if (!c) break;
                    out.push({ id: c.id, title: c.title, duration: c.duration || '60 min' });
                }
                return out;
            }
            /** Una fila por colaborador (como detalle-plan id=3); sin grupos ni toda la empresa. */
            function filasUsuarioDesdeEmpleados(sliceStart, sliceEnd, contenidosPorFilaFn) {
                var slice = empleados.slice(sliceStart, sliceEnd);
                return slice.map(function(e, idx) {
                    var cid = e.id || e.idColaborador || ('E' + (sliceStart + idx + 1));
                    var cont = typeof contenidosPorFilaFn === 'function' ? contenidosPorFilaFn(idx, e) : contenidosEjemploDesdeCatalogo(0, 2);
                    return {
                        id: 'fila-usuario-' + cid,
                        colaboradorId: String(cid),
                        nombreUsuario: (e.nombre || '').trim(),
                        avatar: e.avatar || null,
                        contenidos: cont.slice(),
                        contenidosCount: cont.length
                    };
                });
            }
            function getAsignacionesPlan1() {
                return filasUsuarioDesdeEmpleados(0, 3, function(idx) { return contenidosEjemploDesdeCatalogo(idx % 2, 2); });
            }
            function getAsignacionesPlan2() {
                return filasUsuarioDesdeEmpleados(3, 6, function(idx) { return contenidosEjemploDesdeCatalogo((idx + 1) % 3, 2); });
            }
            function getAsignacionesPlan3Vigente() {
                return filasUsuarioDesdeEmpleados(0, 5, function(idx) { return contenidosEjemploDesdeCatalogo((idx + 3) % 8, 3); });
            }
            var plansEditar = {
                '1': { nombre: 'Plan de onboarding Q3 2026', fechaInicio: '01/07/2026', fechaFin: '30/09/2026', estado: 'Planeado', getAsignaciones: getAsignacionesPlan1 },
                '2': { nombre: 'Competencias de liderazgo', fechaInicio: '01/04/2026', fechaFin: '30/06/2026', estado: 'Procesando 0%', getAsignaciones: getAsignacionesPlan2 },
                '3': { nombre: 'Cursos de cumplimiento Q1', fechaInicio: '01/01/2026', fechaFin: '31/03/2026', estado: 'Vigente', getAsignaciones: getAsignacionesPlan3Vigente },
                '4': { nombre: 'Evaluación técnica 2025', fechaInicio: '01/09/2025', fechaFin: '15/12/2025', estado: 'No vigente', getAsignaciones: getAsignacionesPlan1 }
            };
            function planContenidosPermiteEdicion(estado) {
                if (estado === 'No vigente') return false;
                if (estado === 'Planeado' || estado === 'Vigente') return true;
                if (String(estado).indexOf('Procesando') === 0) return true;
                return false;
            }
            if (planId && plansEditar[planId] && !planContenidosPermiteEdicion(plansEditar[planId].estado)) {
                window.location.replace('detalle-plan.html?id=' + encodeURIComponent(planId));
                return;
            }
            /* Sin id o id no válido: ejemplo plan 1 (misma fuente que planes-formacion.html, tab contenidos) */
            var planEditar = planId && plansEditar[planId] ? plansEditar[planId] : plansEditar['1'];

            function getEstadoTagClassEditar(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }
            function getEstadoTooltipEditar(estado) {
                if (estado === 'Planeado') return 'Plan creado para una fecha futura; aún no ha iniciado. Solo lo ve el administrador, no los estudiantes.';
                if (estado === 'Vigente') return 'En curso: la fecha actual está entre inicio y fin.';
                if (estado === 'No vigente') return 'Ya pasó la fecha de cierre. El progreso quedó congelado; lo que estudien después no suma al plan.';
                if (String(estado).indexOf('Procesando') === 0) return 'El plan se está generando; aún no es visible para los estudiantes.';
                return '';
            }
            /** En edición, el plan «Procesando» (backend) se muestra como **Planeado** en el tag en reposo; Vigente/Planeado se muestran tal cual. */
            function getEstadoTagEstableVisual() {
                var e = planEditar && planEditar.estado ? String(planEditar.estado) : 'Planeado';
                if (e.indexOf('Procesando') === 0) return 'Planeado';
                if (e === 'Vigente') return 'Vigente';
                return 'Planeado';
            }
            var planEstadoPctInterval = null;
            function renderPlanEstadoTagEditar() {
                var estadoEl = document.getElementById('plan-estado-container');
                if (!estadoEl || !planEditar) return;
                var estado = getEstadoTagEstableVisual();
                var estadoClass = getEstadoTagClassEditar(estado);
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + estadoClass + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + String(estado).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span></span>';
                var tooltipText = getEstadoTooltipEditar(estado);
                estadoEl.innerHTML = tooltipText
                    ? '<span data-tooltip="' + tooltipText.replace(/"/g, '&quot;') + '" data-tooltip-delay="500">' + tagHtml + '</span>'
                    : tagHtml;
                if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-estado-container [data-tooltip]'); }, 50);
            }

            function getPlanActionOptionsByStatus(estado) {
                if (estado === 'Vigente') {
                return [
                        { text: 'Enviar recordatorio', value: 'send-reminders', leftIcon: 'bell' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                ];
            }
                if (estado === 'No vigente') {
                return [
                        { text: 'Descargar certificados', value: 'download-certificates', leftIcon: 'download' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                    ];
                }
                return [
                    { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                ];
            }

            function getDeletePlanModalConfig(estado) {
                var body = '<p class="ubits-body-md-regular">Si eliminas este plan, se perderá toda la data asociada (asignaciones, avances e historial).</p>';
                var typeConfirmBlock = '<div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="plan-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="plan-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                if (estado === 'Planeado') {
                    return {
                        title: 'Eliminar plan planeado',
                        bodyHtml: body,
                        footerHtml: '<button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm"><span>Eliminar plan</span></button>'
                    };
                }
                return {
                    title: 'Confirmar eliminación',
                    bodyHtml: body + '<p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p>' + typeConfirmBlock,
                    footerHtml: '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="plan-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm" disabled><span>Eliminar plan</span></button>'
                };
            }

            function redirectAfterPlanDelete() {
                try {
                    sessionStorage.setItem('ubits-toast-pending', JSON.stringify({ type: 'success', message: 'Plan eliminado correctamente.' }));
                } catch (err) {}
                window.location.href = 'planes-formacion.html';
            }

            function openDeletePlanModal(estadoVisual) {
                if (typeof getModalHtml !== 'function' || typeof showModal !== 'function') return;
                var modalConfig = getDeletePlanModalConfig(estadoVisual);
                var overlayId = 'editar-plan-delete-overlay';
                var closeButtonId = 'editar-plan-delete-close';
                var modalsContainer = document.getElementById('asignaciones-modals-container');
                if (!modalsContainer) return;
                modalsContainer.innerHTML += getModalHtml({
                    overlayId: overlayId,
                    title: modalConfig.title,
                    bodyHtml: modalConfig.bodyHtml,
                    footerHtml: modalConfig.footerHtml,
                    size: 'sm',
                    closeButtonId: closeButtonId
                });
                showModal(overlayId);
                var overlay = document.getElementById(overlayId);
                var closeBtn = document.getElementById(closeButtonId);
                var cancelBtn = document.getElementById('plan-delete-cancel');
                var confirmBtn = document.getElementById('plan-delete-confirm');
                function closeDeleteModal() {
                    if (typeof closeModal === 'function') closeModal(overlayId);
                    if (overlay && overlay.parentNode) overlay.remove();
                }
                if (closeBtn) closeBtn.addEventListener('click', closeDeleteModal);
                if (cancelBtn) cancelBtn.addEventListener('click', closeDeleteModal);
                if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeDeleteModal(); });
                var typeInput = document.getElementById('plan-delete-type-input');
                if (typeInput && confirmBtn && estadoVisual !== 'Planeado') {
                    confirmBtn.disabled = true;
                    typeInput.value = '';
                    typeInput.addEventListener('input', function() {
                        confirmBtn.disabled = typeInput.value.trim().toLowerCase() !== 'eliminar';
                    });
                    setTimeout(function() { typeInput.focus(); }, 0);
                }
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', function() {
                        closeDeleteModal();
                        redirectAfterPlanDelete();
                    });
                }
            }

            function initPlanActions() {
                var actionsBtn = document.getElementById('plan-actions-btn');
                if (!actionsBtn || typeof window.getDropdownMenuHtml !== 'function' || typeof window.openDropdownMenu !== 'function' || typeof window.closeDropdownMenu !== 'function') return;
                actionsBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var overlayId = 'editar-plan-actions-overlay';
                    var existingOverlay = document.getElementById(overlayId);
                    if (existingOverlay) existingOverlay.remove();
                    var estadoVisual = getEstadoTagEstableVisual();
                    var options = getPlanActionOptionsByStatus(estadoVisual);
                    document.body.insertAdjacentHTML('beforeend', window.getDropdownMenuHtml({ overlayId: overlayId, options: options }));
                    var overlay = document.getElementById(overlayId);
                    if (!overlay) return;
                    overlay.style.zIndex = '10100';
                    overlay.querySelectorAll('.ubits-dropdown-menu__option').forEach(function(opt) {
                        opt.addEventListener('click', function() {
                            var value = this.getAttribute('data-value');
                            window.closeDropdownMenu(overlayId);
                            if (overlay && overlay.parentNode) overlay.remove();
                            if (value === 'send-reminders') {
                                if (typeof showToast === 'function') showToast('success', 'Recordatorio enviado');
                                return;
                            }
                            if (value === 'download-certificates') {
                                if (typeof showToast === 'function') showToast('success', 'Se descargaron los certificados de los estudiantes que finalizaron el plan.');
                                return;
                            }
                            if (value === 'delete-plan') {
                                openDeletePlanModal(estadoVisual);
                            }
                        });
                    });
                    overlay.addEventListener('click', function(ev) {
                        if (ev.target === overlay) {
                            window.closeDropdownMenu(overlayId);
                            if (overlay.parentNode) overlay.remove();
                        }
                    });
                    window.openDropdownMenu(overlayId, actionsBtn, { alignRight: true });
                    setTimeout(function() {
                        var ov = document.getElementById(overlayId);
                        var cnt = ov ? ov.querySelector('.ubits-dropdown-menu__content') : null;
                        if (cnt && actionsBtn) {
                            var br = actionsBtn.getBoundingClientRect();
                            var left = Math.max(12, br.right - cnt.offsetWidth);
                            cnt.style.left = left + 'px';
                            cnt.style.right = 'auto';
                        }
                    }, 0);
                });
                if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-actions-btn'); }, 50);
            }
            /** Tras agregar una nueva asignación (wizard): mismo patrón que planes-formacion.html — el texto del status tag pasa de «Procesando 0%» a «Procesando 100%» en 4 s; luego vuelve al estado estable (Planeado o Vigente). */
            function iniciarAnimacionEstadoProcesandoAsignacion() {
                if (planEstadoPctInterval) {
                    clearInterval(planEstadoPctInterval);
                    planEstadoPctInterval = null;
                }
                var estadoEl = document.getElementById('plan-estado-container');
                if (!estadoEl) return;
                var animListo = false;
                function finalizarAnimacion() {
                    if (animListo) return;
                    animListo = true;
                    if (planEstadoPctInterval) {
                        clearInterval(planEstadoPctInterval);
                        planEstadoPctInterval = null;
                    }
                    renderPlanEstadoTagEditar();
                    if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-estado-container [data-tooltip]'); }, 50);
                }
                estadoEl.innerHTML =
                    '<span class="ubits-status-tag ubits-status-tag--warning ubits-status-tag--sm" role="status" aria-live="polite" aria-label="Procesando nueva asignación">' +
                    '<span class="ubits-status-tag__text" id="editar-plan-estado-procesando-text">Procesando 0%</span></span>';
                var procPct = 0;
                var step = 1;
                var intervalMs = 40;
                planEstadoPctInterval = setInterval(function() {
                    procPct = Math.min(100, procPct + step);
                    var textEl = document.getElementById('editar-plan-estado-procesando-text');
                    if (textEl) textEl.textContent = 'Procesando ' + procPct + '%';
                    if (procPct >= 100) {
                        clearInterval(planEstadoPctInterval);
                        planEstadoPctInterval = null;
                        finalizarAnimacion();
                    }
                }, intervalMs);
            }

            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');
            
            renderPlanEstadoTagEditar();
            initPlanActions();
            document.title = 'UBITS Playground - LMS Creator - Detalle del plan de contenidos — ' + (planEditar && planEditar.nombre ? planEditar.nombre : '');
            
            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Detalle del plan de contenidos',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() {
                            window.location.href = 'planes-formacion.html';
                        }
                    },
                    secondaryButtons: [
                        {
                            text: 'Guardar',
                            icon: 'fa-floppy-disk',
                            onClick: function() {
                                var sinContenidos = asignacionesData.filter(function(a) { return !a.contenidos || a.contenidos.length === 0; });
                                if (sinContenidos.length > 0 && typeof showToast === 'function') {
                                    showToast('error', 'Todas las asignaciones deben tener al menos un contenido. Agrega contenidos a las que faltan antes de guardar.');
                                    return;
                                }
                                window.location.href = 'planes-formacion.html';
                            }
                        }
                    ]
                });
            }
            
            setTimeout(() => {
                const tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(item => item.classList.remove('active'));
                    tab.classList.add('active');
                }
                const sidebarBtn = document.querySelector('.nav-button[data-section="creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
                    sidebarBtn.classList.add('active');
                }
                const modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(item => item.classList.remove('active'));
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }, 200);

            // Auto-resize textarea del nombre (en el header)
            setTimeout(function() {
                var nombreTa = document.getElementById('asignacion-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                    });
                }
            }, 0);

            // Selectores de fecha (vigencia)
            if (typeof createInput === 'function') {
                createInput({
                    containerId: 'fecha-inicio-container',
                    type: 'calendar',
                    label: 'Fecha de inicio',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Igual o mayor a hoy',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
                createInput({
                    containerId: 'fecha-fin-container',
                    type: 'calendar',
                    label: 'Fecha de finalización',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Mayor o igual a la fecha de inicio',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
            }

            // Asignaciones: datos y refs de tabla
            var asignacionesData = [];
            var pendingCursosRow = null;
            // Catálogo: catalogo-contenidos-drawer.js

            /** Paso 2 del wizard o drawer solo contenidos: catálogo (misma lógica que crear-plan-contenidos). opts.idPrefix ej. drawer-wiz | drawer-editplan */
            function attachWizardContenidosPaso2(overlay, onSync, opts) {
                opts = opts || {};
                var idPrefix = opts.idPrefix || 'drawer-wiz';
                function I(suffix) { return idPrefix + '-' + suffix; }
                if (!overlay._wizCursosSeleccionados) overlay._wizCursosSeleccionados = [];
                var idSearch = I('cursos-search-container');
                var searchWrap = overlay.querySelector('#' + idSearch);
                if (searchWrap) searchWrap.innerHTML = '';
                if (typeof createInput === 'function') {
                    createInput({
                        containerId: idSearch,
                        type: 'search',
                        placeholder: 'Buscar contenidos...',
                        size: 'sm',
                        showLabel: false
                    });
                }
                var searchContainer = overlay.querySelector('#' + idSearch);
                var searchInput = searchContainer ? searchContainer.querySelector('input') : null;
                var cardsContainer = overlay.querySelector('#' + I('cursos-cards-container'));
                var emptySearchContainer = overlay.querySelector('#' + I('contenidos-empty-search'));
                var DRAWER_CURSOS_PAGE_SIZE = 12;
                var drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                var drawerCursosFilter = 'all';
                overlay._wizViewOnlySeleccionados = false;

                function getFiltradosParaGrid() {
                    var filtrados = getFiltradosDrawerCursos();
                    var sel = overlay._wizCursosSeleccionados || [];
                    if (!overlay._wizViewOnlySeleccionados || !sel.length) return filtrados;
                    var idSet = {};
                    sel.forEach(function (c) {
                        if (c && c.id != null) idSet[String(c.id)] = true;
                    });
                    return filtrados.filter(function (c) {
                        return idSet[String(c.id)];
                    });
                }

                function updateVerSeleccionadosBar() {
                    var bar = overlay.querySelector('#' + I('cursos-action-bar'));
                    var btn = overlay.querySelector('#' + I('cursos-ver-seleccionados'));
                    if (!bar || !btn) return;
                    var sel = overlay._wizCursosSeleccionados || [];
                    var n = sel.length;
                    var icon = btn.querySelector('i');
                    var span = btn.querySelector('span');
                    if (n === 0) {
                        overlay._wizViewOnlySeleccionados = false;
                        bar.classList.remove('is-visible');
                        if (icon) icon.className = 'far fa-eye';
                        if (span) span.textContent = 'Ver seleccionados';
                        btn.classList.remove('active');
                        return;
                    }
                    bar.classList.add('is-visible');
                    if (overlay._wizViewOnlySeleccionados) {
                        if (icon) icon.className = 'far fa-eye-slash';
                        if (span) span.textContent = 'Dejar de ver seleccionados (' + n + ')';
                        btn.classList.add('active');
                    } else {
                        if (icon) icon.className = 'far fa-eye';
                        if (span) span.textContent = 'Ver seleccionados (' + n + ')';
                        btn.classList.remove('active');
                    }
                }

                function notifyWizardPaso2Sync() {
                    if (typeof onSync === 'function') onSync();
                }

                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    var bySource = catalogoCursos;
                    if (drawerCursosFilter === 'ubits') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'ubits'; });
                    else if (drawerCursosFilter === 'empresa') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'empresa'; });
                    return bySource.filter(function(c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q)) || (c.categoria && String(c.categoria).toLowerCase().includes(q));
                    });
                }

                function filtrarYRenderizarCards() {
                    if (!cardsContainer || typeof loadCardContentCompact !== 'function') return;
                    var filtrados = getFiltradosDrawerCursos();
                    var paraGrid = getFiltradosParaGrid();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState(I('contenidos-empty-search'), {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: { secondary: { text: 'Limpiar búsqueda', icon: 'fa-times', onClick: function() {} } }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                                            if (searchInput) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        updateVerSeleccionadosBar();
                        return;
                    }
                    if (overlay._wizViewOnlySeleccionados && paraGrid.length === 0 && (overlay._wizCursosSeleccionados || []).length > 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState(I('contenidos-empty-search'), {
                                    icon: 'fa-eye',
                                    iconSize: 'lg',
                                    title: 'Sin contenidos agregados en estos resultados',
                                    description: 'Ninguno de los contenidos ya agregados coincide con la búsqueda o el filtro. Prueba otra búsqueda o deja de ver solo seleccionados.',
                                    buttons: {}
                                });
                            }
                        }
                        cardsContainer.style.display = 'none';
                        updateVerSeleccionadosBar();
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.className = 'drawer-contenidos-empty-search-wrap';
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var aMostrar = paraGrid.slice(0, drawerCursosVisibleCount);
                    loadCardContentCompact(I('cursos-cards-container'), aMostrar);
                    var listSel = overlay._wizCursosSeleccionados || [];
                    aMostrar.forEach(function(course, idx) {
                        var cardEls = cardsContainer.querySelectorAll('.course-card-compact');
                        var cardEl = cardEls[idx];
                        if (cardEl) {
                            cardEl.style.cursor = 'pointer';
                            cardEl.dataset.courseId = course.id;
                            if (listSel.some(function(x) { return String(x.id) === String(course.id); })) {
                                cardEl.classList.add('course-card-compact--selected');
                    } else {
                                cardEl.classList.remove('course-card-compact--selected');
                            }
                        }
                    });
                    updateVerSeleccionadosBar();
                }

                function maybeLoadMoreDrawerCursos() {
                    var paraGrid = getFiltradosParaGrid();
                    if (drawerCursosVisibleCount >= paraGrid.length) return;
                    drawerCursosVisibleCount += DRAWER_CURSOS_PAGE_SIZE;
                    filtrarYRenderizarCards();
                }

                var resultadosBg = overlay.querySelector('#drawer-wizard-step3 .drawer-cursos-resultados-bg')
                    || overlay.querySelector('.drawer-agregar-cursos--single-col .drawer-cursos-resultados-bg--paso2-full');
                if (resultadosBg) {
                    if (overlay._wizContenidosScrollHandler) {
                        resultadosBg.removeEventListener('scroll', overlay._wizContenidosScrollHandler);
                    }
                    overlay._wizContenidosScrollHandler = function() {
                        var el = resultadosBg;
                        var threshold = 120;
                        if (el.scrollTop + el.clientHeight >= el.scrollHeight - threshold) maybeLoadMoreDrawerCursos();
                    };
                    resultadosBg.addEventListener('scroll', overlay._wizContenidosScrollHandler);
                }

                if (cardsContainer) {
                    if (overlay._wizContenidosCardsClickHandler) {
                        cardsContainer.removeEventListener('click', overlay._wizContenidosCardsClickHandler);
                    }
                    overlay._wizContenidosCardsClickHandler = function(e) {
                        var cardEl = e.target.closest('.course-card-compact');
                        if (!cardEl || !cardEl.dataset.courseId) return;
                        var course = catalogoCursos.find(function(c) { return String(c.id) === String(cardEl.dataset.courseId); });
                        if (!course) return;
                        var list = overlay._wizCursosSeleccionados || [];
                        var ix = list.findIndex(function(x) { return String(x.id) === String(course.id); });
                        if (ix !== -1) {
                            list.splice(ix, 1);
                        } else {
                            list.push(course);
                            if (searchInput) {
                                searchInput.value = '';
                                searchInput.dispatchEvent(new Event('input'));
                            }
                        }
                        filtrarYRenderizarCards();
                        notifyWizardPaso2Sync();
                    };
                    cardsContainer.addEventListener('click', overlay._wizContenidosCardsClickHandler);
                }

                if (searchInput) {
                    searchInput.addEventListener('input', function() {
                        drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                        filtrarYRenderizarCards();
                    });
                    searchInput.addEventListener('keyup', function() {
                        drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                        filtrarYRenderizarCards();
                    });
                }

                var filterBtn = overlay.querySelector('#' + I('cursos-filter-btn'));
                if (filterBtn && typeof getDropdownMenuHtml === 'function' && typeof openDropdownMenu === 'function' && typeof closeDropdownMenu === 'function') {
                    if (overlay._wizContenidosFilterClickHandler) {
                        filterBtn.removeEventListener('click', overlay._wizContenidosFilterClickHandler);
                    }
                    overlay._wizContenidosFilterClickHandler = function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var filterOverlayId = I('cursos-filter-overlay');
                        var existing = document.getElementById(filterOverlayId);
                        if (existing) existing.remove();
                        var htmlDropdown = getDropdownMenuHtml({
                            overlayId: filterOverlayId,
                            contentId: filterOverlayId + '-content',
                            radioGroup: true,
                            radioName: filterOverlayId + '-radio',
                            options: [
                                { text: 'Todos', value: 'all', selected: drawerCursosFilter === 'all' },
                                { text: 'Solo catálogo UBITS', value: 'ubits', selected: drawerCursosFilter === 'ubits' },
                                { text: 'Solo catálogo propio', value: 'empresa', selected: drawerCursosFilter === 'empresa' }
                            ]
                        });
                        document.body.insertAdjacentHTML('beforeend', htmlDropdown);
                        var filterOverlay = document.getElementById(filterOverlayId);
                        if (filterOverlay) {
                            filterOverlay.addEventListener('click', function(ev) {
                                if (ev.target === filterOverlay) {
                                    closeDropdownMenu(filterOverlayId);
                                    if (filterOverlay.parentNode) filterOverlay.remove();
                                }
                            });
                            var content = filterOverlay.querySelector('.ubits-dropdown-menu__content');
                            if (content) content.addEventListener('click', function(ev) { ev.stopPropagation(); });
                            filterOverlay.querySelectorAll('input[type=radio]').forEach(function(radio) {
                                radio.addEventListener('change', function() {
                                    drawerCursosFilter = this.value;
                                    closeDropdownMenu(filterOverlayId);
                                    if (filterOverlay.parentNode) filterOverlay.remove();
                                    drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                                    filtrarYRenderizarCards();
                                });
                            });
                        }
                        openDropdownMenu(filterOverlayId, filterBtn, { alignRight: true });
                        (function alignFilterDropdownToButtonRight() {
                            var ov = document.getElementById(filterOverlayId);
                            var cnt = ov ? ov.querySelector('.ubits-dropdown-menu__content') : null;
                            if (!cnt || !filterBtn) return;
                            var br = filterBtn.getBoundingClientRect();
                            cnt.style.left = 'auto';
                            cnt.style.right = (window.innerWidth - br.right) + 'px';
                        })();
                        requestAnimationFrame(function() {
                            var ov = document.getElementById(filterOverlayId);
                            var cnt = ov ? ov.querySelector('.ubits-dropdown-menu__content') : null;
                            if (!cnt || !filterBtn) return;
                            var br = filterBtn.getBoundingClientRect();
                            cnt.style.left = 'auto';
                            cnt.style.right = (window.innerWidth - br.right) + 'px';
                        });
                    };
                    filterBtn.addEventListener('click', overlay._wizContenidosFilterClickHandler);
                }

                var btnVerSel = overlay.querySelector('#' + I('cursos-ver-seleccionados'));
                if (btnVerSel) {
                    btnVerSel.onclick = function () {
                        var sel = overlay._wizCursosSeleccionados || [];
                        if (!sel.length) return;
                        overlay._wizViewOnlySeleccionados = !overlay._wizViewOnlySeleccionados;
                        drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                        filtrarYRenderizarCards();
                    };
                }

                filtrarYRenderizarCards();
                notifyWizardPaso2Sync();
                overlay._wizContenidosAttached = true;

            function abrirDrawerAgregarUsuarios() {
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="drawer-wiz-btn-cancel"><span>Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="drawer-wiz-btn-primary" disabled><span>Siguiente</span></button>';
                openDrawer({

                    size: 'lg',
                    onClose: function() {
                        var oDrawer = document.getElementById('drawer-agregar-usuarios');
                        if (oDrawer) {
                            oDrawer._wizContenidosAttached = false;
                            oDrawer._wizCursosSeleccionados = [];
                        }
                    }
                });
                initDrawerAgregarUsuarios();
            }
            window.abrirDrawerAgregarUsuarios = abrirDrawerAgregarUsuarios;

            function initDrawerAgregarUsuarios() {
                var overlay = document.getElementById('drawer-agregar-usuarios');
                if (!overlay) return;

                overlay._wizContenidosAttached = false;
                overlay._wizardStep = 1;
                overlay._wizCursosSeleccionados = [];

                var stepParticipantes = overlay.querySelector('#drawer-wizard-step2');
                var stepContenidos = overlay.querySelector('#drawer-wizard-step3');
                var stepperOlEdit = overlay.querySelector('#drawer-wiz-stepper-ol-edit');
                var btnPrimary = overlay.querySelector('#drawer-wiz-btn-primary');
                var btnCancel = overlay.querySelector('#drawer-wiz-btn-cancel');

                function getUsernameEmpleado(e) {
                    if (e.username) return e.username;
                    var palabras = (e.nombre || '').toLowerCase().split(' ').filter(function(p) { return p.length > 0; });
                    var iniciales = palabras.map(function(p) { return p.charAt(0); }).join('');
                    return iniciales ? iniciales + '@fiqsha.demo' : 'user@fiqsha.demo';
                }
                var empleadosDrawerRaw = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
                var empleadosDrawer = empleadosDrawerRaw.map(function(e, idx) {
                    var id = e.id || e.idColaborador || ('E' + (idx + 1));
                    return { id: id, username: getUsernameEmpleado(e), nombre: (e.nombre || '').trim(), correo: getUsernameEmpleado(e), area: (e.area || '').trim(), lider: (e.jefe || '').trim(), avatar: e.avatar || null };
                });

                function getEmpleadosDisponibles() {
                    var tomados = {};
                    asignacionesData.forEach(function(a) {
                        if (a.colaboradorId) tomados[String(a.colaboradorId)] = true;
                    });
                    return empleadosDrawer.filter(function(e) { return !tomados[String(e.id)]; });
                }

                function setPrimaryLabel(text) {
                    if (!btnPrimary) return;
                    var sp = btnPrimary.querySelector('span');
                    if (sp) sp.textContent = text;
                    else btnPrimary.textContent = text;
                }
                function setSecondaryLabel(text) {
                    if (!btnCancel) return;
                    var sp = btnCancel.querySelector('span');
                    if (sp) sp.textContent = text;
                    else btnCancel.textContent = text;
                }

                function syncWizardPrimary() {
                    if (!btnPrimary) return;
                    var ws = overlay._wizardStep || 1;
                    if (ws === 1) {
                        setPrimaryLabel('Siguiente');
                        var ref = overlay._drawerColabTablaRef;
                        var dis = !ref || typeof ref.getSelectedIds !== 'function' || ref.getSelectedIds().length === 0;
                        btnPrimary.disabled = dis;
                        setSecondaryLabel('Cancelar');
                    } else {
                        setPrimaryLabel('Agregar');
                        btnPrimary.disabled = (overlay._wizCursosSeleccionados || []).length === 0;
                        setSecondaryLabel('Anterior');
                    }
                }

                function showWizardStep(num) {
                    overlay._wizardStep = num;
                    if (stepParticipantes) stepParticipantes.style.display = num === 1 ? 'flex' : 'none';
                    if (stepContenidos) stepContenidos.style.display = num === 2 ? 'block' : 'none';
                    if (stepperOlEdit && typeof setStepperStepStates === 'function') {
                        setStepperStepStates(stepperOlEdit, num === 1 ? 0 : 1);
                    }
                    if (num === 2 && !overlay._wizContenidosAttached) {
                        attachWizardContenidosPaso2(overlay, syncWizardPrimary);
                    }
                    syncWizardPrimary();
                }

                    function escapeDrawerHtml(t) { if (t == null) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
                    function buildDrawerColabRowHtml(row) {
                        var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                        var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                            (avatarUrl
                                ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeDrawerHtml(row.nombre) + '" class="ubits-avatar__img"></span>'
                                : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                            '<span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.nombre) + '</span></div>';
                        return '<td data-col="username"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.username) + '</span></td>' +
                            '<td data-col="nombre">' + usuarioCell + '</td>' +
                            '<td data-col="correo"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.correo) + '</span></td>' +
                            '<td data-col="area"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.area) + '</span></td>' +
                            '<td data-col="lider"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.lider) + '</span></td>';
                    }

                var drawerColabContainer = overlay.querySelector('#drawer-colab-data-table-container');
                var drawerColabTablaRef = null;
                if (drawerColabContainer && typeof createUbitsDataTable === 'function') {
                    drawerColabTablaRef = createUbitsDataTable({
                        containerId: 'drawer-colab-data-table-container',
                        tableId: 'drawer-colab-table-edit-plan',
                        title: 'Lista de colaboradores',
                        columns: [ { id: 'username', label: 'Username', filterable: true }, { id: 'nombre', label: 'Nombre del usuario', filterable: true }, { id: 'correo', label: 'Correo electrónico', filterable: true }, { id: 'area', label: 'Área', filterable: true }, { id: 'lider', label: 'Líder', filterable: true } ],
                        getData: function() { return getEmpleadosDisponibles(); },
                        rowIdField: 'id',
                        buildRowHtml: buildDrawerColabRowHtml,
                        features: { checkboxes: true, search: true, filters: true, verSeleccionados: true, resultsCount: true },
                        emptyState: { message: 'No hay colaboradores disponibles', icon: 'far fa-user', description: 'Todos los colaboradores ya tienen una asignación en este plan.' },
                        emptySearchState: { message: 'No se encontraron resultados', description: 'Intenta ajustar tu búsqueda.', buttonText: 'Limpiar búsqueda' },
                        i18n: {
                            selectAll: 'Seleccionar todo',
                            deselectAll: 'Deseleccionar todo',
                            verSeleccionados: 'Ver seleccionados',
                            buscar: 'Buscar',
                            buscarPlaceholder: 'Buscar colaborador...'
                        }
                    });
                    drawerColabContainer.addEventListener('change', function(e) {
                        if (e.target && e.target.matches && e.target.matches('input[type="checkbox"]')) syncWizardPrimary();
                    });
                }
                overlay._drawerColabTablaRef = drawerColabTablaRef;
                overlay._empleadosDrawer = empleadosDrawer;

                if (stepParticipantes) stepParticipantes.style.flexDirection = 'column';

                showWizardStep(1);

                if (btnPrimary) {
                    btnPrimary.onclick = function() {
                        var ws = overlay._wizardStep || 1;
                        if (ws === 1) {
                            overlay._wizCursosSeleccionados = [];
                            overlay._wizContenidosAttached = false;
                            showWizardStep(2);
                            return;
                        }
                        var ref = overlay._drawerColabTablaRef;
                        var ids = (ref && typeof ref.getSelectedIds === 'function') ? ref.getSelectedIds() : [];
                        var cursosSel = (overlay._wizCursosSeleccionados || []).map(function(c) {
                            var full = catalogoCursos.find(function(x) { return String(x.id) === String(c.id); });
                            return full || c;
                        });
                        var agregados = 0;
                        ids.forEach(function(cid) {
                            var row = empleadosDrawer.find(function(e) { return String(e.id) === String(cid); });
                            if (!row) return;
                            var nuevaId = 'fila-usuario-' + String(cid);
                            var exists = asignacionesData.some(function(a) { return String(a.colaboradorId) === String(cid); });
                            if (exists) return;
                            agregados++;
                            asignacionesData.push({
                                id: nuevaId,
                                colaboradorId: String(cid),
                                nombreUsuario: row.nombre || row.username || '',
                                avatar: row.avatar || null,
                                contenidos: cursosSel.slice(),
                                contenidosCount: cursosSel.length
                            });
                        });
                        if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    bindAsignacionesRowsAfterRefresh();
                    if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                        if (agregados > 0 && typeof iniciarAnimacionEstadoProcesandoAsignacion === 'function') iniciarAnimacionEstadoProcesandoAsignacion();
                        if (typeof showToast === 'function' && agregados > 0) showToast('success', 'Asignación(es) agregada(s) correctamente');
                    };
                }
                if (btnCancel) {
                    btnCancel.onclick = function() {
                        var ws = overlay._wizardStep || 1;
                        if (ws === 2) {
                            showWizardStep(1);
                            return;
                        }
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                    };
            }
            }

            var asignacionesContainer = document.getElementById('asignaciones-data-table-container');
            if (asignacionesContainer) {
                asignacionesContainer.addEventListener('click', function(e) {
                    var btn = e.target.closest('.js-asignacion-agregar-contenidos');
                    if (!btn) return;
                    e.preventDefault();
                    e.stopPropagation();
                    var tr = btn.closest('tbody tr[data-id]');
                    if (tr) abrirDrawerAgregarCursos(tr);
                });
            }

            var deleteOverlay = document.getElementById('asignaciones-delete-overlay');
            var deleteClose = document.getElementById('asignaciones-delete-close');
            var deleteCancel = document.getElementById('asignaciones-delete-cancel');
            var deleteConfirm = document.getElementById('asignaciones-delete-confirm');
            var deleteCountEl = document.getElementById('asignaciones-delete-count');
            var deleteTypeInput = document.getElementById('asignaciones-delete-type-input');
            function closeAsignacionesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function() {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function(e) { if (e.target === deleteOverlay) closeAsignacionesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsignacionesDeleteModal();
                    pendingAsignacionesDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function(id) { idSet[String(id)] = true; });
                    asignacionesData = asignacionesData.filter(function(a) { return !idSet[String(a.id)]; });
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    bindAsignacionesRowsAfterRefresh();
                    if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' asignación(es) eliminada(s) correctamente');
                });
            }

            // ========== Drawer Editar contenidos (misma UI que paso Contenidos del wizard, sin stepper) ==========
            function getDrawerCursosBodyHtml() {
                var p = 'drawer-editplan';
                return '<div class="drawer-agregar-cursos drawer-agregar-cursos--single-col">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Buscar y agregar contenidos</span>' +
                    '  <div class="drawer-cursos-search-row">' +
                    '    <div id="' + p + '-cursos-search-container" class="drawer-cursos-search-input-wrap"></div>' +
                    '    <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="' + p + '-cursos-filter-btn" aria-label="Filtrar por origen"><i class="far fa-filter"></i></button>' +
                    '  </div>' +
                    '  <div class="drawer-wiz-cursos-action-bar" id="' + p + '-cursos-action-bar">' +
                    '    <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="' + p + '-cursos-ver-seleccionados">' +
                    '      <i class="far fa-eye"></i><span>Ver seleccionados</span></button>' +
                    '  </div>' +
                    '  <div class="drawer-cursos-resultados-bg drawer-cursos-resultados-bg--paso2-full">' +
                    '    <div id="' + p + '-contenidos-empty-search" class="drawer-contenidos-empty-search-wrap" style="display:none;"></div>' +
                    '    <div class="drawer-cursos-cards-grid" id="' + p + '-cursos-cards-container"></div>' +
                    '  </div>' +
                    '</div>';
            }

            function abrirDrawerAgregarCursos(tr) {
                pendingCursosRow = tr;
                var asignacionId = tr ? (tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id')) : null;
                var item = asignacionId ? asignacionesData.find(function(a) { return String(a.id) === String(asignacionId); }) : null;
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" onclick="cerrarDrawerCursos()"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" onclick="cerrarDrawerCursosYAplicar()"><span class="ubits-body-sm-regular">Agregar</span></button>';

                openDrawer({
                    overlayId: 'drawer-agregar-cursos',
                    title: 'Editar contenidos',
                    bodyHtml: getDrawerCursosBodyHtml(),
                    footerHtml: footerHtml,
                    size: 'lg',
                    onClose: function() {
                        pendingCursosRow = null;
                        var o = document.getElementById('drawer-agregar-cursos');
                        if (o) {
                            o._wizCursosSeleccionados = [];
                            o._wizContenidosAttached = false;
                        }
                    }
                });

                var overlay = document.getElementById('drawer-agregar-cursos');
                if (!overlay) return;

                overlay._wizContenidosAttached = false;
                overlay._wizCursosSeleccionados = [];
                if (item && item.contenidos && item.contenidos.length) {
                    item.contenidos.forEach(function(c) {
                        var full = catalogoCursos.find(function(x) { return String(x.id) === String(c.id); });
                        overlay._wizCursosSeleccionados.push(full || c);
                    });
                }
                attachWizardContenidosPaso2(overlay, function() {}, { idPrefix: 'drawer-editplan' });
            }

            function cerrarDrawerCursos() {
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                pendingCursosRow = null;
            }
            window.cerrarDrawerCursos = cerrarDrawerCursos;

            function cerrarDrawerCursosYAplicar() {
                var overlay = document.getElementById('drawer-agregar-cursos');
                var cursosSeleccionados = [];
                if (overlay && overlay._wizCursosSeleccionados && overlay._wizCursosSeleccionados.length) {
                    cursosSeleccionados = overlay._wizCursosSeleccionados.map(function(c) {
                        var full = catalogoCursos.find(function(x) { return String(x.id) === String(c.id); });
                        return full || c;
                    });
                }
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                if (pendingCursosRow) {
                    aplicarCursosAAsignacion(pendingCursosRow, cursosSeleccionados);
                    pendingCursosRow = null;
                }
            }
            window.cerrarDrawerCursosYAplicar = cerrarDrawerCursosYAplicar;

            function aplicarCursosAAsignacion(tr, cursosSeleccionados) {
                if (!tr) return;
                var list = Array.isArray(cursosSeleccionados) ? cursosSeleccionados : [];
                var id = tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id');
                var item = asignacionesData.find(function(a) { return String(a.id) === String(id); });
                if (item) {
                    item.contenidosCount = list.length;
                    item.contenidos = list.slice();
                }
                if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                bindAsignacionesRowsAfterRefresh();
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }
        });
    </script>
</body>
</html>
