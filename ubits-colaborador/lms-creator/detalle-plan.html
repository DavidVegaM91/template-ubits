<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - LMS Creator - Detalle del plan</title>

</head>
<body data-theme="light" class="page-detalle-plan">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>
                    <!-- Card progreso del plan -->
                    <div class="section-single section-single--plan-progress">
                        <div class="widget-detalle-plan-progress">
                        <div class="detalle-plan-progress-card">
                            <div class="detalle-plan-progress-card__header">
                                <textarea class="task-detail-title-editable ubits-heading-h1" id="plan-nombre" placeholder="Nombre del plan" rows="1" maxlength="250"></textarea>
                                <span id="plan-estado-container"></span>
                            </div>
                            <div class="detalle-plan-progress-card__fechas">
                                <span class="detalle-plan-fechas-label-wrap"><span class="ubits-body-xs-regular detalle-plan-card__meta-label">Fecha de inicio:</span> <span id="plan-fecha-inicio" class="ubits-body-xs-regular">1 ene 2025</span></span>
                                <span class="detalle-plan-fecha-fin-static detalle-plan-fechas-label-wrap" id="plan-fecha-fin-static-wrap"><span class="ubits-body-xs-regular detalle-plan-card__meta-label">Fecha de finalización:</span> <span id="plan-fecha-fin" class="ubits-body-xs-regular">31 mar 2025</span></span>
                                <div class="detalle-plan-fecha-fin-editable" id="plan-fecha-fin-editable-wrap" style="display: none;">
                                    <span class="ubits-body-xs-regular detalle-plan-card__meta-label">Fecha de finalización:</span>
                                    <div id="plan-fecha-fin-wrap"></div>
                                </div>
                            </div>
                            <div class="detalle-plan-progress-card__content">
                                <span class="ubits-body-sm-semibold detalle-plan-progress-card__label">Progreso del plan</span>
                                <div class="detalle-plan-progress-card__bar"><div class="detalle-plan-progress-card__bar-fill" id="plan-progress-fill" style="width: 65%"></div></div>
                                <span class="detalle-plan-progress-card__percent" id="plan-progress-value">65%</span>
                            </div>
                        </div>
                        </div>
                    </div>
                    <!-- Asignaciones: componente oficial ubits-data-table -->
                    <div class="section-single section-single--asignaciones-detalle">
                        <div class="widget-asignaciones-detalle">
                            <div class="detalle-plan-asignaciones-wrapper">
                                <div id="asignaciones-detalle-data-table-container" class="crear-plan-contenidos-asignaciones-tabla"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="asignaciones-modals-container"></div>
    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/calendar.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../components/ubits-data-table.js"></script>
    <script src="../../components/drawer.js"></script>
    <script src="../../components/card-content-compact.js"></script>
    <script src="./catalogo-cursos-drawer-data.js"></script>
    <script src="../tareas/tareas-base-unificada.js"></script>
    <script src="../../script.js"></script>
    <script src="./lms-creator-tables.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            var params = new URLSearchParams(window.location.search);
            var planId = params.get('id') || '1';
            var planes = {
                '1': { nombre: 'Plan de onboarding Q3 2026', progreso: 0, fechaInicio: '01/07/2026', fechaFin: '30/09/2026', estado: 'Planeado' },
                '2': { nombre: 'Competencias de liderazgo', progreso: 0, fechaInicio: '01/04/2026', fechaFin: '30/06/2026', estado: 'Planeado' },
                '3': { nombre: 'Cursos de cumplimiento Q1', progreso: 65, fechaInicio: '01/01/2026', fechaFin: '31/03/2026', estado: 'Vigente' },
                '4': { nombre: 'Evaluación técnica 2025', progreso: 85, fechaInicio: '01/09/2025', fechaFin: '15/12/2025', estado: 'No vigente' }
            };
            var plan = planes[planId] || planes['1'];

            function getEstadoTagClass(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }
            function getEstadoTooltip(estado) {
                if (estado === 'Planeado') return 'Plan creado para una fecha futura; aún no ha iniciado. Solo lo ve el administrador, no los estudiantes.';
                if (estado === 'Vigente') return 'En curso: la fecha actual está entre inicio y fin.';
                if (estado === 'No vigente') return 'Ya pasó la fecha de cierre. El progreso quedó congelado; lo que estudien después no suma al plan.';
                return '';
            }
            var estadoEl = document.getElementById('plan-estado-container');
            if (estadoEl && plan.estado) {
                var estadoClass = getEstadoTagClass(plan.estado);
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + estadoClass + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + (plan.estado || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span></span>';
                var tooltipText = getEstadoTooltip(plan.estado);
                estadoEl.innerHTML = tooltipText ? '<span data-tooltip="' + (tooltipText || '').replace(/"/g, '&quot;') + '">' + tagHtml + '</span>' : tagHtml;
                if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-estado-container [data-tooltip]'); }, 50);
            }

            if (typeof loadHeaderProduct === 'function') {
                var headerOpts = {
                    productName: 'Detalle del plan de contenidos',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() { window.location.href = 'planes-formacion.html'; }
                    }
                };
                if (plan.estado === 'Vigente' || plan.estado === 'Planeado') {
                    headerOpts.secondaryButtons = [
                        { text: 'Guardar', icon: 'fa-save', onClick: function() {
                            if (typeof showToast === 'function') showToast('success', 'Cambios guardados');
                        } }
                    ];
                }
                loadHeaderProduct('header-product-container', headerOpts);
            }

            var planNombreEl = document.getElementById('plan-nombre');
            if (planNombreEl) {
                planNombreEl.value = plan.nombre || '';
            }

            document.getElementById('plan-progress-fill').style.width = plan.progreso + '%';
            document.getElementById('plan-progress-value').textContent = plan.progreso + '%';
            document.getElementById('plan-fecha-inicio').textContent = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaInicio) : plan.fechaInicio);
            var staticWrap = document.getElementById('plan-fecha-fin-static-wrap');
            var editableWrap = document.getElementById('plan-fecha-fin-editable-wrap');
            var fechaFinSpan = document.getElementById('plan-fecha-fin');
            if (plan.estado === 'Vigente' || plan.estado === 'Planeado') {
                if (staticWrap) staticWrap.style.display = 'none';
                if (editableWrap) editableWrap.style.display = 'flex';
                var finWrap = document.getElementById('plan-fecha-fin-wrap');
                if (finWrap && typeof createInput === 'function') {
                    finWrap.innerHTML = '';
                    createInput({
                        containerId: 'plan-fecha-fin-wrap',
                        type: 'calendar',
                        size: 'xs',
                        showLabel: false,
                        placeholder: 'Selecciona fecha',
                        value: plan.fechaFin || '',
                        onChange: function(dateStr) {
                            if (dateStr) {
                                plan.fechaFin = dateStr;
                                if (typeof showToast === 'function') showToast('success', 'Fecha de finalización actualizada');
                            }
                        }
                    });
                    var dateInputEl = document.querySelector('#plan-fecha-fin-wrap .ubits-input');
                    if (dateInputEl) dateInputEl.setAttribute('aria-label', 'Fecha de finalización del plan');
                }
            } else {
                if (staticWrap) staticWrap.style.display = '';
                if (editableWrap) editableWrap.style.display = 'none';
                if (fechaFinSpan) fechaFinSpan.textContent = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaFin) : plan.fechaFin);
            }
            document.title = 'UBITS Playground - LMS Creator - ' + plan.nombre;

            setTimeout(function() {
                var nombreTa = document.getElementById('plan-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                    });
                }
            }, 0);

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) del plan?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel">Cancelar</button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled>Eliminar</button>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            // Contenidos por usuario: construidos desde CATALOGO_CURSOS_DRAWER para que coincidan con "Buscar y agregar contenidos". Cada item tiene progress y status.
            var catalogDrawer = window.CATALOGO_CURSOS_DRAWER || [];
            function buildContenidoFromCatalog(indicesWithProgress) {
                var list = [];
                indicesWithProgress.forEach(function(x) {
                    var c = catalogDrawer[x.i];
                    if (!c) return;
                    var copy = {};
                    for (var k in c) copy[k] = c[k];
                    copy.progress = x.p;
                    copy.status = x.s;
                    list.push(copy);
                });
                return list;
            }
            var baseIndices = { '1': [{i:0,p:100,s:'completed'},{i:1,p:100,s:'completed'},{i:2,p:80,s:'progress'},{i:3,p:40,s:'progress'},{i:4,p:0,s:'default'}], '2': [{i:5,p:60,s:'progress'},{i:6,p:100,s:'completed'},{i:7,p:0,s:'default'}], '3': [{i:8,p:100,s:'completed'},{i:9,p:100,s:'completed'},{i:10,p:0,s:'default'}], '4': [{i:11,p:20,s:'progress'},{i:12,p:0,s:'default'},{i:13,p:0,s:'default'}] };
            var plan3Indices = { '1': [{i:0,p:100,s:'completed'},{i:1,p:50,s:'progress'},{i:2,p:30,s:'progress'}], '2': [{i:3,p:100,s:'completed'},{i:4,p:80,s:'progress'},{i:5,p:15,s:'progress'}], '3': [{i:6,p:100,s:'completed'},{i:7,p:100,s:'completed'},{i:8,p:10,s:'progress'}], '4': [{i:9,p:100,s:'completed'},{i:10,p:50,s:'progress'},{i:11,p:45,s:'progress'}] };
            var plan4Indices = { '1': [{i:0,p:82,s:'progress'},{i:1,p:82,s:'progress'},{i:2,p:82,s:'progress'}], '2': [{i:3,p:84,s:'progress'},{i:4,p:84,s:'progress'},{i:5,p:84,s:'progress'}], '3': [{i:6,p:86,s:'progress'},{i:7,p:86,s:'progress'},{i:8,p:86,s:'progress'}], '4': [{i:9,p:88,s:'progress'},{i:10,p:88,s:'progress'},{i:11,p:88,s:'progress'}] };
            var contenidoPorUsuarioBase = {};
            var contenidoPorUsuarioPlan3 = {};
            var contenidoPorUsuarioPlan4 = {};
            ['1','2','3','4'].forEach(function(rid) {
                contenidoPorUsuarioBase[rid] = buildContenidoFromCatalog(baseIndices[rid] || []);
                contenidoPorUsuarioPlan3[rid] = buildContenidoFromCatalog(plan3Indices[rid] || []);
                contenidoPorUsuarioPlan4[rid] = buildContenidoFromCatalog(plan4Indices[rid] || []);
            });
            var contenidoPorUsuario = (planId === '3') ? contenidoPorUsuarioPlan3 : (planId === '4') ? contenidoPorUsuarioPlan4 : contenidoPorUsuarioBase;
            function progresoEstudiante(rowId) {
                var list = contenidoPorUsuario[rowId] || [];
                if (list.length === 0) return 0;
                var sum = list.reduce(function(acc, c) { return acc + (c.progress || 0); }, 0);
                return Math.round(sum / list.length);
            }
            var catalogoContenidos = [
                { id: 'c1', title: 'Design Thinking: bases y aplicación', duration: '60 min' },
                { id: 'c2', title: 'Comunicación efectiva', duration: '15 min' },
                { id: 'c3', title: 'Liderazgo situacional', duration: '90 min' },
                { id: 'c4', title: 'Gestión del tiempo', duration: '20 min' },
                { id: 'c5', title: 'Innovación en equipos', duration: '45 min' },
                { id: 'c6', title: 'Negociación avanzada', duration: '75 min' },
                { id: 'c7', title: 'Trabajo en equipo remoto', duration: '15 min' },
                { id: 'c8', title: 'Data skills para líderes', duration: '120 min' }
            ];

            var empleadosEjemplo = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
            var empleadosSinCEO = empleadosEjemplo.filter(function(e) { return !e.esGerenteGeneral; });
            function parseDateDDMMYYYY(str) {
                if (!str || typeof str !== 'string') return null;
                var parts = str.trim().split(/[\/\-]/);
                if (parts.length < 3) return null;
                var d = parseInt(parts[0], 10), m = parseInt(parts[1], 10) - 1, y = parseInt(parts[2], 10);
                if (parts[0].length === 4) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10) - 1; d = parseInt(parts[2], 10); }
                if (isNaN(d) || isNaN(m) || isNaN(y)) return null;
                var date = new Date(y, m, d);
                return isNaN(date.getTime()) ? null : date;
            }
            function randomDateInRangeDDMMYYYY(fechaInicio, fechaFin) {
                var start = parseDateDDMMYYYY(fechaInicio);
                var end = parseDateDDMMYYYY(fechaFin);
                if (!start || !end || end < start) return null;
                var startTs = start.getTime();
                var endTs = end.getTime();
                var randomTs = startTs + Math.floor(Math.random() * (endTs - startTs + 1));
                var d = new Date(randomTs);
                var day = ('0' + d.getDate()).slice(-2);
                var month = ('0' + (d.getMonth() + 1)).slice(-2);
                return day + '/' + month + '/' + d.getFullYear();
            }
            var asignacionesDetalleData = [
                { id: '1', usuario: 'María García López', avatar: null, ultimoAcceso: 'Hace 2 horas', ultimaFechaProgreso: null, progreso: 0 },
                { id: '2', usuario: 'Carlos Rodríguez', avatar: null, ultimoAcceso: 'Hace 1 día', ultimaFechaProgreso: null, progreso: 0 },
                { id: '3', usuario: 'Ana Martínez', avatar: null, ultimoAcceso: 'Hace 3 días', ultimaFechaProgreso: null, progreso: 0 },
                { id: '4', usuario: 'Pedro Sánchez', avatar: null, ultimoAcceso: 'Hace 5 días', ultimaFechaProgreso: null, progreso: 0 }
            ];
            asignacionesDetalleData.forEach(function(r) {
                var fecha = randomDateInRangeDDMMYYYY(plan.fechaInicio, plan.fechaFin);
                r.ultimaFechaProgreso = fecha || '-';
            });
            if (empleadosSinCEO.length >= 4) {
                asignacionesDetalleData[0].usuario = empleadosSinCEO[0].nombre; asignacionesDetalleData[0].avatar = empleadosSinCEO[0].avatar || null;
                asignacionesDetalleData[1].usuario = empleadosSinCEO[1].nombre; asignacionesDetalleData[1].avatar = empleadosSinCEO[1].avatar || null;
                asignacionesDetalleData[2].usuario = empleadosSinCEO[2].nombre; asignacionesDetalleData[2].avatar = empleadosSinCEO[2].avatar || null;
                asignacionesDetalleData[3].usuario = empleadosSinCEO[3].nombre; asignacionesDetalleData[3].avatar = empleadosSinCEO[3].avatar || null;
            }
            asignacionesDetalleData.forEach(function(r) { r.progreso = progresoEstudiante(r.id); });
            function progresoTotalPlan() {
                var rows = asignacionesDetalleData;
                if (!rows.length) return 0;
                var sum = rows.reduce(function(acc, row) { return acc + (row.progreso || 0); }, 0);
                return Math.round(sum / rows.length);
            }
            function planSinProgreso() {
                return plan.estado === 'Planeado' || String(plan.estado).indexOf('Procesando') === 0;
            }
            var totalPlan = planSinProgreso() ? 0 : progresoTotalPlan();
            document.getElementById('plan-progress-fill').style.width = totalPlan + '%';
            document.getElementById('plan-progress-value').textContent = totalPlan + '%';
            var asignacionesDetalleTablaRef = null;
            var pendingAsignacionesDeleteIds = [];

            function escapeDetalleHtml(t) { if (t == null) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
            function buildDetalleAsignacionRowHtml(row) {
                var count = (contenidoPorUsuario[row.id] || []).length;
                var contenidosBtn = count === 0
                    ? '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-detalle-plan-contenidos-btn" data-row-id="' + escapeDetalleHtml(row.id) + '"><span>Agregar contenidos</span></button>'
                    : '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-detalle-plan-contenidos-btn" data-row-id="' + escapeDetalleHtml(row.id) + '"><span>' + count + ' contenidos</span></button>';
                var progresoMostrar = planSinProgreso() ? 0 : (row.progreso || 0);
                var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                    (avatarUrl
                        ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeDetalleHtml(row.usuario) + '" class="ubits-avatar__img"></span>'
                        : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                    '<span class="ubits-body-sm-regular">' + escapeDetalleHtml(row.usuario) + '</span></div>';
                return '<td data-col="usuario">' + usuarioCell + '</td>' +
                    '<td data-col="ultimo-acceso"><span class="ubits-body-sm-regular">' + escapeDetalleHtml(row.ultimoAcceso) + '</span></td>' +
                    '<td data-col="ultima-fecha-progreso" data-date="' + escapeDetalleHtml(row.ultimaFechaProgreso) + '"><span class="ubits-body-sm-regular">' + escapeDetalleHtml(typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.ultimaFechaProgreso) : row.ultimaFechaProgreso) + '</span></td>' +
                    '<td data-col="contenidos">' + contenidosBtn + '</td>' +
                    '<td data-col="progreso"><div class="ubits-table__cell-progress"><div class="ubits-table__progress-bar"><div class="ubits-table__progress-bar-fill" style="width:' + progresoMostrar + '%"></div></div><span class="ubits-body-sm-regular">' + progresoMostrar + '%</span></div></td>';
            }

            function updatePlanProgressBar() {
                var total = planSinProgreso() ? 0 : progresoTotalPlan();
                var fillEl = document.getElementById('plan-progress-fill');
                var valueEl = document.getElementById('plan-progress-value');
                if (fillEl) fillEl.style.width = total + '%';
                if (valueEl) valueEl.textContent = total + '%';
            }

            function getUsernameEmpleado(e) {
                if (e.username) return e.username;
                var palabras = (e.nombre || '').toLowerCase().split(' ').filter(function(p) { return p.length > 0; });
                var iniciales = palabras.map(function(p) { return p.charAt(0); }).join('');
                return iniciales ? iniciales + '@fiqsha.demo' : 'user@fiqsha.demo';
            }

            function abrirDrawerAgregarAsignacionVigente() {
                var bodyHtml = '<div class="drawer-usuarios-panel drawer-usuarios-panel--colaborador" style="display:block">' +
                    '<div id="drawer-detalle-plan-colab-data-table-container" class="drawer-colab-dt-wrapper"></div>' +
                    '</div>';

                    ],

                    rowIdField: 'id',
                    buildRowHtml: buildDetalleAsignacionRowHtml,
                    features: { checkboxes: true, search: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    actionBarButtons: (function() {

            function closeAsignacionesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';

            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsignacionesDeleteModal();
                    ids.forEach(function(id) { delete contenidoPorUsuario[id]; });
                    asignacionesDetalleData = asignacionesDetalleData.filter(function(r) { return ids.indexOf(r.id) === -1; });

            function getDrawerCursosBodyHtmlDetallePlan() {

            function abrirDrawerAgregarContenidosDetallePlan(rowId) {
                var catalogoCursos = window.CATALOGO_CURSOS_DRAWER || [];
                var cursosSeleccionados = (contenidoPorUsuario[rowId] || []).slice();
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="drawer-detalle-plan-cursos-cancel"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="drawer-detalle-plan-cursos-agregar"><span class="ubits-body-sm-regular">Agregar</span></button>';
                openDrawer({
                    overlayId: 'drawer-detalle-plan-agregar-cursos',
                    title: 'Agregar contenidos',
                    bodyHtml: getDrawerCursosBodyHtmlDetallePlan(),
                    footerHtml: footerHtml,
                    size: 'lg',
                    onClose: function() {}
                });
                var overlay = document.getElementById('drawer-detalle-plan-agregar-cursos');
                if (!overlay) return;

                function actualizarTabla() {
                    var tbody = overlay.querySelector('#drawer-cursos-agregados-tbody');
                    var emptyStateContainer = overlay.querySelector('#drawer-cursos-empty-state');
                    var tableWrapper = overlay.querySelector('#drawer-cursos-table-wrapper');
                    if (!tbody) return;
                    tbody.innerHTML = '';
                    if (cursosSeleccionados.length === 0) {
                        if (tableWrapper) tableWrapper.style.display = 'none';
                        if (emptyStateContainer) {
                            emptyStateContainer.style.display = 'block';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-cursos-empty-state', { icon: 'fa-folder-open', iconSize: 'lg', title: 'No hay contenidos agregados', description: 'Busca y agrega contenidos desde el buscador.', buttons: {} });
                            }
                        }
                    } else {
                        if (emptyStateContainer) emptyStateContainer.style.display = 'none';
                        if (tableWrapper) tableWrapper.style.display = 'block';
                        cursosSeleccionados.forEach(function(c) {
                            var tr = document.createElement('tr');
                            tr.className = 'drawer-cursos-table-row';
                            tr.innerHTML = '<td data-col="contenido"><span class="ubits-body-sm-regular">' + (c.title || '').replace(/</g, '&lt;') + '</span></td>' +
                                '<td data-col="acciones"><button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only js-drawer-cursos-delete" aria-label="Eliminar"><i class="far fa-trash"></i></button></td>';
                            tr.dataset.courseId = c.id;
                            tr.querySelector('.js-drawer-cursos-delete').addEventListener('click', function() {
                                cursosSeleccionados = cursosSeleccionados.filter(function(x) { return x.id !== c.id; });
                                actualizarTabla();
                                filtrarYRenderizarCards();
                            });
                            tbody.appendChild(tr);
                        });
                    }
                }

                if (typeof createInput === 'function') {
                    createInput({ containerId: 'drawer-cursos-search-container', type: 'search', placeholder: 'Buscar contenidos...', size: 'sm', showLabel: false });
                }
                var searchInput = overlay.querySelector('#drawer-cursos-search-container input');
                var cardsContainer = overlay.querySelector('#drawer-cursos-cards-container');
                var emptySearchContainer = overlay.querySelector('#drawer-contenidos-empty-search');
                var DRAWER_CURSOS_PAGE_SIZE = 12;
                var drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    return catalogoCursos.filter(function(c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q));
                    });
                }
                function filtrarYRenderizarCards() {
                    if (!cardsContainer || typeof loadCardContentCompact !== 'function') return;
                    var filtrados = getFiltradosDrawerCursos();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-contenidos-empty-search', {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: { secondary: { text: 'Limpiar búsqueda', icon: 'fa-times', onClick: function() {} } }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (searchInput) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var aMostrar = filtrados.slice(0, drawerCursosVisibleCount);
                    var aMostrarConProgreso = aMostrar.map(function(course) {
                        var sel = cursosSeleccionados.find(function(x) { return x.id === course.id; });
                        var progress = sel && (sel.progress != null) ? sel.progress : 0;
                        var status = sel && sel.status ? sel.status : 'default';
                        var copy = {};
                        for (var k in course) copy[k] = course[k];
                        copy.progress = progress;
                        copy.status = status;
                        return copy;
                    });
                    loadCardContentCompact('drawer-cursos-cards-container', aMostrarConProgreso);
                    aMostrar.forEach(function(course, idx) {
                        var cards = cardsContainer.querySelectorAll('.course-card-compact');
                        var cardEl = cards[idx];
                        if (cardEl) {
                            cardEl.style.cursor = 'pointer';
                            cardEl.dataset.courseId = course.id;
                            cardEl.classList.toggle('course-card-compact--selected', cursosSeleccionados.some(function(x) { return x.id === course.id; }));
                        }
                    });
                }
                function maybeLoadMoreDrawerCursos() {
                    var filtrados = getFiltradosDrawerCursos();
                    if (drawerCursosVisibleCount >= filtrados.length) return;
                    drawerCursosVisibleCount += DRAWER_CURSOS_PAGE_SIZE;
                    filtrarYRenderizarCards();
                }
                var resultadosBg = overlay.querySelector('.drawer-cursos-resultados-bg');
                if (resultadosBg) {
                    resultadosBg.addEventListener('scroll', function() {
                        var el = resultadosBg;
                        var threshold = 120;
                        if (el.scrollTop + el.clientHeight >= el.scrollHeight - threshold) maybeLoadMoreDrawerCursos();
                    });
                }
                cardsContainer.addEventListener('click', function(e) {
                    var cardEl = e.target.closest('.course-card-compact');
                    if (!cardEl || !cardEl.dataset.courseId) return;
                    var course = catalogoCursos.find(function(c) { return c.id === cardEl.dataset.courseId; });
                    if (!course) return;
                    if (cursosSeleccionados.some(function(x) { return x.id === course.id; })) return;
                    cursosSeleccionados.push(course);
                    actualizarTabla();
                    filtrarYRenderizarCards();
                });
                if (searchInput) {
                    searchInput.addEventListener('input', function() { drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE; filtrarYRenderizarCards(); });
                }

                actualizarTabla();
                filtrarYRenderizarCards();

                overlay.querySelector('#drawer-detalle-plan-cursos-cancel').addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                });
                overlay.querySelector('#drawer-detalle-plan-cursos-agregar').addEventListener('click', function() {
                    contenidoPorUsuario[rowId] = cursosSeleccionados.slice();
                    if (asignacionesDetalleTablaRef && typeof asignacionesDetalleTablaRef.refresh === 'function') asignacionesDetalleTablaRef.refresh();
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                    if (typeof showToast === 'function') showToast('success', 'Contenidos actualizados');
                });
            }

            function abrirDrawerAgregarContenidosMultiDetallePlan(selectedIds) {
                if (!selectedIds || selectedIds.length === 0) return;
                var catalogoCursos = window.CATALOGO_CURSOS_DRAWER || [];
                var cursosSeleccionados = [];
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="drawer-detalle-plan-cursos-cancel"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="drawer-detalle-plan-cursos-agregar"><span class="ubits-body-sm-regular">Agregar</span></button>';
                openDrawer({
                    overlayId: 'drawer-detalle-plan-agregar-cursos',
                    title: 'Agregar contenidos',
                    bodyHtml: getDrawerCursosBodyHtmlDetallePlan(),
                    footerHtml: footerHtml,
                    size: 'lg',
                    onClose: function() {}
                });
                var overlay = document.getElementById('drawer-detalle-plan-agregar-cursos');
                if (!overlay) return;

                function actualizarTabla() {
                    var tbody = overlay.querySelector('#drawer-cursos-agregados-tbody');
                    var emptyStateContainer = overlay.querySelector('#drawer-cursos-empty-state');
                    var tableWrapper = overlay.querySelector('#drawer-cursos-table-wrapper');
                    if (!tbody) return;
                    tbody.innerHTML = '';
                    if (cursosSeleccionados.length === 0) {
                        if (tableWrapper) tableWrapper.style.display = 'none';
                        if (emptyStateContainer) {
                            emptyStateContainer.style.display = 'block';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-cursos-empty-state', { icon: 'fa-folder-open', iconSize: 'lg', title: 'No hay contenidos agregados', description: 'Busca y agrega contenidos desde el buscador.', buttons: {} });
                            }
                        }
                    } else {
                        if (emptyStateContainer) emptyStateContainer.style.display = 'none';
                        if (tableWrapper) tableWrapper.style.display = 'block';
                        cursosSeleccionados.forEach(function(c) {
                            var tr = document.createElement('tr');
                            tr.className = 'drawer-cursos-table-row';
                            tr.innerHTML = '<td data-col="contenido"><span class="ubits-body-sm-regular">' + (c.title || '').replace(/</g, '&lt;') + '</span></td>' +
                                '<td data-col="acciones"><button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only js-drawer-cursos-delete" aria-label="Eliminar"><i class="far fa-trash"></i></button></td>';
                            tr.dataset.courseId = c.id;
                            tr.querySelector('.js-drawer-cursos-delete').addEventListener('click', function() {
                                cursosSeleccionados = cursosSeleccionados.filter(function(x) { return x.id !== c.id; });
                                actualizarTabla();
                                filtrarYRenderizarCards();
                            });
                            tbody.appendChild(tr);
                        });
                    }
                }

                if (typeof createInput === 'function') {
                    createInput({ containerId: 'drawer-cursos-search-container', type: 'search', placeholder: 'Buscar contenidos...', size: 'sm', showLabel: false });
                }
                var searchInput = overlay.querySelector('#drawer-cursos-search-container input');
                var cardsContainer = overlay.querySelector('#drawer-cursos-cards-container');
                var emptySearchContainer = overlay.querySelector('#drawer-contenidos-empty-search');
                var DRAWER_CURSOS_PAGE_SIZE = 12;
                var drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    return catalogoCursos.filter(function(c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q));
                    });
                }
                function filtrarYRenderizarCards() {
                    if (!cardsContainer || typeof loadCardContentCompact !== 'function') return;
                    var filtrados = getFiltradosDrawerCursos();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-contenidos-empty-search', {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: { secondary: { text: 'Limpiar búsqueda', icon: 'fa-times', onClick: function() {} } }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (searchInput) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var aMostrar = filtrados.slice(0, drawerCursosVisibleCount);
                    var aMostrarConProgreso = aMostrar.map(function(course) {
                        var sel = cursosSeleccionados.find(function(x) { return x.id === course.id; });
                        var progress = sel && (sel.progress != null) ? sel.progress : 0;
                        var status = sel && sel.status ? sel.status : 'default';
                        var copy = {};
                        for (var k in course) copy[k] = course[k];
                        copy.progress = progress;
                        copy.status = status;
                        return copy;
                    });
                    loadCardContentCompact('drawer-cursos-cards-container', aMostrarConProgreso);
                    aMostrar.forEach(function(course, idx) {
                        var cards = cardsContainer.querySelectorAll('.course-card-compact');
                        var cardEl = cards[idx];
                        if (cardEl) {
                            cardEl.style.cursor = 'pointer';
                            cardEl.dataset.courseId = course.id;
                            cardEl.classList.toggle('course-card-compact--selected', cursosSeleccionados.some(function(x) { return x.id === course.id; }));
                        }
                    });
                }
                function maybeLoadMoreDrawerCursos() {
                    var filtrados = getFiltradosDrawerCursos();
                    if (drawerCursosVisibleCount >= filtrados.length) return;
                    drawerCursosVisibleCount += DRAWER_CURSOS_PAGE_SIZE;
                    filtrarYRenderizarCards();
                }
                var resultadosBg = overlay.querySelector('.drawer-cursos-resultados-bg');
                if (resultadosBg) {
                    resultadosBg.addEventListener('scroll', function() {
                        var el = resultadosBg;
                        var threshold = 120;
                        if (el.scrollTop + el.clientHeight >= el.scrollHeight - threshold) maybeLoadMoreDrawerCursos();
                    });
                }
                cardsContainer.addEventListener('click', function(e) {
                    var cardEl = e.target.closest('.course-card-compact');
                    if (!cardEl || !cardEl.dataset.courseId) return;
                    var course = catalogoCursos.find(function(c) { return c.id === cardEl.dataset.courseId; });
                    if (!course) return;
                    if (cursosSeleccionados.some(function(x) { return x.id === course.id; })) return;
                    cursosSeleccionados.push(course);
                    actualizarTabla();
                    filtrarYRenderizarCards();
                });
                if (searchInput) {
                    searchInput.addEventListener('input', function() { drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE; filtrarYRenderizarCards(); });
                }

                actualizarTabla();
                filtrarYRenderizarCards();

                overlay.querySelector('#drawer-detalle-plan-cursos-cancel').addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                });
                overlay.querySelector('#drawer-detalle-plan-cursos-agregar').addEventListener('click', function() {
                    var toAdd = cursosSeleccionados.slice();
                    selectedIds.forEach(function(id) {
                        var current = (contenidoPorUsuario[id] || []).slice();
                        toAdd.forEach(function(c) {
                            if (!current.some(function(x) { return x.id === c.id; })) current.push(c);
                        });
                        contenidoPorUsuario[id] = current;
                    });
                    if (asignacionesDetalleTablaRef && typeof asignacionesDetalleTablaRef.refresh === 'function') asignacionesDetalleTablaRef.refresh();
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                    if (typeof showToast === 'function') showToast('success', 'Contenidos asignados a ' + selectedIds.length + ' persona(s)');
                });
            }

            var asignacionesDetalleContainer = document.getElementById('asignaciones-detalle-data-table-container');
            if (asignacionesDetalleContainer) {
                asignacionesDetalleContainer.addEventListener('click', function(e) {
                    if (e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                    var row = e.target.closest('tbody tr[data-id]');
                    if (!row) return;
                    var rowId = row.getAttribute('data-id');
                    var btnContenidos = e.target.closest('.js-detalle-plan-contenidos-btn');
                    if (btnContenidos) rowId = btnContenidos.getAttribute('data-row-id') || rowId;
                    e.preventDefault();
                    e.stopPropagation();
                    if (plan.estado === 'No vigente') {
                        var rowData = asignacionesDetalleData.find(function(r) { return String(r.id) === String(rowId); });
                        var userName = rowData ? rowData.usuario : '';
                        abrirPanelContenidos(rowId, userName, contenidoPorUsuario[rowId] || []);
                    } else {
                        abrirDrawerAgregarContenidosDetallePlan(rowId);
                    }
                });
            }

            setTimeout(function() {
                var tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) { item.classList.remove('active'); });
                    tab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="lms-creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) { btn.classList.remove('active'); });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) { item.classList.remove('active'); });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
            }, 200);
        });
    </script>
</body>
</html>
