<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - LMS Creator - Grupos</title>
    
    <!-- Estilos locales -->
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/ia-button.css">
    <link rel="stylesheet" href="../../components/header-product.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../components/table.css">
    <link rel="stylesheet" href="../../components/checkbox.css">
    <link rel="stylesheet" href="../../components/input.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="../../components/modal.css">
    <link rel="stylesheet" href="../../components/empty-state.css">
    <link rel="stylesheet" href="../../components/chip.css">
    <link rel="stylesheet" href="../../components/ubits-data-table.css">
    <link rel="stylesheet" href="../../components/dropdown-menu.css">
    <link rel="stylesheet" href="./lms-creator.css">
    <link rel="stylesheet" href="./grupos.css">
</head>
<body data-theme="light" class="page-grupos">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>
                    <div class="section-single section-single--grupos">
                        <div class="widget-grupos-lista">
                            <div id="grupos-data-table-container" class="grupos-formacion-tabla"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="grupos-modals-container"></div>
    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../components/ubits-data-table.js"></script>
    <script src="../../script.js"></script>
    <script src="../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../bd-master/bd-tareas-y-planes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            var gruposTablaRef = null;
            var pendingDeleteIds = [];

            /* Misma empresa Fiqsha que bd-tareas-y-planes: ids fijos para enlaces; integrantes desde getEmpleadosEjemplo */
            var gruposData = [
                { id: 'g-ventas', nombre: 'Ventas', descripcion: 'Asesoría comercial y cierre de negocios', integrantes: 0 },
                { id: 'g-instalaciones', nombre: 'Instalaciones', descripcion: 'Instalación de productos en sitio', integrantes: 0 },
                { id: 'g-reparaciones', nombre: 'Reparaciones', descripcion: 'Servicio técnico y mantenimiento', integrantes: 0 },
                { id: 'g-atencion', nombre: 'Atención al Cliente', descripcion: 'Soporte y seguimiento postventa', integrantes: 0 },
                { id: 'g-logistica', nombre: 'Logística', descripcion: 'Bodega, inventarios y entregas', integrantes: 0 },
                { id: 'g-admin', nombre: 'Administración', descripcion: 'Gestión administrativa y financiera', integrantes: 0 },
                { id: 'g-marketing', nombre: 'Marketing', descripcion: 'Publicidad, diseño y redes sociales', integrantes: 0 },
                { id: 'g-rrhh', nombre: 'Recursos Humanos', descripcion: 'Gestión de personas, objetivos, encuestas y nómina', integrantes: 0 },
                { id: 'g-lideres', nombre: 'Líderes', descripcion: 'Jefes y coordinadores de cada departamento', integrantes: 0 },
                { id: 'g-operativo', nombre: 'Personal operativo', descripcion: 'Colaboradores que reportan a un líder', integrantes: 0 }
            ];
            function aplicarIntegrantesGruposDesdeBd() {
                if (typeof TAREAS_PLANES_DB === 'undefined' || typeof TAREAS_PLANES_DB.getEmpleadosEjemplo !== 'function') return;
                var emps = TAREAS_PLANES_DB.getEmpleadosEjemplo();
                gruposData.forEach(function(g) {
                    if (g.id === 'g-lideres') g.integrantes = emps.filter(function(e) { return e.esJefe; }).length;
                    else if (g.id === 'g-operativo') g.integrantes = emps.filter(function(e) { return !e.esJefe; }).length;
                    else g.integrantes = emps.filter(function(e) { return e.area === g.nombre; }).length;
                });
            }
            aplicarIntegrantesGruposDesdeBd();

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="grupos-delete-count">0</strong> grupo(s) seleccionado(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div class="delete-confirm-group" style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="grupos-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="grupos-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="grupos-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="grupos-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('grupos-modals-container').innerHTML = getModalHtml({ overlayId: 'grupos-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'grupos-delete-close' });
            }

            function escapeHtml(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }
            function buildGruposRowHtml(row) {
                return '<td data-col="nombre"><span class="ubits-body-sm-regular">' + escapeHtml(row.nombre) + '</span></td>' +
                    '<td data-col="descripcion"><span class="ubits-body-sm-regular">' + escapeHtml(row.descripcion) + '</span></td>' +
                    '<td data-col="integrantes"><span class="ubits-body-sm-regular">' + escapeHtml(String(row.integrantes)) + '</span></td>';
            }

            if (typeof createUbitsDataTable === 'function') {
                gruposTablaRef = createUbitsDataTable({
                    containerId: 'grupos-data-table-container',
                    tableId: 'grupos-table',
                    title: 'Lista de grupos',
                    columns: [
                        { id: 'nombre', label: 'Nombre del grupo', sortable: true },
                        { id: 'descripcion', label: 'Descripción', sortable: true },
                        { id: 'integrantes', label: 'Integrantes', sortable: true, sortType: 'number' }
                    ],
                    getData: function() { return gruposData; },
                    rowIdField: 'id',
                    buildRowHtml: buildGruposRowHtml,
                    features: { checkboxes: true, search: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    actionBarButtons: [
                        { id: 'eliminar', label: 'Eliminar', icon: 'fa-trash', variant: 'error-secondary', onClick: function(selectedIds) {
                            if (!selectedIds || selectedIds.length === 0) return;
                            pendingDeleteIds = selectedIds.slice();
                            var countEl = document.getElementById('grupos-delete-count');
                            var inputEl = document.getElementById('grupos-delete-type-input');
                            var confirmEl = document.getElementById('grupos-delete-confirm');
                            if (countEl) countEl.textContent = pendingDeleteIds.length;
                            if (inputEl) { inputEl.value = ''; inputEl.focus(); }
                            if (confirmEl) confirmEl.disabled = true;
                            var overlay = document.getElementById('grupos-delete-overlay');
                            if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
                        } }
                    ],
                    emptyState: { message: 'Aún no hay grupos.', icon: 'far fa-users', description: 'Crea tu primer grupo para organizar a los colaboradores.' },
                    emptySearchState: { message: 'No se encontraron resultados', description: 'Intenta ajustar tu búsqueda para encontrar lo que buscas.', buttonText: 'Limpiar búsqueda' },
                    i18n: { selectAll: 'Seleccionar todo', deselectAll: 'Deseleccionar todo', verSeleccionados: 'Ver seleccionados', buscar: 'Buscar' }
                });
            }

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Grupos',
                    breadcrumbItems: [],
                    aiButton: {
                        text: 'Asistente IA para grupos',
                        onClick: function() { window.location.href = 'chat-ia-grupos.html'; }
                    },
                    primaryButton: {
                        text: 'Agregar grupo',
                        icon: 'fa-plus',
                        onClick: function() { window.location.href = 'crear-grupo.html'; }
                    }
                });
            }

            var deleteOverlay = document.getElementById('grupos-delete-overlay');
            var deleteClose = document.getElementById('grupos-delete-close');
            var deleteCancel = document.getElementById('grupos-delete-cancel');
            var deleteConfirm = document.getElementById('grupos-delete-confirm');
            var deleteTypeInput = document.getElementById('grupos-delete-type-input');

            function closeGruposDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function() {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closeGruposDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closeGruposDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function(e) { if (e.target === deleteOverlay) closeGruposDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingDeleteIds.slice();
                    closeGruposDeleteModal();
                    pendingDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function(id) { idSet[String(id)] = true; });
                    for (var i = gruposData.length - 1; i >= 0; i--) {
                        if (idSet[String(gruposData[i].id)]) gruposData.splice(i, 1);
                    }
                    if (gruposTablaRef && typeof gruposTablaRef.refresh === 'function') gruposTablaRef.refresh();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' grupo(s) eliminado(s) correctamente', { containerId: 'ubits-toast-container' });
                });
            }

            var gruposContainer = document.getElementById('grupos-data-table-container');
            if (gruposContainer) {
                gruposContainer.addEventListener('click', function(e) {
                    var row = e.target.closest('tbody tr[data-id]');
                    if (!row || e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                    var grupoId = row.getAttribute('data-id');
                    if (grupoId) window.location.href = 'detalle-grupo.html?id=' + grupoId;
                });
            }

            setTimeout(() => {
                const tab = document.querySelector('.nav-tab[data-tab="grupos"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(item => item.classList.remove('active'));
                    tab.classList.add('active');
                }
                const sidebarBtn = document.querySelector('.nav-button[data-section="creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
                    sidebarBtn.classList.add('active');
                }
                const modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(item => item.classList.remove('active'));
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('grupos');
                }
            }, 200);
        });
    </script>
</body>
</html>
