<body data-theme="light" class="page-detalle-plan-competencias">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>
                    <!-- Card progreso del plan -->
                    <div class="section-single section-single--plan-progress">
                        <div class="widget-detalle-plan-progress">
                        <div class="detalle-plan-progress-card">
                            <div class="detalle-plan-progress-card__header">
                                <h1 class="ubits-heading-h1 detalle-plan-title-display" id="plan-nombre"></h1>
                                <div class="detalle-plan-header-actions">
                                    <span id="plan-estado-container"></span>
                                    <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" id="plan-actions-btn" aria-label="Opciones" data-tooltip="Opciones" data-tooltip-delay="1000">
                                        <i class="far fa-ellipsis-vertical"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="detalle-plan-progress-card__fechas">
                                <span class="detalle-plan-fechas-label-wrap"><span class="ubits-body-xs-regular detalle-plan-card__meta-label">Fecha de inicio:</span> <span id="plan-fecha-inicio" class="ubits-body-xs-regular">1 ene 2025</span></span>
                                <span class="detalle-plan-fecha-fin-static detalle-plan-fechas-label-wrap" id="plan-fecha-fin-static-wrap"><span class="ubits-body-xs-regular detalle-plan-card__meta-label">Fecha de finalización:</span> <span id="plan-fecha-fin" class="ubits-body-xs-regular">31 mar 2025</span></span>
                                <span class="detalle-plan-fechas-label-wrap" id="plan-horas-estudio-static-wrap"><span class="ubits-body-xs-regular detalle-plan-card__meta-label">Horas de estudio por competencia:</span> <span id="plan-horas-estudio-static" class="ubits-body-xs-regular">4</span></span>
                            </div>
                            <div class="detalle-plan-progress-card__content">
                                <span class="ubits-body-sm-semibold detalle-plan-progress-card__label">Progreso del plan</span>
                                <div class="detalle-plan-progress-card__bar"><div class="detalle-plan-progress-card__bar-fill" id="plan-progress-fill" style="width: 65%"></div></div>
                                <span class="detalle-plan-progress-card__percent" id="plan-progress-value">65%</span>
                            </div>

                    <!-- Asignaciones: componente oficial ubits-data-table -->
                    <div class="section-single section-single--asignaciones-detalle">
                        <div class="widget-asignaciones-detalle">
                            <div class="detalle-plan-asignaciones-wrapper">

                            </div>

    </div>

    <div id="asignaciones-modals-container"></div>
    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/calendar.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../components/ubits-data-table.js"></script>
    <script src="../../components/drawer.js"></script>
    <script src="../../bd-master/bd-master-competencias.js"></script>
    <script src="../../bd-master/bd-master-habilidades.js"></script>
    <script src="./catalogo-competencias-drawer.js"></script>
    <script src="../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../bd-master/bd-tareas-y-planes.js"></script>
    <script src="../../script.js"></script>
    <script src="../../general-utils/humanizador-fechas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            var params = new URLSearchParams(window.location.search);
            var planId = params.get('id') || 'c1';
            var planes = {
                '1': { nombre: 'Plan de onboarding Q3 2026', progreso: 0, fechaInicio: '01/07/2026', fechaFin: '30/09/2026', estado: 'Planeado', horasEstudioPorCompetencia: 4 },
                '2': { nombre: 'Competencias de liderazgo', progreso: 0, fechaInicio: '01/04/2026', fechaFin: '30/06/2026', estado: 'Planeado', horasEstudioPorCompetencia: 6 },
                '3': { nombre: 'Cursos de cumplimiento Q1', progreso: 65, fechaInicio: '01/01/2026', fechaFin: '31/03/2026', estado: 'Vigente', horasEstudioPorCompetencia: 5 },
                '4': { nombre: 'Evaluación técnica 2025', progreso: 85, fechaInicio: '01/09/2025', fechaFin: '15/12/2025', estado: 'No vigente', horasEstudioPorCompetencia: 4 },
                'c1': { nombre: 'Plan de competencias de liderazgo', progreso: 0, fechaInicio: '01/07/2026', fechaFin: '30/09/2026', estado: 'Planeado', horasEstudioPorCompetencia: 4 },
                'c2': { nombre: 'Desarrollo de competencias Q1', progreso: 65, fechaInicio: '01/01/2026', fechaFin: '31/03/2026', estado: 'Vigente', horasEstudioPorCompetencia: 5 },
                'c3': { nombre: 'Evaluación por competencias 2025', progreso: 85, fechaInicio: '01/09/2025', fechaFin: '15/12/2025', estado: 'No vigente', horasEstudioPorCompetencia: 4 }
            };
            var plan = planes[planId] || planes['c1'];

            function getEstadoTagClass(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }
            function getEstadoTooltip(estado) {
                if (estado === 'Planeado') return 'Plan creado para una fecha futura; aún no ha iniciado. Solo lo ve el administrador, no los estudiantes.';
                if (estado === 'Vigente') return 'En curso: la fecha actual está entre inicio y fin.';
                if (estado === 'No vigente') return 'Ya pasó la fecha de cierre. El progreso quedó congelado; lo que estudien después no suma al plan.';
                return '';
            }
            var estadoEl = document.getElementById('plan-estado-container');
            if (estadoEl && plan.estado) {
                var estadoClass = getEstadoTagClass(plan.estado);
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + estadoClass + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + (plan.estado || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span></span>';
                var tooltipText = getEstadoTooltip(plan.estado);
                estadoEl.innerHTML = tooltipText ? '<span data-tooltip="' + (tooltipText || '').replace(/"/g, '&quot;') + '">' + tagHtml + '</span>' : tagHtml;
                if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-estado-container [data-tooltip]'); }, 50);
            }

            function getPlanActionOptionsByStatus(estado) {
                if (estado === 'Vigente') {
                    return [
                        { text: 'Editar plan', value: 'editar', leftIcon: 'pen' },
                        { text: 'Enviar recordatorio', value: 'send-reminders', leftIcon: 'bell' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                    ];
                }
                if (estado === 'No vigente') {
                    return [
                        { text: 'Descargar certificados', value: 'download-certificates', leftIcon: 'download' },
                        { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                    ];
                }
                return [
                    { text: 'Eliminar', value: 'delete-plan', leftIcon: 'trash' }
                ];
            }

            function getDeletePlanModalConfig(estado) {
                var body = '<p class="ubits-body-md-regular">Si eliminas este plan, se perderá toda la data asociada (asignaciones, avances e historial).</p>';
                var typeConfirmBlock = '<div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="plan-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="plan-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                if (estado === 'Planeado') {
                    return {
                        title: 'Eliminar plan planeado',
                        bodyHtml: body,
                        footerHtml: '<button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm"><span>Eliminar plan</span></button>'
                    };
                }
                return {
                    title: 'Confirmar eliminación',
                    bodyHtml: body + '<p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p>' + typeConfirmBlock,
                    footerHtml: '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="plan-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="plan-delete-confirm" disabled><span>Eliminar plan</span></button>'
                };
            }

            function redirectAfterPlanDelete() {
                try {
                    sessionStorage.setItem('ubits-toast-pending', JSON.stringify({ type: 'success', message: 'Plan eliminado correctamente.' }));
                } catch (err) {}
                window.location.href = typeof getPlanesFormacionBackUrl === 'function' ? getPlanesFormacionBackUrl() : 'planes-formacion.html';
            }

            function openDeletePlanModal(estado) {
                if (typeof getModalHtml !== 'function' || typeof showModal !== 'function') return;
                var modalConfig = getDeletePlanModalConfig(estado);
                var overlayId = 'detalle-plan-comp-delete-overlay';
                var closeButtonId = 'detalle-plan-comp-delete-close';
                var modalsContainer = document.getElementById('asignaciones-modals-container');
                if (!modalsContainer) return;
                modalsContainer.innerHTML += getModalHtml({
                    overlayId: overlayId,
                    title: modalConfig.title,
                    bodyHtml: modalConfig.bodyHtml,
                    footerHtml: modalConfig.footerHtml,
                    size: 'sm',
                    closeButtonId: closeButtonId
                });
                showModal(overlayId);

                var overlay = document.getElementById(overlayId);
                var closeBtn = document.getElementById(closeButtonId);
                var cancelBtn = document.getElementById('plan-delete-cancel');
                var confirmBtn = document.getElementById('plan-delete-confirm');
                function closeDeleteModal() {
                    if (typeof closeModal === 'function') closeModal(overlayId);
                    if (overlay && overlay.parentNode) overlay.remove();
                }
                if (closeBtn) closeBtn.addEventListener('click', closeDeleteModal);
                if (cancelBtn) cancelBtn.addEventListener('click', closeDeleteModal);
                if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeDeleteModal(); });
                var typeInput = document.getElementById('plan-delete-type-input');
                if (typeInput && confirmBtn && estado !== 'Planeado') {
                    confirmBtn.disabled = true;
                    typeInput.value = '';
                    typeInput.addEventListener('input', function() {
                        confirmBtn.disabled = typeInput.value.trim().toLowerCase() !== 'eliminar';
                    });
                    setTimeout(function() { typeInput.focus(); }, 0);
                }
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', function() {
                        closeDeleteModal();
                        redirectAfterPlanDelete();
                    });
                }
            }

            function openRemindersConfirmModal() {
                if (typeof getModalHtml !== 'function' || typeof showModal !== 'function') return;
                var overlayId = 'detalle-plan-comp-reminders-overlay';
                var closeButtonId = 'detalle-plan-comp-reminders-close';
                var bodyHtml = '<p class="ubits-body-md-regular">Se enviará un recordatorio por correo a todos los estudiantes que no hayan completado su plan de formación, informándoles su avance hasta el momento y la fecha de vencimiento del plan.</p>';
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="plan-reminders-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="plan-reminders-confirm"><span>Confirmar</span></button>';
                var modalsContainer = document.getElementById('asignaciones-modals-container');
                if (!modalsContainer) return;
                modalsContainer.innerHTML += getModalHtml({
                    overlayId: overlayId,
                    title: 'Enviar recordatorio',
                    bodyHtml: bodyHtml,
                    footerHtml: footerHtml,
                    size: 'sm',
                    closeButtonId: closeButtonId
                });
                showModal(overlayId);
                var overlay = document.getElementById(overlayId);
                var closeBtn = document.getElementById(closeButtonId);
                var cancelBtn = document.getElementById('plan-reminders-cancel');
                var confirmBtn = document.getElementById('plan-reminders-confirm');
                function closeRemindersModal() {
                    if (typeof closeModal === 'function') closeModal(overlayId);
                    if (overlay && overlay.parentNode) overlay.remove();
                }
                if (closeBtn) closeBtn.addEventListener('click', closeRemindersModal);
                if (cancelBtn) cancelBtn.addEventListener('click', closeRemindersModal);
                if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeRemindersModal(); });
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', function() {
                        closeRemindersModal();
                        if (typeof showToast === 'function') showToast('success', 'Recordatorio enviado');
                    });
                }
            }

            function initPlanActions() {
                var actionsBtn = document.getElementById('plan-actions-btn');
                if (!actionsBtn || typeof window.getDropdownMenuHtml !== 'function' || typeof window.openDropdownMenu !== 'function' || typeof window.closeDropdownMenu !== 'function') return;
                actionsBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var overlayId = 'detalle-plan-comp-actions-overlay';
                    var existingOverlay = document.getElementById(overlayId);
                    if (existingOverlay) existingOverlay.remove();
                    var options = getPlanActionOptionsByStatus(plan.estado);
                    document.body.insertAdjacentHTML('beforeend', window.getDropdownMenuHtml({ overlayId: overlayId, options: options }));
                    var overlay = document.getElementById(overlayId);
                    if (!overlay) return;
                    overlay.style.zIndex = '10100';
                    overlay.querySelectorAll('.ubits-dropdown-menu__option').forEach(function(opt) {
                        opt.addEventListener('click', function() {
                            var value = this.getAttribute('data-value');
                            window.closeDropdownMenu(overlayId);
                            if (overlay && overlay.parentNode) overlay.remove();
                            if (value === 'editar') {
                                window.location.href = 'editar-plan-competencias.html?id=' + encodeURIComponent(planId);
                                return;
                            }
                            if (value === 'send-reminders') {
                                openRemindersConfirmModal();
                                return;
                            }
                            if (value === 'download-certificates') {
                                if (typeof showToast === 'function') showToast('success', 'Se descargaron los certificados de los estudiantes que finalizaron el plan.');
                                return;
                            }
                            if (value === 'delete-plan') {
                                openDeletePlanModal(plan.estado);
                            }
                        });
                    });
                    overlay.addEventListener('click', function(ev) {
                        if (ev.target === overlay) {
                            window.closeDropdownMenu(overlayId);
                            if (overlay.parentNode) overlay.remove();
                        }
                    });
                    window.openDropdownMenu(overlayId, actionsBtn, { alignRight: true });
                    setTimeout(function() {
                        var ov = document.getElementById(overlayId);
                        var cnt = ov ? ov.querySelector('.ubits-dropdown-menu__content') : null;
                        if (cnt && actionsBtn) {
                            var br = actionsBtn.getBoundingClientRect();
                            var left = Math.max(12, br.right - cnt.offsetWidth);
                            cnt.style.left = left + 'px';
                            cnt.style.right = 'auto';
                        }
                    }, 0);
                });
                if (typeof initTooltip === 'function') setTimeout(function() { initTooltip('#plan-actions-btn'); }, 50);
            }
            initPlanActions();

            if (typeof loadHeaderProduct === 'function') {
                var headerOpts = {
                    productName: 'Detalle del plan de competencias',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() { window.location.href = typeof getPlanesFormacionBackUrl === 'function' ? getPlanesFormacionBackUrl() : 'planes-formacion.html'; }
                    }
                };
                loadHeaderProduct('header-product-container', headerOpts);
            }

            var planNombreEl = document.getElementById('plan-nombre');
            if (planNombreEl) {
                planNombreEl.textContent = plan.nombre || '';
            }

            if (plan.estado === 'Planeado' || String(plan.estado).indexOf('Procesando') === 0) {
                document.getElementById('plan-progress-fill').style.width = '0%';
                document.getElementById('plan-progress-value').textContent = '0%';
            } else {
                document.getElementById('plan-progress-fill').style.width = plan.progreso + '%';
                document.getElementById('plan-progress-value').textContent = plan.progreso + '%';
            }
            document.getElementById('plan-fecha-inicio').textContent = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaInicio) : plan.fechaInicio);
            var fechaFinSpan = document.getElementById('plan-fecha-fin');
            if (fechaFinSpan) fechaFinSpan.textContent = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(plan.fechaFin) : plan.fechaFin);
            var horasEstudioStaticSpan = document.getElementById('plan-horas-estudio-static');
            var horasVal = plan.horasEstudioPorCompetencia != null ? String(plan.horasEstudioPorCompetencia) : '4';
            if (horasEstudioStaticSpan) horasEstudioStaticSpan.textContent = horasVal;

            document.title = 'UBITS Playground - LMS Creator - ' + plan.nombre;

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) del plan?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            // Competencias por usuario: { id, title, habilidades, progress, status } (progress/status para propagar al estudiante y al plan).
            var catalogoCompetencias = window.CATALOGO_COMPETENCIAS_DRAWER || [];
            var competenciaImageMap = window.COMPETENCIA_IMAGE_MAP || {};
            var habilidadIconMap = window.HABILIDAD_ICON_MAP || {};
            function buildCompetenciaFromCatalog(indicesWithProgress) {
                var list = [];
                (indicesWithProgress || []).forEach(function(x) {
                    var idx = typeof x === 'number' ? x : (x && x.i != null ? x.i : x);
                    var c = catalogoCompetencias[idx];
                    if (!c) return;
                    var progress = (typeof x === 'object' && x && x.p != null) ? x.p : 0;
                    var status = (typeof x === 'object' && x && x.s) ? x.s : 'default';
                    list.push({ id: c.id, title: c.nombre, nombre: c.nombre, habilidades: (c.habilidades || []).slice(), progress: progress, status: status, image: c.image || null });
                });
                return list;
            }
            var baseIndices = { '1': [{i:0,p:100,s:'completed'},{i:1,p:60,s:'progress'},{i:2,p:0,s:'default'}], '2': [{i:3,p:80,s:'progress'},{i:4,p:100,s:'completed'},{i:5,p:0,s:'default'}], '3': [{i:6,p:100,s:'completed'},{i:7,p:50,s:'progress'},{i:8,p:0,s:'default'}], '4': [{i:9,p:20,s:'progress'},{i:10,p:0,s:'default'},{i:11,p:0,s:'default'}] };
            var plan3Indices = { '1': [{i:0,p:100,s:'completed'},{i:1,p:40,s:'progress'}], '2': [{i:2,p:80,s:'progress'},{i:3,p:100,s:'completed'},{i:4,p:0,s:'default'}], '3': [{i:5,p:100,s:'completed'},{i:6,p:30,s:'progress'}], '4': [{i:7,p:60,s:'progress'},{i:8,p:100,s:'completed'},{i:9,p:0,s:'default'}] };
            var plan4Indices = { '1': [{i:10,p:90,s:'progress'},{i:11,p:100,s:'completed'}], '2': [{i:12,p:100,s:'completed'},{i:13,p:70,s:'progress'}], '3': [{i:14,p:50,s:'progress'},{i:15,p:0,s:'default'}], '4': [{i:16,p:100,s:'completed'},{i:17,p:85,s:'progress'}] };
            var competenciaPorUsuarioBase = {};
            var competenciaPorUsuarioPlan3 = {};
            var competenciaPorUsuarioPlan4 = {};
            ['1','2','3','4'].forEach(function(rid) {
                competenciaPorUsuarioBase[rid] = buildCompetenciaFromCatalog(baseIndices[rid] || []);
                competenciaPorUsuarioPlan3[rid] = buildCompetenciaFromCatalog(plan3Indices[rid] || []);

                        progressBarHtml +
                        '</div>' +
                        '<div class="competencia-habilidades-container drawer-competencias-habilidades' + (isExpanded ? ' is-visible' : '') + '" data-competencia-id="' + escapeDrawerHtml(comp.id) + '">' +
                        '<p class="ubits-body-sm-regular drawer-habilidades-copy">Estas son las habilidades de esta competencia. Ordénalas por prioridad para tu equipo.</p>' +
                        '<div class="competencias-habilidades-grid">' + habilidadesHtml + '</div>' +
                        '</div>' +
                        '</div>';
                }

                function filtrarYRenderizarCards() {
                    if (!cardsContainer) return;
                    var filtrados = getFiltradosDrawerCompetencias();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-competencias-empty-search', {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: { secondary: { text: 'Limpiar búsqueda', icon: 'fa-times', onClick: function() {} } }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (searchInput) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var columns = [[], [], []];
                    filtrados.forEach(function(comp, i) { columns[i % 3].push(comp); });
                    var gridHtml = '<div class="drawer-competencias-grid-v1">' + columns.map(function(col) {
                        return '<div class="drawer-competencias-column">' + col.map(function(comp) {
                            var isSelected = cursosSeleccionados.some(function(x) { return x.id === comp.id; });
                            return buildCardHtml(comp, isSelected);
                        }).join('') + '</div>';
                    }).join('') + '</div>';
                    cardsContainer.innerHTML = gridHtml;
                    cardsContainer.querySelectorAll('.drawer-competencia-card').forEach(function(cardEl) {
                        cardEl.addEventListener('click', function(e) {
                            if (e.target.closest('.drawer-competencia-card-check')) e.preventDefault();
                            var id = cardEl.getAttribute('data-competencia-id');
                            var comp = catalogoCompetencias.find(function(c) { return c.id === id; });
                            if (!comp) return;
                            var idx = cursosSeleccionados.findIndex(function(x) { return x.id === id; });
                            if (idx !== -1) {
                                cursosSeleccionados.splice(idx, 1);
                            } else {
                                var _userId = typeof rowId !== 'undefined' ? rowId : (selectedIds && selectedIds[0]);
                                var _list = competenciaPorUsuario[_userId] || [];
                                var _e = _list.find(function(x) { return x.id === comp.id; });
                                cursosSeleccionados.push({
                                    id: comp.id,
                                    title: comp.nombre,
                                    habilidades: (comp.habilidades || []).slice(),
                                    habilidadesDesactivadas: [],
                                    progress: _e && _e.progress != null ? _e.progress : 0,
                                    status: _e && _e.status ? _e.status : 'default'
                                });
                            }
                            filtrarYRenderizarCards();
                        });
                    });
                    cardsContainer.querySelectorAll('.drawer-habilidad-row--draggable').forEach(function(rowEl) {
                        rowEl.addEventListener('dragstart', function(e) {
                            e.dataTransfer.setData('text/plain', rowEl.getAttribute('data-competencia-id') + '|' + rowEl.getAttribute('data-skill-index'));
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        rowEl.addEventListener('dragover', function(e) {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                        });
                        rowEl.addEventListener('drop', function(e) {
                            e.preventDefault();
                            var data = (e.dataTransfer.getData('text/plain') || '').split('|');
                            var compId = data[0];
                            var fromIdx = parseInt(data[1], 10);
                            var toRow = e.currentTarget;
                            var toIdx = parseInt(toRow.getAttribute('data-skill-index'), 10);
                            if (compId !== toRow.getAttribute('data-competencia-id') || isNaN(fromIdx) || isNaN(toIdx) || fromIdx === toIdx) return;
                            var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                            if (!sel || !sel.habilidades || sel.habilidades.length === 0) return;
                            var desactivadas = sel.habilidadesDesactivadas || [];
                            var checkedList = sel.habilidades.filter(function(h) { return desactivadas.indexOf(h) === -1; });
                            var uncheckedList = desactivadas.slice();
                            var order = checkedList.concat(uncheckedList);
                            var item = order.splice(fromIdx, 1)[0];
                            order.splice(toIdx, 0, item);
                            sel.habilidades = order.slice();
                            sel.habilidadesDesactivadas = order.filter(function(h) { return desactivadas.indexOf(h) !== -1; });
                            filtrarYRenderizarCards();
                        });
                    });
                    cardsContainer.querySelectorAll('.drawer-habilidad-check').forEach(function(chk) {
                        chk.addEventListener('change', function(e) {
                            e.stopPropagation();
                            var row = chk.closest('.drawer-habilidad-row');
                            if (!row) return;
                            var compId = row.getAttribute('data-competencia-id');
                            var habilidad = chk.getAttribute('data-habilidad');
                            var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                            if (!sel) return;
                            sel.habilidadesDesactivadas = sel.habilidadesDesactivadas || [];
                            var desactivadas = sel.habilidadesDesactivadas;
                            var isNowChecked = chk.checked;
                            if (isNowChecked) {
                                var idx = desactivadas.indexOf(habilidad);
                                if (idx !== -1) desactivadas.splice(idx, 1);
                                var idxInH = sel.habilidades.indexOf(habilidad);
                                if (idxInH !== -1) sel.habilidades.splice(idxInH, 1);
                                var insertAt = sel.habilidades.length - desactivadas.length;
                                sel.habilidades.splice(insertAt, 0, habilidad);
                            } else {
                                desactivadas.push(habilidad);
                                var idxInH = sel.habilidades.indexOf(habilidad);
                                if (idxInH !== -1) sel.habilidades.splice(idxInH, 1);
                                sel.habilidades.push(habilidad);
                            }
                            row.classList.toggle('drawer-habilidad-row--unchecked', !isNowChecked);
                            row.draggable = isNowChecked;
                            var grid = row.closest('.competencias-habilidades-grid');
                            if (grid) reorderHabilidadesGridWithAnimation(grid, compId);
                        });
                    });
                }
                function reorderHabilidadesGridWithAnimation(grid, compId) {
                    var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                    if (!sel || !sel.habilidades) return;
                    var rows = [].slice.call(grid.children);
                    if (rows.length === 0) return;
                    var order = sel.habilidades.slice();
                    var oldRects = rows.map(function(r) { return r.getBoundingClientRect(); });
                    rows.sort(function(a, b) {
                        var ai = order.indexOf(a.getAttribute('data-habilidad'));
                        var bi = order.indexOf(b.getAttribute('data-habilidad'));
                        return ai - bi;
                    });
                    rows.forEach(function(r) { grid.appendChild(r); });
                    grid.offsetHeight;
                    var newRects = rows.map(function(r) { return r.getBoundingClientRect(); });
                    rows.forEach(function(r, i) {
                        var oldR = oldRects[i];
                        var newR = newRects[i];
                        if (!oldR || !newR) return;
                        r.style.transition = 'none';
                        r.style.transform = 'translate(' + (oldR.left - newR.left) + 'px,' + (oldR.top - newR.top) + 'px)';
                    });
                    requestAnimationFrame(function() {
                        rows.forEach(function(r) {
                            r.style.transition = 'transform 0.22s ease-out';
                            r.style.transform = '';
                        });
                        requestAnimationFrame(function() {
                            setTimeout(function() {
                                rows.forEach(function(r) { r.style.transition = ''; });
                            }, 230);
                        });
                    });
                }

                if (searchInput) {
                    searchInput.addEventListener('input', function() { filtrarYRenderizarCards(); });
                    searchInput.addEventListener('keyup', function() { filtrarYRenderizarCards(); });
                }
                var searchContainer = overlay.querySelector('#drawer-cursos-search-container');
                var searchClearBtn = searchContainer ? searchContainer.querySelector('i[class*="fa-times"]') : null;
                if (searchClearBtn) {
                    searchClearBtn.addEventListener('click', function() {
                        setTimeout(function() { filtrarYRenderizarCards(); }, 0);
                    });
                }

                filtrarYRenderizarCards();

                overlay.querySelector('#drawer-detalle-plan-cursos-cancel').addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                });
                overlay.querySelector('#drawer-detalle-plan-cursos-agregar').addEventListener('click', function() {
                    var toAdd = cursosSeleccionados.map(function(c) {
                        var desactivadas = c.habilidadesDesactivadas || [];
                        var habilidadesGuardar = (c.habilidades || []).filter(function(h) { return desactivadas.indexOf(h) === -1; });
                        return { id: c.id, title: c.title, nombre: c.nombre || c.title, habilidades: habilidadesGuardar, progress: 0, status: 'default' };
                    });
                    selectedIds.forEach(function(id) {
                        var current = (competenciaPorUsuario[id] || []).slice();
                        toAdd.forEach(function(c) {
                            var exist = current.find(function(x) { return x.id === c.id; });
                            if (!exist) current.push(c);
                            else { exist.habilidades = (c.habilidades || []).slice(); exist.title = c.title; exist.nombre = c.nombre || c.title; }
                        });
                        competenciaPorUsuario[id] = current;
                    });
                    selectedIds.forEach(function(id) {
                        var row = asignacionesDetalleData.find(function(r) { return String(r.id) === String(id); });
                        if (row) row.progreso = progresoEstudiante(id);
                    });
                    updatePlanProgressBar();
                    if (asignacionesDetalleTablaRef && typeof asignacionesDetalleTablaRef.refresh === 'function') asignacionesDetalleTablaRef.refresh();
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-detalle-plan-agregar-cursos');
                    if (typeof showToast === 'function') showToast('success', 'Competencias asignadas a ' + selectedIds.length + ' persona(s)');
                });
            }

            var asignacionesDetalleContainer = document.getElementById('asignaciones-detalle-data-table-container');
            if (asignacionesDetalleContainer) {
                asignacionesDetalleContainer.addEventListener('click', function(e) {
                    if (e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                    var row = e.target.closest('tbody tr[data-id]');
                    if (!row) return;
                    var rowId = row.getAttribute('data-id');
                    var btnCompetencias = e.target.closest('.js-detalle-plan-competencias-btn');
                    if (btnCompetencias) rowId = btnCompetencias.getAttribute('data-row-id') || rowId;
                    e.preventDefault();
                    e.stopPropagation();
                    abrirDrawerCompetenciasEstudiante(rowId);
                });
            }

            setTimeout(function() {
                var tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) { item.classList.remove('active'); });
                    tab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="lms-creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) { btn.classList.remove('active'); });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) { item.classList.remove('active'); });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
            }, 200);
        });
    </script>
</body>
</html>
