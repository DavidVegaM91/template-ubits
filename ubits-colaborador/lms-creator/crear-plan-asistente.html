<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - LMS Creator - Asistente de planes de formación</title>

    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../aprendizaje/aprendizaje-ia-gradientes.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/input.css">
    <link rel="stylesheet" href="../../components/ia-button.css">
    <link rel="stylesheet" href="../../components/header-product.css">
    <link rel="stylesheet" href="../../components/study-chat.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="./lms-creator.css">
    <link rel="stylesheet" href="./crear-plan-asistente.css">
</head>
<body class="crear-plan-asistente-page aprendizaje-ia-pages" data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>

                    <!-- Sección chat (inspirada en Modo Estudio IA) -->
                    <div class="section-single crear-plan-asistente-chat-section">
                        <div class="crear-plan-asistente-chat-main">
                            <div class="widget-chat" id="plan-asistente-chat-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/study-chat.js"></script>
    <script src="../../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Creación con asistente',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() {
                            window.location.href = 'planes-formacion.html';
                        }
                    }
                });
            }

            // Inicializar chat inspirado en Modo Estudio IA (sugerencias para planes)
            if (typeof initStudyChat === 'function') {
                initStudyChat('plan-asistente-chat-container', {
                    userFirstName: 'Usuario',
                    competencies: ['Plan basado en contenidos', 'Plan basado en competencias', 'Plan de onboarding'],
                    welcomeLayout: true
                });
            }

            // Ajustar clases para que el chat tenga el layout de bienvenida
            setTimeout(function() {
                var chatRoot = document.getElementById('ubits-study-chat');
                var chatMain = document.querySelector('.crear-plan-asistente-chat-main');
                if (chatRoot && chatMain) {
                    chatRoot.classList.add('ubits-study-chat--welcome');
                    chatMain.classList.add('study-chat-wrapper--welcome');
                }

                var tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) { item.classList.remove('active'); });
                    tab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) { btn.classList.remove('active'); });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) { item.classList.remove('active'); });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
            }, 300);

            // Sobrescribir texto de bienvenida para contexto de planes
            setTimeout(function() {
                var greeting = document.querySelector('.ubits-study-chat__welcome-greeting');
                var prompt = document.querySelector('.ubits-study-chat__welcome-prompt');
                if (greeting) greeting.textContent = 'Creémos un plan de formación';
                if (prompt) prompt.innerHTML = '¿Qué meta buscas alcanzar con el plan de <span class="ubits-study-chat__welcome-prompt-accent">formación</span>?';
            }, 350);
        });
    </script>
</body>
</html>
