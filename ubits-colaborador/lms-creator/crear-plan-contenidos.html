    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Leer tipo de plan desde URL (?tipo=contenidos | ?tipo=competencias)
            var params = new URLSearchParams(window.location.search);
            var planTipo = params.get('tipo') || 'contenidos';
            var planTipoInput = document.getElementById('plan-tipo');
            if (planTipoInput) planTipoInput.value = planTipo;

            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');
            
            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Crear plan de contenidos',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() {
                            window.location.href = 'planes-formacion.html';
                        }
                    },
                    secondaryButtons: [
                        {
                            text: 'Guardar',
                            icon: 'fa-floppy-disk',
                            onClick: function() {
                                var sinContenidos = asignacionesData.filter(function(a) { return !a.contenidos || a.contenidos.length === 0; });
                                if (sinContenidos.length > 0 && typeof showToast === 'function') {
                                    showToast('error', 'Todas las asignaciones deben tener al menos un contenido. Agrega contenidos a las que faltan antes de guardar.');
                                    return;
                                }
                                window.location.href = 'planes-formacion.html';
                            }
                        }
                    ]
                });
            }
            
            setTimeout(() => {
                const tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(item => item.classList.remove('active'));
                    tab.classList.add('active');
                }
                const sidebarBtn = document.querySelector('.nav-button[data-section="creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
                    sidebarBtn.classList.add('active');
                }
                const modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(item => item.classList.remove('active'));
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }, 200);

            // Auto-resize textarea del nombre (en el header)
            setTimeout(function() {
                var nombreTa = document.getElementById('asignacion-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                    });
                }
            }, 0);

            // Selectores de fecha (vigencia)
            if (typeof createInput === 'function') {
                createInput({
                    containerId: 'fecha-inicio-container',
                    type: 'calendar',
                    label: 'Fecha de inicio',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Igual o mayor a hoy',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
                createInput({
                    containerId: 'fecha-fin-container',
                    type: 'calendar',
                    label: 'Fecha de finalización',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Mayor o igual a la fecha de inicio',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
            }

            // Asignaciones: datos y refs de tabla
            var asignacionesData = [];
            var asignacionIdCounter = 0;
            var pendingCursosRow = null;
            // Catálogo: catalogo-contenidos-drawer.js (lee bd-master) → CATALOGO_CURSOS_DRAWER
            var catalogoCursos = (window.CATALOGO_CURSOS_DRAWER || []).slice();

            function initCatalogoCursosDesdeBdsImplementadas() {
                catalogoCursos = (window.CATALOGO_CURSOS_DRAWER || []).slice();
                if (typeof filtrarYRenderizarCards === 'function') filtrarYRenderizarCards();
                if (typeof actualizarTabla === 'function') actualizarTabla();
            }

            initCatalogoCursosDesdeBdsImplementadas();


            function canGuardar() {
                var inicioInput = document.querySelector('#fecha-inicio-container input');
                var finInput = document.querySelector('#fecha-fin-container input');
                var hasInicio = inicioInput && inicioInput.value && String(inicioInput.value).trim() !== '';
                var hasFin = finInput && finInput.value && String(finInput.value).trim() !== '';
                var hasAsignacionConContenido = asignacionesData.some(function(a) { return a.contenidos && a.contenidos.length > 0; });
                return hasInicio && hasFin && hasAsignacionConContenido;
            }
            function updateGuardarButtonState() {
                var btn = document.getElementById('btn-guardar-plan') || document.querySelector('#header-product-container .ubits-header-product__actions .ubits-button--secondary');
                if (btn) {
                    if (!btn.id) btn.id = 'btn-guardar-plan';
                    btn.disabled = !canGuardar();
                }
            }

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) seleccionada(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            function getDrawerUsuariosBodyHtml() {
                var stepperHtml = '<nav class="drawer-wizard-stepper-nav" aria-label="Pasos de asignación">' +
                    '<ol id="drawer-wiz-stepper-ol" class="ubits-stepper ubits-stepper--horizontal ubits-stepper--horizontal-compact">' +
                    '<li class="ubits-stepper__step ubits-stepper__step--active" data-step-label="Selección de usuarios">' +
                    '<span class="ubits-stepper__mark" aria-hidden="true"><span class="ubits-stepper__mark-num">1</span><i class="far fa-check" aria-hidden="true"></i></span>' +
                    '<span class="ubits-stepper__label">Selección de usuarios</span></li>' +
                    '<li class="ubits-stepper__rail" aria-hidden="true"></li>' +
                    '<li class="ubits-stepper__step ubits-stepper__step--pending" data-step-label="Contenidos">' +
                    '<span class="ubits-stepper__mark" aria-hidden="true"><span class="ubits-stepper__mark-num">2</span><i class="far fa-check" aria-hidden="true"></i></span>' +
                    '<span class="ubits-stepper__label">Contenidos</span></li>' +
                    '</ol></nav>';
                var step1Html = '<div id="drawer-wizard-step1" class="drawer-wizard-step">' +
                    '<div class="drawer-agregar-usuarios-options">' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="toda-empresa">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="toda-empresa">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-building"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar toda la empresa</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Asigna el plan a todos los colaboradores de la empresa de una sola vez.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="por-colaborador">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="por-colaborador">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-user"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar colaborador</span>' +

                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Busca y agrega colaboradores individualmente a la lista de participantes.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +

                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="por-grupos">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-users"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar por grupos</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Selecciona uno o más grupos para asignar el plan a sus integrantes.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold">4</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="desde-archivo">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="desde-archivo">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-file-arrow-up"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar desde archivo</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Importa un CSV con participantes y los contenidos asignados a cada uno.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--colaborador" id="drawer-usuarios-colaborador-panel" style="display:none">' +
                    '  <div id="drawer-colab-data-table-container" class="drawer-colab-dt-wrapper"></div>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--grupos" id="drawer-usuarios-grupos-panel" style="display:none">' +
                    '  <div id="drawer-grupos-data-table-container" class="drawer-grupos-dt-wrapper"></div>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--archivo" id="drawer-usuarios-archivo-panel" style="display:none">' +
                    '  <div class="drawer-archivo-section">' +
                    '    <div class="drawer-archivo-header">' +
                    '      <h2 class="ubits-body-md-bold drawer-archivo-title">Importar archivo</h2>' +
                    '      <div class="drawer-archivo-actions">' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-descargar-lista"><i class="far fa-arrow-down-to-line"></i><span>Descargar lista de colaboradores</span></button>' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-descargar-contenidos"><i class="far fa-arrow-down-to-line"></i><span>Descargar lista de contenidos</span></button>' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-descargar-plantilla"><i class="far fa-arrow-down-to-line"></i><span>Descargar plantilla</span></button>' +
                    '      </div>' +
                    '    </div>' +
                    '    <div class="drawer-archivo-dropzone" id="drawer-archivo-dropzone">' +
                    '      <div class="drawer-archivo-dropzone-inner">' +
                    '        <div class="drawer-archivo-file-icon-wrap"><i class="far fa-file-arrow-up"></i></div>' +
                    '        <p class="ubits-body-md-semibold drawer-archivo-dropzone-title">Subir archivos</p>' +
                    '        <p class="ubits-body-sm-regular drawer-archivo-dropzone-formats">CSV &bull; Hasta 5mb</p>' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-btn-seleccionar"><i class="far fa-arrow-up-from-bracket"></i><span>Seleccionar archivos</span></button>' +
                    '      </div>' +
                    '      <input type="file" id="drawer-archivo-input" accept=".csv,text/csv" style="display:none">' +
                    '    </div>' +
                    '  </div>' +
                    '</div></div>';
                var step2Html = '<div id="drawer-wizard-step2" class="drawer-wizard-step" style="display:none">' +
                    '<div class="drawer-agregar-cursos drawer-agregar-cursos--two-cols">' +
                    '<div class="drawer-agregar-cursos__left">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Buscar y agregar contenidos</span>' +
                    '  <div class="drawer-cursos-search-row">' +
                    '    <div id="drawer-wiz-cursos-search-container" class="drawer-cursos-search-input-wrap"></div>' +
                    '    <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="drawer-wiz-cursos-filter-btn" aria-label="Filtrar por origen"><i class="far fa-filter"></i></button>' +
                    '  </div>' +
                    '  <div class="drawer-cursos-resultados-bg drawer-cursos-resultados-bg--dos-columnas">' +
                    '    <div id="drawer-wiz-contenidos-empty-search" class="drawer-contenidos-empty-search-wrap" style="display:none;"></div>' +
                    '    <div class="drawer-cursos-cards-grid" id="drawer-wiz-cursos-cards-container"></div>' +
                    '  </div>' +
                    '</div>' +
                    '<div class="drawer-agregar-cursos__right drawer-cursos-agregados-section" id="drawer-wiz-cursos-agregados-section">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Contenidos agregados</span>' +
                    '  <div class="drawer-cursos-agregados-content">' +

            function getAsignadosCellHtml(item) {
                var tipo = item.asignadosTipo || '';
                var label = (item.asignadosLabel || 'Por definir').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                if (tipo === 'toda-empresa') {
                    return '<div class="asignaciones-cell-asignados asignaciones-cell-asignados--icon">' +
                        '<span class="ubits-avatar ubits-avatar--sm ubits-avatar--icon-only" data-tooltip="Toda la empresa" data-tooltip-delay="500"><span class="ubits-avatar__fallback"><i class="far fa-building"></i></span></span>' +
                        '<span class="ubits-body-sm-regular">Toda la empresa</span></div>';

            function bindAsignadosPopover(tr, item) {
                if (!item || item.asignadosTipo !== 'por-colaborador' || !item.asignadosPersonas || item.asignadosPersonas.length <= 4) return;
                var countEl = tr.querySelector('.ubits-profile-list__count');

                    e.preventDefault();

                    var popover = document.getElementById('asignaciones-asignados-popover');

                        div.className = 'asignaciones-asignados-popover-item';

                        span.className = 'ubits-body-sm-regular';

                        listEl.appendChild(div);
                    });
                    overlay.style.display = 'block';
                    overlay.setAttribute('aria-hidden', 'false');
                    popover.style.display = 'block';
                    var rect = countEl.getBoundingClientRect();
                    var popoverH = popover.offsetHeight;
                    var gap = 4;
                    var margin = 8;
                    var spaceBelow = window.innerHeight - rect.bottom - margin;
                    var spaceAbove = rect.top - margin;
                    if (spaceBelow >= popoverH + gap) {
                        popover.style.top = (rect.bottom + gap) + 'px';
                    } else if (spaceAbove >= popoverH + gap) {
                        popover.style.top = (rect.top - popoverH - gap) + 'px';
                    } else {
                        popover.style.top = spaceBelow >= spaceAbove ? (rect.bottom + gap) + 'px' : (rect.top - popoverH - gap) + 'px';
                    }
                    var left = rect.left;
                    var maxLeft = window.innerWidth - popover.offsetWidth - margin;
                    if (left > maxLeft) left = maxLeft;
                    if (left < margin) left = margin;
                    popover.style.left = left + 'px';
                });
            }

                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    var bySource = catalogoCursos;
                    if (drawerCursosFilter === 'ubits') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'ubits'; });
                    else if (drawerCursosFilter === 'empresa') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'empresa'; });
                    return bySource.filter(function(c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q)) || (c.categoria && String(c.categoria).toLowerCase().includes(q));
                    });

                function filtrarYRenderizarCards() {
                    if (!cardsContainer || typeof loadCardContentCompact !== 'function') return;
                    var filtrados = getFiltradosDrawerCursos();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';

                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';

                    cardsContainer.style.display = '';
                    var aMostrar = filtrados.slice(0, drawerCursosVisibleCount);

                    aMostrar.forEach(function(course, idx) {

                        var cardEl = cardEls[idx];

                            if (cursosSeleccionados.some(function(x) { return x.id === course.id; })) {

                                cardEl.classList.remove('course-card-compact--selected');
                            }

                    var filtrados = getFiltradosDrawerCursos();
                    if (drawerCursosVisibleCount >= filtrados.length) return;
                    drawerCursosVisibleCount += DRAWER_CURSOS_PAGE_SIZE;
                    filtrarYRenderizarCards();

                        document.body.insertAdjacentHTML('beforeend', htmlDropdown);
                        var filterOverlay = document.getElementById(filterOverlayId);
                        if (filterOverlay) {
                            filterOverlay.addEventListener('click', function(ev) {
                                if (ev.target === filterOverlay) {

                                }

                            var content = filterOverlay.querySelector('.ubits-dropdown-menu__content');

                function parseCsvLine(line) {
                    var out = [];
                    var cur = '';
                    var inQ = false;
                    for (var i = 0; i < line.length; i++) {
                        var ch = line[i];
                        if (ch === '"') {
                            inQ = !inQ;
                            continue;
                        }
                        if (!inQ && ch === ',') {
                            out.push(cur.trim());
                            cur = '';
                            continue;
                        }
                        cur += ch;
                    }
                    out.push(cur.trim());
                    return out;
                }

                function aplicarImportacionDesdeArchivo() {
                    var file = overlay._archivoImportFile;
                    if (!file) {
                        if (typeof showToast === 'function') showToast('warning', 'Selecciona un archivo CSV.');
                        return;
                    }
                    var ext = (file.name.split('.').pop() || '').toLowerCase();
                    if (ext !== 'csv') {
                        if (typeof showToast === 'function') showToast('error', 'Usa un archivo en formato CSV.');
                        return;
                    }
                    var reader = new FileReader();
                    reader.onload = function() {
                        var text = String(reader.result || '');
                        var lines = text.split(/\r?\n/).filter(function(l) { return l.trim().length > 0; });
                        if (lines.length < 2) {
                            if (typeof showToast === 'function') showToast('error', 'El CSV debe incluir encabezados y al menos una fila de datos.');
                            return;
                        }
                        var headers = parseCsvLine(lines[0]).map(normHeaderCell);
                        var ixUser = -1;
                        var ixIds = -1;
                        for (var h = 0; h < headers.length; h++) {
                            if (headers[h] === 'username' || headers[h] === 'usuario') ixUser = h;
                            if (headers[h] === 'id contenidos' || headers[h] === 'idcontenidos') ixIds = h;
                        }
                        if (ixUser < 0 || ixIds < 0) {
                            if (typeof showToast === 'function') showToast('error', 'El CSV debe tener columnas username e id contenidos.');
                            return;
                        }
                        var creadas = 0;
                        for (var r = 1; r < lines.length; r++) {
                            var cells = parseCsvLine(lines[r]);
                            var u = (cells[ixUser] != null ? String(cells[ixUser]) : '').trim().toLowerCase();
                            var idsRaw = cells[ixIds] != null ? String(cells[ixIds]) : '';
                            if (!u) continue;
                            var empRow = empleadosDrawer.find(function(e) { return String(e.username || '').trim().toLowerCase() === u; });
                            if (!empRow) continue;
                            var idTokens = idsRaw.split(/[,;]/).map(function(x) { return x.trim(); }).filter(Boolean);
                            var contenidos = [];
                            idTokens.forEach(function(cid) {
                                var c = catalogoCursos.find(function(x) { return String(x.id) === String(cid); });
                                if (c) contenidos.push(c);
                            });
                            var empleadosRaw = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
                            var nombre = (empRow.nombre || '').trim() || empRow.username;
                            var emp = empleadosRaw.find(function(e) { return ((e.nombre || '').trim()) === nombre; });
                            var idAsig = 'asignacion-' + (++asignacionIdCounter);
                            asignacionesData.push({
                                id: idAsig,
                                asignadosLabel: nombre,
                                asignadosTipo: 'por-colaborador',
                                asignadosPersonas: [{ nombre: nombre, avatar: emp ? emp.avatar : null }],
                                asignadosGrupos: [],
                                contenidosCount: contenidos.length,
                                contenidos: contenidos
                            });
                            creadas++;

                        if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                        bindAsignacionesRowsAfterRefresh();
                        if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                        if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                        if (typeof showToast === 'function') showToast('success', creadas ? (creadas + ' asignación(es) importada(s)') : 'No se importó ninguna fila válida.');
                    };

                        var headers = ['id', 'titulo', 'origen', 'tipo_contenido'];
                        var filas = [headers.map(escapeCsvCell).join(',')];
                        var ubitsContents = (window.BDS_CONTENIDOS_UBITS && window.BDS_CONTENIDOS_UBITS.contents) || [];
                        var fiqshaContents = (window.BDS_CONTENIDOS_FIQSHA && window.BDS_CONTENIDOS_FIQSHA.contents) || [];
                        function agregarFilaContenido(c) {
                            if (!c || c.id == null) return;
                            var tit = (c.title != null && String(c.title).trim() !== '') ? String(c.title) : String(c.titulo || '');
                            filas.push([c.id, tit, c.origen || '', c.tipoContenido || ''].map(escapeCsvCell).join(','));
                        }
                        ubitsContents.forEach(agregarFilaContenido);
                        fiqshaContents.forEach(agregarFilaContenido);
                        descargarCsv('lista-contenidos-ubits-y-fiqsha.csv', filas.join('\r\n'));
                    });
                }
                if (btnDescargarPlantilla) {
                    btnDescargarPlantilla.addEventListener('click', function() {
                        var headers = ['username', 'nombre', 'correo', 'area', 'lider'];
                        var filaEjemplo = ['19237418387', 'José Fernando Pérez Sánchez', 'joseperez@correo.com', 'Ventas', 'Luz Angela Arango Bernal'];
                        var contenido = headers.map(escapeCsvCell).join(',') + '\r\n' + filaEjemplo.map(escapeCsvCell).join(',');
                        descargarCsv('plantilla-participantes.csv', contenido);
                    });
                }

                function procesarArchivoSubido() {
                    var id = 'asignacion-' + (++asignacionIdCounter);
                    asignacionesData.push({ id: id, asignadosLabel: 'Importación desde archivo', asignadosTipo: 'desde-archivo', asignadosPersonas: [], asignadosGrupos: [], contenidosCount: 0, contenidos: [] });
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    bindAsignacionesRowsAfterRefresh();
                    if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
                }
            }

            function cerrarDrawerYActualizar() {
                var overlay = document.getElementById('drawer-agregar-usuarios');
                if (!overlay) { if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios'); return; }
                var radio = overlay.querySelector('input[name="tipo-agregar-usuarios"]:checked');
                var opcion = radio ? radio.value : 'toda-empresa';
                var label = 'Por definir';
                var asignadosTipo = opcion;
                var asignadosPersonas = [];
                var asignadosGrupos = [];
                var refColab = overlay._drawerColabTablaRef;
                var refGrupos = overlay._drawerGruposTablaRef;
                var empleadosDrawerActual = overlay._empleadosDrawer;
                var gruposMockActual = overlay._gruposMockDrawer;
                if (opcion === 'toda-empresa') {
                    label = 'Toda la empresa';
                    asignadosTipo = 'toda-empresa';
                } else if (opcion === 'por-colaborador' && refColab && typeof refColab.getSelectedIds === 'function' && Array.isArray(empleadosDrawerActual)) {
                    var selectedIdsColab = refColab.getSelectedIds();
                    var empleados = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
                    asignadosPersonas = selectedIdsColab.map(function(id) {
                        var r = empleadosDrawerActual.find(function(e) { return String(e.id) === String(id); });
                        if (!r) return null;
                        var nombre = (r.nombre || '').trim() || r.username || '';
                        var emp = empleados.find(function(e) { return ((e.nombre || '').trim()) === nombre; });
                        return { nombre: nombre, avatar: emp ? emp.avatar : null };
                    }).filter(Boolean);
                    label = asignadosPersonas.length ? asignadosPersonas.map(function(p) { return p.nombre; }).join(', ') : 'Por definir';
                } else if (opcion === 'por-grupos' && refGrupos && typeof refGrupos.getSelectedIds === 'function' && Array.isArray(gruposMockActual)) {
                    var selectedIdsGrupos = refGrupos.getSelectedIds();
                    asignadosGrupos = selectedIdsGrupos.map(function(id) {
                        var g = gruposMockActual.find(function(gr) { return String(gr.id) === String(id); });
                        return g ? { nombre: g.nombre } : null;
                    }).filter(Boolean);
                    label = asignadosGrupos.length ? asignadosGrupos.map(function(g) { return g.nombre; }).join(', ') : 'Por definir';
                } else if (opcion === 'desde-archivo') { if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios'); return; }
                var id = 'asignacion-' + (++asignacionIdCounter);
                var item = { id: id, asignadosLabel: label, asignadosTipo: asignadosTipo, asignadosPersonas: asignadosPersonas, asignadosGrupos: asignadosGrupos, contenidosCount: 0, contenidos: [] };
                asignacionesData.push(item);
                if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                bindAsignacionesRowsAfterRefresh();
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
            }
            window.cerrarDrawerYActualizar = cerrarDrawerYActualizar;

            var asignacionesContainer = document.getElementById('asignaciones-data-table-container');
            if (asignacionesContainer) {
                asignacionesContainer.addEventListener('click', function(e) {
                    var btn = e.target.closest('.js-asignacion-agregar-contenidos');
                    if (!btn) return;
                    e.preventDefault();
                    e.stopPropagation();
                    var tr = btn.closest('tbody tr[data-id]');
                    if (tr) abrirDrawerAgregarCursos(tr);
                });
            }

            var deleteOverlay = document.getElementById('asignaciones-delete-overlay');
            var deleteClose = document.getElementById('asignaciones-delete-close');
            var deleteCancel = document.getElementById('asignaciones-delete-cancel');
            var deleteConfirm = document.getElementById('asignaciones-delete-confirm');
            var deleteCountEl = document.getElementById('asignaciones-delete-count');
            var deleteTypeInput = document.getElementById('asignaciones-delete-type-input');
            function closeAsignacionesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function() {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function(e) { if (e.target === deleteOverlay) closeAsignacionesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsignacionesDeleteModal();
                    pendingAsignacionesDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function(id) { idSet[String(id)] = true; });
                    asignacionesData = asignacionesData.filter(function(a) { return !idSet[String(a.id)]; });
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    bindAsignacionesRowsAfterRefresh();
                    if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' asignación(es) eliminada(s) correctamente');
                });
            }

            // ========== Drawer Agregar contenidos (ex cursos) ==========
            function getDrawerCursosBodyHtml() {
                return '<div class="drawer-agregar-cursos drawer-agregar-cursos--two-cols">' +
                    '<div class="drawer-agregar-cursos__left">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Buscar y agregar contenidos</span>' +
                    '  <div class="drawer-cursos-search-row">' +
                    '    <div id="drawer-cursos-search-container" class="drawer-cursos-search-input-wrap"></div>' +
                    '    <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only" id="drawer-cursos-filter-btn" aria-label="Filtrar por origen"><i class="far fa-filter"></i></button>' +
                    '  </div>' +
                    '  <div class="drawer-cursos-resultados-bg drawer-cursos-resultados-bg--dos-columnas">' +
                    '    <div id="drawer-contenidos-empty-search" class="drawer-contenidos-empty-search-wrap" style="display:none;"></div>' +
                    '    <div class="drawer-cursos-cards-grid" id="drawer-cursos-cards-container"></div>' +
                    '  </div>' +
                    '</div>' +
                    '<div class="drawer-agregar-cursos__right drawer-cursos-agregados-section" id="drawer-cursos-agregados-section">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Contenidos agregados</span>' +
                    '  <div class="drawer-cursos-agregados-content">' +
                    '    <div id="drawer-cursos-empty-state" class="drawer-cursos-empty-state-wrap"></div>' +
                    '    <div class="ubits-table-wrapper" id="drawer-cursos-table-wrapper">' +
                    '      <table class="ubits-table" id="drawer-cursos-table">' +
                    '        <thead><tr><th data-col="contenido" class="ubits-body-sm-semibold">Contenido</th><th class="ubits-table__th--actions ubits-body-sm-semibold" data-col="acciones">Acciones</th></tr></thead>' +
                    '        <tbody id="drawer-cursos-agregados-tbody"></tbody>' +
                    '      </table>' +
                    '    </div>' +
                    '  </div>' +
                    '</div>' +
                    '</div>';
            }

            function abrirDrawerAgregarCursos(tr) {
                pendingCursosRow = tr;
                var cursosSeleccionados = [];
                var asignacionId = tr ? (tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id')) : null;
                var item = asignacionId ? asignacionesData.find(function(a) { return a.id === asignacionId; }) : null;
                if (item && item.contenidos && item.contenidos.length) {
                    cursosSeleccionados = item.contenidos.slice();
                }
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" onclick="cerrarDrawerCursos()"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" onclick="cerrarDrawerCursosYAplicar()"><span class="ubits-body-sm-regular">Agregar</span></button>';

                openDrawer({
                    overlayId: 'drawer-agregar-cursos',
                    title: 'Agregar contenidos',
                    bodyHtml: getDrawerCursosBodyHtml(),
                    footerHtml: footerHtml,
                    size: 'lg',
                    onClose: function() {
                        pendingCursosRow = null;
                    }
                });

                var overlay = document.getElementById('drawer-agregar-cursos');
                if (!overlay) return;

                actualizarTabla();

                function actualizarTabla() {
                    var agregadosSection = overlay.querySelector('#drawer-cursos-agregados-section');
                    var tbody = overlay.querySelector('#drawer-cursos-agregados-tbody');
                    var emptyStateContainer = overlay.querySelector('#drawer-cursos-empty-state');
                    var tableWrapper = overlay.querySelector('#drawer-cursos-table-wrapper');
                    if (!tbody) return;
                    if (agregadosSection) agregadosSection.style.display = 'block';
                    tbody.innerHTML = '';
                    if (cursosSeleccionados.length === 0) {
                        if (tableWrapper) tableWrapper.style.display = 'none';
                        if (emptyStateContainer) {
                            emptyStateContainer.style.display = 'block';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-cursos-empty-state', {
                                    icon: 'fa-folder-open',
                                    iconSize: 'lg',
                                    title: 'No hay contenidos agregados',
                                    description: 'Busca y agrega contenidos desde el buscador.',
                                    buttons: {}
                                });
                            }
                        }
                    } else {
                        if (emptyStateContainer) emptyStateContainer.style.display = 'none';
                        if (tableWrapper) tableWrapper.style.display = 'block';
                    }
                    cursosSeleccionados.forEach(function(c) {
                        var tr = document.createElement('tr');
                        tr.className = 'drawer-cursos-table-row';
                        tr.innerHTML = '<td data-col="contenido"><span class="ubits-body-sm-regular">' + (c.title || '') + '</span></td>' +
                            '<td data-col="acciones"><button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only js-drawer-cursos-delete" aria-label="Eliminar" title="Eliminar"><i class="far fa-trash"></i></button></td>';
                        tr.dataset.courseId = c.id;
                        tr.querySelector('.js-drawer-cursos-delete').addEventListener('click', function() {
                            cursosSeleccionados = cursosSeleccionados.filter(function(x) { return x.id !== c.id; });
                            actualizarTabla();
                            filtrarYRenderizarCards();
                        });
                        tbody.appendChild(tr);
                    });
                }

                if (typeof createInput === 'function') {
                    createInput({
                        containerId: 'drawer-cursos-search-container',
                        type: 'search',
                        placeholder: 'Buscar contenidos...',
                        size: 'sm',
                        showLabel: false
                    });
                }
                var searchContainer = overlay.querySelector('#drawer-cursos-search-container');
                var searchInput = searchContainer ? searchContainer.querySelector('input') : null;
                var cardsContainer = overlay.querySelector('#drawer-cursos-cards-container');
                var emptySearchContainer = overlay.querySelector('#drawer-contenidos-empty-search');
                var DRAWER_CURSOS_PAGE_SIZE = 12;
                var drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                var drawerCursosFilter = 'all';

                function getFiltradosDrawerCursos() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    var bySource = catalogoCursos;
                    if (drawerCursosFilter === 'ubits') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'ubits'; });
                    else if (drawerCursosFilter === 'empresa') bySource = catalogoCursos.filter(function(c) { return c.courseSource === 'empresa'; });
                    return bySource.filter(function(c) {
                        return !q || (c.title && c.title.toLowerCase().includes(q)) || (c.competency && c.competency.toLowerCase().includes(q)) || (c.categoria && String(c.categoria).toLowerCase().includes(q));
                    });
                }

                function filtrarYRenderizarCards() {
                    if (!cardsContainer || typeof loadCardContentCompact !== 'function') return;
                    var filtrados = getFiltradosDrawerCursos();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-contenidos-empty-search', {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: { secondary: { text: 'Limpiar búsqueda', icon: 'fa-times', onClick: function() {} } }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (searchInput) { searchInput.value = ''; searchInput.dispatchEvent(new Event('input')); }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var aMostrar = filtrados.slice(0, drawerCursosVisibleCount);
                    loadCardContentCompact('drawer-cursos-cards-container', aMostrar);
                    aMostrar.forEach(function(course, idx) {
                        var cards = cardsContainer.querySelectorAll('.course-card-compact');
                        var cardEl = cards[idx];
                        if (cardEl) {
                            cardEl.style.cursor = 'pointer';
                            cardEl.dataset.courseId = course.id;
                            if (cursosSeleccionados.some(function(x) { return x.id === course.id; })) {
                                cardEl.classList.add('course-card-compact--selected');
                            } else {
                                cardEl.classList.remove('course-card-compact--selected');
                            }
                        }
                    });
                }

                function maybeLoadMoreDrawerCursos() {
                    var filtrados = getFiltradosDrawerCursos();
                    if (drawerCursosVisibleCount >= filtrados.length) return;
                    drawerCursosVisibleCount += DRAWER_CURSOS_PAGE_SIZE;
                    filtrarYRenderizarCards();
                }

                var resultadosBg = overlay.querySelector('.drawer-cursos-resultados-bg');
                if (resultadosBg) {
                    resultadosBg.addEventListener('scroll', function() {
                        var el = resultadosBg;
                        var threshold = 120;
                        if (el.scrollTop + el.clientHeight >= el.scrollHeight - threshold) maybeLoadMoreDrawerCursos();
                    });
                }

                cardsContainer.addEventListener('click', function(e) {
                    var cardEl = e.target.closest('.course-card-compact');
                    if (!cardEl || !cardEl.dataset.courseId) return;
                    var course = catalogoCursos.find(function(c) { return c.id === cardEl.dataset.courseId; });
                    if (!course) return;
                    if (cursosSeleccionados.some(function(x) { return x.id === course.id; })) return;
                    cursosSeleccionados.push(course);
                    actualizarTabla();
                    filtrarYRenderizarCards();
                    if (searchInput) {
                        searchInput.value = '';
                        searchInput.dispatchEvent(new Event('input'));
                    }
                });

                if (searchInput) {
                    searchInput.addEventListener('input', function() {
                        drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                        filtrarYRenderizarCards();
                    });
                    searchInput.addEventListener('keyup', function() {
                        drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                        filtrarYRenderizarCards();
                    });
                }

                var filterBtn = overlay.querySelector('#drawer-cursos-filter-btn');
                if (filterBtn && typeof getDropdownMenuHtml === 'function' && typeof openDropdownMenu === 'function' && typeof closeDropdownMenu === 'function') {
                    filterBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var filterOverlayId = 'drawer-cursos-filter-overlay';
                        var existing = document.getElementById(filterOverlayId);
                        if (existing) existing.remove();
                        var htmlDropdown = getDropdownMenuHtml({
                            overlayId: filterOverlayId,
                            contentId: filterOverlayId + '-content',
                            radioGroup: true,
                            radioName: filterOverlayId + '-radio',
                            options: [
                                { text: 'Todos los cursos', value: 'all', selected: drawerCursosFilter === 'all' },
                                { text: 'Solo cursos UBITS', value: 'ubits', selected: drawerCursosFilter === 'ubits' },
                                { text: 'Solo cursos de mi empresa', value: 'empresa', selected: drawerCursosFilter === 'empresa' }
                            ]
                        });
                        document.body.insertAdjacentHTML('beforeend', htmlDropdown);
                        var filterOverlay = document.getElementById(filterOverlayId);
                        if (filterOverlay) {
                            filterOverlay.addEventListener('click', function(ev) {
                                if (ev.target === filterOverlay) {
                                    closeDropdownMenu(filterOverlayId);
                                    if (filterOverlay.parentNode) filterOverlay.remove();
                                }
                            });
                            var content = filterOverlay.querySelector('.ubits-dropdown-menu__content');
                            if (content) content.addEventListener('click', function(ev) { ev.stopPropagation(); });
                            filterOverlay.querySelectorAll('input[type=radio]').forEach(function(radio) {
                                radio.addEventListener('change', function() {
                                    drawerCursosFilter = this.value;
                                    closeDropdownMenu(filterOverlayId);
                                    if (filterOverlay.parentNode) filterOverlay.remove();
                                    drawerCursosVisibleCount = DRAWER_CURSOS_PAGE_SIZE;
                                    filtrarYRenderizarCards();
                                });
                            });
                        }
                        openDropdownMenu(filterOverlayId, filterBtn, { alignRight: true });
                        requestAnimationFrame(function() {
                            var ov = document.getElementById(filterOverlayId);
                            var cnt = ov ? ov.querySelector('.ubits-dropdown-menu__content') : null;
                            if (cnt && filterBtn) {
                                var br = filterBtn.getBoundingClientRect();
                                cnt.style.left = (br.right - cnt.offsetWidth) + 'px';
                            }
                        });
                    });
                }

                filtrarYRenderizarCards();
            }

            function cerrarDrawerCursos() {
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                pendingCursosRow = null;
            }
            window.cerrarDrawerCursos = cerrarDrawerCursos;

            function cerrarDrawerCursosYAplicar() {
                var overlay = document.getElementById('drawer-agregar-cursos');
                var tbody = overlay ? overlay.querySelector('#drawer-cursos-agregados-tbody') : null;
                var cursosSeleccionados = [];
                if (tbody) {
                    tbody.querySelectorAll('tr').forEach(function(row) {
                        var courseId = row.dataset.courseId;
                        if (courseId) {
                            var c = catalogoCursos.find(function(x) { return x.id === courseId; });
                            if (c) cursosSeleccionados.push(c);
                        }
                    });
                }
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                if (pendingCursosRow) {
                    aplicarCursosAAsignacion(pendingCursosRow, cursosSeleccionados);
                    pendingCursosRow = null;
                }
            }
            window.cerrarDrawerCursosYAplicar = cerrarDrawerCursosYAplicar;

            function aplicarCursosAAsignacion(tr, cursosSeleccionados) {
                if (!tr) return;
                var list = Array.isArray(cursosSeleccionados) ? cursosSeleccionados : [];
                var id = tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id');
                var item = asignacionesData.find(function(a) { return a.id === id; });
                if (item) {
                    item.contenidosCount = list.length;
                    item.contenidos = list.slice();
                }
                if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                bindAsignacionesRowsAfterRefresh();
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }
        });
    </script>
</body>
</html>
