                    <div class="section-single">

                    <div class="section-single">

                            <div class="crear-plan-competencias-form__field crear-plan-competencias-form__field--nombre-plan">

    <div id="asignaciones-modals-container"></div>
    <div class="asignaciones-asignados-popover-overlay" id="asignaciones-asignados-popover-overlay" style="display: none;" aria-hidden="true"></div>

    <script src="../../components/tooltip.js"></script>

    <script src="../../components/profile-menu.js"></script>

    <script src="../../components/empty-state.js"></script>
    <script src="../../components/toast.js"></script>

    <script src="../../components/modal.js"></script>
    <script src="../../script.js"></script>
    <!-- Misma base de datos que seguimiento.html (empresa de pruebas: Fiqsha) -->
    <script src="../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../bd-master/bd-tareas-y-planes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Leer tipo de plan desde URL (?tipo=contenidos | ?tipo=competencias)
            var params = new URLSearchParams(window.location.search);
            var planTipo = params.get('tipo') || 'competencias';
            var planTipoInput = document.getElementById('plan-tipo');
            if (planTipoInput) planTipoInput.value = planTipo;

            loadSidebar('creator');
            loadSubNav('top-nav-container', 'creator');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');
            
            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Crear plan de competencias',
                    breadcrumbItems: [],
                    backButton: {
                        onClick: function() {
                            window.location.href = 'planes-formacion.html';
                        }
                    },
                    secondaryButtons: [
                        {
                            text: 'Guardar',
                            icon: 'fa-floppy-disk',
                            onClick: function() {
                                var sinCompetencias = asignacionesData.filter(function(a) { return !a.contenidos || a.contenidos.length === 0; });
                                if (sinCompetencias.length > 0 && typeof showToast === 'function') {
                                    showToast('error', 'Todas las asignaciones deben tener al menos una competencia. Agrega competencias a las que faltan antes de guardar.');
                                    return;
                                }
                                window.location.href = 'planes-formacion.html';
                            }
                        }
                    ]
                });
            }
            
            setTimeout(() => {
                const tab = document.querySelector('.nav-tab[data-tab="planes-formacion"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(item => item.classList.remove('active'));
                    tab.classList.add('active');
                }
                const sidebarBtn = document.querySelector('.nav-button[data-section="creator"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
                    sidebarBtn.classList.add('active');
                }
                const modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(item => item.classList.remove('active'));
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-formacion');
                }
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }, 200);

            // Auto-resize textarea del nombre (en el header)
            setTimeout(function() {
                var nombreTa = document.getElementById('asignacion-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                    });
                }
            }, 0);

            // Selectores de fecha (vigencia)
            if (typeof createInput === 'function') {
                createInput({
                    containerId: 'fecha-inicio-container',
                    type: 'calendar',
                    label: 'Fecha de inicio',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Igual o mayor a hoy',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
                createInput({
                    containerId: 'fecha-fin-container',
                    type: 'calendar',
                    label: 'Fecha de finalización',
                    placeholder: 'Seleccionar fecha',
                    helperText: 'Mayor o igual a la fecha de inicio',
                    showHelper: true,
                    size: 'sm',
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
                createInput({
                    containerId: 'horas-por-competencia-container',
                    type: 'number',
                    label: 'Horas de estudio por competencia',
                    placeholder: 'Ej. 4',
                    helperText: 'Solo se admiten números.',
                    showHelper: true,
                    size: 'sm',
                    min: 1,
                    onChange: function() { if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState(); }
                });
            }

            // Validar horas por competencia: solo dígitos (sin letras ni caracteres especiales)
            setTimeout(function() {
                var horasInput = document.querySelector('#horas-por-competencia-container input');
                if (horasInput) {
                    function isDigitKey(e) {
                        var k = e.key;
                        if (k.length === 1 && k >= '0' && k <= '9') return true;
                        if (['Backspace', 'Delete', 'Tab', 'ArrowLeft', 'ArrowRight', 'Home', 'End'].indexOf(k) !== -1) return true;
                        if ((e.ctrlKey || e.metaKey) && ['a', 'c', 'v', 'x'].indexOf(k.toLowerCase()) !== -1) return true;
                        return false;
                    }
                    horasInput.addEventListener('keydown', function(e) {
                        if (!isDigitKey(e)) e.preventDefault();
                    });
                    horasInput.addEventListener('input', function() {
                        var v = this.value.replace(/\D/g, '');
                        if (v !== this.value) this.value = v;
                        if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    });
                    horasInput.addEventListener('paste', function(e) {
                        e.preventDefault();
                        var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                        this.value = pasted;
                        if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    });
                }
            }, 500);

            // Asignaciones: datos y refs de tabla
            var asignacionesData = [];
            var asignacionIdCounter = 0;
            var pendingCursosRow = null;
            var catalogoCompetencias = window.CATALOGO_COMPETENCIAS_DRAWER || [];
            var competenciaImageMap = window.COMPETENCIA_IMAGE_MAP || {};
            var habilidadIconMap = window.HABILIDAD_ICON_MAP || {};


            function canGuardar() {
                var inicioInput = document.querySelector('#fecha-inicio-container input');
                var finInput = document.querySelector('#fecha-fin-container input');
                var horasInput = document.querySelector('#horas-por-competencia-container input');
                var hasInicio = inicioInput && inicioInput.value && String(inicioInput.value).trim() !== '';
                var hasFin = finInput && finInput.value && String(finInput.value).trim() !== '';
                var horasVal = horasInput && horasInput.value !== '' ? parseFloat(horasInput.value, 10) : NaN;
                var hasHorasValidas = !isNaN(horasVal) && horasVal >= 1;
                var hasAsignacionConContenido = asignacionesData.some(function(a) { return a.contenidos && a.contenidos.length > 0; });
                return hasInicio && hasFin && hasHorasValidas && hasAsignacionConContenido;
            }
            function updateGuardarButtonState() {
                var btn = document.getElementById('btn-guardar-plan') || document.querySelector('#header-product-container .ubits-header-product__actions .ubits-button--secondary');
                if (btn) {
                    if (!btn.id) btn.id = 'btn-guardar-plan';
                    btn.disabled = !canGuardar();
                }
            }

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="asignaciones-delete-count">0</strong> asignación(es) seleccionada(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="asignaciones-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="asignaciones-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="asignaciones-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="asignaciones-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('asignaciones-modals-container').innerHTML = getModalHtml({ overlayId: 'asignaciones-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'asignaciones-delete-close' });
            }

            function getDrawerUsuariosBodyHtml() {
                return '<div class="drawer-agregar-usuarios-options">' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="toda-empresa">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="toda-empresa">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-building"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar toda la empresa</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Asigna el plan a todos los colaboradores de la empresa de una sola vez.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="por-colaborador">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="por-colaborador">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-user"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar colaborador</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Busca y agrega colaboradores individualmente a la lista de participantes.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="por-grupos">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="por-grupos">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-users"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar por grupos</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Selecciona uno o más grupos para asignar el plan a sus integrantes.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold">4</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '<label class="drawer-option-card ubits-radio ubits-radio--md" data-opcion="desde-archivo">' +
                    '  <input type="radio" name="tipo-agregar-usuarios" class="ubits-radio__input" value="desde-archivo">' +
                    '  <span class="ubits-radio__circle"></span>' +
                    '  <div class="drawer-option-card__main">' +
                    '    <div class="drawer-option-card__row">' +
                    '      <span class="drawer-option-card__icon"><i class="far fa-file-arrow-up"></i></span>' +
                    '      <span class="ubits-body-md-semibold drawer-option-card__title">Agregar desde archivo</span>' +
                    '    </div>' +
                    '    <p class="ubits-body-sm-regular drawer-option-card__desc">Importa una lista de participantes desde un archivo CSV o Excel.</p>' +
                    '    <span class="drawer-option-card__count ubits-body-md-regular"><span class="ubits-body-md-bold">0</span>/<span class="ubits-body-md-bold" data-drawer-total>0</span> seleccionados</span>' +
                    '  </div>' +
                    '</label>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--colaborador" id="drawer-usuarios-colaborador-panel" style="display:none">' +
                    '  <div id="drawer-colab-data-table-container" class="drawer-colab-dt-wrapper"></div>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--grupos" id="drawer-usuarios-grupos-panel" style="display:none">' +
                    '  <div id="drawer-grupos-data-table-container" class="drawer-grupos-dt-wrapper"></div>' +
                    '</div>' +
                    '<div class="drawer-usuarios-panel drawer-usuarios-panel--archivo" id="drawer-usuarios-archivo-panel" style="display:none">' +
                    '  <div class="drawer-archivo-section">' +
                    '    <div class="drawer-archivo-header">' +
                    '      <h2 class="ubits-body-md-bold drawer-archivo-title">Importar archivo</h2>' +
                    '      <div class="drawer-archivo-actions">' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-descargar-lista"><i class="far fa-arrow-down-to-line"></i><span>Descargar lista de colaboradores</span></button>' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-descargar-plantilla"><i class="far fa-arrow-down-to-line"></i><span>Descargar plantilla</span></button>' +
                    '      </div>' +
                    '    </div>' +
                    '    <div class="drawer-archivo-dropzone" id="drawer-archivo-dropzone">' +
                    '      <div class="drawer-archivo-dropzone-inner">' +
                    '        <div class="drawer-archivo-file-icon-wrap"><i class="far fa-file-arrow-up"></i></div>' +
                    '        <p class="ubits-body-md-semibold drawer-archivo-dropzone-title">Subir archivos</p>' +
                    '        <p class="ubits-body-sm-regular drawer-archivo-dropzone-formats">CSV, xlsx &bull; Hasta 5mb</p>' +
                    '        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm" id="drawer-archivo-btn-seleccionar"><i class="far fa-arrow-up-from-bracket"></i><span>Seleccionar archivos</span></button>' +
                    '      </div>' +
                    '      <input type="file" id="drawer-archivo-input" accept=".csv,.xlsx,.xls" style="display:none">' +
                    '    </div>' +
                    '  </div>' +
                    '</div>';
            }

            function getAsignadosCellHtml(item) {
                var tipo = item.asignadosTipo || '';
                var label = (item.asignadosLabel || 'Por definir').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                if (tipo === 'toda-empresa') {
                    return '<div class="asignaciones-cell-asignados asignaciones-cell-asignados--icon">' +
                        '<span class="ubits-avatar ubits-avatar--sm ubits-avatar--icon-only" data-tooltip="Toda la empresa" data-tooltip-delay="500"><span class="ubits-avatar__fallback"><i class="far fa-building"></i></span></span>' +
                        '<span class="ubits-body-sm-regular">Toda la empresa</span></div>';
                }
                if (tipo === 'desde-archivo') {
                    return '<div class="asignaciones-cell-asignados asignaciones-cell-asignados--icon">' +
                        '<span class="ubits-avatar ubits-avatar--sm ubits-avatar--icon-only" data-tooltip="Importación desde archivo" data-tooltip-delay="500"><span class="ubits-avatar__fallback"><i class="far fa-file-arrow-up"></i></span></span>' +
                        '<span class="ubits-body-sm-regular">Importación desde archivo</span></div>';
                }
                if (tipo === 'por-grupos' && item.asignadosGrupos && item.asignadosGrupos.length > 0) {
                    var gruposHtml = item.asignadosGrupos.map(function(g) {
                        var nomAttr = (g.nombre || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        var nomText = (g.nombre || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        return '<span class="asignaciones-cell-grupo" data-tooltip="' + nomAttr + '" data-tooltip-delay="500">' +
                            '<span class="ubits-avatar ubits-avatar--sm ubits-avatar--icon-only"><span class="ubits-avatar__fallback"><i class="far fa-user-group"></i></span></span>' +
                            '<span class="ubits-body-sm-regular">' + nomText + '</span></span>';
                    }).join('');
                    return '<div class="asignaciones-cell-asignados asignaciones-cell-asignados--grupos">' + gruposHtml + '</div>';
                }
                if (tipo === 'por-colaborador' && item.asignadosPersonas && item.asignadosPersonas.length > 0) {
                    var tooltipOpts = { showTooltip: true, tooltipDelay: 500 };
                    var listHtml = typeof renderProfileList === 'function'
                        ? renderProfileList(item.asignadosPersonas, { size: 'sm', maxVisible: 4, ...tooltipOpts })
                        : '<span class="ubits-body-sm-regular">' + label + '</span>';
                    return '<div class="asignaciones-cell-asignados asignaciones-cell-asignados--personas">' + listHtml + '</div>';
                }
                return '<div class="asignaciones-cell-asignados"><span class="ubits-body-sm-regular">' + label + '</span></div>';
            }

            function escapeHtmlAttr(t) {
                if (t == null) return '';
                return String(t).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            function buildAsignacionRowHtml(row) {
                var cursosCell = row.contenidosCount === 0
                    ? '<button type="button" class="ubits-button ubits-button--secondary ubits-button--xs js-asignacion-agregar-contenidos" data-asignacion-id="' + escapeHtmlAttr(row.id) + '"><i class="far fa-plus"></i><span>Agregar competencias</span></button>'

            function bindAsignadosPopover(tr, item) {
                if (!item || item.asignadosTipo !== 'por-colaborador' || !item.asignadosPersonas || item.asignadosPersonas.length <= 4) return;
                var countEl = tr.querySelector('.ubits-profile-list__count');

                countEl.addEventListener('click', function(e) {
                    e.preventDefault();

                    var popover = document.getElementById('asignaciones-asignados-popover');

                        div.className = 'asignaciones-asignados-popover-item';

                        span.className = 'ubits-body-sm-regular';

                        listEl.appendChild(div);
                    });
                    overlay.style.display = 'block';
                    overlay.setAttribute('aria-hidden', 'false');
                    popover.style.display = 'block';
                    var rect = countEl.getBoundingClientRect();
                    var popoverH = popover.offsetHeight;
                    var gap = 4;
                    var margin = 8;
                    var spaceBelow = window.innerHeight - rect.bottom - margin;
                    var spaceAbove = rect.top - margin;
                    if (spaceBelow >= popoverH + gap) {
                        popover.style.top = (rect.bottom + gap) + 'px';
                    } else if (spaceAbove >= popoverH + gap) {
                        popover.style.top = (rect.top - popoverH - gap) + 'px';
                    } else {
                        popover.style.top = spaceBelow >= spaceAbove ? (rect.bottom + gap) + 'px' : (rect.top - popoverH - gap) + 'px';
                    }
                    var left = rect.left;
                    var maxLeft = window.innerWidth - popover.offsetWidth - margin;
                    if (left > maxLeft) left = maxLeft;
                    if (left < margin) left = margin;
                    popover.style.left = left + 'px';
                });
            }

                    }).filter(Boolean);
                    label = asignadosPersonas.length ? asignadosPersonas.map(function(p) { return p.nombre; }).join(', ') : 'Por definir';
                } else if (opcion === 'por-grupos' && refGrupos && typeof refGrupos.getSelectedIds === 'function' && Array.isArray(gruposMockActual)) {
                    var selectedIdsGrupos = refGrupos.getSelectedIds();
                    asignadosGrupos = selectedIdsGrupos.map(function(id) {
                        var g = gruposMockActual.find(function(gr) { return String(gr.id) === String(id); });
                        return g ? { nombre: g.nombre } : null;
                    }).filter(Boolean);
                    label = asignadosGrupos.length ? asignadosGrupos.map(function(g) { return g.nombre; }).join(', ') : 'Por definir';
                } else if (opcion === 'desde-archivo') { if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios'); return; }
                var id = 'asignacion-' + (++asignacionIdCounter);
                var item = { id: id, asignadosLabel: label, asignadosTipo: asignadosTipo, asignadosPersonas: asignadosPersonas, asignadosGrupos: asignadosGrupos, contenidosCount: 0, contenidos: [] };
                asignacionesData.push(item);
                if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                bindAsignacionesRowsAfterRefresh();
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-usuarios');
            }
            window.cerrarDrawerYActualizar = cerrarDrawerYActualizar;

            var asignacionesContainer = document.getElementById('asignaciones-data-table-container');
            if (asignacionesContainer) {
                asignacionesContainer.addEventListener('click', function(e) {
                    var btn = e.target.closest('.js-asignacion-agregar-contenidos');
                    if (!btn) return;
                    e.preventDefault();
                    e.stopPropagation();
                    var tr = btn.closest('tbody tr[data-id]');
                    if (tr) abrirDrawerAgregarCursos(tr);
                });
            }

            var deleteOverlay = document.getElementById('asignaciones-delete-overlay');
            var deleteClose = document.getElementById('asignaciones-delete-close');
            var deleteCancel = document.getElementById('asignaciones-delete-cancel');
            var deleteConfirm = document.getElementById('asignaciones-delete-confirm');
            var deleteCountEl = document.getElementById('asignaciones-delete-count');
            var deleteTypeInput = document.getElementById('asignaciones-delete-type-input');
            function closeAsignacionesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function() {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closeAsignacionesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function(e) { if (e.target === deleteOverlay) closeAsignacionesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingAsignacionesDeleteIds.slice();
                    closeAsignacionesDeleteModal();
                    pendingAsignacionesDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function(id) { idSet[String(id)] = true; });
                    asignacionesData = asignacionesData.filter(function(a) { return !idSet[String(a.id)]; });
                    if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                    bindAsignacionesRowsAfterRefresh();
                    if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' asignación(es) eliminada(s) correctamente');
                });
            }

            // ========== Drawer Agregar competencias ==========
            function escapeDrawerHtml(t) {
                if (t == null) return '';
                return String(t).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            function getDrawerCursosBodyHtml() {
                return '<div class="drawer-agregar-cursos drawer-agregar-cursos--single-col">' +
                    '<div class="drawer-agregar-cursos__left">' +
                    '  <span class="drawer-agregar-cursos__section-title ubits-body-sm-semibold">Buscar y agregar competencias</span>' +
                    '  <div class="drawer-cursos-search-row">' +
                    '    <div id="drawer-cursos-search-container" class="drawer-cursos-search-input-wrap"></div>' +
                    '  </div>' +
                    '  <div class="drawer-cursos-resultados-bg drawer-cursos-resultados-bg--dos-columnas">' +
                    '    <div id="drawer-competencias-empty-search" class="drawer-competencias-empty-search-wrap" style="display:none;"></div>' +
                    '    <div class="drawer-competencias-cards-grid" id="drawer-cursos-cards-container"></div>' +
                    '  </div>' +
                    '</div>' +
                    '</div>';
            }

            function abrirDrawerAgregarCursos(tr) {
                pendingCursosRow = tr;
                var cursosSeleccionados = [];
                var asignacionId = tr ? (tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id')) : null;
                var item = asignacionId ? asignacionesData.find(function(a) { return a.id === asignacionId; }) : null;
                if (item && item.contenidos && item.contenidos.length) {
                    cursosSeleccionados = item.contenidos.map(function(c) {
                        return { id: c.id, title: c.title || c.id, habilidades: (c.habilidades || []).slice(), habilidadesDesactivadas: [] };
                    });
                }
                window._drawerCursosSeleccionados = cursosSeleccionados;
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" onclick="cerrarDrawerCursos()"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" onclick="cerrarDrawerCursosYAplicar()"><span class="ubits-body-sm-regular">Agregar</span></button>';

                openDrawer({
                    overlayId: 'drawer-agregar-cursos',
                    title: 'Agregar competencias',
                    bodyHtml: getDrawerCursosBodyHtml(),
                    footerHtml: footerHtml,
                    size: 'lg',
                    onClose: function() {
                        pendingCursosRow = null;
                    }
                });

                var overlay = document.getElementById('drawer-agregar-cursos');
                if (!overlay) return;

                if (typeof createInput === 'function') {
                    createInput({
                        containerId: 'drawer-cursos-search-container',
                        type: 'search',
                        placeholder: 'Buscar competencias...',
                        size: 'sm',
                        showLabel: false
                    });
                }
                var searchContainer = overlay.querySelector('#drawer-cursos-search-container');
                var searchInput = searchContainer ? searchContainer.querySelector('input') : null;
                var cardsContainer = overlay.querySelector('#drawer-cursos-cards-container');
                var emptySearchContainer = overlay.querySelector('#drawer-competencias-empty-search');
                var imageBase = '../../images/imagenes competencias/';

                function getFiltradosDrawerCompetencias() {
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim().toLowerCase() : '';
                    if (!q) return catalogoCompetencias.slice();
                    return catalogoCompetencias.filter(function(comp) {
                        if (comp.nombre && comp.nombre.toLowerCase().includes(q)) return true;
                        if (comp.academia && comp.academia.toLowerCase().includes(q)) return true;
                        if (comp.habilidades && comp.habilidades.some(function(h) { return h.toLowerCase().includes(q); })) return true;
                        return false;
                    });
                }

                function buildCardHtml(comp, isSelected) {
                    var imgName = competenciaImageMap[comp.nombre] || 'Accountability.jpg';
                    var imgPath = imageBase + imgName;
                    var selectedItem = cursosSeleccionados.find(function(x) { return x.id === comp.id; });
                    var isExpanded = !!selectedItem;
                    var desactivadas = (selectedItem && selectedItem.habilidadesDesactivadas) ? selectedItem.habilidadesDesactivadas.slice() : [];
                    var baseHabilidades = (selectedItem && selectedItem.habilidades && selectedItem.habilidades.length) ? selectedItem.habilidades.slice() : (comp.habilidades || []).slice();
                    var checkedList = baseHabilidades.filter(function(h) { return desactivadas.indexOf(h) === -1; });
                    var uncheckedList = desactivadas.slice();
                    var habilidadesOrder = checkedList.concat(uncheckedList);
                    var habilidadesHtml = habilidadesOrder.map(function(h, idx) {
                        var icon = habilidadIconMap[h] || 'fa-circle';
                        var isUnchecked = desactivadas.indexOf(h) !== -1;
                        var rowClass = 'drawer-habilidad-row drawer-habilidad-row--draggable' + (isUnchecked ? ' drawer-habilidad-row--unchecked' : '');
                        var checkChecked = isUnchecked ? '' : ' checked';
                        return '<div class="' + rowClass + '" draggable="' + (isUnchecked ? 'false' : 'true') + '" data-competencia-id="' + escapeDrawerHtml(comp.id) + '" data-habilidad="' + escapeDrawerHtml(h) + '" data-skill-index="' + idx + '" role="button">' +
                            '<span class="drawer-habilidad-drag" aria-hidden="true"><i class="fas fa-grip-vertical"></i></span>' +
                            '<i class="far ' + icon + ' drawer-habilidad-icon"></i>' +
                            '<span class="ubits-body-sm-regular drawer-habilidad-title">' + escapeDrawerHtml(h) + '</span>' +
                            '<label class="ubits-checkbox ubits-checkbox--sm drawer-habilidad-check-wrap" onclick="event.stopPropagation();"><input type="checkbox" class="ubits-checkbox__input drawer-habilidad-check" data-habilidad="' + escapeDrawerHtml(h) + '"' + checkChecked + '><span class="ubits-checkbox__box"><i class="far fa-check"></i></span><span class="ubits-checkbox__label" aria-hidden="true"></span></label></div>';
                    }).join('');
                    var cardClass = 'drawer-competencia-card competencia-card-v1' + (isSelected ? ' drawer-competencia-card--selected' : '') + (isExpanded ? ' expanded' : '');
                    var checkChecked = isSelected ? ' checked' : '';
                    return '<div class="drawer-competencia-card-wrapper">' +
                        '<div class="' + cardClass + '" data-competencia-id="' + escapeDrawerHtml(comp.id) + '" role="button" tabindex="0">' +
                        '<img src="' + escapeDrawerHtml(imgPath) + '" alt="" class="competencia-card-v1-image" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400&h=300&fit=crop\'">' +
                        '<div class="competencia-card-v1-content">' +
                        '<p class="ubits-body-sm-semibold competencia-card-v1-title"><span class="competencia-card-v1-title-text">' + escapeDrawerHtml(comp.nombre) + '</span></p>' +
                        '<p class="ubits-body-xs-regular competencia-card-v1-count">' + (comp.habilidades ? comp.habilidades.length : 0) + ' habilidades</p>' +
                        '</div>' +
                        '<span class="drawer-competencia-card-check">' +
                        '<label class="ubits-checkbox ubits-checkbox--sm drawer-competencia-card-checkbox">' +
                        '<input type="checkbox" class="ubits-checkbox__input" tabindex="-1"' + checkChecked + '>' +
                        '<span class="ubits-checkbox__box"><i class="far fa-check"></i></span>' +
                        '</label></span>' +
                        '</div>' +
                        '<div class="competencia-habilidades-container drawer-competencias-habilidades' + (isExpanded ? ' is-visible' : '') + '" data-competencia-id="' + escapeDrawerHtml(comp.id) + '">' +
                        '<p class="ubits-body-sm-regular drawer-habilidades-copy">Estas son las habilidades de esta competencia. Ordénalas por prioridad para tu equipo.</p>' +
                        '<div class="competencias-habilidades-grid">' + habilidadesHtml + '</div>' +
                        '</div></div>';
                }

                function filtrarYRenderizarCards() {
                    if (!cardsContainer) return;
                    var filtrados = getFiltradosDrawerCompetencias();
                    var q = (searchInput && searchInput.value) ? searchInput.value.trim() : '';
                    if (q && filtrados.length === 0) {
                        if (emptySearchContainer) {
                            emptySearchContainer.style.display = 'block';
                            emptySearchContainer.innerHTML = '';
                            if (typeof loadEmptyState === 'function') {
                                loadEmptyState('drawer-competencias-empty-search', {
                                    icon: 'fa-search',
                                    iconSize: 'lg',
                                    title: 'No se encontraron resultados',
                                    description: 'Intenta ajustar tu búsqueda.',
                                    buttons: {
                                        secondary: {
                                            text: 'Limpiar búsqueda',
                                            icon: 'fa-times',
                                            onClick: function() {}
                                        }
                                    }
                                });
                                setTimeout(function() {
                                    var btn = emptySearchContainer.querySelector('.ubits-button--secondary');
                                    if (btn) {
                                        btn.onclick = function(e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (searchInput) {
                                                searchInput.value = '';
                                                searchInput.dispatchEvent(new Event('input'));
                                            }
                                            filtrarYRenderizarCards();
                                        };
                                    }
                                }, 50);
                            }
                        }
                        cardsContainer.style.display = 'none';
                        return;
                    }
                    if (emptySearchContainer) {
                        emptySearchContainer.style.display = 'none';
                        emptySearchContainer.innerHTML = '';
                    }
                    cardsContainer.style.display = '';
                    var columns = [[], [], []];
                    filtrados.forEach(function(comp, i) { columns[i % 3].push(comp); });
                    var gridHtml = '<div class="drawer-competencias-grid-v1">' + columns.map(function(col) {
                        return '<div class="drawer-competencias-column">' + col.map(function(comp) {
                            var isSelected = cursosSeleccionados.some(function(x) { return x.id === comp.id; });
                            return buildCardHtml(comp, isSelected);
                        }).join('') + '</div>';
                    }).join('') + '</div>';
                    cardsContainer.innerHTML = gridHtml;
                    cardsContainer.querySelectorAll('.drawer-competencia-card').forEach(function(cardEl) {
                        cardEl.addEventListener('click', function(e) {
                            if (e.target.closest('.drawer-competencia-card-check')) e.preventDefault();
                            var id = cardEl.getAttribute('data-competencia-id');
                            var comp = catalogoCompetencias.find(function(c) { return c.id === id; });
                            if (!comp) return;
                            var idx = cursosSeleccionados.findIndex(function(x) { return x.id === id; });
                            if (idx !== -1) {
                                cursosSeleccionados.splice(idx, 1);
                            } else {
                                cursosSeleccionados.push({ id: comp.id, title: comp.nombre, habilidades: (comp.habilidades || []).slice(), habilidadesDesactivadas: [] });
                            }
                            filtrarYRenderizarCards();
                        });
                    });
                    cardsContainer.querySelectorAll('.drawer-habilidad-row--draggable').forEach(function(rowEl) {
                        rowEl.addEventListener('dragstart', function(e) {
                            e.dataTransfer.setData('text/plain', rowEl.getAttribute('data-competencia-id') + '|' + rowEl.getAttribute('data-skill-index'));
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        rowEl.addEventListener('dragover', function(e) {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                        });
                        rowEl.addEventListener('drop', function(e) {
                            e.preventDefault();
                            var data = (e.dataTransfer.getData('text/plain') || '').split('|');
                            var compId = data[0];
                            var fromIdx = parseInt(data[1], 10);
                            var toRow = e.currentTarget;
                            var toIdx = parseInt(toRow.getAttribute('data-skill-index'), 10);
                            if (compId !== toRow.getAttribute('data-competencia-id') || isNaN(fromIdx) || isNaN(toIdx) || fromIdx === toIdx) return;
                            var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                            if (!sel || !sel.habilidades || sel.habilidades.length === 0) return;
                            var desactivadas = sel.habilidadesDesactivadas || [];
                            var checkedList = sel.habilidades.filter(function(h) { return desactivadas.indexOf(h) === -1; });
                            var uncheckedList = desactivadas.slice();
                            var order = checkedList.concat(uncheckedList);
                            var item = order.splice(fromIdx, 1)[0];
                            order.splice(toIdx, 0, item);
                            sel.habilidades = order.slice();
                            sel.habilidadesDesactivadas = order.filter(function(h) { return desactivadas.indexOf(h) !== -1; });
                            filtrarYRenderizarCards();
                        });
                    });
                    cardsContainer.querySelectorAll('.drawer-habilidad-check').forEach(function(chk) {
                        chk.addEventListener('change', function(e) {
                            e.stopPropagation();
                            var row = chk.closest('.drawer-habilidad-row');
                            if (!row) return;
                            var compId = row.getAttribute('data-competencia-id');
                            var habilidad = chk.getAttribute('data-habilidad');
                            var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                            if (!sel) return;
                            sel.habilidadesDesactivadas = sel.habilidadesDesactivadas || [];
                            var desactivadas = sel.habilidadesDesactivadas;
                            var isNowChecked = chk.checked;
                            if (isNowChecked) {
                                var idx = desactivadas.indexOf(habilidad);
                                if (idx !== -1) desactivadas.splice(idx, 1);
                                var idxInH = sel.habilidades.indexOf(habilidad);
                                if (idxInH !== -1) sel.habilidades.splice(idxInH, 1);
                                var insertAt = sel.habilidades.length - desactivadas.length;
                                sel.habilidades.splice(insertAt, 0, habilidad);
                            } else {
                                desactivadas.push(habilidad);
                                var idxInH = sel.habilidades.indexOf(habilidad);
                                if (idxInH !== -1) sel.habilidades.splice(idxInH, 1);
                                sel.habilidades.push(habilidad);
                            }
                            row.classList.toggle('drawer-habilidad-row--unchecked', !isNowChecked);
                            row.draggable = isNowChecked;
                            var grid = row.closest('.competencias-habilidades-grid');
                            if (grid) reorderHabilidadesGridWithAnimation(grid, compId);
                        });
                    });
                }
                function reorderHabilidadesGridWithAnimation(grid, compId) {
                    var sel = cursosSeleccionados.find(function(x) { return x.id === compId; });
                    if (!sel || !sel.habilidades) return;
                    var rows = [].slice.call(grid.children);
                    if (rows.length === 0) return;
                    var order = sel.habilidades.slice();
                    var oldRects = rows.map(function(r) { return r.getBoundingClientRect(); });
                    rows.sort(function(a, b) {
                        var ai = order.indexOf(a.getAttribute('data-habilidad'));
                        var bi = order.indexOf(b.getAttribute('data-habilidad'));
                        return ai - bi;
                    });
                    rows.forEach(function(r) { grid.appendChild(r); });
                    grid.offsetHeight;
                    var newRects = rows.map(function(r) { return r.getBoundingClientRect(); });
                    rows.forEach(function(r, i) {
                        var oldR = oldRects[i];
                        var newR = newRects[i];
                        if (!oldR || !newR) return;
                        r.style.transition = 'none';
                        r.style.transform = 'translate(' + (oldR.left - newR.left) + 'px,' + (oldR.top - newR.top) + 'px)';
                    });
                    requestAnimationFrame(function() {
                        rows.forEach(function(r) {
                            r.style.transition = 'transform 0.22s ease-out';
                            r.style.transform = '';
                        });
                        requestAnimationFrame(function() {
                            setTimeout(function() {
                                rows.forEach(function(r) { r.style.transition = ''; });
                            }, 230);
                        });
                    });
                }

                if (searchInput) {
                    searchInput.addEventListener('input', function() { filtrarYRenderizarCards(); });
                    searchInput.addEventListener('keyup', function() { filtrarYRenderizarCards(); });
                }
                var searchClearBtn = searchContainer ? searchContainer.querySelector('i[class*="fa-times"]') : null;
                if (searchClearBtn) {
                    searchClearBtn.addEventListener('click', function() {
                        setTimeout(function() { filtrarYRenderizarCards(); }, 0);
                    });
                }

                filtrarYRenderizarCards();
            }

            function cerrarDrawerCursos() {
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                pendingCursosRow = null;
            }
            window.cerrarDrawerCursos = cerrarDrawerCursos;

            function cerrarDrawerCursosYAplicar() {
                var raw = (window._drawerCursosSeleccionados || []).slice();
                window._drawerCursosSeleccionados = null;
                var cursosSeleccionados = raw.map(function(c) {
                    var desactivadas = c.habilidadesDesactivadas || [];
                    return { id: c.id, title: c.title || c.id, habilidades: (c.habilidades || []).filter(function(h) { return desactivadas.indexOf(h) === -1; }) };
                });
                if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-cursos');
                if (pendingCursosRow) {
                    aplicarCursosAAsignacion(pendingCursosRow, cursosSeleccionados);
                    pendingCursosRow = null;
                }
            }
            window.cerrarDrawerCursosYAplicar = cerrarDrawerCursosYAplicar;

            function aplicarCursosAAsignacion(tr, cursosSeleccionados) {
                if (!tr) return;
                var list = Array.isArray(cursosSeleccionados) ? cursosSeleccionados : [];
                var id = tr.getAttribute('data-id') || tr.getAttribute('data-asignacion-id');
                var item = asignacionesData.find(function(a) { return a.id === id; });
                if (item) {
                    item.contenidosCount = list.length;
                    item.contenidos = list.slice();
                }
                if (asignacionesTablaRef && typeof asignacionesTablaRef.refresh === 'function') asignacionesTablaRef.refresh();
                bindAsignacionesRowsAfterRefresh();
                if (typeof updateGuardarButtonState === 'function') updateGuardarButtonState();
            }
        });
    </script>
</body>
</html>
