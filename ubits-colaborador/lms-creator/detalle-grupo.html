<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - LMS Creator - Detalle del grupo</title>
    
    <!-- Estilos locales -->
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/ia-button.css">
    <link rel="stylesheet" href="../../components/header-product.css">
    <link rel="stylesheet" href="../../components/avatar.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../components/input.css">
    <link rel="stylesheet" href="../../components/table.css">
    <link rel="stylesheet" href="../../components/checkbox.css">
    <link rel="stylesheet" href="../../components/empty-state.css">
    <link rel="stylesheet" href="../../components/ubits-data-table.css">
    <link rel="stylesheet" href="../../components/dropdown-menu.css">
    <link rel="stylesheet" href="../../components/drawer.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="./lms-creator.css">
    <link rel="stylesheet" href="./crear-grupo.css">
    <link rel="stylesheet" href="./detalle-grupo.css">
</head>
<body data-theme="light" class="page-detalle-grupo">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>
                    <div class="section-single">
                        <div class="widget-crear-grupo">
                        <div class="crear-grupo-form">
                            <div class="crear-grupo-form__field crear-grupo-form__field--nombre">
                                <textarea class="task-detail-title-editable ubits-heading-h1" id="detalle-grupo-nombre" placeholder="Nombre del grupo" rows="1" maxlength="250"></textarea>
                            </div>
                            <div class="crear-grupo-form__field crear-grupo-form__field--desc">
                                <textarea class="task-detail-desc-editable ubits-body-sm-regular" id="detalle-grupo-descripcion" placeholder="Descripción del grupo" rows="1"></textarea>
                            </div>
                        </div>
                        </div>
                    </div>
                    <div class="section-single">
                        <div class="widget-grupos-lista">
                            <div id="detalle-grupo-integrantes-data-table-container" class="crear-grupo-integrantes-tabla"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../bd-master/bd-tareas-y-planes.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/empty-state.js"></script>
    <script src="../../components/ubits-data-table.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/drawer.js"></script>
    <script src="../../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator', 'planes-formacion');
            loadSubNav('top-nav-container', 'creator-planes');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            var gruposData = [
                { id: 'g-ventas', nombre: 'Ventas', descripcion: 'Asesoría comercial y cierre de negocios', integrantes: 7 },
                { id: 'g-instalaciones', nombre: 'Instalaciones', descripcion: 'Instalación de productos en sitio', integrantes: 9 },
                { id: 'g-reparaciones', nombre: 'Reparaciones', descripcion: 'Servicio técnico y mantenimiento', integrantes: 6 },
                { id: 'g-atencion', nombre: 'Atención al Cliente', descripcion: 'Soporte y seguimiento postventa', integrantes: 7 },
                { id: 'g-logistica', nombre: 'Logística', descripcion: 'Bodega, inventarios y entregas', integrantes: 4 },
                { id: 'g-admin', nombre: 'Administración', descripcion: 'Gestión administrativa y financiera', integrantes: 5 },
                { id: 'g-marketing', nombre: 'Marketing', descripcion: 'Publicidad, diseño y redes sociales', integrantes: 4 },
                { id: 'g-rrhh', nombre: 'Recursos Humanos', descripcion: 'Gestión de personas, objetivos, encuestas y nómina', integrantes: 3 },
                { id: 'g-lideres', nombre: 'Líderes', descripcion: 'Jefes y coordinadores de cada departamento', integrantes: 10 },
                { id: 'g-operativo', nombre: 'Personal operativo', descripcion: 'Colaboradores que reportan a un líder', integrantes: 41 }
            ];

            function getUsernameEmpleado(e) {
                if (e.username) return e.username;
                var palabras = (e.nombre || '').toLowerCase().split(' ').filter(function(p) { return p.length > 0; });
                var iniciales = palabras.map(function(p) { return p.charAt(0); }).join('');
                return iniciales ? iniciales + '@fiqsha.demo' : 'user@fiqsha.demo';
            }

            function getIntegrantesPorGrupo(grupoId) {
                var empleados = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
                var areaPorGrupo = {
                    'g-ventas': 'Ventas',
                    'g-instalaciones': 'Instalaciones',
                    'g-reparaciones': 'Reparaciones',
                    'g-atencion': 'Atención al Cliente',
                    'g-logistica': 'Logística',
                    'g-admin': 'Administración',
                    'g-marketing': 'Marketing',
                    'g-rrhh': 'Recursos Humanos'
                };
                if (grupoId === 'g-lideres') {
                    return empleados.filter(function(e) { return e.esJefe === true; }).map(function(e) {
                        return { id: e.id || e.idColaborador, nombre: e.nombre || '', correo: getUsernameEmpleado(e), area: e.area || '', avatar: e.avatar || null };
                    });
                }
                if (grupoId === 'g-operativo') {
                    return empleados.filter(function(e) { return e.esJefe === false; }).map(function(e) {
                        return { id: e.id || e.idColaborador, nombre: e.nombre || '', correo: getUsernameEmpleado(e), area: e.area || '', avatar: e.avatar || null };
                    });
                }
                var area = areaPorGrupo[grupoId];
                if (!area) return [];
                return empleados.filter(function(e) { return (e.area || '') === area; }).map(function(e) {
                    return { id: e.id || e.idColaborador, nombre: e.nombre || '', correo: getUsernameEmpleado(e), area: e.area || '', avatar: e.avatar || null };
                });
            }

            var grupoId = (function() {
                var params = new URLSearchParams(window.location.search);
                return params.get('id') || '';
            })();
            /* Sin id o id no válido: mostrar datos de ejemplo (como task-detail.html) */
            var grupoEncontrado = gruposData.filter(function(g) { return g.id === grupoId; })[0];
            var grupo = grupoEncontrado || gruposData[0];
            if (!grupoEncontrado && grupo) grupoId = grupo.id;
            var integrantesData = grupoId ? getIntegrantesPorGrupo(grupoId) : [];
            var integrantesTablaRef = null;

            function escapeHtmlDetalle(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }
            function buildIntegranteRowHtml(row) {
                var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                    (avatarUrl
                        ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeHtmlDetalle(row.nombre) + '" class="ubits-avatar__img"></span>'
                        : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                    '<span class="ubits-body-sm-regular">' + escapeHtmlDetalle(row.nombre) + '</span></div>';
                return '<td data-col="nombre">' + usuarioCell + '</td>' +
                    '<td data-col="correo"><span class="ubits-body-sm-regular">' + escapeHtmlDetalle(row.correo) + '</span></td>' +
                    '<td data-col="area"><span class="ubits-body-sm-regular">' + escapeHtmlDetalle(row.area || '') + '</span></td>';
            }

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Detalle del grupo',
                    breadcrumbItems: [],
                    backButton: {
                        text: 'Volver',
                        onClick: function() { window.location.href = 'grupos.html'; }
                    },
                    secondaryButtons: [
                        {
                            text: 'Guardar',
                            icon: 'fa-floppy-disk',
                            onClick: function() {
                                if (typeof showToast === 'function') showToast('success', 'Cambios guardados correctamente', { containerId: 'ubits-toast-container' });
                                window.location.href = 'grupos.html';
                            }
                        }
                    ]
                });
            }

            var nombreEl = document.getElementById('detalle-grupo-nombre');
            var descEl = document.getElementById('detalle-grupo-descripcion');
            if (grupo) {
                if (nombreEl) nombreEl.value = grupo.nombre || '';
                if (descEl) descEl.value = grupo.descripcion || '';
            }

            function updateIntegrantesPrimaryButton() {
                var cont = document.getElementById('detalle-grupo-integrantes-data-table-container');
                if (!cont) return;
                var btn = cont.querySelector('.ubits-dt-primary-btn');
                if (!btn) return;
                var isGestionar = integrantesData.length > 0;
                if (isGestionar) {
                    btn.innerHTML = '<i class="far fa-pen"></i><span>Gestionar integrantes</span>';
                } else {
                    btn.innerHTML = '<i class="far fa-plus"></i><span>Agregar integrantes</span>';
                }
            }

            function abrirDrawerAgregarIntegrantes() {
                var isDrawerGestionar = integrantesData.length > 0;
                var tituloDrawer = isDrawerGestionar ? 'Gestionar integrantes' : 'Agregar integrantes';
                var labelFooter = isDrawerGestionar ? 'Guardar' : 'Agregar';
                var bodyHtml = '<div class="drawer-usuarios-panel drawer-usuarios-panel--colaborador" style="display:block">' +
                    '<div id="drawer-integrantes-colab-data-table-container" class="drawer-colab-dt-wrapper"></div>' +
                    '</div>';
                var footerHtml = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="drawer-integrantes-cancel"><span class="ubits-body-sm-regular">Cancelar</span></button>' +
                    '<button type="button" class="ubits-button ubits-button--primary ubits-button--md" id="drawer-integrantes-agregar"><span class="ubits-body-sm-regular">' + labelFooter + '</span></button>';
                if (typeof openDrawer === 'function') {
                    var overlay = openDrawer({
                        overlayId: 'drawer-agregar-integrantes',
                        title: tituloDrawer,
                        bodyHtml: bodyHtml,
                        footerHtml: footerHtml,
                        size: 'lg',
                        onClose: function() {}
                    });
                    initDrawerAgregarIntegrantes(overlay, isDrawerGestionar);
                }
            }

            function initDrawerAgregarIntegrantes(overlay, isGestionar) {
                if (!overlay) return;
                var initialSelectedIds = isGestionar ? integrantesData.map(function(i) { return i.id; }) : [];
                var empleadosDrawerRaw = (typeof TAREAS_PLANES_DB !== 'undefined' && typeof TAREAS_PLANES_DB.getEmpleadosEjemplo === 'function') ? TAREAS_PLANES_DB.getEmpleadosEjemplo() : [];
                var empleadosDrawer = empleadosDrawerRaw.map(function(e, idx) {
                    var id = e.id || e.idColaborador || ('E' + (idx + 1));
                    return { id: id, username: getUsernameEmpleado(e), nombre: (e.nombre || '').trim(), correo: getUsernameEmpleado(e), area: (e.area || '').trim(), lider: (e.jefe || '').trim(), avatar: e.avatar || null };
                });
                overlay._empleadosDrawer = empleadosDrawer;
                overlay._isGestionar = isGestionar;
                var container = overlay.querySelector('#drawer-integrantes-colab-data-table-container');
                if (container && typeof createUbitsDataTable === 'function') {
                    function escapeDrawerHtml(t) { if (t == null) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
                    function buildDrawerColabRowHtml(row) {
                        var avatarUrl = (row.avatar && String(row.avatar).trim()) ? String(row.avatar).replace(/"/g, '&quot;') : '';
                        var usuarioCell = '<div class="detalle-plan-usuario-cell">' +
                            (avatarUrl
                                ? '<span class="ubits-avatar ubits-avatar--sm"><img src="' + avatarUrl + '" alt="' + escapeDrawerHtml(row.nombre) + '" class="ubits-avatar__img"></span>'
                                : '<span class="ubits-avatar ubits-avatar--sm"><span class="ubits-avatar__fallback"><i class="far fa-user"></i></span></span>') +
                            '<span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.nombre) + '</span></div>';
                        return '<td data-col="username"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.username) + '</span></td>' +
                            '<td data-col="nombre">' + usuarioCell + '</td>' +
                            '<td data-col="correo"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.correo) + '</span></td>' +
                            '<td data-col="area"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.area) + '</span></td>' +
                            '<td data-col="lider"><span class="ubits-body-sm-regular">' + escapeDrawerHtml(row.lider) + '</span></td>';
                    }
                    var drawerTablaRef = createUbitsDataTable({
                        containerId: 'drawer-integrantes-colab-data-table-container',
                        tableId: 'drawer-integrantes-colab-table',
                        title: 'Lista de colaboradores',
                        columns: [
                            { id: 'username', label: 'Username', filterable: true },
                            { id: 'nombre', label: 'Nombre del usuario', filterable: true },
                            { id: 'correo', label: 'Correo electrónico', filterable: true },
                            { id: 'area', label: 'Área', filterable: true },
                            { id: 'lider', label: 'Líder', filterable: true }
                        ],
                        getData: function() { return empleadosDrawer; },
                        rowIdField: 'id',
                        buildRowHtml: buildDrawerColabRowHtml,
                        features: { checkboxes: true, search: true, filters: true, verSeleccionados: true, resultsCount: true },
                        initialSelectedIds: initialSelectedIds,
                        emptyState: { message: 'No hay colaboradores', icon: 'far fa-user' },
                        emptySearchState: { message: 'No se encontraron resultados', description: 'Intenta ajustar tu búsqueda.', buttonText: 'Limpiar búsqueda' },
                        i18n: { selectAll: 'Seleccionar todo', deselectAll: 'Deseleccionar todo', verSeleccionados: 'Ver seleccionados', buscar: 'Buscar' }
                    });
                    overlay._drawerIntegrantesTablaRef = drawerTablaRef;
                }
                overlay.querySelector('#drawer-integrantes-cancel').addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-integrantes');
                });
                overlay.querySelector('#drawer-integrantes-agregar').addEventListener('click', function() {
                    var ref = overlay._drawerIntegrantesTablaRef;
                    var empleados = overlay._empleadosDrawer || [];
                    var mapById = {};
                    empleados.forEach(function(e) { mapById[e.id] = e; });
                    if (ref && typeof ref.getSelectedIds === 'function') {
                        var ids = ref.getSelectedIds();
                        if (overlay._isGestionar) {
                            integrantesData.length = 0;
                            ids.forEach(function(id) {
                                var e = mapById[id];
                                if (e) integrantesData.push({ id: e.id, nombre: e.nombre, correo: e.correo, area: e.area || '', avatar: e.avatar || null });
                            });
                        } else {
                            ids.forEach(function(id) {
                                var e = mapById[id];
                                if (e && !integrantesData.some(function(i) { return i.id === e.id || (i.correo === e.correo && i.nombre === e.nombre); })) {
                                    integrantesData.push({ id: e.id, nombre: e.nombre, correo: e.correo, area: e.area || '', avatar: e.avatar || null });
                                }
                            });
                        }
                    }
                    if (integrantesTablaRef && typeof integrantesTablaRef.refresh === 'function') integrantesTablaRef.refresh();
                    updateIntegrantesPrimaryButton();
                    if (typeof closeDrawer === 'function') closeDrawer('drawer-agregar-integrantes');
                });
                if (container) container.style.flexDirection = 'column';
            }

            if (typeof createUbitsDataTable === 'function') {
                integrantesTablaRef = createUbitsDataTable({
                    containerId: 'detalle-grupo-integrantes-data-table-container',
                    tableId: 'detalle-grupo-integrantes-table',
                    title: 'Lista de integrantes',
                    columns: [
                        { id: 'nombre', label: 'Nombre del usuario', sortable: true },
                        { id: 'correo', label: 'Correo', sortable: true },
                        { id: 'area', label: 'Área', sortable: true }
                    ],
                    getData: function() { return integrantesData; },
                    rowIdField: 'id',
                    buildRowHtml: buildIntegranteRowHtml,
                    features: { checkboxes: false, search: true, resultsCount: true },
                    emptyState: {
                        message: 'No hay integrantes en este grupo',
                        icon: 'far fa-user-plus',
                        description: 'Agrega personas al grupo para gestionar su acceso y permisos.'
                    },
                    emptySearchState: { message: 'No se encontraron resultados', description: 'Intenta ajustar tu búsqueda.', buttonText: 'Limpiar búsqueda' },
                    primaryButton: {
                        text: 'Agregar integrantes',
                        icon: 'fa-plus',
                        onClick: function() { abrirDrawerAgregarIntegrantes(); }
                    }
                });
                updateIntegrantesPrimaryButton();
            }

            setTimeout(function() {
                var nombreTa = document.getElementById('detalle-grupo-nombre');
                if (nombreTa) {
                    nombreTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
                    });
                }
                var descTa = document.getElementById('detalle-grupo-descripcion');
                if (descTa) {
                    descTa.addEventListener('input', function() {
                        this.style.height = 'auto';
                        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                    });
                }
            }, 0);

            setTimeout(function() {
                if (typeof setActiveAccordionLink === 'function') setActiveAccordionLink('grupos');
            }, 200);
        });
    </script>
</body>
</html>
