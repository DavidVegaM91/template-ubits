<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../../images/playground-favicon.svg">
    <title>UBITS Playground - LMS Creator - Descarga</title>

    <link rel="stylesheet" href="../../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../../general-styles/styles.css">
    <link rel="stylesheet" href="../../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../../components/sub-nav.css">
    <link rel="stylesheet" href="../../../components/sidebar.css">
    <link rel="stylesheet" href="../../../components/tab-bar.css">
    <link rel="stylesheet" href="../../../components/floating-menu.css">
    <link rel="stylesheet" href="../../../components/profile-menu.css">
    <link rel="stylesheet" href="../../../components/button.css">
    <link rel="stylesheet" href="../../../components/radio-button.css">
    <link rel="stylesheet" href="../../../components/selection-card.css">
    <link rel="stylesheet" href="../../../components/input.css">
    <link rel="stylesheet" href="../../../components/dropdown-menu.css">
    <link rel="stylesheet" href="../../../components/calendar.css">
    <link rel="stylesheet" href="../../../components/switch.css">
    <link rel="stylesheet" href="../../../components/modal.css">
    <link rel="stylesheet" href="../../../components/toast.css">
    <link rel="stylesheet" href="../../../components/alert.css">
    <link rel="stylesheet" href="../../../components/tooltip.css">
    <link rel="stylesheet" href="../lms-creator.css">
    <link rel="stylesheet" href="./certificados.css">
</head>
<body data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>

        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget--transparent certificados-widget">
                            <div class="certificados-flow" id="certificados-flow">
                                <div class="ubits-selection-card-group ubits-selection-card-group--3 certificados-mode-cards" role="radiogroup" aria-label="Tipo de descarga de certificados">
                                    <label class="ubits-selection-card ubits-radio ubits-radio--md certificados-mode-card" data-cert-mode="global">
                                        <input type="radio" class="ubits-radio__input" name="certificados-modo" value="global" checked />
                                        <span class="ubits-radio__circle" aria-hidden="true"></span>
                                        <div class="ubits-selection-card__body">
                                            <div class="ubits-selection-card__header">
                                                <span class="ubits-selection-card__icon" aria-hidden="true"><i class="far fa-rectangle-history"></i></span>
                                                <span class="ubits-body-md-semibold ubits-selection-card__title">Descarga global</span>
                                            </div>
                                            <p class="ubits-body-sm-regular ubits-selection-card__desc">Todos los certificados emitidos dentro del rango de fechas seleccionado.</p>
                                        </div>
                                    </label>
                                    <label class="ubits-selection-card ubits-radio ubits-radio--md certificados-mode-card" data-cert-mode="contenido">
                                        <input type="radio" class="ubits-radio__input" name="certificados-modo" value="contenido" />
                                        <span class="ubits-radio__circle" aria-hidden="true"></span>
                                        <div class="ubits-selection-card__body">
                                            <div class="ubits-selection-card__header">
                                                <span class="ubits-selection-card__icon" aria-hidden="true"><i class="far fa-book-open"></i></span>
                                                <span class="ubits-body-md-semibold ubits-selection-card__title">Descarga por contenido</span>
                                            </div>
                                            <p class="ubits-body-sm-regular ubits-selection-card__desc">Todos los certificados emitidos para el contenido seleccionado dentro de un rango de fechas.</p>
                                        </div>
                                    </label>
                                    <label class="ubits-selection-card ubits-radio ubits-radio--md certificados-mode-card" data-cert-mode="colaborador">
                                        <input type="radio" class="ubits-radio__input" name="certificados-modo" value="colaborador" />
                                        <span class="ubits-radio__circle" aria-hidden="true"></span>
                                        <div class="ubits-selection-card__body">
                                            <div class="ubits-selection-card__header">
                                                <span class="ubits-selection-card__icon" aria-hidden="true"><i class="far fa-user"></i></span>
                                                <span class="ubits-body-md-semibold ubits-selection-card__title">Descarga por colaborador</span>
                                            </div>
                                            <p class="ubits-body-sm-regular ubits-selection-card__desc">Todos los certificados emitidos para el colaborador seleccionado dentro de un rango de fechas.</p>
                                        </div>
                                    </label>
                                </div>

                                <div class="certificados-form-card" id="certificados-form-card">
                                    <p class="ubits-body-sm-regular certificados-form-hint" id="certificados-form-hint">
                                        Al finalizar el proceso, recibirás en tu correo un archivo .zip con los certificados.
                                    </p>

                                    <div class="certificados-form-field certificados-form-field--full" id="certificados-field-contenido-wrap" hidden>
                                        <div id="certificados-input-contenido"></div>
                                    </div>

                                    <div class="certificados-form-field certificados-form-field--full" id="certificados-field-colaborador-wrap" hidden>
                                        <div id="certificados-input-colaborador"></div>
                                    </div>

                                    <div class="certificados-form-field certificados-form-field--full" id="certificados-field-tipo-contenidos-wrap" hidden>
                                        <div id="certificados-input-tipo-contenidos"></div>
                                    </div>

                                    <div class="certificados-form-row">
                                        <div class="certificados-form-field">
                                            <div id="certificados-input-fecha-inicial"></div>
                                        </div>
                                        <div class="certificados-form-field">
                                            <div id="certificados-input-fecha-final"></div>
                                        </div>
                                    </div>

                                    <div class="certificados-form-row">
                                        <div class="certificados-form-field">
                                            <div id="certificados-input-email"></div>
                                        </div>
                                        <div class="certificados-form-field">
                                            <div id="certificados-input-email-confirm"></div>
                                        </div>
                                    </div>

                                    <label class="ubits-switch ubits-switch--md certificados-form-toggle" for="certificados-toggle-inactivos">
                                        <input type="checkbox" class="ubits-switch__input" id="certificados-toggle-inactivos" role="switch" />
                                        <span class="ubits-switch__track" aria-hidden="true"><span class="ubits-switch__thumb"></span></span>
                                        <span class="ubits-switch__label ubits-body-md-regular">Incluir usuarios inactivos</span>
                                    </label>

                                    <div id="certificados-alert-mount" class="certificados-alert-mount" hidden aria-live="polite"></div>

                                    <button type="button" class="ubits-button ubits-button--primary ubits-button--md certificados-form-submit" id="certificados-btn-solicitar" disabled>
                                        <span>Solicitar certificados</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../../bd-master/bd-contenidos-ubits.js"></script>
    <script src="../../../bd-master/bd-contenidos-fiqsha.js"></script>
    <script src="../../../components/tooltip.js"></script>
    <script src="../../../components/dropdown-menu.js"></script>
    <script src="../../../components/input.js"></script>
    <script src="../../../components/calendar.js"></script>
    <script src="../../../components/modal.js"></script>
    <script src="../../../components/toast.js"></script>
    <script src="../../../components/alert.js"></script>
    <script src="../../../components/sidebar.js"></script>
    <script src="../../../components/sub-nav.js"></script>
    <script src="../../../components/tab-bar.js"></script>
    <script src="../../../components/floating-menu.js"></script>
    <script src="../../../components/profile-menu.js"></script>
    <script src="../../../script.js"></script>
    <script src="./certificados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator', 'certificados');
            loadSubNav('top-nav-container', 'creator-certificados');
            loadTabBar('tab-bar-container', 'creator');
            loadFloatingMenu('floating-menu-container', 'creator');
            loadProfileMenu('profile-menu-container');

            setTimeout(function() {
                var descargaTab = document.querySelector('.nav-tab[data-tab="descarga"]');
                if (descargaTab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) { item.classList.remove('active'); });
                    descargaTab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="certificados"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) { btn.classList.remove('active'); });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) { item.classList.remove('active'); });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('certificados-descarga');
                }
            }, 200);

            if (typeof initCertificadosPage === 'function') {
                initCertificadosPage();
            }
        });
    </script>
</body>
</html>
