<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vista previa — correo certificados</title>
</head>
<body>
  <script>
    (function () {
      var html = sessionStorage.getItem('certificados-mail-preview-html');
      if (html) {
        document.open();
        document.write(html);
        document.close();
        return;
      }
      document.body.innerHTML =
        '<p style="font-family:Inter,Arial,sans-serif;padding:24px;color:#5c646f;">' +
        'No hay vista previa del correo. Envía una solicitud desde <strong>certificados.html</strong> y confirma con Entendido.</p>';
    })();
  </script>
</body>
</html>
