<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - LMS Creator - AI Panel Demo</title>

    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/ia-button.css">
    <link rel="stylesheet" href="../../components/header-product.css">
    <link rel="stylesheet" href="../../components/toolbar-panel.css">
    <link rel="stylesheet" href="../../components/table.css">
    <link rel="stylesheet" href="../../components/chip.css">
    <link rel="stylesheet" href="../../components/paginator.css">
    <link rel="stylesheet" href="../../components/empty-state.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../components/ai-panel.css">
    <link rel="stylesheet" href="../aprendizaje/aprendizaje-ia-gradientes.css">
    <link rel="stylesheet" href="./lms-creator.css">
    <link rel="stylesheet" href="./contenidos.css">
    <link rel="stylesheet" href="./ai-panel-demo.css">
</head>
<body data-theme="light" class="page-contenidos-creator">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>

                    <div class="section-single section-single--contenidos">
                        <div class="widget-contenidos-creator">
                            <div class="ubits-toolbar-panel">
                                <div class="ubits-toolbar-panel__bar">
                                    <div class="ubits-toolbar-panel__title-block">
                                        <span class="ubits-toolbar-panel__title ubits-body-md-bold">Lista de elementos</span>
                                        <span class="ubits-toolbar-panel__meta">
                                            <span class="ubits-body-sm-regular">12</span>
                                            <span class="ubits-body-sm-regular">resultados</span>
                                        </span>
                                    </div>
                                    <div class="ubits-toolbar-panel__actions">
                                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="abrir-ai-panel-desde-toolbar">
                                            <i class="far fa-sparkles"></i>
                                            <span>Abrir panel IA</span>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="contenidos-demo-grid">
                                <article class="contenidos-demo-card">
                                    <p class="ubits-body-md-bold">Curso: Liderazgo y feedback</p>
                                    <p class="ubits-body-sm-regular">Estado: Publicado</p>
                                </article>
                                <article class="contenidos-demo-card">
                                    <p class="ubits-body-md-bold">Curso: Productividad personal</p>
                                    <p class="ubits-body-sm-regular">Estado: Borrador</p>
                                </article>
                                <article class="contenidos-demo-card">
                                    <p class="ubits-body-md-bold">Ruta: Comunicación efectiva</p>
                                    <p class="ubits-body-sm-regular">Estado: Publicado</p>
                                </article>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../components/header-product.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/ai-panel.js"></script>
    <script src="../../script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initTooltip === 'function') {
                initTooltip('[data-tooltip]');
            }

            loadSidebar('creator', 'lms-creator');
            loadSubNav('top-nav-container', 'creator-lms');
            loadTabBar('tab-bar-container', 'creator');
            loadFloatingMenu('floating-menu-container', 'creator');
            loadProfileMenu('profile-menu-container');

            loadHeaderProduct('header-product-container', {
                productName: 'Contenidos - Demo AI Panel',
                breadcrumbItems: [],
                aiButton: {
                    text: 'AI Assistant',
                    onClick: function () {
                        openAIPanel();
                    }
                },
                secondaryButtons: [
                    {
                        text: 'Filtros',
                        icon: 'fa-filter',
                        onClick: function () {
                            if (typeof showToast === 'function') {
                                showToast('info', 'Esta es una demo visual del toolbar de contenidos.');
                            }
                        }
                    }
                ],
                primaryButton: {
                    text: 'Crear contenido',
                    icon: 'fa-plus',
                    onClick: function () {
                        if (typeof showToast === 'function') {
                            showToast('success', 'Accion de ejemplo ejecutada.');
                        }
                    }
                }
            });

            initAIPanel({
                title: 'AI Assistant',
                placeholder: 'Escribe tu solicitud...',
                welcomeSubtitle: 'Pide ayuda para crear o mejorar contenidos.',
                dockDesktop: true,
                dockContainerSelector: '.dashboard-container',
                dockBreakpoint: 1024,
                onSend: function (text) {
                    var removeTyping = showAIPanelTyping();
                    setTimeout(function () {
                        removeTyping();
                        addAIPanelMessage('Recibi: "' + text + '". Esta respuesta es de demostracion.', 'ai');
                    }, 900);
                },
                onAttach: function () {
                    if (typeof showToast === 'function') {
                        showToast('info', 'Adjunto simulado en la demo.');
                    }
                }
            });

            var toolbarBtn = document.getElementById('abrir-ai-panel-desde-toolbar');
            if (toolbarBtn) {
                toolbarBtn.addEventListener('click', function () {
                    openAIPanel();
                });
            }
        });
    </script>
</body>
</html>
