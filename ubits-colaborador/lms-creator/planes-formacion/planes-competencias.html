<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../../images/playground-favicon.svg">
    <title>UBITS Playground - LMS Creator - Planes de competencias</title>

    <link rel="stylesheet" href="../../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../../general-styles/styles.css">
    <link rel="stylesheet" href="../lms-creator.css">
    <link rel="stylesheet" href="../../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../../components/sub-nav.css">
    <link rel="stylesheet" href="../../../components/sidebar.css">
    <link rel="stylesheet" href="../../../components/tab-bar.css">
    <link rel="stylesheet" href="../../../components/floating-menu.css">
    <link rel="stylesheet" href="../../../components/profile-menu.css">
    <link rel="stylesheet" href="../../../components/button.css">
    <link rel="stylesheet" href="../../../components/ia-button.css">
    <link rel="stylesheet" href="../../../components/header-product.css">
    <link rel="stylesheet" href="../../../components/tooltip.css">
    <link rel="stylesheet" href="../../../components/table.css">
    <link rel="stylesheet" href="../../../components/status-tag.css">
    <link rel="stylesheet" href="../../../components/checkbox.css">
    <link rel="stylesheet" href="../../../components/dropdown-menu.css">
    <link rel="stylesheet" href="../../../components/input.css">
    <link rel="stylesheet" href="../../../components/toast.css">
    <link rel="stylesheet" href="../../../components/modal.css">
    <link rel="stylesheet" href="../../../components/empty-state.css">
    <link rel="stylesheet" href="../../../components/chip.css">
    <link rel="stylesheet" href="../../../components/ubits-data-table.css">
    <link rel="stylesheet" href="../../../components/popover.css">
    <link rel="stylesheet" href="../../../components/coachmark.css">
    <link rel="stylesheet" href="./planes-formacion.css">
</head>
<body data-theme="light" class="page-planes-competencias">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>

        <div id="sidebar-container"></div>

        <main class="main-content">
            <div id="top-nav-container"></div>
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="widget-header-product" id="header-product-container"></div>
                    </div>
                    <div class="section-single section-single--test-tabla">
                        <div class="widget-planes-formacion">
                            <div id="planes-data-table-container" class="planes-formacion-tabla"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="planes-modals-container"></div>
    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>
    <div id="ubits-toast-container"></div>

    <script src="../../../components/tooltip.js"></script>
    <script src="../../../components/popover.js"></script>
    <script src="../../../components/coachmark.js"></script>
    <script src="../lms-creator-admin-migration-tour.js"></script>
    <script src="../../../components/sidebar.js"></script>
    <script src="../../../components/sub-nav.js"></script>
    <script src="../../../components/tab-bar.js"></script>
    <script src="../../../components/floating-menu.js"></script>
    <script src="../../../components/profile-menu.js"></script>
    <script src="../../../components/header-product.js"></script>
    <script src="../../../components/dropdown-menu.js"></script>
    <script src="../../../components/input.js"></script>
    <script src="../../../components/toast.js"></script>
    <script src="../../../components/modal.js"></script>
    <script src="../../../components/empty-state.js"></script>
    <script src="../../../components/ubits-data-table.js"></script>
    <script src="../../../script.js"></script>
    <script src="../../../general-utils/humanizador-fechas.js"></script>
    <script src="../../../components/progress-bar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('creator', 'planes-formacion');
            loadSubNav('top-nav-container', 'creator-planes');
            loadTabBar('tab-bar-container', 'creator');
            loadFloatingMenu('floating-menu-container', 'creator');
            loadProfileMenu('profile-menu-container');

            try { sessionStorage.setItem('ubits-planes-formacion-list-page', 'competencias'); } catch (e) {}

            var planesTablaRef = null;
            var pendingDeleteIds = [];

            var planesFormacionData = [
                { id: 'c1', nombre: 'Plan de competencias de liderazgo', fechaInicio: '01/07/2026', fechaFin: '30/09/2026', estado: 'Planeado', progreso: 0, tipo: 'competencias' },
                { id: 'c2', nombre: 'Desarrollo de competencias Q1', fechaInicio: '01/01/2026', fechaFin: '31/03/2026', estado: 'Vigente', progreso: 65, tipo: 'competencias' },
                { id: 'c3', nombre: 'Evaluación por competencias 2025', fechaInicio: '01/09/2025', fechaFin: '15/12/2025', estado: 'No vigente', progreso: 85, tipo: 'competencias' }
            ];

            function irCrearPlanCompetencias() {
                window.location.href = 'crear-plan-competencias.html';
            }

            if (typeof getModalHtml === 'function') {
                var deleteBody = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar <strong id="planes-delete-count">0</strong> plan(es) seleccionado(s)?</p><p class="ubits-body-sm-regular" style="color: var(--ubits-fg-1-medium);">Esta acción no se puede deshacer.</p><div class="delete-confirm-group" style="margin-top: var(--gap-lg);"><label class="ubits-body-sm-regular" for="planes-delete-type-input">Escriba <strong>eliminar</strong> para habilitar el botón:</label><input type="text" id="planes-delete-type-input" class="ubits-input" placeholder="Escriba la palabra de confirmación" autocomplete="off" style="margin-top: var(--gap-sm); width: 100%; padding: var(--padding-sm) var(--padding-md); border: 1px solid var(--ubits-border-1); border-radius: var(--border-radius-sm); font-size: var(--font-size-sm); color: var(--ubits-fg-1-high); box-sizing: border-box;"></div>';
                var deleteFooter = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="planes-delete-cancel"><span>Cancelar</span></button><button type="button" class="ubits-button ubits-button--error ubits-button--md" id="planes-delete-confirm" disabled><span>Eliminar</span></button>';
                document.getElementById('planes-modals-container').innerHTML = getModalHtml({ overlayId: 'planes-delete-overlay', title: 'Confirmar eliminación', bodyHtml: deleteBody, footerHtml: deleteFooter, size: 'sm', closeButtonId: 'planes-delete-close' });
            }

            function openPlanesDeleteModal(ids) {
                if (!ids || ids.length === 0) return;
                pendingDeleteIds = ids.slice();
                var countEl = document.getElementById('planes-delete-count');
                var inputEl = document.getElementById('planes-delete-type-input');
                var confirmEl = document.getElementById('planes-delete-confirm');
                if (countEl) countEl.textContent = pendingDeleteIds.length;
                if (inputEl) { inputEl.value = ''; inputEl.focus(); }
                if (confirmEl) confirmEl.disabled = true;
                var overlay = document.getElementById('planes-delete-overlay');
                if (overlay) { overlay.style.display = 'flex'; overlay.setAttribute('aria-hidden', 'false'); }
            }

            function escapeHtml(t) {
                if (t == null) return '';
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }
            function getEstadoTagClass(estado) {
                if (estado === 'Planeado') return 'info';
                if (String(estado).indexOf('Procesando') === 0) return 'warning';
                if (estado === 'Vigente') return 'success';
                if (estado === 'No vigente') return 'neutral';
                return 'neutral';
            }
            function getEstadoTooltip(estado) {
                if (estado === 'Planeado') return 'Plan creado para una fecha futura; aún no ha iniciado. Solo lo ve el administrador, no los estudiantes.';
                if (estado === 'Vigente') return 'En curso: la fecha actual está entre inicio y fin.';
                if (estado === 'No vigente') return 'Ya pasó la fecha de cierre. El progreso quedó congelado; lo que estudien después no suma al plan.';
                return '';
            }
            function buildPlanesRowHtml(row) {
                var estadoClass = getEstadoTagClass(row.estado);
                var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + estadoClass + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + escapeHtml(row.estado) + '</span></span>';
                var tooltipText = getEstadoTooltip(row.estado);
                var estadoHtml = tooltipText
                    ? '<span data-tooltip="' + escapeHtml(tooltipText) + '">' + tagHtml + '</span>'
                    : tagHtml;
                var pct = Math.min(100, Math.max(0, parseInt(row.progreso, 10) || 0));
                var fechaInicioDisplay = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.fechaInicio) : row.fechaInicio);
                var fechaFinDisplay = (typeof formatDateDDMmmAAAA === 'function' ? formatDateDDMmmAAAA(row.fechaFin) : row.fechaFin);
                var accionesBtn = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only js-planes-row-acciones-btn" data-plan-id="' + escapeHtml(String(row.id)) + '" aria-label="Acciones del plan" data-tooltip="Acciones" data-tooltip-delay="500"><i class="far fa-ellipsis-vertical"></i></button>';
                return '<td data-col="nombre"><span class="ubits-body-sm-regular">' + escapeHtml(row.nombre) + '</span></td>' +
                    '<td data-col="fecha-inicio" data-date="' + escapeHtml(row.fechaInicio) + '"><span class="ubits-body-sm-regular">' + escapeHtml(fechaInicioDisplay) + '</span></td>' +
                    '<td data-col="fecha-fin" data-date="' + escapeHtml(row.fechaFin) + '"><span class="ubits-body-sm-regular">' + escapeHtml(fechaFinDisplay) + '</span></td>' +
                    '<td data-col="estado">' + estadoHtml + '</td>' +
                    '<td data-col="progreso">' + (typeof tableProgressCellHtml === 'function' ? tableProgressCellHtml(pct) : '<div class="ubits-table__cell-progress"><span class="ubits-body-sm-regular">' + pct + '%</span></div>') + '</td>' +
                    '<td data-col="acciones" class="planes-formacion-tabla__td-acciones">' + accionesBtn + '</td>';
            }

            if (typeof createUbitsDataTable === 'function') {
                planesTablaRef = createUbitsDataTable({
                    containerId: 'planes-data-table-container',
                    tableId: 'planes-competencias-table',
                    title: 'Lista de planes',
                    columns: [
                        { id: 'nombre', label: 'Nombre del plan', sortable: true },
                        { id: 'fecha-inicio', label: 'Fecha inicio', sortable: true, sortType: 'date' },
                        { id: 'fecha-fin', label: 'Fecha fin', sortable: true, sortType: 'date' },
                        { id: 'estado', label: 'Estado', filterable: true },
                        { id: 'progreso', label: 'Progreso', sortable: true, sortType: 'number' },
                        { id: 'acciones', label: 'Acciones' }
                    ],
                    getData: function() {
                        return planesFormacionData;
                    },
                    rowIdField: 'id',
                    buildRowHtml: buildPlanesRowHtml,
                    features: { checkboxes: true, search: true, filters: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                    actionBarButtons: [
                        { id: 'eliminar', label: 'Eliminar', icon: 'fa-trash', variant: 'error-secondary', onClick: function(selectedIds) {
                            openPlanesDeleteModal(selectedIds);
                        } }
                    ],
                    emptyState: {
                        message: 'Aún no tienes planes de competencias',
                        icon: 'far fa-bullseye',
                        description: 'En estos planes puedes asignar las competencias y habilidades que quieres desarrollar en tus colaboradores en un tiempo determinado.',
                        buttons: {
                            secondary: {
                                text: 'Crear plan',
                                icon: 'fa-plus',
                                onClick: irCrearPlanCompetencias
                            }
                        }
                    },
                    i18n: { selectAll: 'Seleccionar todo', deselectAll: 'Deseleccionar todo', verSeleccionados: 'Ver seleccionados', clearFilters: 'Limpiar filtros', filtrosAplicados: 'Filtros aplicados', buscar: 'Buscar' }
                });
                setTimeout(function() { if (typeof initTooltip === 'function') initTooltip('#planes-data-table-container [data-tooltip]'); }, 50);
            }

            if (typeof loadHeaderProduct === 'function') {
                loadHeaderProduct('header-product-container', {
                    productName: 'Planes de competencias',
                    aiButton: {
                        text: 'Crear con IA',
                        onClick: function() {
                            // Sin acción: no navega ni hace nada
                        }
                    },
                    primaryButton: {
                        text: 'Crear plan',
                        icon: 'fa-plus',
                        onClick: irCrearPlanCompetencias
                    }
                });
            }

            var deleteOverlay = document.getElementById('planes-delete-overlay');
            var deleteClose = document.getElementById('planes-delete-close');
            var deleteCancel = document.getElementById('planes-delete-cancel');
            var deleteConfirm = document.getElementById('planes-delete-confirm');
            var deleteTypeInput = document.getElementById('planes-delete-type-input');

            function closePlanesDeleteModal() {
                if (deleteOverlay) { deleteOverlay.style.display = 'none'; deleteOverlay.setAttribute('aria-hidden', 'true'); }
                if (deleteTypeInput) deleteTypeInput.value = '';
                if (deleteConfirm) deleteConfirm.disabled = true;
            }
            if (deleteTypeInput && deleteConfirm) {
                deleteTypeInput.addEventListener('input', function() {
                    deleteConfirm.disabled = this.value.trim().toLowerCase() !== 'eliminar';
                });
            }
            if (deleteClose) deleteClose.addEventListener('click', closePlanesDeleteModal);
            if (deleteCancel) deleteCancel.addEventListener('click', closePlanesDeleteModal);
            if (deleteOverlay) deleteOverlay.addEventListener('click', function(e) { if (e.target === deleteOverlay) closePlanesDeleteModal(); });
            if (deleteConfirm) {
                deleteConfirm.addEventListener('click', function() {
                    var ids = pendingDeleteIds.slice();
                    closePlanesDeleteModal();
                    pendingDeleteIds = [];
                    var idSet = {};
                    ids.forEach(function(id) { idSet[String(id)] = true; });
                    for (var i = planesFormacionData.length - 1; i >= 0; i--) {
                        if (idSet[String(planesFormacionData[i].id)]) planesFormacionData.splice(i, 1);
                    }
                    if (planesTablaRef && typeof planesTablaRef.refresh === 'function') planesTablaRef.refresh();
                    if (typeof showToast === 'function') showToast('success', ids.length + ' plan(es) eliminado(s) correctamente', { containerId: 'ubits-toast-container' });
                });
            }

            var planesContainer = document.getElementById('planes-data-table-container');
            if (planesContainer) {
                planesContainer.addEventListener('click', function(e) {
                    if (e.target.closest('.js-planes-row-acciones-btn')) {
                        e.preventDefault();
                        e.stopPropagation();
                        var accBtn = e.target.closest('.js-planes-row-acciones-btn');
                        if (!accBtn || typeof window.getDropdownMenuHtml !== 'function' || typeof window.openDropdownMenu !== 'function' || typeof window.closeDropdownMenu !== 'function') return;
                        var planIdAcc = accBtn.getAttribute('data-plan-id');
                        var planRowAcc = planIdAcc ? planesFormacionData.find(function(p) { return String(p.id) === String(planIdAcc); }) : null;
                        var estAcc = planRowAcc && planRowAcc.estado != null ? String(planRowAcc.estado) : '';
                        var mostrarVerProgreso = estAcc === 'Vigente' || estAcc === 'No vigente';
                        var mostrarEditar = estAcc === 'Planeado' || estAcc === 'Vigente' || String(estAcc).indexOf('Procesando') === 0;
                        var overlayId = 'planes-formacion-row-options-overlay';
                        var prev = document.getElementById(overlayId);
                        if (prev) prev.remove();
                        var options = [];
                        if (mostrarVerProgreso) {
                            options.push({ text: 'Ver progreso', value: 'ver-progreso', leftIcon: 'chart-line' });
                        }
                        if (mostrarEditar) {
                            options.push({ text: 'Editar', value: 'editar', leftIcon: 'pen' });
                        }
                        options.push({ text: 'Eliminar', value: 'eliminar', leftIcon: 'trash' });
                        document.body.insertAdjacentHTML('beforeend', window.getDropdownMenuHtml({ overlayId: overlayId, options: options }));
                        var overlayEl = document.getElementById(overlayId);
                        if (!overlayEl) return;
                        overlayEl.style.zIndex = '10100';
                        overlayEl.querySelectorAll('.ubits-dropdown-menu__option').forEach(function(opt) {
                            opt.addEventListener('click', function() {
                                var val = this.getAttribute('data-value');
                                window.closeDropdownMenu(overlayId);
                                if (overlayEl.parentNode) overlayEl.remove();
                                if (val === 'ver-progreso') {
                                    var pid = accBtn.getAttribute('data-plan-id');
                                    window.location.href = 'detalle-plan-competencias.html?id=' + encodeURIComponent(pid);
                                    return;
                                }
                                if (val === 'editar') {
                                    var pidEd = accBtn.getAttribute('data-plan-id');
                                    window.location.href = 'editar-plan-competencias.html?id=' + encodeURIComponent(pidEd);
                                    return;
                                }
                                if (val === 'eliminar') {
                                    var pidDel = accBtn.getAttribute('data-plan-id');
                                    if (pidDel) openPlanesDeleteModal([pidDel]);
                                    return;
                                }
                            });
                        });
                        overlayEl.addEventListener('click', function(ev) {
                            if (ev.target === overlayEl) {
                                window.closeDropdownMenu(overlayId);
                                if (overlayEl.parentNode) overlayEl.remove();
                            }
                        });
                        window.openDropdownMenu(overlayId, accBtn, { alignRight: true });
                        return;
                    }
                    var row = e.target.closest('tbody tr[data-id]');
                    if (!row || e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]')) return;
                    var planId = row.getAttribute('data-id');
                    if (!planId) return;
                    var planRow = planesFormacionData.find(function(p) { return String(p.id) === String(planId); });
                    var esProcComp = planRow && String(planRow.estado).indexOf('Procesando') === 0;
                    var esPlaneadoComp = planRow && planRow.estado === 'Planeado';
                    window.location.href = (esProcComp || esPlaneadoComp)
                        ? 'editar-plan-competencias.html?id=' + encodeURIComponent(planId)
                        : 'detalle-plan-competencias.html?id=' + encodeURIComponent(planId);
                });
            }
            setTimeout(function() {
                var tab = document.querySelector('.nav-tab[data-tab="planes-competencias"]');
                if (tab) {
                    document.querySelectorAll('.nav-tab, .hamburger-item').forEach(function(item) { item.classList.remove('active'); });
                    tab.classList.add('active');
                }
                var sidebarBtn = document.querySelector('.nav-button[data-section="planes-formacion"]');
                if (sidebarBtn) {
                    document.querySelectorAll('.nav-button').forEach(function(btn) { btn.classList.remove('active'); });
                    sidebarBtn.classList.add('active');
                }
                var modulosTab = document.querySelector('.tab-bar-item[data-tab="modulos"]');
                if (modulosTab) {
                    document.querySelectorAll('.tab-bar-item').forEach(function(item) { item.classList.remove('active'); });
                    modulosTab.classList.add('active');
                }
                if (typeof setActiveAccordionLink === 'function') {
                    setActiveAccordionLink('planes-competencias');
                }
            }, 200);

            if (typeof initUbitsLmsCreatorAdminMigrationTour === 'function') {
                initUbitsLmsCreatorAdminMigrationTour(450);
            }
        });
    </script>
</body>
</html>
