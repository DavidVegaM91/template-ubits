<head>

    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/save-indicator.css">
    <link rel="stylesheet" href="../../components/status-tag.css">
    <link rel="stylesheet" href="../../components/tooltip.css">

    <link rel="stylesheet" href="../../components/chip.css">

<body data-theme="light" class="no-subnav page-layout-immersive page-task-detail">
    <div class="tooltip" id="tooltip"></div>

    <div class="ubits-layout-immersive">
        <header class="ubits-layout-immersive__header" role="banner">
            <div class="ubits-layout-immersive__header-inner">
                <div class="ubits-layout-immersive__leading">
                    <div class="ubits-layout-immersive__title-row">
                        <span class="ubits-body-md-bold ubits-layout-immersive__title">Detalle de la tarea</span>
                        <span id="task-detail-save-indicator" class="ubits-layout-immersive__save-slot"></span>
                    </div>
                </div>
                <button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only" onclick="history.back()" aria-label="Salir del detalle" data-tooltip="Salir del detalle" data-tooltip-delay="500"><i class="far fa-times"></i></button>
            </div>
        </header>

        <main class="ubits-layout-immersive__main ubits-body-md-regular" id="task-detail-main" tabindex="-1">
            <!-- Contenido principal: dos columnas; izq = dos tarjetas (info + subtareas), der = comentarios -->
            <div class="ubits-layout-immersive__stage task-detail-stage">
                <div class="task-detail-two-cols">
                    <div class="task-detail-col-main">
                        <div class="task-detail-card task-detail-card--info">
                            <div id="task-detail-info-block" class="task-detail-info-block"></div>
                        </div>
                        <div class="task-detail-card task-detail-card--subtasks">
                            <div id="task-detail-subtasks-block" class="task-detail-subtasks-block"></div>
                        </div>
                    </div>
                    <div class="task-detail-col-comments">
                        <div id="task-detail-comments-block" class="task-detail-comments-block"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="ubits-toast-container"></div>
    <div id="task-detail-modals-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/save-indicator.js"></script>
    <script src="../../script.js"></script>
    <script src="../../components/avatar.js"></script>
    <script src="../../components/task-strip.js"></script>
    <script src="../../components/input.js"></script>
    <script src="../../components/calendar.js"></script>
    <script src="../../components/dropdown-menu.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/alert.js"></script>
    <script src="../../components/card-content-compact.js"></script>
    <script src="../../bd-master/bd-master-colaboradores.js"></script>
    <script src="../../bd-master/bd-tareas-y-planes.js"></script>
    <script src="../../bd-master/bd-contenidos-ubits.js"></script>
    <script src="../../bd-master/bd-contenidos-fiqsha.js"></script>
    <script src="./task-detail.js"></script>
    <script>
        // Mantiene el panel de comentarios alineado con la columna derecha del grid
        function positionCommentsPanel() {
            var col = document.querySelector('.task-detail-col-comments');
            var block = document.querySelector('.task-detail-comments-block');
            if (!col || !block) return;
            if (window.innerWidth < 1024) {
                // En mobile/tablet: limpiar estilos inline para ceder al CSS normal
                block.style.left = '';
                block.style.width = '';
                return;
            }
            var rect = col.getBoundingClientRect();
            block.style.left = rect.left + 'px';
            block.style.width = rect.width + 'px';
        }
        window.addEventListener('load', positionCommentsPanel);
        window.addEventListener('resize', positionCommentsPanel);
        // Re-ejecutar tras render inicial del JS de la página
        setTimeout(positionCommentsPanel, 300);
        setTimeout(positionCommentsPanel, 800);
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initTaskDetailPage === 'function') {
                initTaskDetailPage();
            }
        });
    </script>
</body>

</html>
