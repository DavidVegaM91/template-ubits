<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/Ubits-logo-dark.svg">
    <title>UBITS Playground - IA para HR</title>

    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../aprendizaje/aprendizaje-ia-gradientes.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/tab-bar.css">
    <link rel="stylesheet" href="../../components/floating-menu.css">
    <link rel="stylesheet" href="../../components/profile-menu.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../perfil/profile.css">
    <link rel="stylesheet" href="./ia-para-hr.css">
</head>
<body data-theme="light" class="no-subnav">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>

        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="content-area">
                <div class="content-sections">
                    <div class="section-single">
                        <div class="ia-hr-shell">
                            <header class="ia-hr-shell__intro">
                                <h1 class="ia-hr-shell__title">
                                    <span class="ubits-display-d2-bold ia-hr-shell__title-line">
                                        <span class="ia-hr-shell__title-accent">Agentes IA</span><span class="ia-hr-shell__title-rest"> para recursos humanos</span>
                                    </span>
                                </h1>
                                <p class="ubits-body-md-regular ia-hr-shell__subtitle">Transforma tu área de RH hacia la nueva era, reduciendo la operatividad y escalando apoyos estratégicos.</p>
                            </header>

                            <div class="ia-hr-card-grid">
                                <button type="button" class="ia-hr-card">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--pink" aria-hidden="true">
                                        <i class="far fa-cog"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Soporte técnico</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Acompañamiento en la implementación y solución de problemas de nuestros productos.</span>
                                </button>
                                <button type="button" class="ia-hr-card">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--blue" aria-hidden="true">
                                        <i class="far fa-chart-line"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Diagnóstico de eficiencia organizacional</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Detecta las principales oportunidades para mejorar la eficiencia del diseño organizacional.</span>
                                </button>
                                <button type="button" class="ia-hr-card">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--blue" aria-hidden="true">
                                        <i class="far fa-diagram-project"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Simulador de alternativas de estructuras</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Evalúa el impacto de potenciales cambios en la estructura organizacional.</span>
                                </button>
                                <button type="button" class="ia-hr-card">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--yellow" aria-hidden="true">
                                        <i class="far fa-medal"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Consejero estratégico de gestión de talento</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Apoyo en decisiones clave sobre gestión de personas, con metodologías y benchmarks confiables.</span>
                                </button>
                                <a class="ia-hr-card" href="../aprendizaje/modo-estudio-ia.html">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--purple" aria-hidden="true">
                                        <i class="far fa-graduation-cap"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Aprende con IA</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Tutor personalizado a tu contexto para potenciar tu impacto en el trabajo.</span>
                                </a>
                                <button type="button" class="ia-hr-card">
                                    <span class="ia-hr-card__icon ia-hr-card__icon--teal" aria-hidden="true">
                                        <i class="far fa-clipboard-list-check"></i>
                                    </span>
                                    <span class="ubits-body-md-bold ia-hr-card__title">Establece una meta de formación</span>
                                    <span class="ubits-body-sm-regular ia-hr-card__desc">Diseña y define planes de formación de competencias y contenidos en equipos e individuos de tu organización.</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tab-bar-container"></div>
    <div id="floating-menu-container"></div>
    <div id="profile-menu-container"></div>

    <script src="../../components/tooltip.js"></script>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/tab-bar.js"></script>
    <script src="../../components/floating-menu.js"></script>
    <script src="../../components/profile-menu.js"></script>
    <script src="../../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('ia-para-hr');
            loadTabBar('tab-bar-container');
            loadFloatingMenu('floating-menu-container');
            loadProfileMenu('profile-menu-container');

            setTimeout(function() {
                setActiveDirectLink('ia-para-hr');
            }, 500);

            if (typeof initTooltip === 'function') {
                initTooltip();
            }
        });
    </script>
</body>
</html>
