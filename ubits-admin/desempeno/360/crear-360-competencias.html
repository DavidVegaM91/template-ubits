<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../../images/Ubits-logo-dark.svg">
    <title>Competencias y enunciados | 360 UBITS</title>

    <link rel="stylesheet" href="../../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../../general-styles/styles.css">
    <link rel="stylesheet" href="../../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../../general-styles/layout-immersive.css">
    <link rel="stylesheet" href="../../../components/button.css">
    <link rel="stylesheet" href="../../../components/input.css">
    <link rel="stylesheet" href="../../../components/modal.css">
    <link rel="stylesheet" href="../../../components/toast.css">
    <link rel="stylesheet" href="../../../components/tooltip.css">
    <link rel="stylesheet" href="../../../components/tab-bar.css">
    <link rel="stylesheet" href="../../../components/floating-menu.css">
    <link rel="stylesheet" href="../../../components/profile-menu.css">
    <link rel="stylesheet" href="../../../components/sidebar.css">
    <link rel="stylesheet" href="./crear-360-competencias.css">
</head>
<body data-theme="light" class="page-layout-immersive page-crear360-competencias">

<div class="ubits-layout-immersive">

    <!-- Header -->
    <header class="ubits-layout-immersive__header">
        <div class="ubits-layout-immersive__header-inner">
            <button type="button"
                class="ubits-button ubits-button--tertiary ubits-button--md ubits-button--icon-only"
                id="comp360-btn-back"
                data-tooltip="Volver" data-tooltip-delay="800"
                aria-label="Volver">
                <i class="far fa-arrow-left"></i>
            </button>
            <div class="ubits-layout-immersive__leading">
                <div class="ubits-layout-immersive__title-row">
                    <span class="ubits-layout-immersive__title ubits-body-md-bold">Competencias y enunciados</span>
                </div>
            </div>
            <div class="comp360-header-counter">
                <span class="ubits-body-sm-regular" id="comp360-selected-count">0 seleccionadas</span>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="ubits-layout-immersive__main">
        <div class="ubits-layout-immersive__stage">

            <section class="comp360-description">
                <h2 class="ubits-body-md-bold">Selecciona las competencias a evaluar</h2>
                <p class="ubits-body-md-regular">Elige al menos una competencia. Cada competencia incluye 3 enunciados que los evaluadores responderán. Puedes expandir cada competencia para revisar sus enunciados.</p>
            </section>

            <!-- Lista de competencias -->
            <div class="comp360-list" id="comp360-list"></div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="ubits-layout-immersive__footer">
        <div class="ubits-layout-immersive__footer-inner">
            <div class="ubits-layout-immersive__footer-actions">
                <div class="ubits-layout-immersive__footer-grow"></div>
                <div class="ubits-layout-immersive__footer-nav">
                    <button type="button"
                        class="ubits-button ubits-button--secondary ubits-button--md"
                        id="comp360-btn-cancel">
                        <span>Cancelar</span>
                    </button>
                    <button type="button"
                        class="ubits-button ubits-button--primary ubits-button--md"
                        id="comp360-btn-save"
                        disabled>
                        <i class="far fa-save"></i>
                        <span>Guardar competencias</span>
                    </button>
                </div>
            </div>
        </div>
    </footer>
</div>

<div id="tab-bar-container"></div>
<div id="floating-menu-container"></div>
<div id="profile-menu-container"></div>
<div id="ubits-toast-container"></div>

<script src="../../../components/tooltip.js"></script>
<script src="../../../components/sidebar.js"></script>
<script src="../../../components/tab-bar.js"></script>
<script src="../../../components/floating-menu.js"></script>
<script src="../../../components/profile-menu.js"></script>
<script src="../../../components/input.js"></script>
<script src="../../../components/modal.js"></script>
<script src="../../../components/toast.js"></script>
<script src="../../../script.js"></script>
<script src="../../../bd-master/bd-evaluaciones-360.js"></script>
<script>
(function () {
    'use strict';

    var DRAFT_KEY = 'AXS360_DRAFT';
    var _competencias = [];

    function loadDraft() {
        try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY)) || {}; }
        catch (e) { return {}; }
    }
    function saveDraft(d) { sessionStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }

    function updateCounter() {
        var sel = _competencias.filter(function (c) { return c.seleccionada; }).length;
        var el = document.getElementById('comp360-selected-count');
        if (el) el.textContent = sel + (sel === 1 ? ' seleccionada' : ' seleccionadas');
        var saveBtn = document.getElementById('comp360-btn-save');
        if (saveBtn) saveBtn.disabled = sel === 0;
    }

    function renderList() {
        var container = document.getElementById('comp360-list');
        container.innerHTML = '';

        _competencias.forEach(function (comp, idx) {
            var item = document.createElement('div');
            item.className = 'comp360-item' + (comp.seleccionada ? ' comp360-item--selected' : '');
            item.innerHTML =
                '<div class="comp360-item__header" data-idx="' + idx + '">' +
                '<label class="comp360-item__check-label">' +
                '<input type="checkbox" class="comp360-item__checkbox" data-idx="' + idx + '" ' + (comp.seleccionada ? 'checked' : '') + '>' +
                '<span class="comp360-item__check-box"><i class="far fa-check"></i></span>' +
                '</label>' +
                '<span class="ubits-body-md-bold comp360-item__nombre">' + comp.nombre + '</span>' +
                '<span class="ubits-body-sm-regular comp360-item__count">' + comp.enunciados.length + ' enunciados</span>' +
                '<button type="button" class="ubits-button ubits-button--tertiary ubits-button--sm ubits-button--icon-only comp360-item__expand-btn" data-idx="' + idx + '" aria-label="Expandir">' +
                '<i class="far fa-chevron-' + (comp.expandida ? 'up' : 'down') + '"></i>' +
                '</button>' +
                '</div>' +
                '<div class="comp360-item__enunciados" style="' + (comp.expandida ? '' : 'display:none;') + '">' +
                '<ul>' +
                comp.enunciados.map(function (e, i) {
                    return '<li class="ubits-body-sm-regular"><span class="comp360-enum">' + (i + 1) + '.</span> ' + e + '</li>';
                }).join('') +
                '</ul>' +
                '</div>';

            container.appendChild(item);

            /* checkbox */
            item.querySelector('.comp360-item__checkbox').addEventListener('change', function (e) {
                _competencias[idx].seleccionada = e.target.checked;
                renderList();
                updateCounter();
            });

            /* expandir */
            item.querySelector('.comp360-item__expand-btn').addEventListener('click', function () {
                _competencias[idx].expandida = !_competencias[idx].expandida;
                renderList();
            });
        });

        updateCounter();
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadSidebar('admin', 'desempeño');
        loadTabBar('tab-bar-container', 'admin');
        loadFloatingMenu('floating-menu-container', 'admin');
        loadProfileMenu('profile-menu-container');

        var draft = loadDraft();
        var savedComp = draft.competencias || [];

        _competencias = BD_EVALUACIONES_360.competenciasBase.map(function (base) {
            var saved = savedComp.find(function (s) { return s.id === base.id; });
            return {
                id: base.id,
                nombre: base.nombre,
                enunciados: base.enunciados,
                seleccionada: saved ? saved.seleccionada : false,
                expandida: false
            };
        });

        renderList();

        document.getElementById('comp360-btn-back').addEventListener('click', function () {
            window.location.href = 'crear-360.html';
        });
        document.getElementById('comp360-btn-cancel').addEventListener('click', function () {
            window.location.href = 'crear-360.html';
        });
        document.getElementById('comp360-btn-save').addEventListener('click', function () {
            var d = loadDraft();
            d.competencias = _competencias.map(function (c) { return { id: c.id, seleccionada: c.seleccionada }; });
            if (!d.checks) d.checks = {};
            d.checks.competencias = true;
            saveDraft(d);
            window.location.href = 'crear-360.html?saved=competencias';
        });

        if (typeof initTooltip === 'function') initTooltip('[data-tooltip]');
    });
}());
</script>
</body>
</html>
