<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../../images/Ubits-logo-dark.svg">
    <title>Configuración de resultados | 360 UBITS</title>

    <link rel="stylesheet" href="../../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../../general-styles/styles.css">
    <link rel="stylesheet" href="../../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../../general-styles/layout-immersive.css">
    <link rel="stylesheet" href="../../../components/button.css">
    <link rel="stylesheet" href="../../../components/input.css">
    <link rel="stylesheet" href="../../../components/modal.css">
    <link rel="stylesheet" href="../../../components/toast.css">
    <link rel="stylesheet" href="../../../components/tooltip.css">
    <link rel="stylesheet" href="../../../components/tab-bar.css">
    <link rel="stylesheet" href="../../../components/floating-menu.css">
    <link rel="stylesheet" href="../../../components/profile-menu.css">
    <link rel="stylesheet" href="../../../components/sidebar.css">
    <link rel="stylesheet" href="./crear-360-resultados.css">
</head>
<body data-theme="light" class="page-layout-immersive page-crear360-resultados">

<div class="ubits-layout-immersive">

    <!-- Header -->
    <header class="ubits-layout-immersive__header">
        <div class="ubits-layout-immersive__header-inner">
            <button type="button"
                class="ubits-button ubits-button--tertiary ubits-button--md ubits-button--icon-only"
                id="res360-btn-back"
                data-tooltip="Volver" data-tooltip-delay="800"
                aria-label="Volver">
                <i class="far fa-arrow-left"></i>
            </button>
            <div class="ubits-layout-immersive__leading">
                <div class="ubits-layout-immersive__title-row">
                    <span class="ubits-layout-immersive__title ubits-body-md-bold">Configuración de resultados</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="ubits-layout-immersive__main">
        <div class="ubits-layout-immersive__stage">

            <section class="res360-description">
                <h2 class="ubits-body-md-bold">Define los rangos de calificación</h2>
                <p class="ubits-body-md-regular">Configura entre 3 y 5 rangos. Cada rango tiene un nombre, un intervalo numérico (mín – máx) y un color de identificación.</p>
            </section>

            <!-- Selector de cantidad de rangos -->
            <div class="res360-controls">
                <div class="res360-cantidad-wrap">
                    <span class="ubits-body-md-regular res360-cantidad-label">Cantidad de rangos:</span>
                    <div class="res360-cantidad-btns">
                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm res360-cant-btn" data-n="3">3</button>
                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm res360-cant-btn" data-n="4">4</button>
                        <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm res360-cant-btn" data-n="5">5</button>
                    </div>
                </div>
            </div>

            <!-- Preview visual de rangos -->
            <div class="res360-preview" id="res360-preview"></div>

            <!-- Tabla de configuración de rangos -->
            <div class="res360-table-wrap" id="res360-table-wrap"></div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="ubits-layout-immersive__footer">
        <div class="ubits-layout-immersive__footer-inner">
            <div class="ubits-layout-immersive__footer-actions">
                <div class="ubits-layout-immersive__footer-grow"></div>
                <div class="ubits-layout-immersive__footer-nav">
                    <button type="button"
                        class="ubits-button ubits-button--secondary ubits-button--md"
                        id="res360-btn-cancel">
                        <span>Cancelar</span>
                    </button>
                    <button type="button"
                        class="ubits-button ubits-button--primary ubits-button--md"
                        id="res360-btn-save">
                        <i class="far fa-save"></i>
                        <span>Guardar configuración</span>
                    </button>
                </div>
            </div>
        </div>
    </footer>
</div>

<div id="tab-bar-container"></div>
<div id="floating-menu-container"></div>
<div id="profile-menu-container"></div>
<div id="ubits-toast-container"></div>

<script src="../../../components/tooltip.js"></script>
<script src="../../../components/sidebar.js"></script>
<script src="../../../components/tab-bar.js"></script>
<script src="../../../components/floating-menu.js"></script>
<script src="../../../components/profile-menu.js"></script>
<script src="../../../components/input.js"></script>
<script src="../../../components/modal.js"></script>
<script src="../../../components/toast.js"></script>
<script src="../../../script.js"></script>
<script src="../../../bd-master/bd-evaluaciones-360.js"></script>
<script>
(function () {
    'use strict';

    var DRAFT_KEY = 'AXS360_DRAFT';

    /* Paleta de 5 colores predefinidos */
    var COLORES = [
        { id: 'rojo',    label: 'Rojo',    hex: '#EF4444' },
        { id: 'naranja', label: 'Naranja', hex: '#F97316' },
        { id: 'amarillo',label: 'Amarillo',hex: '#EAB308' },
        { id: 'verde',   label: 'Verde',   hex: '#22C55E' },
        { id: 'azul',    label: 'Azul',    hex: '#3B82F6' }
    ];

    /* Rangos por defecto según cantidad */
    var DEFAULTS = {
        3: [
            { nombre: 'Por mejorar', min: 1, max: 2, color: 'rojo'    },
            { nombre: 'En desarrollo', min: 3, max: 4, color: 'amarillo' },
            { nombre: 'Destacado',   min: 5, max: 5, color: 'verde'   }
        ],
        4: [
            { nombre: 'Por mejorar', min: 1, max: 1, color: 'rojo'    },
            { nombre: 'Regular',     min: 2, max: 3, color: 'naranja' },
            { nombre: 'Bueno',       min: 4, max: 4, color: 'amarillo'},
            { nombre: 'Destacado',   min: 5, max: 5, color: 'verde'   }
        ],
        5: [
            { nombre: 'Crítico',     min: 1, max: 1, color: 'rojo'    },
            { nombre: 'Por mejorar',  min: 2, max: 2, color: 'naranja' },
            { nombre: 'Regular',     min: 3, max: 3, color: 'amarillo'},
            { nombre: 'Bueno',       min: 4, max: 4, color: 'azul'    },
            { nombre: 'Destacado',   min: 5, max: 5, color: 'verde'   }
        ]
    };

    var _cantidad = 4;
    var _rangos = [];

    function loadDraft() {
        try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY)) || {}; }
        catch (e) { return {}; }
    }
    function saveDraft(d) { sessionStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }

    function getColorHex(colorId) {
        var c = COLORES.find(function (x) { return x.id === colorId; });
        return c ? c.hex : '#888';
    }

    /* ── Preview visual ── */
    function renderPreview() {
        var container = document.getElementById('res360-preview');
        if (!_rangos.length) { container.innerHTML = ''; return; }

        var bars = _rangos.map(function (r) {
            var hex = getColorHex(r.color);
            return '<div class="res360-preview-bar" style="background:' + hex + ';" title="' + r.nombre + ' (' + r.min + '–' + r.max + ')">' +
                '<span class="res360-preview-label ubits-body-sm-bold">' + r.nombre + '</span>' +
                '<span class="res360-preview-range ubits-body-sm-regular">' + r.min + '–' + r.max + '</span>' +
                '</div>';
        }).join('');

        container.innerHTML = '<div class="res360-preview-inner">' + bars + '</div>';
    }

    /* ── Tabla de edición ── */
    function renderTable() {
        var container = document.getElementById('res360-table-wrap');

        var header = '<div class="res360-table">' +
            '<div class="res360-table__header">' +
            '<span class="ubits-body-sm-bold">#</span>' +
            '<span class="ubits-body-sm-bold">Nombre del rango</span>' +
            '<span class="ubits-body-sm-bold">Mínimo</span>' +
            '<span class="ubits-body-sm-bold">Máximo</span>' +
            '<span class="ubits-body-sm-bold">Color</span>' +
            '</div>' +
            '<div class="res360-table__body" id="res360-rows"></div>' +
            '</div>';

        container.innerHTML = header;

        var rowsContainer = document.getElementById('res360-rows');

        _rangos.forEach(function (rango, idx) {
            var row = document.createElement('div');
            row.className = 'res360-table__row';

            /* Número */
            var numCell = document.createElement('span');
            numCell.className = 'ubits-body-sm-regular res360-table__num';
            numCell.textContent = idx + 1;
            row.appendChild(numCell);

            /* Nombre */
            var nombreCell = document.createElement('div');
            nombreCell.className = 'res360-table__cell-nombre';
            nombreCell.id = 'res360-nombre-' + idx;
            row.appendChild(nombreCell);

            /* Mínimo */
            var minCell = document.createElement('div');
            minCell.className = 'res360-table__cell-num';
            minCell.id = 'res360-min-' + idx;
            row.appendChild(minCell);

            /* Máximo */
            var maxCell = document.createElement('div');
            maxCell.className = 'res360-table__cell-num';
            maxCell.id = 'res360-max-' + idx;
            row.appendChild(maxCell);

            /* Color picker */
            var colorCell = document.createElement('div');
            colorCell.className = 'res360-table__cell-color';
            var colorButtons = COLORES.map(function (c) {
                return '<button type="button" class="res360-color-btn ' + (rango.color === c.id ? 'res360-color-btn--selected' : '') + '" ' +
                    'style="background:' + c.hex + ';" data-color="' + c.id + '" data-idx="' + idx + '" title="' + c.label + '" aria-label="' + c.label + '">' +
                    (rango.color === c.id ? '<i class="far fa-check" style="color:#fff;font-size:10px;"></i>' : '') +
                    '</button>';
            }).join('');
            colorCell.innerHTML = '<div class="res360-color-picker">' + colorButtons + '</div>';
            row.appendChild(colorCell);

            rowsContainer.appendChild(row);

            /* Crear inputs después de que el DOM esté listo */
            createInput({
                containerId: 'res360-nombre-' + idx,
                type: 'text',
                placeholder: 'Nombre del rango',
                size: 'sm',
                value: rango.nombre,
                onChange: function (val) {
                    _rangos[idx].nombre = val;
                    renderPreview();
                }
            });

            createInput({
                containerId: 'res360-min-' + idx,
                type: 'number',
                placeholder: '0',
                size: 'sm',
                value: String(rango.min),
                onChange: function (val) {
                    _rangos[idx].min = parseInt(val, 10) || 0;
                    renderPreview();
                }
            });

            createInput({
                containerId: 'res360-max-' + idx,
                type: 'number',
                placeholder: '0',
                size: 'sm',
                value: String(rango.max),
                onChange: function (val) {
                    _rangos[idx].max = parseInt(val, 10) || 0;
                    renderPreview();
                }
            });

            /* Color buttons */
            colorCell.querySelectorAll('.res360-color-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var colorId = btn.dataset.color;
                    var i = parseInt(btn.dataset.idx, 10);
                    _rangos[i].color = colorId;
                    renderTable();
                    renderPreview();
                });
            });
        });

        renderPreview();
    }

    /* ── Cambiar cantidad ── */
    function setCantidad(n) {
        _cantidad = n;
        var draft = loadDraft();
        if (draft.resultados && draft.resultados.cantidad === n && draft.resultados.rangos && draft.resultados.rangos.length === n) {
            _rangos = JSON.parse(JSON.stringify(draft.resultados.rangos));
        } else {
            _rangos = JSON.parse(JSON.stringify(DEFAULTS[n]));
        }

        /* actualizar botones de cantidad */
        document.querySelectorAll('.res360-cant-btn').forEach(function (btn) {
            if (parseInt(btn.dataset.n, 10) === n) {
                btn.classList.add('ubits-button--active');
            } else {
                btn.classList.remove('ubits-button--active');
            }
        });

        renderTable();
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadSidebar('admin', 'desempeño');
        loadTabBar('tab-bar-container', 'admin');
        loadFloatingMenu('floating-menu-container', 'admin');
        loadProfileMenu('profile-menu-container');

        var draft = loadDraft();
        var savedRes = draft.resultados;
        var initialCantidad = (savedRes && savedRes.cantidad) ? savedRes.cantidad : 4;

        setCantidad(initialCantidad);

        /* Botones cantidad */
        document.querySelectorAll('.res360-cant-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                setCantidad(parseInt(btn.dataset.n, 10));
            });
        });

        document.getElementById('res360-btn-back').addEventListener('click', function () {
            window.location.href = 'crear-360.html';
        });
        document.getElementById('res360-btn-cancel').addEventListener('click', function () {
            window.location.href = 'crear-360.html';
        });
        document.getElementById('res360-btn-save').addEventListener('click', function () {
            var d = loadDraft();
            d.resultados = { cantidad: _cantidad, rangos: _rangos };
            if (!d.checks) d.checks = {};
            d.checks.resultados = true;
            saveDraft(d);
            window.location.href = 'crear-360.html?saved=resultados';
        });

        if (typeof initTooltip === 'function') initTooltip('[data-tooltip]');
    });
}());
</script>
</body>
</html>
