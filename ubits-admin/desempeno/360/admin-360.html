<script>
(function () {
    'use strict';

    var tablaRef = null;
    var pendingDeleteId = null;
    var pendingFinishId = null;

    /* ── helpers ── */
    function escapeHtml(t) {
        if (t == null) return '';
        var d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    /**
     * Estado en listado: requiere `row.activada === true` para salir de borrador.
     * - Sin activar: siempre borrador (aunque tenga fechas; si llega el inicio sin activar, sigue borrador).
     * - Activada: finalizada si estado guardado es finalizada o ya pasó fecha fin;
     *   por iniciar si inicio futuro; en progreso si ya empezó el período.
     */
    function calcEstado(row) {
        if (!row) return 'borrador';
        var activada = row.activada === true;
        var hoy = new Date();
        hoy.setHours(0, 0, 0, 0);
        var fin    = row.fechaFin    ? new Date(row.fechaFin)    : null;
        var inicio = row.fechaInicio ? new Date(row.fechaInicio) : null;

        if (!activada) {
            return 'borrador';
        }
        if (row.estado === 'finalizada' || (fin && fin < hoy)) {
            return 'finalizada';
        }
        if (inicio && inicio > hoy) {
            return 'por_iniciar';
        }
        if (inicio && inicio <= hoy) {
            return 'activa';
        }
        return 'borrador';
    }

    function getEstadoTagType(estado) {
        if (estado === 'activa')       return 'success';
        if (estado === 'finalizada')   return 'neutral';
        if (estado === 'por_iniciar') return 'warning';
        return 'info'; /* borrador */
    }

    function getEstadoLabel(estado) {
        var labels = {
            borrador: 'Borrador',
            activa: 'En progreso',
            por_iniciar: 'Por iniciar',
            finalizada: 'Finalizada'
        };
        return labels[estado] || estado;
    }

    /** Solo visible si hay ≥2 seleccionadas y todas están «En progreso» (calcEstado === activa). */
    function syncA360DescargarButton(selectedIds) {
        var btn = document.getElementById('a360-btn-descargar');
        if (!btn) return;
        var ids = Array.isArray(selectedIds) ? selectedIds : [];
        var ok = ids.length >= 2 && ids.every(function (id) {
            var ev = BD_EVALUACIONES_360.getEvaluacionById(id != null ? String(id) : '');
            return !!ev && calcEstado(ev) === 'activa';
        });
        /* inline-flex gana a [hidden] con .ubits-button en algunos navegadores */
        btn.style.display = ok ? 'inline-flex' : 'none';
        btn.hidden = !ok;
        btn.setAttribute('aria-hidden', ok ? 'false' : 'true');
        btn.disabled = !ok;
    }

    function selectionAllowsDescargaProgreso(selectedIds) {
        var ids = Array.isArray(selectedIds) ? selectedIds : [];
        return ids.length >= 2 && ids.every(function (id) {
            var ev = BD_EVALUACIONES_360.getEvaluacionById(id != null ? String(id) : '');
            return !!ev && calcEstado(ev) === 'activa';
        });
    }

    /** Misma lectura natural que planes-formacion (p. ej. «15 mar 2026»). */
    function formatDate(d) {
        if (!d) return '—';
        if (typeof window.formatDateDDMmmAAAA === 'function') {
            var natural = window.formatDateDDMmmAAAA(d);
            return (natural && String(natural).trim()) ? natural : '—';
        }
        var parts = String(d).split('-');
        if (parts.length !== 3) return String(d);
        return parts[2] + '/' + parts[1] + '/' + parts[0];
    }

    /* ── modal eliminar ── */
    function buildDeleteModal() {
        if (typeof getModalHtml !== 'function') return;
        var body = '<p class="ubits-body-md-regular">¿Estás seguro de que deseas eliminar esta evaluación? Esta acción no se puede deshacer.</p>';
        var footer = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--md" id="a360-delete-cancel"><span>Cancelar</span></button>' +
            '<button type="button" class="ubits-button ubits-button--error ubits-button--md" id="a360-delete-confirm"><span>Eliminar</span></button>';
        document.getElementById('a360-modals-container').innerHTML =
            getModalHtml({ overlayId: 'a360-delete-overlay', title: 'Eliminar evaluación', bodyHtml: body, footerHtml: footer, size: 'sm', closeButtonId: 'a360-delete-close' });
    }

    function openDeleteModal(id) {
        pendingDeleteId = id;
        var overlay = document.getElementById('a360-delete-overlay');
        if (overlay) { overlay.style.display = 'flex'; overlay.removeAttribute('aria-hidden'); }
    }
    function closeDeleteModal() {
        pendingDeleteId = null;
        var overlay = document.getElementById('a360-delete-overlay');
        if (overlay) { overlay.style.display = 'none'; overlay.setAttribute('aria-hidden', 'true'); }
    }

    /* ── modal finalizar ── */
    function openFinishModal(id) {
        pendingFinishId = id;
        var ev = BD_EVALUACIONES_360.getEvaluacionById(id);
        openModal({
            overlayId: 'a360-finish-modal',
            title: 'Finalizar evaluación',
            bodyHtml: '<p class="ubits-body-md-regular">¿Deseas finalizar <strong>' + escapeHtml(ev ? ev.nombre : '') + '</strong>? Los evaluadores ya no podrán responder.</p>',
            footerHtml: '<button class="ubits-button ubits-button--secondary ubits-button--md" onclick="closeModal(\'a360-finish-modal\')"><span>Cancelar</span></button>' +
                '<button class="ubits-button ubits-button--primary ubits-button--md" id="a360-confirm-finish-btn"><span>Finalizar</span></button>',
            size: 'sm',
            closeOnOverlayClick: true
        });
        setTimeout(function () {
            var btn = document.getElementById('a360-confirm-finish-btn');
            if (btn) btn.addEventListener('click', function () {
                var ev2 = BD_EVALUACIONES_360.getEvaluacionById(pendingFinishId);
                if (ev2) ev2.estado = 'finalizada';
                closeModal('a360-finish-modal');
                if (tablaRef && typeof tablaRef.refresh === 'function') tablaRef.refresh();
                showToast('success', 'Evaluación finalizada correctamente');
            });
        }, 50);
    }

    /* ── row HTML para ubits-data-table ── */
    function buildRowHtml(row) {
        var estadoCalc = calcEstado(row);
        var tipo  = getEstadoTagType(estadoCalc);
        var label = getEstadoLabel(estadoCalc);
        var tagHtml = '<span class="ubits-status-tag ubits-status-tag--' + tipo + ' ubits-status-tag--sm"><span class="ubits-status-tag__text">' + escapeHtml(label) + '</span></span>';
        var accionesBtn = '<button type="button" class="ubits-button ubits-button--secondary ubits-button--sm ubits-button--icon-only js-a360-row-acciones-btn" ' +
            'data-id="' + escapeHtml(String(row.id)) + '" data-estado="' + escapeHtml(estadoCalc) + '" ' +
            'aria-label="Acciones" data-tooltip="Acciones" data-tooltip-delay="500">' +
            '<i class="far fa-ellipsis-vertical"></i></button>';
        return '<td data-col="nombre"><span class="ubits-body-sm-regular">' + escapeHtml(row.nombre) + '</span></td>' +
            '<td data-col="fecha-inicio" data-date="' + escapeHtml(row.fechaInicio) + '"><span class="ubits-body-sm-regular">' + escapeHtml(formatDate(row.fechaInicio)) + '</span></td>' +
            '<td data-col="fecha-fin" data-date="' + escapeHtml(row.fechaFin) + '"><span class="ubits-body-sm-regular">' + escapeHtml(formatDate(row.fechaFin)) + '</span></td>' +
            '<td data-col="estado">' + tagHtml + '</td>' +
            '<td data-col="acciones" class="a360-tabla__td-acciones">' + accionesBtn + '</td>';
    }

    /* ── menú contextual por fila ── */
    function openRowMenu(btn, id, estado) {
        if (typeof getDropdownMenuHtml !== 'function' || typeof openDropdownMenu !== 'function') return;
        var ACCIONES_POR_ESTADO = {
            borrador:   [{ text: 'Editar',             value: 'editar',       leftIcon: 'pen'              },
                         { text: 'Duplicar',            value: 'duplicar',     leftIcon: 'copy'             },
                         { text: 'Eliminar',            value: 'eliminar',     leftIcon: 'trash', danger: true }],
            por_iniciar: [{ text: 'Editar',             value: 'editar',       leftIcon: 'pen'              },
                         { text: 'Finalizar',           value: 'finalizar',    leftIcon: 'flag-checkered'   },
                         { text: 'Enviar recordatorio', value: 'recordatorio', leftIcon: 'bell'             },
                         { text: 'Duplicar',            value: 'duplicar',     leftIcon: 'copy'             },
                         { text: 'Eliminar',            value: 'eliminar',     leftIcon: 'trash', danger: true }],
            activa:     [{ text: 'Editar',             value: 'editar',       leftIcon: 'pen'              },
                         { text: 'Finalizar',           value: 'finalizar',    leftIcon: 'flag-checkered'   },
                         { text: 'Enviar recordatorio', value: 'recordatorio', leftIcon: 'bell'             },
                         { text: 'Duplicar',            value: 'duplicar',     leftIcon: 'copy'             },
                         { text: 'Eliminar',            value: 'eliminar',     leftIcon: 'trash', danger: true }],
            finalizada: [{ text: 'Ver detalle',        value: 'ver',          leftIcon: 'eye'              },
                         { text: 'Duplicar',            value: 'duplicar',     leftIcon: 'copy'             },
                         { text: 'Eliminar',            value: 'eliminar',     leftIcon: 'trash', danger: true }]
        };
        var options = ACCIONES_POR_ESTADO[estado] || ACCIONES_POR_ESTADO['borrador'];
        var overlayId = 'a360-row-menu-overlay';
        var prev = document.getElementById(overlayId);
        if (prev) prev.remove();
        document.body.insertAdjacentHTML('beforeend', getDropdownMenuHtml({ overlayId: overlayId, options: options }));
        var overlay = document.getElementById(overlayId);
        if (!overlay) return;
        overlay.style.zIndex = '10100';
        overlay.querySelectorAll('.ubits-dropdown-menu__option').forEach(function (opt) {
            opt.addEventListener('click', function () {
                var val = this.getAttribute('data-value');
                closeDropdownMenu(overlayId);
                if (overlay.parentNode) overlay.remove();
                handleAccion(id, val);
            });
        });
        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) { closeDropdownMenu(overlayId); if (overlay.parentNode) overlay.remove(); }
        });
        openDropdownMenu(overlayId, btn, { alignRight: true });
    }

    /* ── acciones ── */
    function handleAccion(id, accion) {
        if (accion === 'ver') {
            showToast('info', 'Esta vista aún no está disponible en el Playground.');
            return;
        }
        if (accion === 'editar') {
            window.location.href = 'editar-360.html?id=' + encodeURIComponent(String(id));
            return;
        }
        if (accion === 'duplicar') {
            var orig = BD_EVALUACIONES_360.getEvaluacionById(id);
            if (orig) {
                var clone = JSON.parse(JSON.stringify(orig));
                clone.nombre = 'Copia de ' + orig.nombre;
                clone.estado = 'borrador';
                clone.activada = false;
                clone.checks = { tipo: false, competencias: false, evaluados: false, resultados: false };
                BD_EVALUACIONES_360.addEvaluacion(clone);
                if (tablaRef && typeof tablaRef.refresh === 'function') tablaRef.refresh();
                showToast('success', 'Evaluación duplicada');
            }
        } else if (accion === 'eliminar') {
            openDeleteModal(id);
        } else if (accion === 'finalizar') {
            openFinishModal(id);
        } else if (accion === 'recordatorio') {
            showToast('info', 'Recordatorio enviado a los evaluadores');
        }
    }

    /* ── inicialización ── */
    document.addEventListener('DOMContentLoaded', function () {
        loadSidebar('admin', 'desempeño');
        loadSubNav('top-nav-container', 'admin-desempeño');
        /* Forzar tab activo tras el timer interno del componente (200 ms) */
        setTimeout(function () {
            var nav = document.getElementById('top-nav-container');
            if (!nav) return;
            nav.querySelectorAll('.nav-tab').forEach(function (t) { t.classList.remove('active'); });
            var target = nav.querySelector('.nav-tab[data-tab="evaluations"]');
            if (target) target.classList.add('active');
        }, 350);
        /* Corregir rutas del selector de SubNav: página 3 niveles de profundidad,
           el componente genera URLs con '../../' (2 niveles) y no pasa por
           getCorrectTabUrl(). Se intercepta el clic usando data-tab + getCorrectTabUrl
           (función global de sub-nav.js) para obtener el path ajustado correctamente,
           sin depender del atributo href (que puede estar modificado). */
        (function fixSubNavSelectorPaths() {
            var nav = document.getElementById('top-nav-container');
            if (!nav) return;
            nav.addEventListener('click', function (e) {
                var item = e.target.closest('.module-selector-item');
                if (!item) return;
                var tabId = item.getAttribute('data-tab');
                if (!tabId) return;
                /* Buscar configuración del tab en la variante admin-desempeño */
                var tabs = (typeof TOP_NAV_VARIANTS !== 'undefined' &&
                            TOP_NAV_VARIANTS['admin-desempeño'])
                           ? TOP_NAV_VARIANTS['admin-desempeño'].tabs : [];
                var tabConfig = null;
                for (var i = 0; i < tabs.length; i++) {
                    if (tabs[i].id === tabId) { tabConfig = tabs[i]; break; }
                }
                if (!tabConfig || !tabConfig.url) return;
                /* getCorrectTabUrl ajusta el prefijo según la profundidad actual */
                var correctUrl = typeof getCorrectTabUrl === 'function'
                    ? getCorrectTabUrl(tabConfig, 'admin-desempeño')
                    : tabConfig.url;
                e.preventDefault();
                e.stopImmediatePropagation();
                window.location.href = correctUrl;
            }, true);
        })();
        loadTabBar('tab-bar-container', 'admin');
        loadFloatingMenu('floating-menu-container', 'admin');
        loadProfileMenu('profile-menu-container');
        /* Corregir rutas del floating menu: esta página está 3 niveles de profundidad
           pero el componente genera URLs con '../../' (2 niveles). */
        (function fixFloatingMenuPaths() {
            var container = document.getElementById('floating-menu-container');
            if (!container) return;
            container.querySelectorAll('a[href]').forEach(function (a) {
                var h = a.getAttribute('href');
                if (h && h.startsWith('../../')) {
                    a.setAttribute('href', '../' + h);
                }
            });
        })();

        /* header product */
        if (typeof loadHeaderProduct === 'function') {
            loadHeaderProduct('header-product-container', {
                productName: 'Evaluaciones 360',
                breadcrumbItems: [],
                secondaryButtons: [
                    {
                        text: 'Asignación masiva',
                        icon: 'fa-users',
                        onClick: function () {}
                    }
                ],
                primaryButton: {
                    text: 'Crear evaluación',
                    icon: 'fa-plus',
                    onClick: function () { window.location.href = 'crear-360.html'; }
                }
            });
        }

        /* modal de eliminar */
        buildDeleteModal();

        /* ubits-data-table */
        if (typeof createUbitsDataTable === 'function') {
            tablaRef = createUbitsDataTable({
                containerId: 'a360-data-table-container',
                tableId: 'a360-table',
                title: 'Lista de evaluaciones',
                columns: [
                    { id: 'nombre',       label: 'Nombre',       sortable: true },
                    { id: 'fecha-inicio', label: 'Fecha inicio',  sortable: true, sortType: 'date' },
                    { id: 'fecha-fin',    label: 'Fecha fin',     sortable: true, sortType: 'date' },
                    { id: 'estado',       label: 'Estado',        filterable: true },
                    { id: 'acciones',     label: 'Acciones' }
                ],
                getData: function () {
                    var items = BD_EVALUACIONES_360.getEvaluaciones().slice();
                    items.sort(function (a, b) {
                        var sa = calcEstado(a);
                        var sb = calcEstado(b);
                        var aBorrador = sa === 'borrador';
                        var bBorrador = sb === 'borrador';
                        if (aBorrador && !bBorrador) return -1;
                        if (!aBorrador && bBorrador) return 1;
                        return (b.fechaInicio || '').localeCompare(a.fechaInicio || '');
                    });
                    return items;
                },
                rowIdField: 'id',
                buildRowHtml: buildRowHtml,
                features: { checkboxes: true, search: true, filters: true, verSeleccionados: true, actionBar: true, resultsCount: true },
                onSelectionChange: function (selectedIds) {
                    syncA360DescargarButton(selectedIds);
                },
                actionBarButtons: [
                    {
                        id: 'eliminar',
                        label: 'Eliminar',
                        icon: 'fa-trash',
                        variant: 'error-secondary',
                        onClick: function (selectedIds) {
                            if (!selectedIds || selectedIds.length === 0) return;
                            /* borrar en lote */
                            selectedIds.forEach(function (id) { BD_EVALUACIONES_360.deleteEvaluacion(id); });
                            if (tablaRef && typeof tablaRef.refresh === 'function') tablaRef.refresh();
                            showToast('success', selectedIds.length + ' evaluación(es) eliminada(s)');
                        }
                    }
                ],
                emptyState: {
                    message: 'Aún no tienes evaluaciones',
                    icon: 'far fa-clipboard-list',
                    description: 'Crea tu primera evaluación 360 usando el botón de arriba.'
                },
                i18n: {
                    selectAll: 'Seleccionar todo',
                    deselectAll: 'Deseleccionar todo',
                    verSeleccionados: 'Ver seleccionados',
                    clearFilters: 'Limpiar filtros',
                    filtrosAplicados: 'Filtros aplicados',
                    buscar: 'Buscar'
                }
            });

            setTimeout(function () {
                /* Descargar progreso: 2+ seleccionadas, todas «En progreso»; a la izquierda de Eliminar */
                var actionBtnsWrap = document.querySelector('#a360-data-table-container .ubits-dt-action-buttons');
                if (actionBtnsWrap && !document.getElementById('a360-btn-descargar')) {
                    var dlBtn = document.createElement('button');
                    dlBtn.type = 'button';
                    dlBtn.id = 'a360-btn-descargar';
                    dlBtn.className = 'ubits-button ubits-button--secondary ubits-button--sm';
                    dlBtn.hidden = true;
                    dlBtn.style.display = 'none';
                    dlBtn.disabled = true;
                    dlBtn.setAttribute('aria-label', 'Descargar progreso de evaluaciones seleccionadas');
                    dlBtn.innerHTML = '<i class="far fa-download"></i><span>Descargar progreso</span>';
                    dlBtn.addEventListener('click', function () {
                        var ids = tablaRef && typeof tablaRef.getSelectedIds === 'function' ? tablaRef.getSelectedIds() : [];
                        if (!selectionAllowsDescargaProgreso(ids)) return;
                        showToast('success', 'Descarga iniciada para ' + ids.length + ' evaluación(es)');
                    });
                    actionBtnsWrap.insertBefore(dlBtn, actionBtnsWrap.firstChild);
                }
                syncA360DescargarButton(tablaRef && typeof tablaRef.getSelectedIds === 'function' ? tablaRef.getSelectedIds() : []);

                /* Inyectar botón "Resultados generales" al lado derecho del buscador */
                var headerRight = document.querySelector('#a360-data-table-container .ubits-dt-header-right');
                if (headerRight) {
                    var searchInline = headerRight.querySelector('.ubits-dt-search-inline');
                    var anchorEl = searchInline || headerRight.querySelector('.ubits-dt-search-toggle');
                    var btn = document.createElement('button');
                    btn.type    = 'button';
                    btn.id      = 'a360-btn-resultados-generales';
                    btn.className = 'ubits-button ubits-button--secondary ubits-button--md';
                    btn.innerHTML = '<i class="far fa-chart-line-up"></i><span>Resultados generales</span>';
                    if (anchorEl) {
                        anchorEl.insertAdjacentElement('afterend', btn);
                    } else {
                        headerRight.appendChild(btn);
                    }
                }
                if (typeof initTooltip === 'function') initTooltip('#a360-data-table-container [data-tooltip]');
            }, 50);
        }

        /* delegación de clics en la tabla */
        var tableContainer = document.getElementById('a360-data-table-container');
        if (tableContainer) {
            tableContainer.addEventListener('click', function (e) {
                var accionBtn = e.target.closest('.js-a360-row-acciones-btn');
                if (accionBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    openRowMenu(accionBtn, accionBtn.dataset.id, accionBtn.dataset.estado);
                    return;
                }
                /* clic en fila → edición salvo evaluaciones finalizadas (vista detalle pendiente) */
                var row = e.target.closest('tbody tr[data-id]');
                if (!row || e.target.closest('.ubits-checkbox') || e.target.closest('input[type="checkbox"]') || e.target.closest('.js-a360-row-acciones-btn')) return;
                var id = row.getAttribute('data-id');
                if (!id) return;
                var evRow = BD_EVALUACIONES_360.getEvaluacionById(id);
                if (evRow && calcEstado(evRow) === 'finalizada') {
                    showToast('info', 'Esta vista aún no está disponible en el Playground.');
                    return;
                }
                window.location.href = 'editar-360.html?id=' + encodeURIComponent(String(id));
            });
        }

        /* modal eliminar — listeners */
        var deleteClose   = document.getElementById('a360-delete-close');
        var deleteCancel  = document.getElementById('a360-delete-cancel');
        var deleteConfirm = document.getElementById('a360-delete-confirm');
        var deleteOverlay = document.getElementById('a360-delete-overlay');

        function closeDel() { closeDeleteModal(); }
        if (deleteClose)   deleteClose.addEventListener('click', closeDel);
        if (deleteCancel)  deleteCancel.addEventListener('click', closeDel);
        if (deleteOverlay) deleteOverlay.addEventListener('click', function (e) { if (e.target === deleteOverlay) closeDel(); });
        if (deleteConfirm) deleteConfirm.addEventListener('click', function () {
            if (pendingDeleteId) {
                BD_EVALUACIONES_360.deleteEvaluacion(pendingDeleteId);
                if (tablaRef && typeof tablaRef.refresh === 'function') tablaRef.refresh();
                showToast('success', 'Evaluación eliminada');
            }
            closeDel();
        });

        /* toast desde crear-360 */
        var params = new URLSearchParams(window.location.search);
        if (params.get('toast') === 'created') {
            setTimeout(function () { showToast('success', 'Evaluación creada exitosamente'); }, 300);
            history.replaceState(null, '', window.location.pathname);
        }
        if (params.get('toast') === 'activated') {
            setTimeout(function () { showToast('success', 'Evaluación activada correctamente'); }, 300);
            history.replaceState(null, '', window.location.pathname);
        }
    });
}());
</script>
</body>
</html>
