<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/playground-favicon.svg">
    <title>Título Specs CTA Exp Estudio | UBITS Playground</title>
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/badge-tag.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../docs/docs-sidebar.css">
    <link rel="stylesheet" href="../../docs/docstyles.css">
    <link rel="stylesheet" href="../../components/progress-bar.css">
    <link rel="stylesheet" href="../../components/progreso-exp-estudio.css">
    <link rel="stylesheet" href="../../components/titulo-specs-cta-exp-estudio.css">
    <style>
        .preview-control-btn.active {
            background: var(--ubits-accent-brand) !important;
            color: white !important;
            border-color: var(--ubits-accent-brand) !important;
        }
        .preview-control-btn.active span { color: white !important; }
    </style>
</head>
<body class="componentes-page" data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <main class="main-content">
            <div id="top-nav-container"></div>
            <div style="display: flex;">
                <div id="docs-dropdown-container"></div>
                <div id="docs-sidebar-container"></div>
                <div class="components-content">
                    <div class="content-area" style="display: block; width: 100%;">
                        <div style="text-align: center; margin-bottom: 60px;">
                            <h1 class="ubits-display-d2-bold" style="margin-bottom: 24px; color: var(--ubits-accent-brand);">Título Specs CTA Exp Estudio</h1>
                            <p class="ubits-body-md-regular" style="max-width: 800px; margin: 0 auto 32px; line-height: 1.6;">Columna derecha de portada: badge, título, specs, CTAs y progreso según estado del curso.</p>
                        </div>
                        <div style="background: var(--ubits-bg-1); padding: 32px; border-radius: var(--border-radius-lg); margin-bottom: 40px;">
                            <h2 class="ubits-heading-h2" style="margin-bottom: 24px; color: var(--ubits-fg-1-high);">
                                <i class="far fa-eye" style="margin-right: 8px; color: var(--ubits-accent-brand);"></i>
                                Preview del componente
                            </h2>
                            <div style="margin-bottom: 20px; display:flex; flex-wrap:wrap; gap: var(--gap-sm);">
                                <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm preview-control-btn active" data-mode="por-iniciar"><span>Por iniciar</span></button>
                                <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm preview-control-btn" data-mode="en-progreso"><span>En progreso</span></button>
                                <button type="button" class="ubits-button ubits-button--secondary ubits-button--sm preview-control-btn" data-mode="completado"><span>Completado</span></button>
                            </div>

                            <div style="background: var(--ubits-bg-2); padding: 24px; border-radius: var(--border-radius-md); width: 100%; max-width: 420px; box-sizing: border-box;">
                                <div id="preview-mount"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="ubits-toast-container"></div>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/tooltip.js"></script>
    <script src="../../components/progress-bar.js"></script>
    <script src="../../components/progreso-exp-estudio.js"></script>
    <script src="../../components/titulo-specs-cta-exp-estudio.js"></script>
    <script src="../../docs/docs-sidebar.js"></script>
    <script src="../../script.js"></script>
    <script>

        var mode = 'por-iniciar';
        function renderPreview() {
            var mount = document.getElementById('preview-mount');
            if (!mount || typeof tituloSpecsCtaExpEstudioHtml !== 'function') return;
            mount.innerHTML = tituloSpecsCtaExpEstudioHtml({
                contentType: 'Curso',
                title: 'Resolución efectiva de conflictos en equipos de trabajo',
                level: 'Básico',
                duration: '60 min',
                language: 'Español',
                hasCertificate: true,
                subtitles: 'Subtítulos: Español, Inglés, Portugués',
                mode: mode
            });
            if (typeof initTituloSpecsCtaExpEstudio === 'function') {
                initTituloSpecsCtaExpEstudio(mount.firstElementChild, {
                    onPrimary: function () {
                        if (typeof showToast === 'function') showToast('info', 'CTA primario', { containerId: 'ubits-toast-container', duration: 1800 });
                    },
                    onSecondary: function () {
                        if (typeof showToast === 'function') showToast('info', 'Descargar certificado', { containerId: 'ubits-toast-container', duration: 1800 });
                    }
                });
            }
        }
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('[data-mode]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    mode = btn.getAttribute('data-mode');
                    document.querySelectorAll('[data-mode]').forEach(function (b) {
                        b.classList.toggle('active', b === btn);
                    });
                    renderPreview();
                });
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            if (typeof loadSubNav === 'function') loadSubNav('top-nav-container', 'documentacion');
            if (typeof loadSidebar === 'function') loadSidebar('ninguno');
            if (typeof loadDocsSidebar === 'function') loadDocsSidebar('titulo-specs-cta-exp-estudio');
            if (typeof renderPreview === 'function') renderPreview();
        });
    </script>
</body>
</html>
