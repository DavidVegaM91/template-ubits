<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/playground-favicon.svg">
    <title>Feedback Exp Estudio | UBITS Playground</title>
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../docs/docs-sidebar.css">
    <link rel="stylesheet" href="../../docs/docstyles.css">
    <link rel="stylesheet" href="../../components/feedback-exp-estudio.css">
    <style>
        .preview-control-btn.active {
            background: var(--ubits-accent-brand) !important;
            color: white !important;
            border-color: var(--ubits-accent-brand) !important;
        }
        .preview-control-btn.active span { color: white !important; }
    </style>
</head>
<body class="componentes-page" data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <main class="main-content">
            <div id="top-nav-container"></div>
            <div style="display: flex;">
                <div id="docs-dropdown-container"></div>
                <div id="docs-sidebar-container"></div>
                <div class="components-content">
                    <div class="content-area" style="display: block; width: 100%;">
                        <div style="text-align: center; margin-bottom: 60px;">
                            <h1 class="ubits-display-d2-bold" style="margin-bottom: 24px; color: var(--ubits-accent-brand);">Feedback Exp Estudio</h1>
                            <p class="ubits-body-md-regular" style="max-width: 800px; margin: 0 auto 32px; line-height: 1.6;">Ícono de estado 24px para filas del índice learner: bloqueada (candado), activa (spinner) o completada (check).</p>
                        </div>
                        <div style="background: var(--ubits-bg-1); padding: 32px; border-radius: var(--border-radius-lg); margin-bottom: 40px;">
                            <h2 class="ubits-heading-h2" style="margin-bottom: 24px; color: var(--ubits-fg-1-high);">
                                <i class="far fa-eye" style="margin-right: 8px; color: var(--ubits-accent-brand);"></i>
                                Preview del componente
                            </h2>

                            <div style="background: var(--ubits-bg-2); padding: 24px; border-radius: var(--border-radius-md); width: 100%; max-width: 420px; box-sizing: border-box;">
                                <div id="preview-mount"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="ubits-toast-container"></div>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/tooltip.js"></script>
    <script src="../../components/feedback-exp-estudio.js"></script>
    <script src="../../docs/docs-sidebar.js"></script>
    <script src="../../script.js"></script>
    <script>

        function renderPreview() {
            var mount = document.getElementById('preview-mount');
            if (!mount || typeof feedbackExpEstudioHtml !== 'function') return;
            mount.innerHTML =
                '<div style="display:flex;gap:24px;align-items:center;">' +
                feedbackExpEstudioHtml({ type: 'locked' }) +
                feedbackExpEstudioHtml({ type: 'progress' }) +
                feedbackExpEstudioHtml({ type: 'check' }) +
                '</div>';
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (typeof loadSubNav === 'function') loadSubNav('top-nav-container', 'documentacion');
            if (typeof loadSidebar === 'function') loadSidebar('ninguno');
            if (typeof loadDocsSidebar === 'function') loadDocsSidebar('feedback-exp-estudio');
            if (typeof renderPreview === 'function') renderPreview();
        });
    </script>
</body>
</html>
