<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../images/playground-favicon.svg">
    <title>Índice Exp Estudio | UBITS Playground</title>
    <link rel="stylesheet" href="../../general-styles/ubits-colors.css">
    <link rel="stylesheet" href="../../general-styles/styles.css">
    <link rel="stylesheet" href="../../general-styles/fontawesome-icons.css">
    <link rel="stylesheet" href="../../general-styles/ubits-typography.css">
    <link rel="stylesheet" href="../../components/sub-nav.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="../../components/button.css">
    <link rel="stylesheet" href="../../components/toast.css">
    <link rel="stylesheet" href="../../components/tooltip.css">
    <link rel="stylesheet" href="../../docs/docs-sidebar.css">
    <link rel="stylesheet" href="../../docs/docstyles.css">
    <link rel="stylesheet" href="../../components/modal.css">
    <link rel="stylesheet" href="../../components/feedback-exp-estudio.css">
    <link rel="stylesheet" href="../../components/paginas-exp-estudio.css">
    <link rel="stylesheet" href="../../components/seccion-exp-estudio.css">
    <link rel="stylesheet" href="../../components/indice-exp-estudio.css">
    <style>
        .preview-control-btn.active {
            background: var(--ubits-accent-brand) !important;
            color: white !important;
            border-color: var(--ubits-accent-brand) !important;
        }
        .preview-control-btn.active span { color: white !important; }
    </style>
</head>
<body class="componentes-page" data-theme="light">
    <div class="dashboard-container">
        <div class="tooltip" id="tooltip"></div>
        <main class="main-content">
            <div id="top-nav-container"></div>
            <div style="display: flex;">
                <div id="docs-dropdown-container"></div>
                <div id="docs-sidebar-container"></div>
                <div class="components-content">
                    <div class="content-area" style="display: block; width: 100%;">
                        <div style="text-align: center; margin-bottom: 60px;">
                            <h1 class="ubits-display-d2-bold" style="margin-bottom: 24px; color: var(--ubits-accent-brand);">Índice Exp Estudio</h1>
                            <p class="ubits-body-md-regular" style="max-width: 800px; margin: 0 auto 32px; line-height: 1.6;">Stack de Sección Exp Estudio (tarjetas separadas con gap, como Creator). Sin card envolvente ni fondo bg-3.</p>
                        </div>
                        <div style="background: var(--ubits-bg-1); padding: 32px; border-radius: var(--border-radius-lg); margin-bottom: 40px;">
                            <h2 class="ubits-heading-h2" style="margin-bottom: 24px; color: var(--ubits-fg-1-high);">
                                <i class="far fa-eye" style="margin-right: 8px; color: var(--ubits-accent-brand);"></i>
                                Preview del componente
                            </h2>

                            <div style="background: var(--ubits-bg-2); padding: 24px; border-radius: var(--border-radius-md); width: 100%; max-width: 420px; box-sizing: border-box;">
                                <div id="preview-mount"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="ubits-toast-container"></div>
    <script src="../../components/sidebar.js"></script>
    <script src="../../components/sub-nav.js"></script>
    <script src="../../components/toast.js"></script>
    <script src="../../components/tooltip.js"></script>
    <script src="../../components/modal.js"></script>
    <script src="../../components/feedback-exp-estudio.js"></script>
    <script src="../../components/paginas-exp-estudio.js"></script>
    <script src="../../components/seccion-exp-estudio.js"></script>
    <script src="../../components/indice-exp-estudio.js"></script>
    <script src="../../docs/docs-sidebar.js"></script>
    <script src="../../script.js"></script>
    <script>

        var DEMO_SECTIONS = [
            {
                id: 'sec-1',
                title: 'Sección 1: Fundamentos',
                pages: [
                    { id: 'p-1', title: 'Comunicación para desescalar un conflicto', tipo: 'video', state: 'completada', clickable: true },
                    { id: 'p-2', title: 'Guía mapa de conflicto', tipo: 'pdf', state: 'completada', clickable: true }
                ]
            },
            {
                id: 'sec-2',
                title: 'Sección 2: Herramientas para resolver conflictos',
                descriptionHtml: '<p class="ubits-body-md-regular">Simulaciones, marcos de referencia y evaluación para aplicar lo aprendido en situaciones reales de conflicto en el trabajo.</p>',
                pages: [
                    { id: 'p-3', title: 'Simulador de conversación difícil', tipo: 'scorm', state: 'activa', clickable: true },
                    { id: 'p-4', title: 'Conversaciones difíciles según Thomas-Kilmann', tipo: 'scorm', state: 'bloqueada' },
                    { id: 'p-5', title: 'Evaluación', tipo: 'evaluacion', state: 'bloqueada' },
                    { id: 'p-6', title: 'Fin del contenido', tipo: 'fin', state: 'bloqueada' }
                ]
            }
        ];
        function renderPreview() {
            var mount = document.getElementById('preview-mount');
            if (!mount || typeof createIndiceExpEstudio !== 'function') return;
            createIndiceExpEstudio({
                container: mount,
                sections: DEMO_SECTIONS,
                onPageClick: function (id) {
                    if (typeof showToast === 'function') {
                        showToast('info', 'Página: ' + id, { containerId: 'ubits-toast-container', duration: 2000 });
                    }
                }
            });
            if (typeof initTooltip === 'function') initTooltip('#preview-mount [data-tooltip]');
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (typeof loadSubNav === 'function') loadSubNav('top-nav-container', 'documentacion');
            if (typeof loadSidebar === 'function') loadSidebar('ninguno');
            if (typeof loadDocsSidebar === 'function') loadDocsSidebar('indice-exp-estudio');
            if (typeof renderPreview === 'function') renderPreview();
        });
    </script>
</body>
</html>
